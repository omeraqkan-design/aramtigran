<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getFirestore, collection, doc, setDoc, getDoc, getDocs, addDoc, updateDoc, deleteDoc, onSnapshot, serverTimestamp, query, orderBy, where, limit } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
  import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged, sendPasswordResetEmail, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

  // ══════════════════════════════════════════════════════════════════════
  // ── Firebase Firestore GÜVENLİK KURALLARI (Firebase Console > Firestore > Rules)
  // Bu kuralları Firebase konsolunuza yapıştırın:
  //
  // rules_version = '2';
  // service cloud.firestore {
  //   match /databases/{database}/documents {
  //
  //     // ── Admin e-posta adresi — kendi admin mailinizi yazın ──
  //     function isAdmin() {
  //       return request.auth != null &&
  //              request.auth.token.email == "admin@aramtigran.edu";
  //     }
  //     function isLoggedIn() {
  //       return request.auth != null;
  //     }
  //
  //     // Öğrenciler: sadece admin yazabilir, giriş yapan herkes okuyabilir
  //     match /students/{docId} {
  //       allow read: if isLoggedIn();
  //       allow write: if isAdmin();
  //     }
  //     // Öğretmenler: sadece admin yazabilir
  //     match /teachers/{docId} {
  //       allow read: if isLoggedIn();
  //       allow write: if isAdmin();
  //     }
  //     // Ders programı: giriş yapan öğretmen/admin yazabilir
  //     match /schedule/{docId} {
  //       allow read: if isLoggedIn();
  //       allow write: if isLoggedIn();
  //     }
  //     // Mesajlar: giriş yapan herkes okuyup yazabilir
  //     match /messages/{docId} {
  //       allow read: if isLoggedIn();
  //       allow write: if isLoggedIn();
  //     }
  //     // Duyurular: giriş yapan herkes okuyabilir, admin yazabilir
  //     match /announcements/{docId} {
  //       allow read: if isLoggedIn();
  //       allow write: if isAdmin();
  //     }
  //     // Firebase Auth kullanıcı rolleri (opsiyonel)
  //     match /roles/{uid} {
  //       allow read: if request.auth != null && request.auth.uid == uid;
  //       allow write: if isAdmin();
  //     }
  //   }
  // }
  // ══════════════════════════════════════════════════════════════════════

  // ── Firebase Config — kendi config'inizi buraya yapıştırın ──
  const firebaseConfig = {
    apiKey: "AIzaSyDwzScCH_NTnpEfmSlgIRlOkGivMWc9bGw",
    authDomain: "aram2026-a9fd7.firebaseapp.com",
    projectId: "aram2026-a9fd7",
    storageBucket: "aram2026-a9fd7.firebasestorage.app",
    messagingSenderId: "326496145672",
    appId: "1:326496145672:web:199c6cdd6db08ac3ea9cbd",
    measurementId: "G-11ZK8JRY5E"
  };

  // ── Admin e-posta adresi — Firestore kuralındaki ile aynı olmalı ──
  const ADMIN_EMAIL = "admin@aramtigran.edu"; 

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  const auth = getAuth(app);

  // ── İkinci Firebase instance — kullanıcı oluştururken admin oturumu kapanmaz ──
  // Bu yöntem sayesinde öğretmen/öğrenci eklendiğinde admin olarak kalmaya devam edersiniz.
  let _secondaryApp = null;
  function getSecondaryAuth() {
    if (!_secondaryApp) {
      _secondaryApp = initializeApp(firebaseConfig, "secondary");
    }
    return getAuth(_secondaryApp);
  }

  window.__FB = {
    db, auth,
    ADMIN_EMAIL,
    collection, doc, setDoc, getDoc, getDocs, addDoc, updateDoc, deleteDoc,
    onSnapshot, serverTimestamp, query, orderBy, where, limit,
    signInWithEmailAndPassword, signOut, onAuthStateChanged, sendPasswordResetEmail, createUserWithEmailAndPassword,
    // Koleksiyon referansları
    studentsRef: () => collection(db, "students"),
    teachersRef: () => collection(db, "teachers"),
    scheduleRef: () => collection(db, "schedule"),
    messagesRef: () => collection(db, "messages"),
    announcementsRef: () => collection(db, "announcements"),

    // ── Firebase Auth'a kullanıcı oluştur (admin oturumunu kapatmadan) ──
    // email: kullanıcının e-posta adresi
    // password: geçici şifre (plain text)
    // role: "teacher" | "student"
    async createAuthUser(email, password, role) {
      const secondaryAuth = getSecondaryAuth();
      try {
        const cred = await createUserWithEmailAndPassword(secondaryAuth, email, password);
        const uid = cred.user.uid;
        // Kullanıcı rolünü Firestore'a kaydet (opsiyonel ama tavsiye edilir)
        await setDoc(doc(db, "roles", uid), {
          email,
          role,        // "teacher" veya "student"
          createdAt: serverTimestamp()
        });
        // İkinci oturumu kapat — admin oturumu etkilenmez
        await signOut(secondaryAuth);
        console.log("✅ Firebase Auth kullanıcı oluşturuldu:", email, "| Rol:", role);
        return { uid, email };
      } catch(e) {
        // İkinci oturumu yine de kapat
        try { await signOut(secondaryAuth); } catch(_) {}
        throw e;
      }
    },

    // ── CRUD helpers ──
    async saveStudent(s) {
      // Şifreyi Firestore'a kaydetme! (Firebase Auth halleder)
      const { pass, ...safeData } = s;
      const ref = s.fireId ? doc(db,"students",s.fireId) : doc(collection(db,"students"));
      await setDoc(ref, {...safeData, fireId: ref.id, updatedAt: serverTimestamp()});
      return ref.id;
    },
    async saveTeacher(tc) {
      // Şifreyi Firestore'a kaydetme!
      const { pass, ...safeData } = tc;
      const ref = tc.fireId ? doc(db,"teachers",tc.fireId) : doc(collection(db,"teachers"));
      await setDoc(ref, {...safeData, fireId: ref.id, updatedAt: serverTimestamp()});
      return ref.id;
    },
    async saveSchedule(ls) {
      const ref = ls.fireId ? doc(db,"schedule",ls.fireId) : doc(collection(db,"schedule"));
      await setDoc(ref, {...ls, fireId: ref.id, updatedAt: serverTimestamp()});
      return ref.id;
    },
    async deleteSchedule(fireId) {
      await deleteDoc(doc(db,"schedule",fireId));
    },
    async sendMessage(msg) {
      const ref = await addDoc(collection(db,"messages"), {...msg, createdAt: serverTimestamp()});
      return ref.id;
    },
    async sendAnnouncement(ann) {
      const ref = await addDoc(collection(db,"announcements"), {...ann, createdAt: serverTimestamp()});
      return ref.id;
    },
    async markMessageRead(fireId) {
      await updateDoc(doc(db,"messages",fireId), {read: true});
    },
    // Realtime dinleyiciler
    onStudents(cb) { return onSnapshot(collection(db,"students"), snap => cb(snap.docs.map(d=>d.data()))); },
    onTeachers(cb) { return onSnapshot(collection(db,"teachers"), snap => cb(snap.docs.map(d=>d.data()))); },
    onSchedule(cb) { return onSnapshot(collection(db,"schedule"), snap => cb(snap.docs.map(d=>d.data()))); },
    onMessages(userId, cb) {
      const q = query(collection(db,"messages"), where("recipientId","==",userId), orderBy("createdAt","desc"));
      return onSnapshot(q, snap => cb(snap.docs.map(d=>({...d.data(), fireId:d.id}))));
    },
    onAnnouncements(cb) {
      const q = query(collection(db,"announcements"), orderBy("createdAt","desc"));
      return onSnapshot(q, snap => cb(snap.docs.map(d=>({...d.data(), fireId:d.id}))));
    },
    isConfigured() {
      return firebaseConfig.apiKey !== "YOUR_API_KEY";
    },
    // Firebase Auth sign-in helper
    async authSignIn(email, password) {
      return signInWithEmailAndPassword(auth, email, password);
    },
    async authSignOut() {
      return signOut(auth);
    },
    async authResetPassword(email) {
      return sendPasswordResetEmail(auth, email);
    },
    onAuthState(cb) {
      return onAuthStateChanged(auth, cb);
    }
  };
  console.log("✅ Firebase hazır. Yapılandırılmış:", window.__FB.isConfigured());
</script>

async function hashPassword(password) {
  const msgBuffer = new TextEncoder().encode(password);
  const hashBuffer = await crypto.subtle.digest("SHA-256", msgBuffer);
  const hashArray = Array.from(new Uint8Array(hashBuffer));
  return hashArray.map(b => b.toString(16).padStart(2, "0")).join("");
}
async function verifyPassword(plain, storedHash) {
  if (!storedHash) return false;
  if (storedHash.length !== 64) return plain === storedHash; // legacy
  const hashed = await hashPassword(plain);
  return hashed === storedHash;
}
function checkPasswordStrength(pass) {
  if (!pass || pass.length < 8)
    return { ok: false, msg: "Min 8 karakter / 8 tîp" };
  if (!/[A-Z]/.test(pass))
    return { ok: false, msg: "Buyuk harf gerekli / Tipa mezin lazim e" };

  return { ok: true, msg: "" };
}

const MAX_ATTEMPTS = 5;
const LOCKOUT_MS = 10 * 60 * 1000;

  if (!_loginAttempts[uid]) _loginAttempts[uid] = [];
  _loginAttempts[uid] = _loginAttempts[uid].filter(t => now - t < LOCKOUT_MS);
  _loginAttempts[uid].push(now);
}
function isLockedOut(uid) {
  const now = Date.now();
  if (!_loginAttempts[uid]) return false;
  return _loginAttempts[uid].filter(t => now - t < LOCKOUT_MS).length >= MAX_ATTEMPTS;
}

function remainingLockoutSeconds(uid) {
  if (!_loginAttempts[uid] || !_loginAttempts[uid].length) return 0;

/* ── Input Sanitization ── */
function sanitizeText(str) {
  if (!str) return "";
  return String(str)
    .replace(/[<>]/g, "")                  // strip < >
    .replace(/javascript:/gi, "")          // strip js: URIs
    .replace(/on\w+\s*=/gi, "")            // strip event attrs
    .trim()
    .slice(0, 500);                        // max length guard
}
function sanitizeEmail(str) {
  if (!str) return "";

}

/* ── Debounce & Throttle ── */
function debounce(fn, ms = 300) {
  let timer;
  return function(...args) {
    clearTimeout(timer);
    timer = setTimeout(() => fn.apply(this, args), ms);
  };
}
function throttle(fn, ms = 200) {
  let last = 0;
  return function(...args) {
    const now = Date.now();
    if (now - last >= ms) { last = now; fn.apply(this, args); }
  };
}

async function shareContent({ title, text, url }) {

      return true;
    } catch(e) { if (e.name !== "AbortError") console.warn("Share error:", e); }

/* ── Clipboard API ── */
async function copyToClipboard(text) {
  try {
    if (navigator.clipboard && window.isSecureContext) {
      await navigator.clipboard.writeText(text);
      return true;
    }
    // Legacy fallback
    const el = document.createElement("textarea");
    el.value = text; el.style.position = "fixed"; el.style.opacity = "0";
    document.body.appendChild(el); el.select();
    const ok = document.execCommand("copy");
    document.body.removeChild(el);
    return ok;
  } catch(e) { console.warn("Clipboard error:", e); return false; }
}

/* ── Pull-to-Refresh Hook ── */
function usePullToRefresh(onRefresh, containerRef) {
  const startY = useRef(0);
  const pulling = useRef(false);
  const [pullDist, setPullDist] = useState(0);
  const THRESHOLD = 72;

  useEffect(() => {
    const el = containerRef?.current;
    if (!el) return;

    function onTouchStart(e) {
      if (el.scrollTop > 0) return;
      startY.current = e.touches[0].clientY;
      pulling.current = true;
    }
    function onTouchMove(e) {
      if (!pulling.current) return;
      const dist = Math.max(0, Math.min(THRESHOLD * 1.5, e.touches[0].clientY - startY.current));
      if (dist > 0) { setPullDist(dist); }
    }
    function onTouchEnd() {
      if (pullDist >= THRESHOLD) {
        hapticMedium();
        onRefresh && onRefresh();
      }
      setPullDist(0);
      pulling.current = false;
    }

    el.addEventListener("touchstart", onTouchStart, { passive: true });
    el.addEventListener("touchmove",  onTouchMove,  { passive: true });
    el.addEventListener("touchend",   onTouchEnd,   { passive: true });
    return () => {
      el.removeEventListener("touchstart", onTouchStart);
      el.removeEventListener("touchmove",  onTouchMove);
      el.removeEventListener("touchend",   onTouchEnd);
    };
  }, [onRefresh, pullDist, containerRef]);

  return pullDist;
}

/* ── Virtual List Hook (for large student/teacher lists) ── */
function useVirtualList(items, itemHeight = 64, containerHeight = 500) {
  const [scrollTop, setScrollTop] = useState(0);
  const overscan = 5;
  const startIndex = Math.max(0, Math.floor(scrollTop / itemHeight) - overscan);
  const visibleCount = Math.ceil(containerHeight / itemHeight) + overscan * 2;
  const endIndex = Math.min(items.length - 1, startIndex + visibleCount);
  const visibleItems = items.slice(startIndex, endIndex + 1).map((item, i) => ({
    item, index: startIndex + i, offsetTop: (startIndex + i) * itemHeight
  }));
  const totalHeight = items.length * itemHeight;
  const onScroll = useCallback(throttle(e => setScrollTop(e.target.scrollTop), 16), []);
  return { visibleItems, totalHeight, onScroll };
}

function useBiometric(){
  const [supported,setSupported]=useState(false);
  const [authenticated,setAuthenticated]=useState(false);
  
  useEffect(()=>{
    // Check if WebAuthn / Credential Management is available

  },[]);
  
  const authenticate=useCallback(async(username)=>{
    // On mobile browsers, we use the Credential Management API for autofill
    // Full WebAuthn biometrics would require a backend — this is a UI-level hint
    try{
      if("credentials" in navigator && "PasswordCredential" in window){

        if(cred) return {ok:true, username:cred.id, password:cred.password};

/* ─── ABORT CONTROLLER FETCH ─────────────────────────────────────────────── */
function useAbortableFetch() {
  const abortRef = useRef(null);
  const fetchWithAbort = useCallback(async (url, options = {}) => {
    if (abortRef.current) abortRef.current.abort();
    abortRef.current = new AbortController();
    try {
      const res = await fetch(url, { ...options, signal: abortRef.current.signal });
      return res;
    } catch(e) {
      if (e.name === "AbortError") return null;
      throw e;
    }
  }, []);
  useEffect(() => () => { if (abortRef.current) abortRef.current.abort(); }, []);
  return fetchWithAbort;
}

/* ─── IMAGE COMPRESSION ──────────────────────────────────────────────────── */
function compressImage(dataUrl, maxW = 800, maxH = 800, quality = 0.82) {
  return new Promise((resolve) => {
    const img = new Image();
    img.onload = () => {
      let { width, height } = img;
      const ratio = Math.min(maxW / width, maxH / height, 1);
      width = Math.round(width * ratio);
      height = Math.round(height * ratio);
      const canvas = document.createElement("canvas");
      canvas.width = width; canvas.height = height;
      const ctx = canvas.getContext("2d");
      ctx.drawImage(img, 0, 0, width, height);
      canvas.toBlob(blob => {
        const reader = new FileReader();
        reader.onload = e => resolve(e.target.result);
        reader.readAsDataURL(blob);
      }, "image/jpeg", quality);
    };
    img.src = dataUrl;
  });
}

/* ─── INTERSECTION OBSERVER HOOK ─────────────────────────────────────────── */
function useVisible(ref, threshold = 0.15) {
  const [visible, setVisible] = useState(false);
  useEffect(() => {
    if (!ref.current) return;
    const obs = new IntersectionObserver(
      ([entry]) => { if (entry.isIntersecting) { setVisible(true); obs.disconnect(); } },
      { threshold }
    );
    obs.observe(ref.current);
    return () => obs.disconnect();
  }, [ref, threshold]);
  return visible;
}

    fired.current = false;
    timerRef.current = setTimeout(() => {

  }, []);
  return {

  };
}

/* ─── SCREEN WAKE LOCK ───────────────────────────────────────────────────── */
function useWakeLock() {
  const lockRef = useRef(null);
  const acquire = useCallback(async () => {
    try {
      if ("wakeLock" in navigator) {
        lockRef.current = await navigator.wakeLock.request("screen");
        console.log("🔆 Wake lock acquired");
      }
    } catch(e) { console.warn("Wake lock error:", e); }
  }, []);
  const release = useCallback(async () => {
    if (lockRef.current) {
      await lockRef.current.release();
      lockRef.current = null;
    }
  }, []);
  // Auto-release on page hide
  useEffect(() => {
    const onVis = () => { if (document.visibilityState === "hidden") release(); };
    document.addEventListener("visibilitychange", onVis);
    return () => document.removeEventListener("visibilitychange", onVis);
  }, [release]);
  return { acquire, release };
}

/* ─── NETWORK SPEED DETECTION ────────────────────────────────────────────── */
function useNetworkInfo() {
  const [info, setInfo] = useState(() => {
    const conn = navigator.connection || navigator.mozConnection || navigator.webkitConnection;
    return conn ? { type: conn.effectiveType, downlink: conn.downlink, saveData: conn.saveData } : { type: "unknown" };
  });
  useEffect(() => {
    const conn = navigator.connection || navigator.mozConnection || navigator.webkitConnection;
    if (!conn) return;
    const update = () => setInfo({ type: conn.effectiveType, downlink: conn.downlink, saveData: conn.saveData });
    conn.addEventListener("change", update);
    return () => conn.removeEventListener("change", update);
  }, []);
  return info;
}

/* ─── BATTERY API ────────────────────────────────────────────────────────── */
function useBattery() {
  const [battery, setBattery] = useState({ level: null, charging: null });
  useEffect(() => {
    let batt = null;
    const update = (b) => setBattery({ level: Math.round(b.level * 100), charging: b.charging });
    navigator.getBattery && navigator.getBattery().then(b => {
      batt = b;
      update(b);
      b.addEventListener("levelchange",  () => update(b));
      b.addEventListener("chargingchange", () => update(b));
    }).catch(() => {});
    return () => {
      if (batt) {
        batt.removeEventListener("levelchange",  () => {});
        batt.removeEventListener("chargingchange", () => {});
      }
    };
  }, []);
  return battery;
}

/* ─── DEVICE ORIENTATION ─────────────────────────────────────────────────── */
function useOrientation() {
  const [orientation, setOrientation] = useState(() =>
    screen.orientation ? screen.orientation.type : "portrait-primary"
  );
  useEffect(() => {
    const update = () => {
      if (screen.orientation) setOrientation(screen.orientation.type);
      else setOrientation(window.innerWidth > window.innerHeight ? "landscape" : "portrait");
    };
    screen.orientation
      ? screen.orientation.addEventListener("change", update)
      : window.addEventListener("orientationchange", update);
    return () => {
      screen.orientation
        ? screen.orientation.removeEventListener("change", update)
        : window.removeEventListener("orientationchange", update);
    };
  }, []);
  return orientation;
}

/* ─── BARCODE DETECTION API ──────────────────────────────────────────────── */
async function detectBarcodeNative(imageData) {
  if (!("BarcodeDetector" in window)) return null;
  try {
    const detector = new BarcodeDetector({ formats: ["qr_code"] });
    const barcodes = await detector.detect(imageData);
    return barcodes.length > 0 ? barcodes[0].rawValue : null;
  } catch(e) { return null; }
}
const hasBarcodeDetector = () => "BarcodeDetector" in window;

/* ─── LOCALE-AWARE SORT ──────────────────────────────────────────────────── */
function localeSortBy(arr, key, lang) {
  const locale = lang === "de" ? "de-DE" : lang === "en" ? "en-US" : "tr";
  return [...arr].sort((a, b) =>
    String(a[key] || "").localeCompare(String(b[key] || ""), locale, { sensitivity: "base" })
  );
}

/* ─── CURRENCY FORMAT ────────────────────────────────────────────────────── */
function fmtCurrency(amount, lang, currency = "TRY") {
  try {
    const locale = lang === "de" ? "de-DE" : lang === "en" ? "en-US" : "tr-TR";
    return new Intl.NumberFormat(locale, { style: "currency", currency, maximumFractionDigits: 0 }).format(amount);
  } catch { return amount + " " + currency; }
}

/* ─── OFFLINE DATA QUEUE ─────────────────────────────────────────────────── */
const _offlineQueue = [];
function enqueueOfflineAction(action) {
  _offlineQueue.push({ ...action, queuedAt: Date.now() });
  try { localStorage.setItem("aat-offline-queue", JSON.stringify(_offlineQueue)); } catch(e) {}
  console.log(`📥 Offline queue: ${_offlineQueue.length} işlem bekliyor`);
}
async function flushOfflineQueue() {
  if (!navigator.onLine || _offlineQueue.length === 0) return;
  const items = [..._offlineQueue];
  _offlineQueue.length = 0;
  for (const item of items) {
    try {
      if (item.type === "saveAttendance") {
        await fbSaveAttendance(item.lessonId, item.teacherId, item.date, item.records);
      } else if (item.type === "saveStudent") {
        await fbSave("student", item.data);
      } else if (item.type === "saveTeacher") {
        await fbSave("teacher", item.data);
      }
    } catch(e) {
      _offlineQueue.push(item); // re-queue on failure
      console.warn("Offline flush error:", e);
    }
  }
  try { localStorage.setItem("aat-offline-queue", JSON.stringify(_offlineQueue)); } catch(e) {}
  console.log(`✅ Offline queue flushed`);
}
// Flush when coming back online
window.addEventListener("online", () => setTimeout(flushOfflineQueue, 1000));
// Load persisted queue on startup
try {
  const saved = localStorage.getItem("aat-offline-queue");
  if (saved) { const items = JSON.parse(saved); _offlineQueue.push(...items); }
} catch(e) {}

// Lazy image with IntersectionObserver
function LazyImg({src, alt, style, className}) {
  const ref = useRef(null);
  const [loaded, setLoaded] = useState(false);
  const visible = useVisible(ref, 0.1);
  return (
    <div ref={ref} style={{overflow:"hidden",...style}} className={className}
      aria-hidden={!src ? "true" : undefined}>
      {visible && src && (
        <img
          src={src}
          alt={alt || ""}
          loading="lazy"
          decoding="async"
          onLoad={() => setLoaded(true)}
          style={{
            width:"100%", height:"100%",
            objectFit:"cover", display:"block",
            opacity: loaded ? 1 : 0,
            transition: "opacity .3s ease"
          }}
        />
      )}
      {(!visible || !loaded) && !src && (
        <div className="shimmer" style={{width:"100%",height:"100%"}}
          aria-hidden="true"/>
      )}
    </div>
  );
}

/* ─── CSRF / NONCE ───────────────────────────────────────────────────────── */
// For a PWA without a traditional server, CSRF is mitigated by:
// 1. Same-origin policy (browser enforced)
// 2. Firebase Security Rules (server-side enforcement)
// 3. Session nonce for QR tokens (already implemented via random tokens)
function generateNonce(len = 16) {
  const arr = new Uint8Array(len);
  crypto.getRandomValues(arr);
  return Array.from(arr).map(b => b.toString(16).padStart(2,"0")).join("");
}
// Used in QR session tokens for replay-attack prevention
window._csrfNonce = generateNonce();

/* ─── SRI VERIFICATION HELPER ───────────────────────────────────────────── */
// Verify CDN script integrity at runtime (belt-and-suspenders)
async function verifyCDNIntegrity(url, expectedHash) {
  try {
    const res = await fetch(url, {cache: "force-cache"});
    const buf = await res.arrayBuffer();
    const hashBuf = await crypto.subtle.digest("SHA-384", buf);
    const hash = btoa(String.fromCharCode(...new Uint8Array(hashBuf)));
    const ok = hash === expectedHash;
    if (!ok) console.warn(`⚠️ SRI mismatch for ${url}`);
    return ok;
  } catch(e) { return true; } // fail open — network errors shouldn't block app
}

/* ─── GEOLOCATION ────────────────────────────────────────────────────────── */
function useGeolocation(enabled = false) {
  const [pos, setPos] = useState(null);
  const [err, setErr] = useState(null);
  useEffect(() => {
    if (!enabled || !navigator.geolocation) return;
    const id = navigator.geolocation.watchPosition(
      p => setPos({ lat: p.coords.latitude, lng: p.coords.longitude, acc: p.coords.accuracy }),
      e => setErr(e.message),
      { enableHighAccuracy: false, timeout: 10000, maximumAge: 60000 }
    );
    return () => navigator.geolocation.clearWatch(id);
  }, [enabled]);
  return { pos, err };
}

/* ─── GYROSCOPE / ACCELEROMETER ─────────────────────────────────────────── */
function useDeviceMotion(enabled = false) {
  const [motion, setMotion] = useState({ x: 0, y: 0, z: 0 });
  useEffect(() => {
    if (!enabled || typeof DeviceMotionEvent === "undefined") return;
    // iOS 13+ requires permission
    async function init() {
      if (typeof DeviceMotionEvent.requestPermission === "function") {
        const perm = await DeviceMotionEvent.requestPermission().catch(() => "denied");
        if (perm !== "granted") return;
      }
      const handler = throttle(e => {
        if (e.accelerationIncludingGravity) {
          setMotion({
            x: e.accelerationIncludingGravity.x || 0,
            y: e.accelerationIncludingGravity.y || 0,
            z: e.accelerationIncludingGravity.z || 0,
          });
        }
      }, 100);
      window.addEventListener("devicemotion", handler);
      return () => window.removeEventListener("devicemotion", handler);
    }
    const cleanup = init();
    return () => cleanup && cleanup.then(fn => fn && fn());
  }, [enabled]);
  return motion;
}

// Firebase Performance Monitoring
// Setup: import { getPerformance, trace } from "firebase/performance"
const _perf = {
  _traces: {},
  startTrace(name) {
    this._traces[name] = { name, startTime: performance.now() };
    return {
      stop: () => {
        const t = this._traces[name];
        if (t) {
          const dur = performance.now() - t.startTime;
          console.debug(`⚡ Perf [${name}]: ${dur.toFixed(1)}ms`);
          window._analytics && window._analytics.logEvent("timing_complete", { name, value: Math.round(dur) });
          delete this._traces[name];
        }
      },
      putAttribute: (k, v) => { if (this._traces[name]) this._traces[name][k] = v; },
      putMetric: (k, v) => { if (this._traces[name]) this._traces[name][k] = v; },
    };
  }
};
window._perf = _perf;
// Measure initial app load
const _appLoadTrace = _perf.startTrace("app_load");
window.addEventListener("load", () => _appLoadTrace.stop(), { once: true });

/* ── role=dialog wrapper — Sheet bileşeni için ── */
function AccessibleSheet({open, onClose, title, children, describedBy}) {
  const titleId = useRef("sheet-title-" + Math.random().toString(36).slice(2,6));
  const descId  = describedBy || ("sheet-desc-" + titleId.current);
  // Trap focus inside dialog when open
  const sheetRef = useRef(null);
  useEffect(() => {
    if (!open) return;
    const el = sheetRef.current;
    if (!el) return;
    const focusable = el.querySelectorAll(
      'button,input,select,textarea,[tabindex]:not([tabindex="-1"])'
    );
    if (focusable.length) focusable[0].focus();
    function trapFocus(e) {
      if (e.key !== "Tab") return;
      const first = focusable[0];
      const last  = focusable[focusable.length - 1];
      if (e.shiftKey) { if (document.activeElement === first) { e.preventDefault(); last.focus(); } }
      else            { if (document.activeElement === last)  { e.preventDefault(); first.focus(); } }
    }
    function onEsc(e) { if (e.key === "Escape") onClose && onClose(); }
    el.addEventListener("keydown", trapFocus);
    el.addEventListener("keydown", onEsc);
    return () => { el.removeEventListener("keydown", trapFocus); el.removeEventListener("keydown", onEsc); };
  }, [open, onClose]);

  return (
    <>
      {open && (
        <div
          onClick={onClose}
          style={{position:"fixed",inset:0,background:"rgba(0,0,0,.55)",zIndex:200,backdropFilter:"blur(2px)"}}
          aria-hidden="true"
        />
      )}
      <div
        ref={sheetRef}
        role="dialog"
        aria-modal="true"
        aria-labelledby={titleId.current}
        aria-describedby={descId}
        style={{
          position:"fixed",bottom:0,left:"50%",
          transform:"translateX(-50%) translateY("+(open?0:110)+"%)",
          width:"100%",maxWidth:430,
          background:"var(--bg1)",
          borderRadius:"26px 26px 0 0",

        }}

}

/* ── aria-expanded on collapsible sections ── */
function ExpandableSection({title, children, defaultOpen=false}) {
  const [open, setOpen] = useState(defaultOpen);
  const id = useRef("exp-" + Math.random().toString(36).slice(2,6));
  return (
    <div>
      <button
        aria-expanded={open}
        aria-controls={id.current}
        onClick={()=>{setOpen(o=>!o); hapticLight();}}
        style={{width:"100%",display:"flex",alignItems:"center",justifyContent:"space-between",
          background:"none",border:"none",cursor:"pointer",padding:"10px 0",
          color:"var(--text)",fontSize:13,fontWeight:600,textAlign:"left"}}
      >
        {title}
        <span aria-hidden="true" style={{transition:"transform .2s",transform:open?"rotate(180deg)":"none",fontSize:12}}>▼</span>
      </button>
      <div
        id={id.current}
        role="region"
        aria-label={title}
        style={{display:open?"block":"none",overflow:"hidden"}}
      >
        {children}
      </div>
    </div>
  );
}

/* ── aria-describedby on form inputs ── */
function DescribedInput({id, label, hint, error, children}) {
  const hintId  = hint  ? id+"-hint"  : undefined;
  const errId   = error ? id+"-error" : undefined;
  const descBy  = [hintId, errId].filter(Boolean).join(" ") || undefined;
  return (
    <div style={{marginBottom:14}}>
      <label htmlFor={id}
        style={{fontSize:11.5,color:"var(--text2)",fontWeight:600,marginBottom:6,display:"block",letterSpacing:"0.03em"}}>
        {label}
      </label>
      {React.cloneElement(children, { id, "aria-describedby": descBy })}
      {hint && !error && (
        <div id={hintId} style={{fontSize:10.5,color:"var(--text2)",marginTop:4}}>{hint}</div>
      )}
      {error && (
        <div id={errId} role="alert" aria-live="assertive"
          style={{fontSize:11,color:"var(--red)",marginTop:4,display:"flex",alignItems:"center",gap:4}}>
          <span aria-hidden="true">⚠</span>{error}
        </div>
      )}
    </div>
  );
}

/* ── Payment Request API ── */
// Used for: burs ödemesi, kayıt ücreti (future feature)
async function requestPayment({ amount, label, currency = "TRY" }) {
  if (!window.PaymentRequest) {
    console.warn("Payment Request API desteklenmiyor");
    return null;
  }
  try {
    const methods = [{ supportedMethods: "basic-card",
      data: { supportedNetworks: ["visa","mastercard"], supportedTypes: ["debit","credit"] } }];
    const details = {
      total: { label, amount: { currency, value: String(amount) } },
      displayItems: [{ label, amount: { currency, value: String(amount) } }]
    };
    const request = new PaymentRequest(methods, details, { requestPayerName: true, requestPayerEmail: true });
    const canMake = await request.canMakePayment();
    if (!canMake) return null;
    const response = await request.show();
    await response.complete("success");
    return response;
  } catch(e) {
    if (e.name !== "AbortError") console.warn("Payment error:", e);
    return null;
  }
}

/* ── Screen Capture API ── */
// Used for: ders kaydı, ekran paylaşımı (teacher feature, future)
async function startScreenCapture(options = {}) {
  if (!navigator.mediaDevices || !navigator.mediaDevices.getDisplayMedia) {
    console.warn("Screen Capture API desteklenmiyor");
    return null;
  }
  try {
    const stream = await navigator.mediaDevices.getDisplayMedia({
      video: { cursor: "always", ...options },
      audio: false
    });
    return stream;
  } catch(e) {
    if (e.name !== "AbortError") console.warn("Screen capture error:", e);
    return null;
  }
}
function stopScreenCapture(stream) {
  if (stream) stream.getTracks().forEach(t => t.stop());
}

/* ── Contact Picker API ── */
// Used for: veli/acil kişi seçimi (future feature)
async function pickContact(properties = ["name","tel","email"]) {
  if (!navigator.contacts || !navigator.contacts.select) {
    console.warn("Contact Picker API desteklenmiyor (yalnızca Android Chrome)");
    return null;
  }
  try {
    const contacts = await navigator.contacts.select(properties, { multiple: false });
    return contacts && contacts.length > 0 ? contacts[0] : null;
  } catch(e) {
    if (e.name !== "AbortError") console.warn("Contact picker error:", e);
    return null;
  }
}
const hasContactPicker = () => !!(navigator.contacts && navigator.contacts.select);

/* ── Pointer Lock API ── */
// Used for: tam ekran QR tarayıcı, kiosk modu
function usePointerLock(elementRef) {
  const [locked, setLocked] = useState(false);
  const lock = useCallback(async () => {
    const el = elementRef?.current || document.documentElement;
    try {
      await el.requestPointerLock({ unadjustedMovement: true });
    } catch { el.requestPointerLock && el.requestPointerLock(); }
  }, [elementRef]);
  const unlock = useCallback(() => { document.exitPointerLock && document.exitPointerLock(); }, []);
  useEffect(() => {
    const onLock   = () => setLocked(true);
    const onUnlock = () => setLocked(false);
    document.addEventListener("pointerlockchange", onLock);
    document.addEventListener("pointerlockchange", onUnlock);
    return () => {
      document.removeEventListener("pointerlockchange", onLock);
      document.removeEventListener("pointerlockchange", onUnlock);
    };
  }, []);
  return { locked, lock, unlock };
}

function KRGFlag({size=28}){
  const rays=Array.from({length:21},(_,i)=>i*360/21);
  return(
    <svg width={size} height={size*2/3} viewBox="0 0 90 60" style={{borderRadius:3,display:"block"}}>
      <rect width="90" height="20" fill="#EF2B2D"/>
      <rect y="20" width="90" height="20" fill="#FFF"/>
      <rect y="40" width="90" height="20" fill="#007A3D"/>
      <circle cx="45" cy="30" r="11" fill="#F7D116"/>
      <circle cx="45" cy="30" r="8" fill="#EF2B2D"/>
      <g fill="#F7D116" transform="translate(45,30)">
        {rays.map((r,i)=>(
          <rect key={i} x="-1" y="-19" width="2" height="6" rx="1" transform={`rotate(${r})`}/>
        ))}
      </g>
    </svg>
  );
}

function QRPattern({no, size=160}){
  const seed=no?parseInt(no.replace(/\D/g,""))||12345:12345;
  const cells=[];
  for(let i=0;i<10;i++) for(let j=0;j<10;j++){
    const v=(seed*(i*13+j*7+1))%17;
    if(v<8) cells.push([i,j]);
  }
  return(
    <svg width={size} height={size} viewBox="0 0 120 120" fill="currentColor" style={{color:"var(--text)"}}>
      <rect x="10" y="10" width="30" height="30" rx="2" fill="none" stroke="currentColor" strokeWidth="3"/>
      <rect x="15" y="15" width="20" height="20" rx="1"/>
      <rect x="80" y="10" width="30" height="30" rx="2" fill="none" stroke="currentColor" strokeWidth="3"/>
      <rect x="85" y="15" width="20" height="20" rx="1"/>
      <rect x="10" y="80" width="30" height="30" rx="2" fill="none" stroke="currentColor" strokeWidth="3"/>
      <rect x="15" y="85" width="20" height="20" rx="1"/>
      {/* Logo center */}
      <rect x="48" y="48" width="24" height="24" rx="3" fill="#0C2340"/>
      <text x="60" y="61" textAnchor="middle" fill="#F7D116" fontSize="8" fontWeight="bold" fontFamily="serif">AT</text>
      {cells.map(([r,c],k)=>(
        <rect key={k} x={50+c*7} y={50+r*7} width="6" height="6"/>
      ))}
    </svg>
  );
}

function Avatar({name,color,size=36,photo}){
  if(photo) return <img src={photo} style={{width:size,height:size,borderRadius:"50%",objectFit:"cover",flexShrink:0}} alt={name}/>;
  const ini=name?name.split(" ").map(w=>w[0]).join("").slice(0,2).toUpperCase():"??";
  return(
    <div style={{width:size,height:size,borderRadius:"50%",background:color||"#185FA5",display:"flex",alignItems:"center",justifyContent:"center",fontSize:size*0.3,fontWeight:600,color:"#fff",flexShrink:0}}>
      {ini}
    </div>
  );
}

function Badge({children,color="#185FA5",bg="#E6F1FB"}){
  return <span style={{fontSize:10,padding:"2px 8px",borderRadius:8,background:bg,color,fontWeight:500,whiteSpace:"nowrap"}}>{children}</span>;
}

function SectionHeader({children}){
  return <div className="sec-hd">{children}</div>;
}

function Card({children,style,onClick}){
  return(
    <div onClick={onClick} className={`card${onClick?" card-tap":""}`} style={{marginBottom:10,...style}}>
      {children}
    </div>
  );
}

function PrimaryBtn({children,onClick,style,icon}){
  return(
    <button onClick={onClick} className="btn-navy" style={style}>
      <span style={{display:"flex",alignItems:"center",justifyContent:"center",gap:7}}>
        {icon&&<span>{icon}</span>}{children}
      </span>
    </button>
  );

/* ─── FORGOT PASSWORD ───────────────────────────────────────────────────── */
function ForgotScreen({t, onBack, onSuccess, students, teachers, onDataChange}){
  const [step,setStep]=useState("method"); // method / sent / code / newpass
  const [method,setMethod]=useState("email");
  const [contact,setContact]=useState("");
  const [code,setCode]=useState("");
  const [newPass,setNewPass]=useState("");
  const [confirmPass,setConfirmPass]=useState("");
  const [err,setErr]=useState("");
  const [foundUser,setFoundUser]=useState(null); // {type:"student"|"teacher", obj}
  const DEMO_CODE="123456";

  function sendCode(){
    if(!contact.trim()){setErr("!"); return;}
    // Find user by email or phone
    const val=contact.trim().toLowerCase();
    let matched=null;
    if(method==="email"){
      const s=(students||[]).find(u=>u.email&&u.email.toLowerCase()===val);
      const tc=(teachers||[]).find(u=>u.email&&u.email.toLowerCase()===val);
      matched=s?{type:"student",obj:s}:tc?{type:"teacher",obj:tc}:null;
    } else {
      const s=(students||[]).find(u=>u.phone&&u.phone.replace(/\s/g,"")===val.replace(/\s/g,""));
      const tc=(teachers||[]).find(u=>u.phone&&u.phone.replace(/\s/g,"")===val.replace(/\s/g,""));
      matched=s?{type:"student",obj:s}:tc?{type:"teacher",obj:tc}:null;
    }
    if(!matched){setErr("⚠ Kullanıcı bulunamadı / Bikarhêner nehat dîtin"); return;}
    setFoundUser(matched);
    setErr(""); setStep("sent");
    setTimeout(()=>setStep("code"),1200);
  }

  function verifyCode(){
    if(code===DEMO_CODE){setStep("newpass"); setErr("");}
    else setErr("⚠ "+t.forgotCodeLabel);
  }

  async function savePass(){
    const strength=checkPasswordStrength(newPass);
    if(!strength.ok){setErr(strength.msg);return;}
    if(newPass!==confirmPass){setErr("⚠ "+t.forgotConfirmPass);return;}
    setErr("");
    const hashed=await hashPassword(newPass);
    if(foundUser&&onDataChange){
      const updated={...foundUser.obj,pass:hashed};
      if(foundUser.type==="student") onDataChange("updateStudent",updated);
      else onDataChange("updateTeacher",updated);
    }
    onSuccess&&onSuccess();
    onBack();
  }

  return(
    <div style={{height:"100%",background:"#0C2340",display:"flex",flexDirection:"column",overflow:"hidden"}}>
      <div style={{padding:"40px 24px 24px",textAlign:"center"}}>
        <AcademyLogo size={56}/>
        <div style={{color:"#fff",fontSize:16,fontWeight:700,marginTop:14}}>{t.forgotTitle}</div>
      </div>
      <div style={{background:"var(--bg1)",borderRadius:"28px 28px 0 0",flex:1,padding:"24px 22px 40px"}}>
        {step==="method"&&(
          <>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:18}}>
              {[{k:"email",icon:"📧",label:t.forgotEmail},{k:"phone",icon:"📱",label:t.forgotPhone}].map(m=>(
                <button key={m.k} onClick={()=>setMethod(m.k)} style={{padding:"14px 8px",border:`2px solid ${method===m.k?"#0C2340":"var(--border)"}`,borderRadius:12,background:method===m.k?"#0C2340":"var(--bg2)",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:8}}>
                  <span style={{fontSize:26}}>{m.icon}</span>
                  <span style={{fontSize:12,fontWeight:600,color:method===m.k?"#fff":"var(--text)"}}>{m.label}</span>
                </button>
              ))}
            </div>
            <FieldWrap label={method==="email"?t.forgotEmail:t.forgotPhone}>
              <input style={inputStyle} value={contact} onChange={e=>setContact(e.target.value)}
                placeholder={method==="email"?"ornek@email.com":"05XX XXX XX XX"}
                type={method==="email"?"email":"tel"} type={method==="email"?"email":"tel"} autoComplete={method==="email"?"email":"tel"} inputMode={method==="email"?"email":"tel"}/>
            </FieldWrap>
            {err&&<div style={{color:"var(--red)",fontSize:12,marginBottom:8}}>{err}</div>}
            <PrimaryBtn onClick={sendCode} icon={method==="email"?"📧":"📱"}>
              {method==="email"?t.forgotSendEmail:t.forgotSendSMS}
            </PrimaryBtn>
          </>
        )}
        {step==="sent"&&(
          <div style={{textAlign:"center",padding:"40px 20px"}}>
            <div style={{fontSize:48,marginBottom:16}}>📨</div>
            <div style={{fontSize:15,color:"var(--text)",fontWeight:600}}>{t.forgotEmailSent}</div>
            <div style={{fontSize:12,color:"var(--text2)",marginTop:8}}>{t.forgotCodeSent} {contact}</div>
            <div style={{fontSize:11,color:"var(--text2)",marginTop:20,background:"var(--bg2)",padding:12,borderRadius:8,border:"0.5px dashed var(--border2)"}}>
              Demo mod: kod gonderildi / hat şandin
            </div>
          </div>
        )}
        {step==="code"&&(
          <>
            <FieldWrap label={t.forgotCodeLabel}>
              <input style={{...inputStyle,fontFamily:"monospace",fontSize:20,letterSpacing:"0.2em",textAlign:"center"}}
                value={code} onChange={e=>setCode(e.target.value)} placeholder="------" maxLength={6}/>
            </FieldWrap>
            {err&&<div style={{color:"var(--red)",fontSize:12,marginBottom:8}}>{err}</div>}
            <PrimaryBtn onClick={verifyCode} icon="✓">{t.forgotVerify}</PrimaryBtn>
          </>
        )}
        {step==="newpass"&&(
          <>
            <FieldWrap label={t.forgotNewPass}>
              <input style={inputStyle} type="password" value={newPass} onChange={e=>setNewPass(e.target.value)} placeholder="••••••••" autoComplete="new-password"/>
            </FieldWrap>
            <FieldWrap label={t.forgotConfirmPass}>
              <input style={inputStyle} type="password" value={confirmPass} onChange={e=>setConfirmPass(e.target.value)} placeholder="••••••••" autoComplete="new-password"/>
            </FieldWrap>
            {err&&<div style={{color:"var(--red)",fontSize:12,marginBottom:8}}>{err}</div>}
            <PrimaryBtn onClick={savePass} icon="💾">{t.forgotSave}</PrimaryBtn>
          </>
        )}
        <button onClick={onBack} style={{width:"100%",marginTop:12,padding:"10px",background:"none",border:"none",color:"var(--text2)",fontSize:13,cursor:"pointer"}}>
          ← {t.forgotBack}
        </button>
      </div>
    </div>
  );
}

/* ─── ADD STUDENT SHEET ─────────────────────────────────────────────────── */
function AddStudentSheet({open,onClose,defaultArea,students,t,lang,toast,onSave}){
  const [name,setName]=useState("");
  const [area,setArea]=useState(defaultArea||"sinema");
  const [year,setYear]=useState("2026");
  const [burs,setBurs]=useState("");
  const [phone,setPhone]=useState("");
  const [email,setEmail]=useState("");
  const [dob,setDob]=useState("");
  const [address,setAddress]=useState("");
  const [photo,setPhoto]=useState(null);
  const [showCard,setShowCard]=useState(false);
  const [tc,setTc]=useState("");
  const [birthPlace,setBirthPlace]=useState("");
  const [motherName,setMotherName]=useState("");
  const [fatherName,setFatherName]=useState("");
  const [nationality,setNationality]=useState("TC");
  const [docs,setDocs]=useState([]);
  const fileRef=useRef();
  const docFileRef=useRef();

  useEffect(()=>{if(defaultArea) setArea(defaultArea);},[defaultArea]);

  function handleDocUpload(e){
    const files=Array.from(e.target.files);
    files.forEach(file=>{
      const reader=new FileReader();
      reader.onload=ev=>setDocs(prev=>[...prev,{id:Date.now()+Math.random(),name:file.name,size:(file.size/1024).toFixed(0)+"KB",url:ev.target.result}]);
      reader.readAsDataURL(file);
    });
    e.target.value="";
  }

  function previewNo(){
    // Heman qad û sal ji bo jimareya rêzê ya herî bilind bibîne
    const existing=students.filter(s=>s.area===area&&s.no.startsWith(String(AREA_MAP[area].code)));
    const seqs=existing.map(s=>parseInt(s.no.slice(-2))||0);
    const nextSeq=(seqs.length>0?Math.max(...seqs):0)+1;
    return genStudentNo(area,year,nextSeq);
  }

  function handleSave(){
    if(!name.trim()){toast("⚠ "+t.fullName); return;}
    if(tc&&tc.length!==11){toast("⚠ Jimara nasnameyê divê 11 hejmar be"); return;}
    // Jimareya rastîn a rêzê bo heman qadê — pevçûn tê pêşgirtin
    const existing=students.filter(s=>s.area===area&&s.no.startsWith(String(AREA_MAP[area].code)));
    const seqs=existing.map(s=>parseInt(s.no.slice(-2))||0);
    const seq=(seqs.length>0?Math.max(...seqs):0)+1;
    const no=genStudentNo(area,year,seq);
    // Kontrola pevçûna jimareyê
    if(students.find(s=>s.no===no)){toast("⚠ Bu numara zaten mevcut, tekrar deneyin"); return;}
    const tempPass=no+"!"+Math.random().toString(36).slice(2,5).toUpperCase();
    hashPassword(tempPass).then(hashed=>{
      const student={id:Date.now(),name:sanitizeText(name),area,no,pass:hashed,burs:sanitizeText(burs),phone:sanitizePhone(phone),email:sanitizeEmail(email),dob,address:sanitizeText(address),photo,tc,birthPlace:sanitizeText(birthPlace),motherName:sanitizeText(motherName),fatherName:sanitizeText(fatherName),nationality,docs,
        // Firebase Auth için geçici şifre (fbSave sonrası silinir, Firestore'a yazılmaz)
        _plainPass:tempPass
      };
      onSave(student);
      toast("✓ "+name.trim()+" · "+no+" | 🔑 Gecici sifre: "+tempPass);
    });
    setName(""); setBurs(""); setPhone(""); setEmail(""); setDob(""); setAddress(""); setPhoto(null);
    setTc(""); setBirthPlace(""); setMotherName(""); setFatherName(""); setNationality("TC"); setDocs([]);
    setShowCard(false);
  }

  function handlePhoto(e){
    const f=e.target.files[0];
    if(!f) return;
    const r=new FileReader();
    r.onload=async ev=>{
      const compressed=await compressImage(ev.target.result,400,400,0.78);
      setPhoto(compressed);
    };
    r.readAsDataURL(f);
  }

  const previewStudent={name,area,no:previewNo(),burs,phone,email,dob,address,photo};

    <Sheet open={open} onClose={onClose} title={"➕ "+t.addStudent}>

        <div onClick={()=>fileRef.current.click()} style={{width:80,height:80,borderRadius:"50%",background:"var(--bg2)",border:"2px dashed var(--border2)",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",overflow:"hidden",position:"relative"}}>
          {photo
            ? <img src={photo} style={{width:"100%",height:"100%",objectFit:"cover"}} alt=""/>
            : <div style={{textAlign:"center"}}><div style={{fontSize:24}}>📷</div><div style={{fontSize:9,color:"var(--text2)",marginTop:4}}>{t.photoUpload}</div></div>
          }
        </div>
        <input ref={fileRef} type="file" accept="image/*" style={{display:"none"}} onChange={handlePhoto}/>
      </div>
      <FieldWrap label={t.fullName}>
        <input style={inputStyle} value={name} onChange={e=>setName(e.target.value)} placeholder="Nav û Nasname"/>
      </FieldWrap>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
        <FieldWrap label={t.artField}>
          <select style={selectStyle} value={area} onChange={e=>setArea(e.target.value)}>
            {AREAS.map(a=>(<option key={a.key} value={a.key}>{a.icon} {a.name.ku}</option>))}
          </select>
        </FieldWrap>
        <FieldWrap label={t.regYear}>
          <select style={selectStyle} value={year} onChange={e=>setYear(e.target.value)}>
            {["2025","2026","2027"].map(y=>(<option key={y}>{y}</option>))}
          </select>
        </FieldWrap>
      </div>

      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
        <FieldWrap label={t.phone}>
          <input style={inputStyle} value={phone} onChange={e=>setPhone(e.target.value)} type="tel" inputMode="tel" autoComplete="tel" placeholder="05XX..." type="tel" inputMode="tel" autoComplete="tel"/>
        </FieldWrap>
        <FieldWrap label={t.dobLabel}>
          <input style={inputStyle} type="date" value={dob} onChange={e=>setDob(e.target.value)}/>
        </FieldWrap>
      </div>
      <FieldWrap label={t.emailLabel}>
        <input style={inputStyle} value={email} onChange={e=>setEmail(e.target.value)} type="email" autoComplete="email" inputMode="email" placeholder="email@..."/>
      </FieldWrap>

        <input style={inputStyle} value={address} onChange={e=>setAddress(e.target.value)} placeholder="Navnîşan..."/>
      </FieldWrap>

      {/* Nasname & Belge */}
      <div style={{marginTop:4,marginBottom:6,padding:"10px 12px",background:"var(--bg2)",borderRadius:10,border:"0.5px solid var(--border2)"}}>

/* ─── ADD TEACHER SHEET ─────────────────────────────────────────────────── */
function AddTeacherSheet({open,onClose,defaultArea,teachers,t,lang,toast,onSave}){
  const [name,setName]=useState("");
  const [area,setArea]=useState(defaultArea||"sinema");
  const [user,setUser]=useState("");
  const [pass,setPass]=useState("1234");
  const [phone,setPhone]=useState("");
  const [email,setEmail]=useState("");
  const [dob,setDob]=useState("");
  const [address,setAddress]=useState("");
  const [bio,setBio]=useState("");
  const [photo,setPhoto]=useState(null);
  const fileRef=useRef();

  useEffect(()=>{if(defaultArea) setArea(defaultArea);},[defaultArea]);

  function handlePhoto(e){
    const f=e.target.files[0];
    if(!f) return;
    const r=new FileReader();
    r.onload=async ev=>{
      const compressed=await compressImage(ev.target.result,400,400,0.78);
      setPhoto(compressed);
    };
    r.readAsDataURL(f);
  }

  function handleSave(){
    if(!name.trim()||!user.trim()){toast("⚠ "+t.fullName); return;}
    if(teachers.find(tc=>tc.id===user.trim())){toast("⚠ Ev navê bikarhêner berê heye / Username exists"); return;}
    const areaTeachers=teachers.filter(tc=>tc.area===area&&!tc.isAdmin);
    const seqs=areaTeachers.map(tc=>{const m=tc.no.match(/(\d+)$/);return m?parseInt(m[1]):0;});
    const seq=(seqs.length>0?Math.max(...seqs):0)+1;
    const code=AREA_MAP[area].code;
    const no="AT-"+String(code)+"-"+String(seq).padStart(2,"0");
    const rawPass=pass||("AT!"+Math.random().toString(36).slice(2,6).toUpperCase());
    hashPassword(rawPass).then(hashed=>{
      const tc={id:user.trim(),name:name.trim(),area,no,pass:hashed,email:email||(user.trim()+"@aramtigran.edu"),isAdmin:false,phone,dob,address,bio,photo,
        // Firebase Auth için geçici şifre (fbSave sonrası silinir, Firestore'a yazılmaz)
        _plainPass:rawPass
      };
      onSave(tc);
      toast("✓ "+name.trim()+" · "+no+" | 🔑 Gecici sifre: "+rawPass);
    });
    setName(""); setUser(""); setPass(""); setPhone(""); setEmail(""); setDob(""); setAddress(""); setBio(""); setPhoto(null);
  }

  return(
    <Sheet open={open} onClose={onClose} title={"➕ "+t.addTeacher}>
      {/* Photo */}
      <div style={{display:"flex",justifyContent:"center",marginBottom:18}}>
        <div onClick={()=>fileRef.current.click()} style={{width:80,height:80,borderRadius:"50%",background:"var(--bg2)",border:"2px dashed var(--border2)",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",overflow:"hidden"}}>
          {photo
            ? <img src={photo} style={{width:"100%",height:"100%",objectFit:"cover"}} alt=""/>
            : <div style={{textAlign:"center"}}><div style={{fontSize:24}}>📷</div><div style={{fontSize:9,color:"var(--text2)",marginTop:4}}>{t.photoUpload}</div></div>
          }
        </div>
        <input ref={fileRef} type="file" accept="image/*" style={{display:"none"}} onChange={handlePhoto}/>
      </div>
      <FieldWrap label={t.fullName}>
        <input style={inputStyle} value={name} onChange={e=>setName(e.target.value)} placeholder="Nav û Nasname"/>
      </FieldWrap>
      <FieldWrap label={t.artField}>
        <select style={selectStyle} value={area} onChange={e=>setArea(e.target.value)}>
          {AREAS.map(a=>(<option key={a.key} value={a.key}>{a.icon} {a.name.ku}</option>))}
        </select>
      </FieldWrap>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
        <FieldWrap label={t.username}>
          <input style={inputStyle} value={user} onChange={e=>setUser(e.target.value)} placeholder="kemal" autoCapitalize="none"/>
        </FieldWrap>
        <FieldWrap label={t.password}>
          <input style={inputStyle} value={pass} onChange={e=>setPass(e.target.value)} placeholder="Min 8 karakter / 8 tip"/>
        </FieldWrap>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
        <FieldWrap label={t.phone}>
          <input style={inputStyle} value={phone} onChange={e=>setPhone(e.target.value)} type="tel" inputMode="tel" autoComplete="tel" placeholder="05XX..." type="tel" inputMode="tel" autoComplete="tel"/>
        </FieldWrap>
        <FieldWrap label={t.dobLabel}>
          <input style={inputStyle} type="date" value={dob} onChange={e=>setDob(e.target.value)}/>
        </FieldWrap>
      </div>
      <FieldWrap label={t.emailLabel}>
        <input style={inputStyle} value={email} onChange={e=>setEmail(e.target.value)} type="email" autoComplete="email" inputMode="email" placeholder="email@..."/>
      </FieldWrap>
      <FieldWrap label={t.addressLabel}>
        <input style={inputStyle} value={address} onChange={e=>setAddress(e.target.value)} placeholder="Amed..."/>
      </FieldWrap>
      <FieldWrap label={t.bioLabel}>
        <textarea style={{...inputStyle,minHeight:60,resize:"vertical"}} value={bio} onChange={e=>setBio(e.target.value)} placeholder="Danasîn..."/>
      </FieldWrap>
      <PrimaryBtn onClick={handleSave} icon="💾">{t.saveTeacher}</PrimaryBtn>
    </Sheet>
  );
}

/* ─── ADMIN MESSAGES PANEL ──────────────────────────────────────────────── */
function AdminMessagesPanel({students,teachers,lang,t,toast,adminName}){
  const [mode,setMode]=useState("inbox"); // inbox | compose
  const [msgType,setMsgType]=useState("private"); // private | bulk
  const [recipient,setRecipient]=useState("");
  const [recipientGroup,setRecipientGroup]=useState("allStudents");
  const [subject,setSubject]=useState("");
  const [body,setBody]=useState("");
  const [messages,setMessages]=useState([
    {id:1,from:"Sistem",fromType:"admin",to:"Dilnoza Yusupova",type:"private",subject:"Bursê Nûkirin",body:"Burseka nû ji bo te hatiye pejirandin.",time:"Îro 09:00",read:false,direction:"inbox"},
    {id:2,from:adminName||"Rêveber",fromType:"admin",to:"Hemû Xwendekar",type:"bulk",subject:"Sînav Bernamesi",body:"Ezmûnên dawiya semesterê di 5ê Hezîranê de dest pê dikin.",time:"Duh 11:30",read:true,direction:"sent"},
  ]);
  const [selectedMsg,setSelectedMsg]=useState(null);

  const allPeople=[
    ...students.map(s=>({id:"s_"+s.id,label:s.name,sub:s.no,type:"student"})),
    ...teachers.filter(tc=>!tc.isAdmin).map(tc=>({id:"t_"+tc.id,label:tc.name,sub:tc.no,type:"teacher"})),
  ];
  const groupOptions=[
    {k:"allStudents",label:lang==="ku"?"Hemû Xwendekar":lang==="en"?"All Students":"Hemû Xwendekar"},
    {k:"allTeachers",label:lang==="ku"?"Hemû Mamoste":lang==="en"?"All Teachers":"Hemû Mamoste"},
    {k:"all",label:lang==="ku"?"Hemû":lang==="en"?"Everyone":"Hemû"},
    ...AREAS.map(a=>({k:"area_"+a.key,label:a.icon+" "+areaName(a.key,lang)})),
  ];

  const inbox=messages.filter(m=>m.direction==="inbox");
  const sent=messages.filter(m=>m.direction==="sent");
  const [inboxTab,setInboxTab]=useState("inbox");

  function sendMsg(){
    if(!subject.trim()||!body.trim()){toast("⚠ Sernav û peyam");return;}
    if(msgType==="private"&&!recipient){toast("⚠ Wergir hilbijêre");return;}
    const toLabel=msgType==="private"
      ? allPeople.find(p=>p.id===recipient)?.label||recipient
      : groupOptions.find(g=>g.k===recipientGroup)?.label||recipientGroup;
    const now=new Date();
    const timeStr=now.getHours().toString().padStart(2,"0")+":"+now.getMinutes().toString().padStart(2,"0");
    const newMsg={id:Date.now(),from:adminName||"Rêveber",fromType:"admin",to:toLabel,
      type:msgType,subject:subject.trim(),body:body.trim(),
      time:"Niha "+timeStr,read:true,direction:"sent",
      recipientId:msgType==="private"?recipient:"bulk",
      recipientGroup:msgType==="bulk"?recipientGroup:null,
      senderId:"admin",
    };
    fbSave("message", newMsg);
    setMessages(p=>[newMsg,...p]);
    toast("✓ "+(lang==="ku"?"Peyam hate şandin":lang==="en"?"Message sent":"Nachricht gesendet"));
    setSubject("");setBody("");setRecipient("");setMode("inbox");
  }

  const L={
    inbox:lang==="ku"?"Qutiya Girtî":lang==="en"?"Inbox":"Gelen Kutusu",
    sent:lang==="ku"?"Şandî":lang==="en"?"Sent":"Gönderildi",
    compose:lang==="ku"?"Peyamek Nû":lang==="en"?"New Message":"Yeni Mesaj",
    private:lang==="ku"?"Taybet":lang==="en"?"Private":"Özel",
    bulk:lang==="ku"?"Girseyî":lang==="en"?"Bulk":"Toplu",
    recipient:lang==="ku"?"Wergir":lang==="en"?"Recipient":"Alıcı",
    group:lang==="ku"?"Koma":lang==="en"?"Group":"Grup",
    subject:lang==="ku"?"Sernav":lang==="en"?"Subject":"Konu",
    message:lang==="ku"?"Peyam":lang==="en"?"Message":"Mesaj",
    send:lang==="ku"?"Bişîne":lang==="en"?"Send":"Gönder",
    unread:lang==="ku"?"Nexwandî":lang==="en"?"Unread":"Okunmamış",
  };

  if(selectedMsg) return(
    <>
      <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:12}}>
        <button onClick={()=>setSelectedMsg(null)} style={{padding:"7px 14px",fontSize:12,background:"var(--bg2)",border:"0.5px solid var(--border2)",borderRadius:8,cursor:"pointer",color:"var(--text)",fontWeight:600}}>← {lang==="ku"?"Vegere":lang==="en"?"Back":"Geri"}</button>
        <div style={{fontSize:13,fontWeight:700,color:"var(--text)",flex:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{selectedMsg.subject}</div>
      </div>
      <Card>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:10}}>
          <div>
            <div style={{fontSize:12,fontWeight:700,color:"var(--text)"}}>{selectedMsg.direction==="inbox"?selectedMsg.from:("→ "+selectedMsg.to)}</div>
            <div style={{fontSize:10,color:"var(--text2)",marginTop:2}}>{selectedMsg.time}</div>
          </div>
          <span style={{fontSize:10,padding:"2px 8px",borderRadius:8,background:selectedMsg.type==="bulk"?"#E6F1FB":"#EAF3DE",color:selectedMsg.type==="bulk"?"#185FA5":"#1a7a4a",fontWeight:600}}>{selectedMsg.type==="bulk"?L.bulk:L.private}</span>
        </div>
        <div style={{fontSize:14,color:"var(--text)",lineHeight:1.7,padding:"10px 0",borderTop:"1px solid var(--border)"}}>{selectedMsg.body}</div>
      </Card>
    </>
  );

  if(mode==="compose") return(
    <>
      <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:12}}>
        <button onClick={()=>setMode("inbox")} style={{padding:"7px 14px",fontSize:12,background:"var(--bg2)",border:"0.5px solid var(--border2)",borderRadius:8,cursor:"pointer",color:"var(--text)",fontWeight:600}}>← {lang==="ku"?"Vegere":lang==="en"?"Back":"Geri"}</button>
        <div style={{fontSize:14,fontWeight:700,color:"var(--text)"}}>✍️ {L.compose}</div>
      </div>
      <Card style={{marginBottom:12}}>
        <div style={{display:"flex",gap:6,marginBottom:14}}>
          {[{k:"private",icon:"👤",label:L.private},{k:"bulk",icon:"📣",label:L.bulk}].map(opt=>(
            <button key={opt.k} onClick={()=>setMsgType(opt.k)} style={{flex:1,padding:"10px 6px",border:`2px solid ${msgType===opt.k?"#0C2340":"var(--border2)"}`,borderRadius:10,background:msgType===opt.k?"#0C2340":"var(--bg2)",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:4}}>
              <span style={{fontSize:20}}>{opt.icon}</span>
              <span style={{fontSize:11,fontWeight:700,color:msgType===opt.k?"#fff":"var(--text)"}}>{opt.label}</span>
            </button>
          ))}
        </div>
        {msgType==="private"?(
          <FieldWrap label={L.recipient}>
            <select style={selectStyle} value={recipient} onChange={e=>setRecipient(e.target.value)}>
              <option value="">{lang==="ku"?"Hilbijêre...":lang==="en"?"Select...":"Seç..."}</option>
              <optgroup label={lang==="ku"?"Xwendekar":lang==="en"?"Students":"Öğrenciler"}>
                {students.map(s=><option key={"s_"+s.id} value={"s_"+s.id}>{s.name} · {s.no}</option>)}
              </optgroup>
              <optgroup label={lang==="ku"?"Mamoste":lang==="en"?"Teachers":"Öğretmenler"}>
                {teachers.filter(tc=>!tc.isAdmin).map(tc=><option key={"t_"+tc.id} value={"t_"+tc.id}>{tc.name} · {tc.no}</option>)}
              </optgroup>
            </select>
          </FieldWrap>
        ):(
          <FieldWrap label={L.group}>
            <select style={selectStyle} value={recipientGroup} onChange={e=>setRecipientGroup(e.target.value)}>
              {groupOptions.map(g=><option key={g.k} value={g.k}>{g.label}</option>)}
            </select>
          </FieldWrap>
        )}
        <FieldWrap label={L.subject}><input style={inputStyle} value={subject} onChange={e=>setSubject(e.target.value)} placeholder="..."/></FieldWrap>
        <FieldWrap label={L.message}><textarea style={{...inputStyle,minHeight:90,resize:"vertical"}} value={body} onChange={e=>setBody(e.target.value)} placeholder="..."/></FieldWrap>
        <PrimaryBtn onClick={sendMsg} icon="📤">{L.send}</PrimaryBtn>
      </Card>
    </>
  );

  return(
    <>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
        <div style={{display:"flex",gap:6}}>
          {[{k:"inbox",label:L.inbox},{k:"sent",label:L.sent}].map(tab=>(
            <button key={tab.k} onClick={()=>setInboxTab(tab.k)} style={{padding:"7px 14px",fontSize:12,border:"none",borderRadius:8,cursor:"pointer",fontWeight:inboxTab===tab.k?700:500,background:inboxTab===tab.k?"#0C2340":"var(--bg2)",color:inboxTab===tab.k?"#fff":"var(--text)"}}>
              {tab.label}{tab.k==="inbox"&&inbox.filter(m=>!m.read).length>0&&<span style={{marginLeft:5,background:"#ef4444",color:"#fff",borderRadius:8,padding:"0 5px",fontSize:10}}>{inbox.filter(m=>!m.read).length}</span>}
            </button>
          ))}
        </div>
        <button onClick={()=>setMode("compose")} style={{padding:"8px 14px",background:"#0C2340",color:"#fff",border:"none",borderRadius:8,fontSize:12,fontWeight:700,cursor:"pointer"}}>✍️ {L.compose}</button>
      </div>
      {(inboxTab==="inbox"?inbox:sent).length===0?(
        <Card><div style={{textAlign:"center",padding:24,color:"var(--text2)",fontSize:13}}>
          <div style={{fontSize:36,marginBottom:8}}>💬</div>
          {lang==="ku"?"Peyam tune":lang==="en"?"No messages":"Mesaj yok"}
        </div></Card>
      ):(
        <Card>
          {(inboxTab==="inbox"?inbox:sent).map((msg,i,arr)=>(
            <div key={msg.id} onClick={()=>{setSelectedMsg(msg);setMessages(p=>p.map(m=>m.id===msg.id?{...m,read:true}:m));}}
              style={{display:"flex",alignItems:"flex-start",gap:10,padding:"11px 0",borderBottom:i<arr.length-1?"0.5px solid var(--border)":"none",cursor:"pointer"}}>
              <div style={{width:36,height:36,borderRadius:"50%",background:msg.type==="bulk"?"#E6F1FB":"#EAF3DE",display:"flex",alignItems:"center",justifyContent:"center",fontSize:16,flexShrink:0}}>
                {msg.type==="bulk"?"📣":"💬"}
              </div>
              <div style={{flex:1,minWidth:0}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",gap:4}}>
                  <div style={{fontSize:12,fontWeight:!msg.read&&inboxTab==="inbox"?700:500,color:"var(--text)",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{inboxTab==="inbox"?msg.from:("→ "+msg.to)}</div>
                  <span style={{fontSize:9,color:"var(--text2)",flexShrink:0}}>{msg.time}</span>
                </div>
                <div style={{fontSize:12,fontWeight:!msg.read&&inboxTab==="inbox"?600:400,color:"var(--text)",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{msg.subject}</div>
                <div style={{fontSize:11,color:"var(--text2)",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{msg.body}</div>
              </div>
              {!msg.read&&inboxTab==="inbox"&&<div style={{width:8,height:8,borderRadius:"50%",background:"#0C2340",flexShrink:0,marginTop:4}}/>}
            </div>
          ))}
        </Card>
      )}
    </>
  );
}

      ):(

                <div style={{fontSize:11,color:"var(--text2)",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{msg.body}</div>
              </div>
              {!msg.read&&inboxTab==="inbox"&&<div style={{width:8,height:8,borderRadius:"50%",background:aColor,flexShrink:0,marginTop:4}}/>}
            </div>
          ))}
        </Card>
      )}
    </>
  );
}

/* ─── ANNOUNCEMENTS ─────────────────────────────────────────────────────── */
function AnnouncementsPanel({t,toast,lang}){
  const [title,setTitle]=useState("");
  const [msg,setMsg]=useState("");
  const [targets,setTargets]=useState({"all":true});
  const [sentList,setSentList]=useState([
    {id:1,title:"Yarın ders saati değişti",msg:"Saat 09:00→10:00 olarak değişti.",to:"Hemû Xwendekar",time:"Duh 15:30"},
    {id:2,title:"Salixdana cetwela ezmûnan",msg:"Di dawiya Gulanê de ezmûn dest pê dikin.",to:"Mamoste",time:"2 Roj",},
  ]);
  const toggleTarget=k=>setTargets(p=>({...p,[k]:!p[k]}));

  const L={
    titleLabel:lang==="en"?"Title":lang==="de"?"Titel":"Sernav",
    msgLabel:lang==="en"?"Message":lang==="de"?"Nachricht":"Peyam",
    targetLabel:lang==="en"?"Recipients":lang==="de"?"Empfänger":"Armanc",
    allStudents:lang==="en"?"All Students":lang==="de"?"Alle Schüler":"Hemû Xwendekar",
    teachers:lang==="en"?"Teachers":lang==="de"?"Lehrer":"Mamoste",
    send:lang==="en"?"Send":lang==="de"?"Senden":"Bişîne",
    sent:lang==="en"?"Sent Announcements":lang==="de"?"Gesendete Ankündigungen":"Ragihandinên Şandî",
    placeholder_title:lang==="en"?"Announcement title...":lang==="de"?"Ankündigungstitel...":"Sernava ragihandinê...",
    placeholder_msg:lang==="en"?"Announcement message...":lang==="de"?"Ankündigungstext...":"Nivîsa ragihandinê...",
  };

  function send(){
    if(!title.trim()){toast("⚠ "+L.titleLabel); return;}
    if(!msg.trim()){toast("⚠ "+L.msgLabel); return;}
    const selected=Object.entries(targets).filter(([,v])=>v).map(([k])=>k);
    if(!selected.length){toast("⚠ "+L.targetLabel); return;}
    const now=new Date();
    const timeStr=now.getHours().toString().padStart(2,"0")+":"+now.getMinutes().toString().padStart(2,"0");
    const ann={id:Date.now(),title:title.trim(),msg:msg.trim(),to:selected.join(", "),time:"Niha "+timeStr,targets:selected};
    fbSave("announcement", ann);
    setSentList(p=>[ann,...p]);
    toast("✓ "+title.trim());
    setTitle(""); setMsg("");
  }

  return(
    <>
    <Card style={{marginBottom:12}}>
      <div style={{fontSize:13,fontWeight:600,color:"var(--text)",marginBottom:12}}>📢 {lang==="en"?"Send Announcement":lang==="de"?"Ankündigung senden":"Ragihandinek Bişîne"}</div>
      <FieldWrap label={L.targetLabel}>
        {[
          {k:"all",label:L.allStudents},
          ...AREAS.map(a=>({k:a.key,label:a.icon+" "+areaName(a.key,lang)})),
          {k:"teachers",label:"👨‍🏫 "+L.teachers}
        ].map(item=>(
          <div key={item.k} onClick={()=>toggleTarget(item.k)} style={{display:"flex",alignItems:"center",gap:10,padding:"7px 0",cursor:"pointer"}}>
            <div style={{width:18,height:18,borderRadius:4,border:"0.5px solid var(--border2)",background:targets[item.k]?"#0C2340":"var(--bg2)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,color:"#fff",fontWeight:700,flexShrink:0}}>
              {targets[item.k]?"✓":""}
            </div>
            <span style={{fontSize:13,color:"var(--text)"}}>{item.label}</span>
          </div>
        ))}
      </FieldWrap>
      <FieldWrap label={L.titleLabel}><input style={inputStyle} value={title} onChange={e=>setTitle(e.target.value)} placeholder={L.placeholder_title}/></FieldWrap>
      <FieldWrap label={L.msgLabel}><textarea style={{...inputStyle,minHeight:72,resize:"vertical"}} value={msg} onChange={e=>setMsg(e.target.value)} placeholder={L.placeholder_msg}/></FieldWrap>
      <PrimaryBtn onClick={send} icon="📤">{L.send}</PrimaryBtn>
    </Card>
    {sentList.length>0&&(
      <Card>
        <div style={{fontSize:13,fontWeight:600,color:"var(--text)",marginBottom:12}}>📋 {L.sent}</div>
        {sentList.map((ann,i)=>(
          <div key={ann.id} style={{padding:"10px 0",borderBottom:i<sentList.length-1?"0.5px solid var(--border)":"none"}}>
            <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",gap:8}}>
              <div style={{flex:1}}>
                <div style={{fontSize:13,fontWeight:600,color:"var(--text)"}}>{ann.title}</div>
                <div style={{fontSize:11,color:"var(--text2)",marginTop:2,lineHeight:1.5}}>{ann.msg}</div>
                <div style={{display:"flex",gap:8,marginTop:5}}>
                  <span style={{fontSize:10,padding:"1px 7px",borderRadius:8,background:"#E6F1FB",color:"#185FA5"}}>{ann.to}</span>
                  <span style={{fontSize:10,color:"var(--text2)"}}>{ann.time}</span>
                </div>
              </div>
              <button onClick={()=>setSentList(p=>p.filter(x=>x.id!==ann.id))} style={{fontSize:13,background:"var(--red-bg)",border:"none",borderRadius:6,padding:"4px 7px",cursor:"pointer",color:"var(--red)",flexShrink:0}}>🗑</button>
            </div>
          </div>
        ))}
      </Card>
    )}
    </>
  );
}

// Central grade/attendance store — changes persist during session
const _statsStore = {};
function getStudentStats(studentId){
  if(_statsStore[studentId]) return _statsStore[studentId];
  const seed=typeof studentId==="number"?studentId:parseInt(String(studentId).replace(/\D/g,""))||7;
  const att=Math.min(100,Math.max(55, 72+(seed*17)%29));
  const grade=Math.min(100,Math.max(50, 58+(seed*23)%42));
  const late=Math.max(0,(seed*3)%5);
  // absent = toplam 18 ders varsayımı ile devamsızlık
  const totalLessons=18;
  const absent=Math.max(0,Math.round((100-att)/100*totalLessons));
  const attended=totalLessons-absent;
  const notes=["Pêşketina baş","Bala xwe bide","Beşdariya birêkûpêk","Performans bilind","Amadebûn bişopîne"];
  const note=notes[seed%notes.length];
  _statsStore[studentId]={att,grade,late,absent,attended,totalLessons,note};
  return _statsStore[studentId];
}
function updateStudentStats(studentId, patch){
  const current = getStudentStats(studentId);
  _statsStore[studentId] = {...current,...patch};
  // att değişirse absent/attended'ı yeniden hesapla
  if(patch.att!==undefined){
    const totalLessons=current.totalLessons||18;
    _statsStore[studentId].absent=Math.max(0,Math.round((100-patch.att)/100*totalLessons));
    _statsStore[studentId].attended=totalLessons-_statsStore[studentId].absent;
  }
}
