<title>Akademîya Aram Tîgran – Rapor</title>
<${'style'}>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f0;color:#1a1a1a;padding:0}
  .page{max-width:900px;margin:0 auto;background:#fff;min-height:100vh;padding:0}
  .header{background:linear-gradient(135deg,#0C2340 0%,#1a3a60 60%,${selectedArea!=="all"?AREA_MAP[selectedArea].color:"#2d6a9f"} 100%);padding:32px 36px 28px;color:#fff}
  .academy-name{font-size:11px;letter-spacing:0.15em;opacity:0.7;text-transform:uppercase;margin-bottom:6px}
  .report-title{font-size:26px;font-weight:800;margin-bottom:4px}
  .report-sub{font-size:13px;opacity:0.7;margin-bottom:18px}
  .summary-row{display:flex;gap:16px;flex-wrap:wrap}
  .summary-card{background:rgba(255,255,255,0.12);border:1px solid rgba(255,255,255,0.2);border-radius:12px;padding:12px 18px;min-width:110px}
  .summary-val{font-size:24px;font-weight:800;color:#F7D116}
  .summary-label{font-size:10px;opacity:0.7;margin-top:3px;text-transform:uppercase;letter-spacing:0.05em}
  .meta-row{background:#E6F1FB;padding:12px 36px;font-size:12px;color:#185FA5;display:flex;gap:24px;flex-wrap:wrap}
  .meta-item{display:flex;align-items:center;gap:6px}
  .content{padding:24px 36px}
  table{width:100%;border-collapse:collapse;font-size:13px}
  th{background:#0C2340;color:#fff;padding:10px 10px;text-align:left;font-size:11px;letter-spacing:0.05em;font-weight:600;position:sticky;top:0}
  td{padding:9px 10px;border-bottom:1px solid #f0eeea;vertical-align:middle}
  tr:hover td{background:#faf9f7}
  tr:nth-child(even) td{background:#f9f8f5}
  tr:hover td{background:#f0f4fb}
  .footer{background:#f5f5f0;border-top:2px solid #e0ddd6;padding:16px 36px;font-size:11px;color:#888;display:flex;justify-content:space-between;align-items:center;margin-top:0}
  .badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:600}
  .risk-badge{background:#FCEBEB;color:#A32D2D}
  .ok-badge{background:#EAF3DE;color:#3B6D11}
  @media print{body{background:#fff}.page{box-shadow:none}button{display:none}}
</${'style'}>
</head>
${`<body>`}
<div class="page">
  <div class="header">
    <div class="academy-name">🏛 Akademîya Aram Tîgran</div>
    <div class="report-title">${reportType==="attendance"?"Amadebûn Raporu":reportType==="grades"?"Raporu Notan":"Raporu Tevahî ya Xwendekaran"}</div>
    <div class="report-sub">${areaLabel} · ${reportDate}</div>
    <div class="summary-row">
      <div class="summary-card">
        <div class="summary-val">${filteredStudents.length}</div>
        <div class="summary-label">Xwendekarên Tevahî</div>
      </div>
      ${reportType!=="grades"?`<div class="summary-card">
        <div class="summary-val">${avgAtt}%</div>
        <div class="summary-label">Navgîna Amadebûnê</div>
      </div>
      <div class="summary-card">
        <div class="summary-val">${riskCount}</div>
        <div class="summary-label">Di Xeterê de</div>
      </div>`:""}
      ${reportType!=="attendance"?`<div class="summary-card">
        <div class="summary-val">${avgGrade}</div>
        <div class="summary-label">Navgîna Notan</div>
      </div>`:""}
    </div>
  </div>
  <div class="meta-row">
    <div class="meta-item">📅 Tarih: <strong>${reportDate}</strong></div>
    <div class="meta-item">🎓 Alan: <strong>${areaLabel}</strong></div>
    <div class="meta-item">📊 Cureyê Rapor: <strong>${reportType==="attendance"?"Amadebûn":reportType==="grades"?"Not":"Rapor Tevahî"}</strong></div>
  </div>
  <div class="content">
    <table>
      <thead>
        <tr>
          <th>Navê Xwendekarê</th>
          <th>Jm. Xwendekarê</th>
          ${selectedArea==="all"?"<th>Alan</th>":""}
          <th>Burs</th>
          ${headerCols}
        </tr>
      </thead>
      <tbody>
        ${rows}
      </tbody>
    </table>
  </div>
  <div class="footer">
    <span>Akademîya Aram Tîgran – Pergala Rêveberiya Zanistê</span>
    <span>Ev rapor di ${reportDate} de hatiye amadekirin.</span>
  </div>
</div>
${`</body>`}
${`</html>`}`;
  }

  function downloadReport(){
    const html = generateReportHTML();
    const blob = new Blob([html],{type:"text/html;charset=utf-8"});
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    const areaLabel = selectedArea==="all"?"tum-alanlar":selectedArea;
    const typeLabel = reportType==="attendance"?"attendance":reportType==="grades"?"grades":"full";
    a.download = `rapor-${areaLabel}-${typeLabel}-${new Date().toISOString().slice(0,10)}.html`;
    a.click();
    URL.revokeObjectURL(url);
    toast("✓ Rapor hat dakêşîn!");
  }

  const areaInfo = selectedArea==="all"
    ? {color:"#0C2340",bg:"#E6F1FB",text:"#185FA5",icon:"🏫"}
    : AREA_MAP[selectedArea];

  const avgAtt = filteredStudents.length
    ? Math.round(filteredStudents.reduce((a,s)=>a+getStudentStats(s.id).att,0)/filteredStudents.length) : 0;
  const avgGrade = filteredStudents.length
    ? Math.round(filteredStudents.reduce((a,s)=>a+getStudentStats(s.id).grade,0)/filteredStudents.length) : 0;
  const riskCount = filteredStudents.filter(s=>getStudentStats(s.id).att<75).length;

  return(
    <>
      {/* Area Selector */}
      <Card style={{marginBottom:10}}>
        <div style={{fontSize:13,fontWeight:700,color:"var(--text)",marginBottom:12}}>🎓 Qadê Hilbijêre</div>
        <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
          <button onClick={()=>setSelectedArea("all")}
            style={{padding:"6px 12px",borderRadius:20,fontSize:11,fontWeight:selectedArea==="all"?700:400,
              background:selectedArea==="all"?"#0C2340":"var(--bg2)",
              color:selectedArea==="all"?"#fff":"var(--text2)",
              border:`1.5px solid ${selectedArea==="all"?"#0C2340":"var(--border)"}`,cursor:"pointer"}}>
            {lang==="en"?"🏫 All Fields":lang==="de"?"🏫 Alle Felder":"🏫 Hemû Qadan"}
          </button>
          {AREAS.map(a=>(
            <button key={a.key} onClick={()=>setSelectedArea(a.key)}
              style={{padding:"6px 12px",borderRadius:20,fontSize:11,fontWeight:selectedArea===a.key?700:400,
                background:selectedArea===a.key?a.color:"var(--bg2)",
                color:selectedArea===a.key?"#fff":"var(--text2)",
                border:`1.5px solid ${selectedArea===a.key?a.color:"var(--border)"}`,cursor:"pointer"}}>
              {a.icon} {areaName(a.key,lang)}
            </button>
          ))}
        </div>
      </Card>

      {/* Report Type */}
      <Card style={{marginBottom:10}}>
        <div style={{fontSize:13,fontWeight:700,color:"var(--text)",marginBottom:12}}>📊 Cureyê Rapor</div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8}}>
          {[
            {key:"attendance",icon:"📋",label:"Amadebûn Raporu"},
            {key:"grades",icon:"🎯",label:"Raporu Notan"},
            {key:"full",icon:"📄",label:"Rapor Tevahî"},
          ].map(rt=>(
            <button key={rt.key} onClick={()=>setReportType(rt.key)}
              style={{padding:"10px 6px",borderRadius:10,fontSize:11,fontWeight:reportType===rt.key?700:400,
                background:reportType===rt.key?"#0C2340":"var(--bg2)",
                color:reportType===rt.key?"#fff":"var(--text2)",
                border:`1.5px solid ${reportType===rt.key?"#0C2340":"var(--border)"}`,
                cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:5}}>
              <span style={{fontSize:20}}>{rt.icon}</span>
              <span style={{lineHeight:1.3,textAlign:"center"}}>{rt.label}</span>
            </button>
          ))}
        </div>
      </Card>

      {/* Summary Preview */}
      <Card style={{marginBottom:10}}>
        <div style={{fontSize:12,fontWeight:700,color:"var(--text)",marginBottom:10}}>
          {selectedArea!=="all"?AREA_MAP[selectedArea].icon:"🏫"} {selectedArea==="all"?(lang==="en"?"All Fields":lang==="de"?"Alle Felder":"Hemû Qadan"):areaName(selectedArea,lang)} {lang==="en"?"Summary":lang==="de"?"Zusammenfassung":"Kurte"}
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginBottom:12}}>
          <div style={{background:"#E6F1FB",borderRadius:10,padding:"10px 8px",textAlign:"center"}}>
            <div style={{fontSize:20,fontWeight:800,color:"#185FA5"}}>{filteredStudents.length}</div>
            <div style={{fontSize:9,color:"#185FA5",marginTop:2}}>Xwendekar</div>
          </div>
          <div style={{background:avgAtt>=85?"var(--green-bg)":avgAtt>=75?"#FAEEDA":"var(--red-bg)",borderRadius:10,padding:"10px 8px",textAlign:"center"}}>
            <div style={{fontSize:20,fontWeight:800,color:avgAtt>=85?"var(--green)":avgAtt>=75?"#854F0B":"var(--red)"}}>{avgAtt}%</div>
            <div style={{fontSize:9,color:"var(--text2)",marginTop:2}}>Navgîna Amadebûnê</div>
          </div>
          <div style={{background:"var(--red-bg)",borderRadius:10,padding:"10px 8px",textAlign:"center"}}>
            <div style={{fontSize:20,fontWeight:800,color:"var(--red)"}}>{riskCount}</div>
            <div style={{fontSize:9,color:"var(--red)",marginTop:2}}>Di Xeterê de</div>
          </div>
        </div>

        {/* Student list preview */}
        {filteredStudents.slice(0,5).map((s,i)=>{
          const st=getStudentStats(s.id);
          const a=AREA_MAP[s.area];
          const attColor=st.att>=85?"var(--green)":st.att>=75?"#EF9F27":"var(--red)";
          return(
            <div key={s.id} style={{display:"flex",alignItems:"center",gap:8,padding:"7px 0",borderBottom:i<Math.min(filteredStudents.length,5)-1?"0.5px solid var(--border)":"none"}}>
              <Avatar name={s.name} color={a.color} size={30} photo={s.photo}/>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontSize:12,fontWeight:500,color:"var(--text)",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{s.name}</div>
                <div style={{fontSize:10,color:"var(--text2)",fontFamily:"monospace"}}>{s.no}</div>
              </div>
              {(reportType==="attendance"||reportType==="full")&&(
                <div style={{fontSize:12,fontWeight:700,color:attColor,minWidth:38,textAlign:"right"}}>{st.att}%</div>
              )}
              {(reportType==="grades"||reportType==="full")&&(
                <div style={{fontSize:11,color:st.grade>=85?"var(--green)":st.grade>=70?"#EF9F27":"var(--red)",minWidth:36,textAlign:"right"}}>{st.grade}/100</div>
              )}
            </div>
          );
        })}
        {filteredStudents.length>5&&(
          <div style={{textAlign:"center",padding:"8px 0",fontSize:11,color:"var(--text2)"}}>
            +{filteredStudents.length-5} xwendekar zêdetir (di rapor de hemû xuya dibin)
          </div>
        )}
      </Card>

      {/* Download Button */}
      <div style={{display:"grid",gridTemplateColumns:"1fr",gap:8}}>
        <button onClick={downloadReport}
          style={{width:"100%",padding:"14px",background:"#0C2340",color:"#fff",border:"none",borderRadius:12,fontSize:14,fontWeight:700,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>
          ⬇️ Raporu Dakêşe
        </button>
        <button onClick={()=>{
          const html=generateReportHTML();
          const w=window.open("","_blank");
          if(w){w.document.write(html);w.document.close();}
          else toast("⚠ Popup hat asteng kirin – Bişkoka Dakêşanê bikar bîne");
        }}
          style={{width:"100%",padding:"12px",background:"var(--bg2)",color:"var(--text)",border:"0.5px solid var(--border2)",borderRadius:12,fontSize:13,fontWeight:600,cursor:"pointer"}}>
          👁 Raporu Pêşbinê
        </button>
      </div>
    </>
  );
}

/* ─── TEACHER PROFILE VIEW ───────────────────────────────────────────────── */
function TeacherProfileView({teacher,a,lang,t,toast,avgAtt,avgGrade,riskCount,myStudents,studentsWithStats,onLogout,onGoStats,onSelectStudent,onSaveTeacherPass}){
  const [photoState,setPhotoState]=useState(teacher.photo||null);
  const [showChangePass,setShowChangePass]=useState(false);
  const photoRef=useRef();
  function handlePhotoChange(e){
    const f=e.target.files[0];if(!f)return;
    const r=new FileReader();r.onload=ev=>{setPhotoState(ev.target.result);toast("✓ Wêne hate nûkirin");};r.readAsDataURL(f);
  }
  return(
    <>
      {/* Header card */}
      <div style={{background:"linear-gradient(135deg,#0C2340,"+a.color+")",borderRadius:16,padding:"20px 16px 18px",marginBottom:12,position:"relative",overflow:"hidden"}}>
        <div style={{position:"absolute",right:-10,top:-10,fontSize:80,opacity:0.10,pointerEvents:"none"}}>{a.icon}</div>
        <div style={{display:"flex",alignItems:"center",gap:14,marginBottom:14,position:"relative",zIndex:1}}>
          <div style={{position:"relative",cursor:"pointer"}} onClick={()=>photoRef.current.click()}>
            <Avatar name={teacher.name} color={a.color} size={64} photo={photoState}/>
            <div style={{position:"absolute",bottom:0,right:0,width:20,height:20,borderRadius:"50%",background:"#F7D116",display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,border:"2px solid #0C2340"}}>📷</div>
          </div>
          <input ref={photoRef} type="file" accept="image/*" style={{display:"none"}} onChange={handlePhotoChange}/>
          <div style={{flex:1}}>
            <div style={{color:"#fff",fontSize:16,fontWeight:700}}>{teacher.name}</div>
            <div style={{color:"rgba(255,255,255,0.7)",fontSize:11,marginTop:2}}>{teacher.no}</div>
            <div style={{color:"rgba(255,255,255,0.6)",fontSize:11}}>{a.icon} {areaName(teacher.area,lang)}</div>
          </div>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8,position:"relative",zIndex:1}}>
          {[
            {label:lang==="en"?"Avg Att":lang==="de"?"Ø Anw.":"Navgîna Amadebûnê",val:avgAtt+"%",color:avgAtt>=85?"#7DC499":"#EF9F27"},
            {label:lang==="en"?"Avg Grade":lang==="de"?"Ø Note":"Navgîna Notê",val:avgGrade+"/100",color:"#F7D116"},
            {label:"Tevahî",val:myStudents.length,color:"rgba(255,255,255,0.9)"},
          ].map((s,i)=>(
            <div key={i} style={{background:"rgba(255,255,255,0.12)",borderRadius:8,padding:"8px 6px",textAlign:"center"}}>
              <div style={{fontSize:16,fontWeight:800,color:s.color}}>{s.val}</div>
              <div style={{fontSize:9,color:"rgba(255,255,255,0.6)",marginTop:2}}>{s.label}</div>
            </div>
          ))}
        </div>
      </div>

      {/* Contact info */}
      <Card style={{marginBottom:10}}>
        <div style={{fontSize:12,fontWeight:700,color:"var(--text)",marginBottom:12}}>👤 {lang==="de"?"Persönliche Daten":lang==="en"?"Personal Info":"Agahiyên Kesane"}</div>
        {[
          {icon:"📱",label:lang==="en"?"Phone":lang==="de"?"Telefon":"Têlefon",val:teacher.phone},
          {icon:"✉️",label:lang==="en"?"Email":lang==="de"?"E-Mail":"E-Posta",val:teacher.email},
          {icon:"🎂",label:lang==="en"?"Date of Birth":lang==="de"?"Geburtsdatum":"Roja Jidayikbûnê",val:teacher.dob},
          {icon:"📍",label:lang==="en"?"Address":lang==="de"?"Adresse":"Navnîşan",val:teacher.address},
          {icon:"📝",label:lang==="en"?"About":lang==="de"?"Über":"Derbarê",val:teacher.bio},
        ].filter(x=>x.val).map((x,i,arr)=>(
          <div key={i} style={{display:"flex",alignItems:"flex-start",gap:10,padding:"8px 0",borderBottom:i<arr.length-1?"0.5px solid var(--border)":"none"}}>
            <span style={{fontSize:15,flexShrink:0,marginTop:1}}>{x.icon}</span>
            <div>
              <div style={{fontSize:10,color:"var(--text2)"}}>{x.label}</div>
              <div style={{fontSize:13,color:"var(--text)",fontWeight:500}}>{x.val}</div>
            </div>
          </div>
        ))}
      </Card>

      {/* Polê statîstîk */}
      <Card style={{marginBottom:10}}>
        <div style={{fontSize:12,fontWeight:700,color:"var(--text)",marginBottom:10}}>📊 Kurteya Polê</div>
        <PbarRow label="Navgîna Amadebûnê" pct={avgAtt} color={avgAtt>=85?"#3B6D11":avgAtt>=75?"#EF9F27":"#A32D2D"}/>
        <PbarRow label="Navgîna Notan" pct={avgGrade} color={a.color}/>
        <div style={{marginTop:10,display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8}}>
          {[
            {bg:"var(--red-bg)",color:"var(--red)",val:riskCount,label:"Di Xeterê de"},
            {bg:"var(--green-bg)",color:"var(--green)",val:studentsWithStats.filter(s=>s.att>=85).length,label:"Di Rewşa Baş de"},
            {bg:a.bg,color:a.text,val:myStudents.length,label:"Tevahî"},
          ].map((s,i)=>(

              <div style={{fontSize:9,color:"var(--text2)",marginTop:2}}>{s.label}</div>

          ))}

      </Card>

      {/* Lîsteya xwendekaran */}
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:8}}>
        <div style={{fontSize:11,fontWeight:600,color:"var(--text2)",textTransform:"uppercase",letterSpacing:"0.07em"}}>{t.myStudents}</div>
        <button onClick={onGoStats} style={{fontSize:10,padding:"3px 10px",background:a.bg,color:a.text,border:"none",borderRadius:8,cursor:"pointer",fontWeight:600}}>
          📊 Hemû Statîstîk →
        </button>
      </div>
      <Card style={{marginBottom:12}}>
        {studentsWithStats.map((s,i)=>{
          const ac=s.att>=85?"var(--green)":s.att>=75?"#EF9F27":"var(--red)";
          return(
            <div key={s.id} onClick={()=>onSelectStudent(s)}
              style={{display:"flex",alignItems:"center",gap:10,padding:"9px 0",borderBottom:i<myStudents.length-1?"0.5px solid var(--border)":"none",cursor:"pointer"}}>
              <Avatar name={s.name} color={a.color} size={32} photo={s.photo}/>
              <div style={{flex:1}}>
                <div style={{fontSize:13,color:"var(--text)"}}>{s.name}</div>
                <div style={{fontSize:10,color:"var(--text2)",fontFamily:"monospace"}}>{s.no}</div>
              </div>
              <div style={{fontSize:12,fontWeight:700,color:ac}}>{s.att}%</div>
              {s.att<75&&<span style={{fontSize:12}}>⚠️</span>}

          );
        })}
      </Card>

      {/* Mîhengên hesabê */}
      <Card>
        <div style={{fontSize:12,fontWeight:700,color:"var(--text)",marginBottom:12}}>⚙️ {lang==="de"?"Kontoeinstellungen":lang==="en"?"Account Settings":"Mîhengên Hesabê"}</div>
        <button onClick={()=>setShowChangePass(true)}
          style={{width:"100%",padding:"12px",marginBottom:8,background:"var(--bg2)",border:"0.5px solid var(--border2)",borderRadius:10,fontSize:13,fontWeight:600,cursor:"pointer",color:"var(--text)",textAlign:"left",display:"flex",alignItems:"center",gap:10}}>
          <span style={{fontSize:18}}>🔒</span> {lang==="de"?"Passwort Ändern":lang==="en"?"Change Password":"Şîfre Biguherîne"}
          <span style={{marginLeft:"auto",color:"var(--text2)"}}>›</span>
        </button>
        <button onClick={onLogout}
          style={{width:"100%",padding:"12px",background:"var(--red-bg)",border:"0.5px solid var(--red)",borderRadius:10,fontSize:13,fontWeight:600,cursor:"pointer",color:"var(--red)",textAlign:"left",display:"flex",alignItems:"center",gap:10}}>
          <span style={{fontSize:18}}>↩</span> {lang==="de"?"Abmelden":lang==="en"?"Sign Out":"Derkeve"}
          <span style={{marginLeft:"auto"}}>›</span>
        </button>
      </Card>

      {showChangePass&&<StudentChangePassSheet onClose={()=>setShowChangePass(false)} toast={toast} user={teacher} onSavePass={onSaveTeacherPass}/>}
    </>
  );
}

/* ─── TEACHER PANEL ─────────────────────────────────────────────────────── */
function TeacherPanel({teacher,students,schedule,t,lang,toast,onLogout,onDataChange}){
  const [view,setView]=useState("home");
  const [scanResult,setScanResult]=useState(null);
  const [attendance,setAttendance]=useState({});
  const [scannedId,setScannedId]=useState(null);
  const [activeQRSession,setActiveQRSession]=useState(null);
  const [qrToken,setQrToken]=useState(null);
  const [selectedStudentStat,setSelectedStudentStat]=useState(null);
  const [statsFilter,setStatsFilter]=useState("all"); // all | risk | ok
  const [showAddStudentSheet,setShowAddStudentSheet]=useState(false);

  const a=AREA_MAP[teacher.area];
  const myStudents=students.filter(s=>s.area===teacher.area);
  const mySchedule=schedule.filter(s=>s.area===teacher.area);

  // Aggregate stats
  const studentsWithStats=myStudents.map(s=>({...s,...getStudentStats(s.id)}));
  const avgAtt=myStudents.length?Math.round(studentsWithStats.reduce((acc,s)=>acc+s.att,0)/myStudents.length):0;
  const avgGrade=myStudents.length?Math.round(studentsWithStats.reduce((acc,s)=>acc+s.grade,0)/myStudents.length):0;
  const riskCount=studentsWithStats.filter(s=>s.att<75).length;

  const filteredStudents=statsFilter==="risk"
    ? studentsWithStats.filter(s=>s.att<75)
    : statsFilter==="ok"
    ? studentsWithStats.filter(s=>s.att>=85)
    : studentsWithStats;

  // Sync attendance from QR checkins
  useEffect(()=>{
    if(!activeQRSession) return;
    const interval = setInterval(()=>{
      const checkins = getSessionCheckins();
      setAttendance(prev=>{
        const updated = {...prev};
        Object.keys(checkins).forEach(sid=>{ updated[sid]="on"; });
        return updated;
      });
    }, 800);
    return ()=>clearInterval(interval);
  },[activeQRSession]);

  function openLessonQR(){
    const lesson = mySchedule[0];
    const lessonName = lesson ? lesson.name : (lang==="en"?"Class Session":lang==="de"?"Unterrichtssitzung":"Ders Oturumu");
    const lessonId = lesson ? lesson.id : ("manual_"+Date.now());
    const token = generateSessionToken(lessonId, teacher.id);
    const session = openQRSession(token, lessonName, teacher.name, teacher.area);
    setQrToken(token);
    setActiveQRSession(session);
  }

  function closeLessonQR(){
    closeQRSession();
    const checkins = getSessionCheckins();
    setAttendance(prev=>{
      const updated = {...prev};
      Object.keys(checkins).forEach(sid=>{ updated[sid]="on"; });
      return updated;
    });
    setActiveQRSession(null);
    setQrToken(null);
    toast("✓ Rûniştina dersa hate girtin – Amadebûn hate nûkirin");
  }

    setScannedId(target.id);
    setScanResult(target);
    setAttendance(prev=>({...prev,[target.id]:"on"}));
    toast("✓ "+target.name+" → "+target.no);
  },[myStudents,scannedId]);

          size: (file.size/1024).toFixed(0)+"KB",
          type: file.type,
          date: new Date().toLocaleDateString("ku"),
          url: ev.target.result

      reader.readAsDataURL(file);
    });
    e.target.value="";

/* ─── STUDENT CHANGE PASSWORD SHEET ────────────────────────────────────── */
function StudentChangePassSheet({onClose,toast,user,onSavePass}){
  const [cur,setCur]=useState("");
  const [next,setNext]=useState("");
  const [confirm,setConfirm]=useState("");
  const [err,setErr]=useState("");
  const [done,setDone]=useState(false);
  function handleSave(){
    if(!cur||!next||!confirm){setErr("Hemû qadan dagire");return;}
    const currentPass=user&&user.pass?user.pass:"1234";
    if(cur!==currentPass){setErr("Şîfreya niha xelet e / Mevcut şifre yanlış");return;}
    if(next.length<4){setErr("Şîfreya nû herî kêm 4 tîp be / En az 4 karakter");return;}
    if(next!==confirm){setErr("Şîfre li hev nayên / Şifreler eşleşmiyor");return;}
    setErr("");setDone(true);
    if(onSavePass) onSavePass(next);
    toast("✓ Şîfre hate guhertin");
    setTimeout(()=>onClose(),1200);
  }
  return(
    <Sheet open={true} onClose={onClose} title="🔒 Şîfre Biguherîne">
      {done?(
        <div style={{textAlign:"center",padding:"24px 0"}}>
          <div style={{fontSize:52,marginBottom:12}}>✅</div>
          <div style={{fontSize:15,fontWeight:700,color:"var(--text)"}}>Şîfre hate guhertin!</div>
        </div>
      ):(
        <>
          <FieldWrap label="Şîfreya Niha">
            <input style={inputStyle} type="password" value={cur} onChange={e=>setCur(e.target.value)} placeholder="••••"/>
          </FieldWrap>
          <FieldWrap label="Şîfreya Nû">
            <input style={inputStyle} type="password" value={next} onChange={e=>setNext(e.target.value)} placeholder="••••••••"/>
          </FieldWrap>
          <FieldWrap label="Şîfreya Nû (Careke din)">
            <input style={inputStyle} type="password" value={confirm} onChange={e=>setConfirm(e.target.value)} placeholder="••••••••"/>
          </FieldWrap>
          {err&&<div style={{color:"var(--red)",fontSize:12,marginBottom:10,padding:"8px 10px",background:"var(--red-bg)",borderRadius:8}}>{err}</div>}
          <PrimaryBtn onClick={handleSave} icon="💾">Şîfre Tomar Bike</PrimaryBtn>
          <button onClick={onClose} style={{width:"100%",marginTop:8,padding:10,background:"none",border:"none",color:"var(--text2)",fontSize:13,cursor:"pointer"}}>İptal</button>
        </>
      )}
    </Sheet>
  );
}

/* ─── LOGIN SCREEN ──────────────────────────────────────────────────────── */
function LoginScreen({students,teachers,t,lang,setLang,onLogin,onForgot,dark,onThemeToggle}){
  const [role,setRole]=useState("student");
  const [user,setUser]=useState("");
  const [pass,setPass]=useState("");
  const [err,setErr]=useState("");

  const LANGS=[
    {key:"ku",label:"Kurdî",flag:<KRGFlag size={30}/>},
    {key:"en",label:"English",flag:<span style={{fontSize:22}}>🇬🇧</span>},
    {key:"de",label:"Deutsch",flag:<span style={{fontSize:22}}>🇩🇪</span>},
  ];

  // Credential Autofill support
  const {saveCredential}=useBiometric();
  
  async function doLogin(){
    setErr("");
    const uid=(user.trim()||"?").toLowerCase();
    if(isLockedOut(uid)){
      const mins=Math.ceil(remainingLockoutSeconds(uid)/60);
      setErr("Hesap kilitlendi "+mins+" dk / Hesab "+mins+" deq kiliye");
      return;
    }

    const fb = window.__FB;
    const userInput = user.trim();
    const passInput = pass;

    // ── Firebase Auth ile giriş dene ──
    // Admin için: e-posta ile giriş
    // Öğretmen için: id@aramtigran.edu veya kendi e-postaları
    // Öğrenci için: no@aramtigran.edu veya kendi e-postaları
    if(fb && fb.isConfigured()){
      try {
        // Giriş için e-posta oluştur: eğer @'li değilse otomatik ekle
        const loginEmail = userInput.includes("@")
          ? userInput
          : (role === "student"
            ? userInput + "@aramtigran.edu"
            : userInput + "@aramtigran.edu");
        const cred = await fb.authSignIn(loginEmail, passInput);
        const fbUser = cred.user;
        // Firebase Auth başarılı — kullanıcıyı students/teachers listesinden bul
        let matched=null, matchedType=null;
        const tcList=teachers.filter(tc=>tc.email&&tc.email.toLowerCase()===fbUser.email.toLowerCase());
        if(tcList.length>0){
          matched=tcList[0];
          matchedType=matched.isAdmin?"admin":"teacher";
        }
        if(!matched){
          const sList=students.filter(s=>s.email&&s.email.toLowerCase()===fbUser.email.toLowerCase());
          if(sList.length>0){matched=sList[0];matchedType="student";}
        }
        // Admin e-posta ile doğrudan eşleştir
        if(!matched && fbUser.email===fb.ADMIN_EMAIL){
          const adminUser=teachers.find(tc=>tc.isAdmin);
          matched=adminUser||{id:"admin",name:"Admin",isAdmin:true};
          matchedType="admin";
        }
        if(matched&&matchedType){
          clearAttempts(uid);
          hapticSuccess();
          window._analytics && window._analytics.login("firebase_"+matchedType);
          window._crashlytics && window._crashlytics.setUserId(matched.no||matched.id||"unknown");
          onLogin(matchedType,matched);
          saveCredential(userInput, passInput).catch(()=>{});
          return;
        }
        // Firebase Auth başarılı ama Firestore'da kayıt yok — demo olarak devam et
      } catch(fbErr){
        // Firebase Auth başarısız — yerel doğrulamaya düş (demo modu)

        }
      }
    }

    // ── Yerel (demo) doğrulama — Firebase bağlı değilse veya Firebase başarısızsa ──

    const tcList=teachers.filter(tc=>tc.id===userInput||tc.no===userInput||(tc.email&&tc.email.split("@")[0]===userInput));

        if(await verifyPassword(passInput,s.pass)){matched=s;matchedType="student";break;}
      }
    }
    if(matched&&matchedType){

      hapticSuccess();
      window._analytics && window._analytics.login(matchedType);
      window._crashlytics && window._crashlytics.setUserId(matched.no || matched.id || "unknown");

      saveCredential(userInput, passInput).catch(()=>{});

        <div style={{color:"rgba(255,255,255,.45)",fontSize:11,marginTop:10,letterSpacing:"0.08em",textTransform:"uppercase"}}>{t.appSub}</div>
      </div>

      {/* Form panel */}
      <div style={{background:"var(--bg1)",borderRadius:"28px 28px 0 0",flex:1,overflow:"hidden",display:"flex",flexDirection:"column"}}>
        <div role="main" style={{flex:1,overflowY:"auto",padding:"22px 20px 40px"}}>

          {/* Lang picker */}

/* ─── QR SESSION MANAGER ────────────────────────────────────────────────── */
// In-memory session store (works without localStorage)
window._aat_qr_session = null;

function generateSessionToken(lessonId, teacherId){
  const ts = Date.now();
  const rand = Math.random().toString(36).slice(2,8).toUpperCase();
  return `AAT-${teacherId}-${lessonId}-${ts}-${rand}`;
}

function openQRSession(token, lessonName, teacherName, area, expiresInMs=600000){
  const session = {
    token, lessonName, teacherName, area,
    openedAt: Date.now(),
    expiresAt: Date.now() + expiresInMs,
    checkins: {},
    active: true
  };
  window._aat_qr_session = session;
  return session;
}

function getActiveQRSession(){
  const s = window._aat_qr_session;
  if(!s || !s.active || Date.now() > s.expiresAt) return null;
  return s;
}

function checkinToSession(token, student){
  const s = window._aat_qr_session;
  if(!s) return {ok:false, reason:"session_not_found"};
  if(!s.active) return {ok:false, reason:"session_closed"};
  if(Date.now() > s.expiresAt) return {ok:false, reason:"session_expired"};
  if(s.token !== token) return {ok:false, reason:"token_mismatch"};
  if(s.checkins[student.id]) return {ok:false, reason:"already_checked_in"};
  s.checkins[student.id] = {name:student.name, no:student.no, time:new Date().toLocaleTimeString("tr")};
  return {ok:true, session:s};
}

function closeQRSession(){
  if(window._aat_qr_session) window._aat_qr_session.active = false;
}

function getSessionCheckins(){
  const s = window._aat_qr_session;
  return (s && s.checkins) ? s.checkins : {};
}

/* ─── REAL QR CODE GENERATOR (uses qrcodejs) ───────────────────────────── */
function TeacherQRDisplay({token, lessonName, teacherName, areaColor, onClose, students, myStudents, lang}){
  const qrRef = useRef(null);
  const qrInstance = useRef(null);
  const [checkins, setCheckins] = useState(()=>getSessionCheckins());
  const [secondsLeft, setSecondsLeft] = useState(600);
  const intervalRef = useRef(null);
  const pollRef = useRef(null);

  useEffect(()=>{
    if(!qrRef.current) return;
    qrRef.current.innerHTML = "";
    if(window.QRCode){
      qrInstance.current = new window.QRCode(qrRef.current, {
        text: token,
        width: 220,
        height: 220,
        colorDark: "#0C2340",
        colorLight: "#ffffff",
        correctLevel: window.QRCode.CorrectLevel.H
      });
    }
    // Countdown
    intervalRef.current = setInterval(()=>{
      setSecondsLeft(p=>{
        if(p<=1){ clearInterval(intervalRef.current); onClose(); return 0; }
        return p-1;
      });
    },1000);
    // Poll for check-ins
    pollRef.current = setInterval(()=>{
      setCheckins(getSessionCheckins());
    },800);
    return ()=>{
      clearInterval(intervalRef.current);
      clearInterval(pollRef.current);
    };
  },[token]);

  const mins = Math.floor(secondsLeft/60);
  const secs = secondsLeft % 60;
  const checkinList = Object.values(checkins);
  const total = myStudents.length;
  const pct = total ? Math.round(checkinList.length/total*100) : 0;

  return(
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.85)",zIndex:400,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:20}}>
      <div style={{background:"var(--bg1)",borderRadius:24,width:"100%",maxWidth:380,padding:"20px 18px 24px",boxShadow:"0 20px 60px rgba(0,0,0,0.5)"}}>
        {/* Header */}
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:14}}>
          <div>
            <div style={{fontSize:16,fontWeight:700,color:"var(--text)"}}>{lang==="en"?"📡 Class QR Session":lang==="de"?"📡 Unterrichts-QR-Sitzung":"📡 Ders QR Oturumu"}</div>
            <div style={{fontSize:11,color:"var(--text2)",marginTop:2}}>{lessonName}</div>
          </div>
          <div style={{textAlign:"right"}}>
            <div style={{fontSize:22,fontWeight:700,color:secondsLeft<60?"#A32D2D":areaColor,fontFamily:"monospace"}}>
              {mins}:{String(secs).padStart(2,"0")}
            </div>
            <div style={{fontSize:9,color:"var(--text2)"}}>süre</div>
          </div>
        </div>

        {/* QR Code */}
        <div style={{display:"flex",justifyContent:"center",marginBottom:14}}>
          <div style={{position:"relative",background:"#fff",borderRadius:16,padding:12,boxShadow:"0 4px 20px rgba(12,35,64,0.15)",border:`3px solid ${areaColor}`}}>
            <div ref={qrRef} id="qr-teacher-canvas" style={{width:220,height:220}} className="pulse-qr"/>
            {/* Scanline animation overlay */}
            <div style={{position:"absolute",left:12,right:12,top:12,bottom:12,pointerEvents:"none",overflow:"hidden",borderRadius:8}}>
              <div style={{position:"absolute",left:0,right:0,height:"2px",background:"linear-gradient(90deg,transparent,"+areaColor+",transparent)",animation:"scanmove 2.5s linear infinite"}}/>
            </div>
            {/* Corner marks */}
            {[{top:4,left:4},{top:4,right:4},{bottom:4,left:4},{bottom:4,right:4}].map((pos,i)=>(
              <div key={i} style={{position:"absolute",width:20,height:20,borderStyle:"solid",borderColor:areaColor,borderWidth:0,...Object.fromEntries(Object.entries(pos).map(([k,v])=>[k,v])),
                borderTopWidth:Object.keys(pos).includes("top")?3:0,
                borderLeftWidth:Object.keys(pos).includes("left")?3:0,
                borderBottomWidth:Object.keys(pos).includes("bottom")?3:0,
                borderRightWidth:Object.keys(pos).includes("right")?3:0
              }}/>
            ))}
          </div>
        </div>

        {/* Token display */}
        <div style={{background:"var(--bg2)",borderRadius:8,padding:"6px 10px",marginBottom:14,textAlign:"center"}}>
          <div style={{fontSize:9,color:"var(--text2)",letterSpacing:"0.05em",marginBottom:2}}>OTURUM KODU</div>
          <div style={{fontSize:10,fontFamily:"monospace",color:areaColor,fontWeight:700,wordBreak:"break-all",letterSpacing:"0.04em"}}>{token}</div>
        </div>

        {/* Progress */}
        <div style={{marginBottom:14}}>
          <div style={{display:"flex",justifyContent:"space-between",fontSize:12,marginBottom:6}}>
            <span style={{color:"var(--text2)"}}>🎓 Giriş Yapan</span>
            <span style={{fontWeight:700,color:"var(--green)"}}>{checkinList.length} / {total}</span>
          </div>
          <div style={{height:8,background:"var(--bg2)",borderRadius:4,overflow:"hidden"}}>
            <div style={{height:"100%",width:`${pct}%`,background:"var(--green)",borderRadius:4,transition:"width 0.5s ease"}}/>
          </div>
        </div>

        {/* Check-in list */}
        {checkinList.length>0&&(
          <div style={{maxHeight:140,overflowY:"auto",marginBottom:14}}>
            {checkinList.map((c,i)=>(
              <div key={c.no} className="fade-in" style={{display:"flex",alignItems:"center",gap:8,padding:"5px 0",borderBottom:"0.5px solid var(--border)"}}>
                <span style={{fontSize:16}} className="check-anim">✅</span>
                <div style={{flex:1}}>

                </div>
                <div style={{fontSize:10,color:"var(--green)"}}>{c.time}</div>

            🔄 Nûve bike
          </button>
        </div>
      </div>
    </div>
  );
}

/* ─── STUDENT QR SCANNER (reads teacher's QR) ───────────────────────────── */
function StudentQRScanner({student, onClose, toast, lang="ku"}){
  const videoRef  = useRef(null);
  const canvasRef = useRef(null);
  const streamRef = useRef(null);
  const rafRef    = useRef(null);
  const fileRef   = useRef(null);

  // mode: "live" = getUserMedia stream  |  "capture" = file input / photo capture
  const [mode, setMode]           = useState("live");  // try live first
  const [status, setStatus]       = useState("scanning");
  const [cameraOn, setCameraOn]   = useState(false);
  const [camError, setCamError]   = useState("");
  const [manualCode, setManualCode] = useState("");
  const [errorMsg, setErrorMsg]   = useState("");
  const [checkinTime, setCheckinTime] = useState("");
  const [lessonName, setLessonName]   = useState("");
  const [tab, setTab] = useState("camera"); // camera | manual

  /* ── labels ── */
  const L = {
    entry:     lang==="de"?"Unterrichtseingang":lang==="en"?"Class Entry":"Têketina Dersê",
    scanLabel: lang==="de"?"QR-Code des Lehrers scannen":lang==="en"?"Scan teacher's QR code":"Koda QR ya mamosteyê bixwîne",
    manualLabel:lang==="de"?"Code manuell eingeben":lang==="en"?"Enter code manually":"Koda bi destan binivîse",
    retry:     lang==="de"?"Erneut versuchen":lang==="en"?"Try again":"Dîsa biceribîne",
    shoot:     lang==="de"?"Foto aufnehmen & scannen":lang==="en"?"Take photo & scan":"Wêne bigire & bixwîne",
    starting:  lang==="de"?"Kamera wird gestartet…":lang==="en"?"Starting camera…":"Kamera tê destpêkirin…",
    submit:    lang==="de"?"Einreichen":lang==="en"?"Submit":"Bişîne",
    back:      lang==="de"?"Zurück zur Kamera":lang==="en"?"Back to camera":"Vegere kamerayê",
    ok:        lang==="de"?"OK":lang==="en"?"OK":"Baş e",
    confirmed: lang==="de"?"Eingang Bestätigt!":lang==="en"?"Entry Confirmed!":"Têketin Hate Pejirandin!",
    failed:    lang==="de"?"Eingang Fehlgeschlagen":lang==="en"?"Entry Failed":"Têketin Pêk Nehat",
    msgs:{
      ku:{session_not_found:"Civîna dersê ya çalak nehat dîtin.",session_closed:"Civîna dersê hatiye girtin.",session_expired:"Dema QR ya dersê derbas bûye.",token_mismatch:"Koda QR ya şaş.",already_checked_in:"Berê ketina vê dersê qeyd kir."},
      en:{session_not_found:"No active class session found.",session_closed:"Class session has been closed.",session_expired:"Class QR has expired.",token_mismatch:"Invalid QR code.",already_checked_in:"You already checked into this class."},
      de:{session_not_found:"Keine aktive Unterrichtssitzung gefunden.",session_closed:"Unterrichtssitzung wurde geschlossen.",session_expired:"Unterrichts-QR ist abgelaufen.",token_mismatch:"Ungültiger QR-Code.",already_checked_in:"Sie haben sich bereits in dieser Klasse eingecheckt."}
    }
  };

  /* ── mount: try live camera, fall back to capture mode ── */
  useEffect(()=>{ tryLive(); return ()=>{ stopLive(); }; },[]);

  async function tryLive(){
    setCamError(""); setCameraOn(false);
    // getUserMedia requires secure context (https or localhost)
    const secure = location.protocol==="https:" || /^(localhost|127\.0\.0\.1)$/.test(location.hostname);
    if(!secure || !navigator.mediaDevices?.getUserMedia){
      setMode("capture"); // fall back silently — no error shown
      return;
    }
    try{
      const stream = await navigator.mediaDevices.getUserMedia({
        video:{ facingMode:{ideal:"environment"}, width:{ideal:1920}, height:{ideal:1080} }
      });
      streamRef.current = stream;
      if(videoRef.current){
        videoRef.current.srcObject = stream;
        await videoRef.current.play();
        setCameraOn(true);
        scanFrame();
      }
    } catch(e){
      console.warn("getUserMedia:", e.name);
      setMode("capture"); // silently fall back
    }
  }

  function stopLive(){
    cancelAnimationFrame(rafRef.current);
    if(streamRef.current){ streamRef.current.getTracks().forEach(t=>t.stop()); streamRef.current=null; }
    setCameraOn(false);
  }

  function scanFrame(){
    const video  = videoRef.current;
    const canvas = canvasRef.current;
    if(!video||!canvas) return;
    if(video.readyState < video.HAVE_ENOUGH_DATA){ rafRef.current=requestAnimationFrame(scanFrame); return; }
    const ctx = canvas.getContext("2d");
    canvas.width=video.videoWidth; canvas.height=video.videoHeight;
    ctx.drawImage(video,0,0,canvas.width,canvas.height);
    const img = ctx.getImageData(0,0,canvas.width,canvas.height);
    if(window.jsQR){
      const code = window.jsQR(img.data,img.width,img.height,{inversionAttempts:"dontInvert"});
      if(code?.data?.startsWith("AAT-")){ stopLive(); handleToken(code.data); return; }
    }
    rafRef.current=requestAnimationFrame(scanFrame);
  }

  /* ── file/capture input handler ── */
  function onFileChange(e){
    const file = e.target.files?.[0]; if(!file) return;
    const img = new Image();
    const url = URL.createObjectURL(file);
    img.onload = ()=>{
      const canvas = canvasRef.current || document.createElement("canvas");
      canvas.width=img.width; canvas.height=img.height;
      const ctx = canvas.getContext("2d");
      ctx.drawImage(img,0,0);
      URL.revokeObjectURL(url);
      const data = ctx.getImageData(0,0,canvas.width,canvas.height);
      if(window.jsQR){
        const code = window.jsQR(data.data,data.width,data.height,{inversionAttempts:"attemptBoth"});
        if(code?.data?.startsWith("AAT-")){ handleToken(code.data); return; }
        // no QR found
        setCamError(lang==="de"?"Kein QR-Code gefunden — erneut versuchen":lang==="en"?"No QR code found — try again":"Koda QR nehat dîtin — dîsa biceribîne");
      }
    };
    img.onerror = ()=>{ URL.revokeObjectURL(url); };
    img.src = url;
    // reset input so same file can be re-selected
    e.target.value="";
  }

  /* ── token handling ── */
  function handleToken(token){
    const result = checkinToSession(token, student);
    if(result.ok){
      const s = getActiveQRSession();
      setLessonName(s?.lessonName||(lang==="de"?"Unterricht":lang==="en"?"Class":"Ders"));
      setCheckinTime(new Date().toLocaleTimeString());
      hapticSuccess(); setStatus("success");
    } else {
      const m = L.msgs[lang]||L.msgs.ku;
      setErrorMsg(m[result.reason]||(lang==="de"?"Fehler":lang==="en"?"Error":"Xelet"));
      setStatus("error");
    }
  }

  /* ── manual code submit ── */
  function submitManual(){
    const code = manualCode.trim().toUpperCase(); if(!code) return;
    if(code.startsWith("AAT-")){ handleToken(code); return; }
    const s = getActiveQRSession();
    if(s?.token){
      if(code===s.token.slice(-6).toUpperCase()||code===s.token){ handleToken(s.token); }
      else { setErrorMsg(lang==="de"?"Falscher Code":lang==="en"?"Wrong code":"Koda xelet"); setStatus("error"); }
    } else {
      setErrorMsg(lang==="de"?"Keine aktive Sitzung":lang==="en"?"No active session":"Rûniştina çalak tune");
      setStatus("no_session");
    }
  }

  /* ────────────────── RENDER ────────────────── */
  return(
    <div style={{position:"fixed",inset:0,background:"#000",zIndex:500,display:"flex",flexDirection:"column"}}>

      {/* ── Header ── */}
      <div style={{background:"rgba(12,35,64,0.97)",padding:"14px 16px",display:"flex",alignItems:"center",gap:12,flexShrink:0}}>
        <button onClick={()=>{stopLive();onClose();}}
          style={{background:"none",border:"none",color:"#fff",fontSize:24,cursor:"pointer",padding:0,lineHeight:1}}>←</button>
        <div style={{flex:1,color:"#fff",fontSize:15,fontWeight:700}}>📷 {L.entry}</div>
        {/* camera / manual tabs */}
        <div style={{display:"flex",gap:4,background:"rgba(255,255,255,0.1)",borderRadius:8,padding:3}}>
          {[{k:"camera",icon:"📷"},{k:"manual",icon:"⌨️"}].map(t=>(
            <button key={t.k} onClick={()=>setTab(t.k)}
              style={{padding:"5px 11px",borderRadius:6,border:"none",
                background:tab===t.k?"#F7D116":"transparent",
                color:tab===t.k?"#0C2340":"#fff",fontSize:14,cursor:"pointer",fontWeight:700}}>
              {t.icon}
            </button>
          ))}
        </div>
      </div>

      {/* ── Camera tab ── */}
      {(status==="scanning"||status==="no_session")&&tab==="camera"&&(
        <>
          {/* ── LIVE mode: full-screen video ── */}
          {mode==="live"&&(
            <div style={{flex:1,position:"relative",background:"#000",overflow:"hidden"}}>
              <video ref={videoRef} playsInline muted autoPlay
                style={{position:"absolute",inset:0,width:"100%",height:"100%",objectFit:"cover"}}/>
              <canvas ref={canvasRef} style={{display:"none"}}/>

              {/* Loading spinner until stream starts */}

function useOnline(){
  const [online,setOnline]=useState(typeof navigator!=="undefined"?navigator.onLine:true);
  useEffect(()=>{
    const on=()=>{setOnline(true);window.dispatchEvent(new CustomEvent("aat-online"));}
    const off=()=>{setOnline(false);window.dispatchEvent(new CustomEvent("aat-offline"));}
    window.addEventListener("online",on);
    window.addEventListener("offline",off);
    return()=>{window.removeEventListener("online",on);window.removeEventListener("offline",off);}
  },[]);
  return online;
}

function OfflineBanner({online}){
  const [visible,setVisible]=useState(false);
  const [justCame,setJustCame]=useState(false);
  const timerRef=useRef();

      clearTimeout(timerRef.current);

  const [show,setShow]=useState(false);

  useEffect(()=>{
    const onAvail=()=>setShow(true);
    const onInstalled=()=>{setInstalled(true);setShow(false);}
    window.addEventListener("pwaInstallAvailable",onAvail);
    window.addEventListener("pwaInstalled",onInstalled);
    // Check if already installed
    if(window.matchMedia&&window.matchMedia("(display-mode: standalone)").matches) setShow(false);
    return()=>{window.removeEventListener("pwaInstallAvailable",onAvail);window.removeEventListener("pwaInstalled",onInstalled);}
  },[]);
  if(!show||installed) return null;

    <div style={{

      width:"calc(100% - 32px)",maxWidth:398,zIndex:500,

class ErrorBoundary extends React.Component {

          alignItems:"center",justifyContent:"center",padding:24,gap:16,textAlign:"center"}}>

/* ─── NOTIFICATION SYSTEM ────────────────────────────────────────────────── */
function useNotifications(){
  const [permission,setPermission]=useState(()=>
    typeof Notification!=="undefined"?Notification.permission:"default"
  );
  
  const requestPermission=useCallback(async()=>{
    if(typeof Notification==="undefined") return "denied";
    if(Notification.permission==="granted") return "granted";
    const result=await Notification.requestPermission();
    setPermission(result);
    return result;
  },[]);
  
  const sendLocalNotification=useCallback((title,body,options={})=>{
    if(typeof Notification==="undefined"||Notification.permission!=="granted") return;
    try{
      const n=new Notification(title,{
        body,icon:"/favicon.ico",badge:"/favicon.ico",
        tag:options.tag||"aat-notif",
        ...options
      });
      if(options.onClick) n.onclick=options.onClick;
    }catch(e){console.warn("Notification error:",e);}
  },[]);
  
  return {permission,requestPermission,sendLocalNotification};
}

      )}
      
      {settingRow("⚡",
        lang==="en"?"Offline Cache":lang==="de"?"Offline-Cache":"Depokirina Offline",
        `Service Worker: ${swStatus==="registered"
          ?(lang==="en"?"Active":lang==="de"?"Aktiv":"Çalak")
          :(lang==="en"?"Not active":lang==="de"?"Nicht aktiv":"Ne çalak")}`,
        <span style={{fontSize:11,color:swStatus==="registered"?"var(--green)":"var(--text2)",fontWeight:700}}>
          {swStatus==="registered"?"✓":"—"}
        </span>,
        null
      )}
      
      {/* Legal rows */}
      {onLegal&&settingRow("🔒",
        lang==="en"?"Privacy Policy":lang==="de"?"Datenschutzerklärung":"Siyaseta Nepenîtiyê",
        lang==="en"?"How we handle your data":lang==="de"?"Datenschutz":
          "Çawa daneyên we têne parastin",
        <span style={{fontSize:13,color:"var(--text2)"}}>›</span>,
        ()=>onLegal("privacy")
      )}
      {onLegal&&settingRow("📋",
        lang==="en"?"Terms of Service":lang==="de"?"Nutzungsbedingungen":"Şertên Bikaranînê",
        lang==="en"?"Usage rules & conditions":lang==="de"?"Nutzungsregeln":"Bikaranîna sepetê",
        <span style={{fontSize:13,color:"var(--text2)"}}>›</span>,
        ()=>onLegal("terms")
      )}
      {onLegal&&settingRow("📝",
        lang==="en"?"Changelog":lang==="de"?"Änderungsprotokoll":"Guhertinên Nû",
        lang==="en"?"What's new in v4.0":lang==="de"?"Neuigkeiten in v4.0":"v4.0 de çi nû ye",
        <span style={{fontSize:13,color:"var(--text2)"}}>›</span>,
        ()=>onLegal("changelog")
      )}
      
      {/* Network + Battery info */}
      {(networkInfo||battery)&&(
        <div style={{marginTop:12,padding:"10px 12px",background:"var(--bg2)",borderRadius:10,
          border:"0.5px solid var(--border)",display:"flex",gap:16,justifyContent:"center",
          flexWrap:"wrap"}}>
          {networkInfo&&networkInfo.type!=="unknown"&&(
            <div style={{textAlign:"center"}}>
              <div style={{fontSize:16}}>{networkInfo.type==="4g"?"📶":networkInfo.type==="3g"?"📶":"📡"}</div>
              <div style={{fontSize:9,color:"var(--text2)",marginTop:2}}>{String(networkInfo.type).toUpperCase()}{networkInfo.downlink?" · "+networkInfo.downlink+"Mb/s":""}</div>
            </div>
          )}
          {battery&&battery.level!==null&&(
            <div style={{textAlign:"center"}}>
              <div style={{fontSize:16}}>{battery.charging?"🔌":battery.level>20?"🔋":"🪫"}</div>
              <div style={{fontSize:9,color:"var(--text2)",marginTop:2}}>{battery.level}%{battery.charging?" ⚡":""}</div>
            </div>
          )}
        </div>
      )}
      
      {/* App Info */}
      <div style={{marginTop:12,padding:"12px",background:"var(--bg2)",borderRadius:12,
        textAlign:"center",border:"0.5px solid var(--border)"}}>
        <div style={{color:"var(--text2)",fontSize:10}}>AKADEMÎYA ARAM TÎGRAN v4.0</div>
        <div style={{color:"var(--text2)",fontSize:9,marginTop:2}}>PWA · Firebase · React 18 · WCAG 2.1 · 2025</div>
      </div>
    </Sheet>
  );
}

/* ─── APP ───────────────────────────────────────────────────────────────── */
function App(){
  const [lang,setLang]=useState(()=>{try{return localStorage.getItem("aat-lang")||"ku";}catch{return "ku";}});
  const [screen,setScreen]=useState("login");
  const [currentUser,setCurrentUser]=useState(null);
  const [students,setStudents]=useState(INIT_STUDENTS);
  const [teachers,setTeachers]=useState(INIT_TEACHERS);
  const [schedule,setSchedule]=useState(INIT_SCHEDULE);
  const [toastMsg,toast]=useToast();
  const t=useT(lang);
  const online=useOnline();
  const [dark,setDark]=useTheme();
  const {permission:notifPerm,requestPermission,sendLocalNotification}=useNotifications();
  const [showSettings,setShowSettings]=useState(false);
  
  // Persist language selection
  useEffect(()=>{try{localStorage.setItem("aat-lang",lang);}catch{}}, [lang]);
  
  // Back button (Android hardware back)
  useBackButton(screen, setScreen, setCurrentUser);
  
  // Deep link init
  useDeepLink(screen, setScreen, setCurrentUser);
  
  // Firebase offline persistence (once on mount)
  useEffect(() => { enableFirestoreOffline(); }, []);
  
  // Screen reader live region message
  const [liveMsg, setLiveMsg] = useState("");
  const announce = useCallback((msg) => {
    setLiveMsg(msg);
    setTimeout(() => setLiveMsg(""), 2000);
  }, []);
  
  const [legalModal, setLegalModal] = useState(null); // "privacy"|"terms"|"changelog"|null
  const networkInfo = useNetworkInfo();
  const battery = useBattery();
  const orientation = useOrientation();
  
  // RTL direction management (Kurdî Kurmancî = LTR; future Sorani = RTL)
  useRTL(lang);
  
  // GDPR consent state
  const [gdprAccepted, setGdprAccepted] = useState(() => {
    try { return !!localStorage.getItem("aat-gdpr-consent"); } catch { return true; }
  });
  
  // Request notification permission on first login
  const handleNotifRequest=useCallback(()=>{
    if(notifPerm==="default") requestPermission();
  },[notifPerm,requestPermission]);

  const onDataChange=useCallback((action,payload)=>{
    if(action==="addStudent") {
      fbSave("student", payload);
      setStudents(p=>[...p,payload]);
    }
    if(action==="addTeacher") {
      fbSave("teacher", payload);
      setTeachers(p=>[...p,payload]);
    }
    if(action==="addSchedule") {
      fbSave("schedule", payload);
      setSchedule(p=>[...p,payload]);
    }
    if(action==="updateStudent") {
      fbSave("student", payload);
      setStudents(p=>p.map(s=>s.id===payload.id?payload:s));
    }
    if(action==="updateTeacher") {
      fbSave("teacher", payload);
      setTeachers(p=>p.map(tc=>tc.id===payload.id?payload:tc));
    }
    if(action==="updateSchedule") {
      fbSave("schedule", payload);
      setSchedule(p=>p.map(ls=>ls.id===payload.id?payload:ls));
    }
    if(action==="deleteSchedule") {
      fbDelete("schedule", payload?.fireId || null);
      setSchedule(p=>p.filter(ls=>ls.id!==payload));
    }
  },[]);

  function handleLogin(type,user){
    setCurrentUser({...user,type});
    setScreen(type);
    // Welcome notification (delayed to avoid blocking UI)
    setTimeout(()=>{
      try{
        if(typeof Notification!=="undefined"&&Notification.permission==="granted"){
          sendLocalNotification(
            "Akademîya Aram Tîgran",
            (type==="student"?"Xweş hatî / Hoş geldin: ":"Mamoste / Öğretmen: ")+user.name,
            {tag:"aat-login"}
          );
        }
      }catch(e){}
    },500);
  }

  function handleLogout(){
    setScreen("login");
    setCurrentUser(null);
  }

  return(
    <div style={{maxWidth:430,margin:"0 auto",height:"100%",background:"var(--bg3)",position:"relative",display:"flex",flexDirection:"column",overflow:"hidden",borderRadius:"0"}}>
      <FirebaseBanner/>
      <OfflineBanner online={online}/>
      <PWAInstallBanner/>
      {screen==="login"&&(
        <LoginScreen students={students} teachers={teachers} t={t} lang={lang} setLang={setLang} onLogin={(type,user)=>{handleLogin(type,user);handleNotifRequest();}} onForgot={()=>setScreen("forgot")} dark={dark} onThemeToggle={()=>setDark(d=>!d)}/>
      )}
      {screen==="forgot"&&(
        <ForgotScreen t={t} onBack={()=>setScreen("login")} onSuccess={()=>toast("✓ "+t.forgotSuccess)} students={students} teachers={teachers} onDataChange={onDataChange}/>
      )}
      {screen==="admin"&&currentUser&&(
        <AdminPanel admin={currentUser} students={students} teachers={teachers} schedule={schedule} t={t} lang={lang} toast={toast} onLogout={handleLogout} onDataChange={onDataChange} onSettings={()=>setShowSettings(true)} dark={dark} onThemeToggle={()=>setDark(d=>!d)}/>
      )}
      {screen==="teacher"&&currentUser&&(
        <TeacherPanel teacher={currentUser} students={students} schedule={schedule} t={t} lang={lang} toast={toast} onLogout={handleLogout} onDataChange={onDataChange} onSettings={()=>setShowSettings(true)}/>
      )}
      {screen==="student"&&currentUser&&(
        <StudentPanel student={currentUser} schedule={schedule} t={t} lang={lang} toast={toast} onLogout={handleLogout} onDataChange={onDataChange} onSettings={()=>setShowSettings(true)}/>
      )}
      <Toast msg={toastMsg}/>
      <SettingsSheet open={showSettings} onClose={()=>setShowSettings(false)} dark={dark} onThemeToggle={()=>setDark(d=>!d)} lang={lang} setLang={setLang} t={t} onLegal={(type)=>{setShowSettings(false);setLegalModal(type);}} networkInfo={networkInfo} battery={battery}/>
      {!gdprAccepted && <GDPRBanner lang={lang} onAccept={()=>setGdprAccepted(true)}/>}
      <LiveRegion msg={liveMsg}/>
      {legalModal && <LegalModal type={legalModal} lang={lang} onClose={()=>setLegalModal(null)}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<ErrorBoundary><App/></ErrorBoundary>);
</script>
</body>
</html>
