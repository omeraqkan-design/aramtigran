  // ══════════════════════════════════════════════════════════════════════

  // ── Firebase Config — kendi config'inizi buraya yapıştırın ──
  const firebaseConfig = {
    apiKey: "AIzaSyDwzScCH_NTnpEfmSlgIRlOkGivMWc9bGw",
    authDomain: "aram2026-a9fd7.firebaseapp.com",
    projectId: "aram2026-a9fd7",
    storageBucket: "aram2026-a9fd7.firebasestorage.app",
    messagingSenderId: "326496145672",
    appId: "1:326496145672:web:199c6cdd6db08ac3ea9cbd",
    measurementId: "G-11ZK8JRY5E"
  };

  // ── Admin e-posta adresi — Firestore kuralındaki ile aynı olmalı ──
  const ADMIN_EMAIL = "admin@aramtigran.edu"; 

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  const auth = getAuth(app);

  // ── İkinci Firebase instance — kullanıcı oluştururken admin oturumu kapanmaz ──
  // Bu yöntem sayesinde öğretmen/öğrenci eklendiğinde admin olarak kalmaya devam edersiniz.
  let _secondaryApp = null;
  function getSecondaryAuth() {
    if (!_secondaryApp) {
      _secondaryApp = initializeApp(firebaseConfig, "secondary");
    }
    return getAuth(_secondaryApp);
  }

  // ── Okul numarasından Auth email üret ──────────────────────────────────────
  // Öğrenci:  10202601  → 10202601@ogrenci.aat  (sinema öğrenci)
  // Öğretmen: 11202601  → 11202601@ogretmen.aat (sinema öğretmen = alanKodu+1)
  // Admin:    1000      → 1000@ogretmen.aat
  function noToEmail(no, role) {
    const suffix = (role === "student") ? "@ogrenci.aat" : "@ogretmen.aat";
    return (no || "unknown").replace(/[^A-Za-z0-9_\-\.]/g, "") + suffix;
  }

  window.__FB = {
    db, auth,
    ADMIN_EMAIL,
    collection, doc, setDoc, getDoc, getDocs, addDoc, updateDoc, deleteDoc,
    onSnapshot, serverTimestamp, query, orderBy, where, limit,
    // Auth fonksiyonlarını dışa aç
    signInWithEmailAndPassword, signOut, onAuthStateChanged,
    sendPasswordResetEmail, createUserWithEmailAndPassword,
    updatePassword, updateEmail, EmailAuthProvider, reauthenticateWithCredential,
    noToEmail,
    // deleteDoc ve doc referansları (fbDelete için)
    deleteDoc: (ref) => deleteDoc(ref),
    doc: (db, col, id) => doc(db, col, id),
    // Koleksiyon referansları
    studentsRef: () => collection(db, "students"),
    teachersRef: () => collection(db, "teachers"),
    scheduleRef: () => collection(db, "schedule"),
    messagesRef: () => collection(db, "messages"),
    announcementsRef: () => collection(db, "announcements"),

    // ── Firebase Auth'a kullanıcı oluştur (admin oturumunu kapatmadan) ──
    // no:       okul numarası (kullanıcı adı olarak kullanılır)
    // password: plain text şifre
    // role:     "teacher" | "student" | "admin"
    async createAuthUser(no, password, role) {
      const email = noToEmail(no, role);
      const secondaryAuth = getSecondaryAuth();
      try {
        const cred = await createUserWithEmailAndPassword(secondaryAuth, email, password);
        const uid = cred.user.uid;
        await signOut(secondaryAuth);
        try {
          await setDoc(doc(db, "roles", uid), { email, no, role, createdAt: serverTimestamp() });
        } catch(rolesErr) {
        }
        return { uid, email };
      } catch(e) {
        try { await signOut(secondaryAuth); } catch(_) {}
        throw e;
      }
    },

    // Şifre sıfırlama: Admin yeni şifre üretir → Auth güncellenir
    // Strateji: 1) createUserWithEmailAndPassword dene (yeni kullanıcı)
    //            2) "already-in-use" ise → secondary ile login + updatePassword
    //            3) Login başarısız → kullanıcı zaten var, Firestore hash güncellendi
    async forceResetPassword(no, role, oldPlainPassIfKnown, newPlainPass) {
      const email = noToEmail(no, role);
      const secAuth = getSecondaryAuth();
      try {
        // Strateji A: Yeni kullanıcı oluştur (henüz Auth'da yoksa)
        try {
          const newCred = await createUserWithEmailAndPassword(secAuth, email, newPlainPass);
          await signOut(secAuth);
          return { uid: newCred.user.uid, email };
        } catch(createErr) {
          if(createErr.code !== "auth/email-already-in-use") {
            await signOut(secAuth).catch(()=>{});
            throw createErr;
          }
        }
        // Strateji B: Kullanıcı zaten var — eski şifreyle giriş yap → updatePassword
        if(oldPlainPassIfKnown) {
          try {
            const loginCred = await signInWithEmailAndPassword(secAuth, email, oldPlainPassIfKnown);
            await updatePassword(loginCred.user, newPlainPass);
            await signOut(secAuth);
            return { uid: loginCred.user.uid, email };
          } catch(loginErr) {
            await signOut(secAuth).catch(()=>{});
          }
        }
        // Strateji C: Sadece Firestore hash güncellendi, Admin Firebase Console'dan manuel günceller
        return null;
      } catch(e) {
        await signOut(secAuth).catch(()=>{});
        return null;
      }
    },

    // ── Firebase Auth şifresini güncelle (giriş yapan kullanıcı kendi şifresini değiştirir) ──
    async updateAuthPassword(currentPassword, newPassword) {
      const user = auth.currentUser;
      if (!user) throw new Error("User not signed in");
      // Önce yeniden kimlik doğrula
      const credential = EmailAuthProvider.credential(user.email, currentPassword);
      await reauthenticateWithCredential(user, credential);
      await updatePassword(user, newPassword);
    },

    // ── Admin olarak başka kullanıcının şifresini güncelle (secondary auth ile) ──
    // Firestore'daki hash de güncellenir ayrıca
    async adminUpdateAuthPassword(no, role, newPassword) {
      const email = noToEmail(no, role);
      // Secondary auth ile giriş yap (eski şifre bilinmiyorsa olmaz — sadece hash güncellenir)
      // Not: Admin SDK olmadan başkasının şifresini güncelleme mümkün değil (tarayıcıdan)
      // Bunun yerine Firestore'daki hash'i güncelle, kullanıcı bir sonraki girişte yeni şifreyi kullanır
    },

    // ── CRUD helpers ──
    async saveStudent(s) {
      const hasPhoto = !!(s.photo);
      const SKIP = new Set(["pass","_authEmail","docs","id"]);
      const cleanData = {};
      for(const [k,v] of Object.entries(s)){
        if(SKIP.has(k)) continue;
        if(k === "photo") continue; // photo aşağıda ayrı ekleniyor
        if(v === undefined) continue;
        cleanData[k] = v;
      }
      // Photo: base64 ise Firestore'a yaz (compressImage ile ~30-80KB olmalı)
      let photoToSave = null;
      if(s.photo && typeof s.photo === "string" && s.photo.startsWith("data:")) {
        const sizeKB = Math.round(s.photo.length * 0.75 / 1024);
        if(sizeKB <= 500) photoToSave = s.photo;
        else console.warn("[saveStudent] foto çok büyük:", sizeKB, "KB");
      }
      const ref = s.fireId ? doc(db,"students",s.fireId) : doc(collection(db,"students"));
      await setDoc(ref, {...cleanData, passHash: s.pass || "", fireId: ref.id, hasPhoto, photo: photoToSave, updatedAt: serverTimestamp()});
      return ref.id;
    },
    async saveTeacher(tc) {
      const hasPhoto = !!(tc.photo);
      const SKIP = new Set(["pass","docs","id"]);
      const cleanData = {};
      for(const [k,v] of Object.entries(tc)){
        if(SKIP.has(k)) continue;
        if(k === "photo") continue;
        if(v === undefined) continue;
        cleanData[k] = v;
      }
      let photoToSave = null;
      if(tc.photo && typeof tc.photo === "string" && tc.photo.startsWith("data:")) {
        const sizeKB = Math.round(tc.photo.length * 0.75 / 1024);
        if(sizeKB <= 500) photoToSave = tc.photo;
        else console.warn("[saveTeacher] foto çok büyük:", sizeKB, "KB");
      }
      const ref = tc.fireId ? doc(db,"teachers",tc.fireId) : doc(collection(db,"teachers"));
      await setDoc(ref, {...cleanData, passHash: tc.pass || "", fireId: ref.id, hasPhoto, photo: photoToSave, updatedAt: serverTimestamp()});
      return ref.id;
    },
    async saveSchedule(ls) {
      const ref = ls.fireId ? doc(db,"schedule",ls.fireId) : doc(collection(db,"schedule"));
      await setDoc(ref, {...ls, fireId: ref.id, updatedAt: serverTimestamp()});
      return ref.id;
    },
    async deleteSchedule(fireId) {
      await deleteDoc(doc(db,"schedule",fireId));
    },
    async sendMessage(msg) {
      const ref = await addDoc(collection(db,"messages"), {...msg, createdAt: serverTimestamp()});
      return ref.id;
    },
    async sendAnnouncement(ann) {
      const ref = await addDoc(collection(db,"announcements"), {...ann, createdAt: serverTimestamp()});
      return ref.id;
    },
    async markMessageRead(fireId) {
      await updateDoc(doc(db,"messages",fireId), {read: true});
    },
    // Realtime dinleyiciler
    onStudents(cb) {
      return onSnapshot(collection(db,"students"), snap => {
        // Map passHash → pass for local state compatibility
        cb(snap.docs.map(d => { const data = d.data(); return {...data, fireId: d.id, id: data.id||d.id, pass: data.passHash || data.pass || ""}; }));
      });
    },
    onTeachers(cb) {
      return onSnapshot(collection(db,"teachers"), snap => {
        cb(snap.docs.map(d => { const data = d.data(); return {...data, fireId: d.id, id: data.id||d.id, pass: data.passHash || data.pass || ""}; }));
      });
    },
    onSchedule(cb) { return onSnapshot(collection(db,"schedule"), snap => cb(snap.docs.map(d=>({...d.data(), fireId: d.id})))); },
    onMessages(userId, cb) {
      const q = query(collection(db,"messages"), where("recipientId","==",userId), orderBy("createdAt","desc"));
      return onSnapshot(q, snap => cb(snap.docs.map(d=>({...d.data(), fireId:d.id}))));
    },
    // Admin için tüm mesajları dinle (gelen + feedback + sent)
    onAllMessages(cb) {
      // orderBy("createdAt") için Firestore index gerekebilir
      // Index yoksa unordered snapshot al
      try {
        const q = query(collection(db,"messages"), orderBy("createdAt","desc"), limit(200));
        return onSnapshot(q, snap => cb(snap.docs.map(d=>({...d.data(), fireId:d.id}))),
          err => {
            // Index hatası — unordered olarak tekrar dene
            const q2 = query(collection(db,"messages"), limit(200));
            return onSnapshot(q2, snap2 => cb(snap2.docs.map(d=>({...d.data(), fireId:d.id}))));
          }
        );
      } catch(e) {
        const q2 = query(collection(db,"messages"), limit(200));
        return onSnapshot(q2, snap => cb(snap.docs.map(d=>({...d.data(), fireId:d.id}))));
      }
    },
    // Mesajı okundu olarak işaretle
    async markRead(fireId) {
      try { await updateDoc(doc(db,"messages",fireId), {read:true, readAt:serverTimestamp()}); } catch(e){}
    },
    async deleteMessage(fireId) {
      await deleteDoc(doc(db,"messages",fireId));
    },
    // Belirli alana ait yoklama kayıtlarını dinle
    onAttendance(area, cb) {
      const q = query(collection(db,"attendance"), where("area","==",area), orderBy("date","desc"), limit(100));
      return onSnapshot(q, snap => cb(snap.docs.map(d=>({...d.data(), fireId:d.id}))));
    },
    onAnnouncements(cb) {
      const q = query(collection(db,"announcements"), orderBy("createdAt","desc"));
      return onSnapshot(q, snap => cb(snap.docs.map(d=>({...d.data(), fireId:d.id}))));
    },
    // Alan bazlı duyuru filtresi — client side
    filterAnnouncements(anns, role, area) {
      return anns.filter(ann => {
        const targets = ann.targets || ["all"];
        if(targets.includes("all")) return true;
        if(role === "teacher" && (targets.includes("teachers")||targets.includes("allTeachers"))) return true;
        if(role === "student" && (targets.includes("allStudents")||targets.includes("all"))) return true;
        if(role === "student" && area && targets.includes(area)) return true;
        if(role === "student" && ann.senderRole === "teacher" && ann.senderArea === area) return true;
        // Öğretmen: kendi alanına gönderilmiş
        if(role === "teacher" && area && targets.includes(area)) return true;
        return false;
      });
    },
    // Anket config - alan hedeflemeli
    async saveSurveyConfig(config) {
      await setDoc(doc(db,"config","surveyConfig"), {...config, updatedAt: serverTimestamp()});
    },
    onSurveyConfig(cb) {
      return onSnapshot(doc(db,"config","surveyConfig"), snap => {
        if(snap.exists()) cb(snap.data());
        else cb({active: false, targetAreas: []});
      });
    },
    // Realtime survey questions listener
    onSurveyQuestions(cb) {
      return onSnapshot(doc(db,"config","surveyQuestions"), snap => {
        if(snap.exists()) {
          const data = snap.data();
          if(Array.isArray(data.questions) && data.questions.length > 0) cb(data.questions);
        }
      });
    },
    // Realtime survey responses listener
    onSurveyResponses(cb) {
      return onSnapshot(collection(db,"surveyResponses"), snap => {
        cb(snap.docs.map(d => d.data()));
      });
    },
    isConfigured() {
      return firebaseConfig.apiKey !== "YOUR_API_KEY";
    },
    // Firebase Auth sign-in helper — okul numarası ile giriş
    async authSignIn(no, password, role) {
      const email = noToEmail(no, role || "student");
      return signInWithEmailAndPassword(auth, email, password);
    },
    async authSignOut() {
      return signOut(auth);
    },
    async authResetPassword(no, role) {
      const email = noToEmail(no, role || "student");
      return sendPasswordResetEmail(auth, email);
    },

    // Gerçek e-posta adresine şifre sıfırlama linki gönder
    async sendRealEmailReset(realEmail) {
      if(!realEmail || !realEmail.includes("@")) throw new Error("Geçersiz e-posta");
      // Önce bu e-posta ile Firebase Auth kullanıcısı var mı kontrol et
      return sendPasswordResetEmail(auth, realEmail, {
        url: window.location.href, // geri dönüş URL'si
        handleCodeInApp: false
      });
    },

    // Admin: kullanıcının Firebase Auth e-postasını gerçek e-posta ile güncelle
    async linkRealEmail(no, role, plainPass, realEmail) {
      const fakeEmail = noToEmail(no, role);
      const secondaryAuth2 = getSecondaryAuth();
      try {
        // Secondary auth ile giriş yap
        const cred = await signInWithEmailAndPassword(secondaryAuth2, fakeEmail, plainPass);
        // Gerçek e-postayı güncelle
        await updateEmail(cred.user, realEmail);
        await signOut(secondaryAuth2);
        return true;
      } catch(e) {
        try { await signOut(secondaryAuth2); } catch(_) {}
        throw e;
      }
    },

    // Admin: yeni şifre üret ve Firebase Auth'a kaydet
    async adminResetPassword(no, role, newPlainPass) {
      const fakeEmail = noToEmail(no, role);
      const secondaryAuth3 = getSecondaryAuth();
      try {
        const cred = await signInWithEmailAndPassword(secondaryAuth3, fakeEmail, newPlainPass);
        await signOut(secondaryAuth3);
        return true;
      } catch(e) {
        try { await signOut(secondaryAuth3); } catch(_) {}
        // Kullanıcı yoksa oluştur
        if(e.code === "auth/invalid-credential" || e.code === "auth/user-not-found") {
          return false; // Şifre yanlış demek, createAuthUser ile yeniden oluştur
        }
        throw e;
      }
    },
    onAuthState(cb) {
      return onAuthStateChanged(auth, cb);
    }
  };
</script>

/* ── ANIMATIONS ── */

const { useState, useEffect, useRef, useCallback } = React;

/* ─── GÜVENLİK KATMANI ──────────────────────────────────────────────────── */
async function hashPassword(password) {
  const msgBuffer = new TextEncoder().encode(password);
  const hashBuffer = await crypto.subtle.digest("SHA-256", msgBuffer);
  const hashArray = Array.from(new Uint8Array(hashBuffer));
  return hashArray.map(b => b.toString(16).padStart(2, "0")).join("");
}
async function verifyPassword(plain, storedHash) {
  if (!storedHash) return false;
  if (storedHash.length !== 64) return plain === storedHash; // legacy
  const hashed = await hashPassword(plain);
  return hashed === storedHash;
}
function checkPasswordStrength(pass) {
  if (!pass || pass.length < 8)
    return { ok: false, msg: "Min 8 chars / 8 tîp" };
  if (!/[A-Z]/.test(pass))
    return { ok: false, msg: "Uppercase required / Tipa mezin lazim e" };
  if (!/[0-9]/.test(pass))
    return { ok: false, msg: "Number required / Hejmar lazim e" };
  return { ok: true, msg: "" };
}
const _loginAttempts = {};
const MAX_ATTEMPTS = 5;
const LOCKOUT_MS = 10 * 60 * 1000;
function recordFailedAttempt(uid) {
  const now = Date.now();
  if (!_loginAttempts[uid]) _loginAttempts[uid] = [];
  _loginAttempts[uid] = _loginAttempts[uid].filter(t => now - t < LOCKOUT_MS);
  _loginAttempts[uid].push(now);
}
function isLockedOut(uid) {
  const now = Date.now();
  if (!_loginAttempts[uid]) return false;
  return _loginAttempts[uid].filter(t => now - t < LOCKOUT_MS).length >= MAX_ATTEMPTS;
}
function clearAttempts(uid) { delete _loginAttempts[uid]; }
function remainingLockoutSeconds(uid) {
  if (!_loginAttempts[uid] || !_loginAttempts[uid].length) return 0;
  const oldest = Math.min(..._loginAttempts[uid]);
  return Math.max(0, Math.ceil((LOCKOUT_MS - (Date.now() - oldest)) / 1000));
}

function useFirebase() {

// Firestore'a güvenli yazma — FB yoksa sessizce atlar
// Okul numarası = Firebase Auth kullanıcı adı (no@ogrenci.aat / no@ogretmen.aat)
async function fbSave(type, data) {
  const fb = window.__FB;
  if (!fb || !fb.isConfigured()) return null;

  if (type === "student") {
    let authUser = fb.auth.currentUser;
    if(!authUser) {
      // Token yok - bir kere daha bekle (onAuthStateChanged gecikmesi)
      authUser = await new Promise(resolve => {
        const unsub = fb.auth.onAuthStateChanged(u => { unsub(); resolve(u); });
        setTimeout(() => resolve(null), 3000);
      });
    }
    if(!authUser) {
      throw new Error("auth/not-logged-in — Cikis yap, tekrar gir");
    }
    let fireId;
    try {
      fireId = await fb.saveStudent(data);
    } catch(e) {
      const msg = e.code || e.message || String(e);
      console.error("[fbSave] Firestore error:", e);
      throw new Error("Firestore hatasi: " + msg);
    }
    if (data._plainPass && data.no) {
      try {
        await fb.createAuthUser(data.no, data._plainPass, "student");
      } catch(authErr) {
        const code = authErr.code || authErr.message || String(authErr);
        if (code !== "auth/email-already-in-use") {
          throw new Error("Auth hatasi: " + code);
        }
      }
    }
    return fireId;
  }

  if (type === "teacher") {
    let fireId;
    try {
      fireId = await fb.saveTeacher(data);
    } catch(e) {
      const msg = e.code || e.message || String(e);
      throw new Error("Firestore hatasi: " + msg);
    }
    if (data._plainPass && data.no) {
      const role = data.isAdmin ? "admin" : "teacher";
      try {
        await fb.createAuthUser(data.no, data._plainPass, role);
      } catch(authErr) {
        const code = authErr.code || authErr.message || String(authErr);
        if (code !== "auth/email-already-in-use") {
          throw new Error("Auth hatasi: " + code);
        }
      }
    }
    return fireId;
  }

  try {
    if (type === "schedule") return await fb.saveSchedule(data);
    if (type === "message") return await fb.sendMessage(data);
    if (type === "announcement") return await fb.sendAnnouncement(data);
  } catch(e) {
    const msg = e.code || e.message || String(e);
    throw new Error(type + " hatasi: " + msg);
  }
  return null;
}

async function fbUpdatePassword(user, userType, currentPlainPass, newPlainPass) {

        await fb.reauthenticateWithCredential(currentUser, credential);

    }

/* ── Input Sanitization ── */
function sanitizeText(str) {
  if (!str) return "";
  return String(str)
    .replace(/[<>]/g, "")                  // strip < >
    .replace(/javascript:/gi, "")          // strip js: URIs
    .replace(/on\w+\s*=/gi, "")            // strip event attrs
    .trim()
    .slice(0, 500);                        // max length guard
}
function sanitizeEmail(str) {
  if (!str) return "";
  return String(str).trim().toLowerCase().slice(0, 200);
}
function sanitizePhone(str) {
  if (!str) return "";
  return String(str).replace(/[^\d\s+\-()]/g, "").trim().slice(0, 20);
}

/* ── Debounce & Throttle ── */
function debounce(fn, ms = 300) {
  let timer;
  return function(...args) {
    clearTimeout(timer);
    timer = setTimeout(() => fn.apply(this, args), ms);
  };
}
function throttle(fn, ms = 200) {
  let last = 0;
  return function(...args) {
    const now = Date.now();
    if (now - last >= ms) { last = now; fn.apply(this, args); }
  };
}

/* ── Share API ── */
async function shareContent({ title, text, url }) {
  if (navigator.share) {
    try {
      await navigator.share({ title, text, url: url || window.location.href });
      return true;
    } catch(e) { if (e.name !== "AbortError") console.warn("Share error:", e); }
  }
  // Fallback: clipboard
  return copyToClipboard(text || url || title);
}

/* ── Clipboard API ── */
async function copyToClipboard(text) {
  try {
    if (navigator.clipboard && window.isSecureContext) {
      await navigator.clipboard.writeText(text);
      return true;
    }
    // Legacy fallback
    const el = document.createElement("textarea");
    el.value = text; el.style.position = "fixed"; el.style.opacity = "0";
    document.body.appendChild(el); el.select();
    const ok = document.execCommand("copy");
    document.body.removeChild(el);
    return ok;
  } catch(e) { console.warn("Clipboard error:", e); return false; }
}

/* ── Pull-to-Refresh Hook ── */
function usePullToRefresh(onRefresh, containerRef) {
  const startY = useRef(0);
  const pulling = useRef(false);
  const [pullDist, setPullDist] = useState(0);
  const THRESHOLD = 72;

  useEffect(() => {
    const el = containerRef?.current;
    if (!el) return;

    function onTouchStart(e) {
      if (el.scrollTop > 0) return;
      startY.current = e.touches[0].clientY;
      pulling.current = true;
    }
    function onTouchMove(e) {
      if (!pulling.current) return;
      const dist = Math.max(0, Math.min(THRESHOLD * 1.5, e.touches[0].clientY - startY.current));
      if (dist > 0) { setPullDist(dist); }
    }
    function onTouchEnd() {
      if (pullDist >= THRESHOLD) {
        hapticMedium();
        onRefresh && onRefresh();
      }
      setPullDist(0);
      pulling.current = false;
    }

    el.addEventListener("touchstart", onTouchStart, { passive: true });
    el.addEventListener("touchmove",  onTouchMove,  { passive: true });
    el.addEventListener("touchend",   onTouchEnd,   { passive: true });
    return () => {
      el.removeEventListener("touchstart", onTouchStart);
      el.removeEventListener("touchmove",  onTouchMove);
      el.removeEventListener("touchend",   onTouchEnd);
    };
  }, [onRefresh, pullDist, containerRef]);

  return pullDist;
}

/* ── Virtual List Hook (for large student/teacher lists) ── */
function useVirtualList(items, itemHeight = 64, containerHeight = 500) {
  const [scrollTop, setScrollTop] = useState(0);
  const overscan = 5;
  const startIndex = Math.max(0, Math.floor(scrollTop / itemHeight) - overscan);
  const visibleCount = Math.ceil(containerHeight / itemHeight) + overscan * 2;
  const endIndex = Math.min(items.length - 1, startIndex + visibleCount);
  const visibleItems = items.slice(startIndex, endIndex + 1).map((item, i) => ({
    item, index: startIndex + i, offsetTop: (startIndex + i) * itemHeight
  }));
  const totalHeight = items.length * itemHeight;
  const onScroll = useCallback(throttle(e => setScrollTop(e.target.scrollTop), 16), []);
  return { visibleItems, totalHeight, onScroll };
}

async function fbUploadPhoto(file, path) {

  try {
    const storageModule = await import(
      "https://www.gstatic.com/firebasejs/10.12.0/firebase-storage.js"
    ).catch(() => null);
    if (!storageModule) return null;
    
    const { getStorage, ref, uploadBytes, getDownloadURL } = storageModule;

  }

/* ─── BIOMETRIC / DEVICE LOCK ────────────────────────────────────────────── */
function useBiometric(){
  const [supported,setSupported]=useState(false);
  const [authenticated,setAuthenticated]=useState(false);
  
  useEffect(()=>{
    // Check if WebAuthn / Credential Management is available
    const hasWebAuthn = typeof PublicKeyCredential !== "undefined";
    const hasCredMgmt = "credentials" in navigator;
    setSupported(hasWebAuthn || hasCredMgmt);
  },[]);
  
  const authenticate=useCallback(async(username)=>{
    // On mobile browsers, we use the Credential Management API for autofill
    // Full WebAuthn biometrics would require a backend — this is a UI-level hint
    try{
      if("credentials" in navigator && "PasswordCredential" in window){
        const cred = await navigator.credentials.get({password:true,mediation:"optional"});
        if(cred) return {ok:true, username:cred.id, password:cred.password};
      }
    }catch(e){}
    return {ok:false};
  },[]);
  
  const saveCredential=useCallback(async(username,password)=>{
    try{
      if("PasswordCredential" in window){
        const cred = new PasswordCredential({id:username,password,name:username});
        await navigator.credentials.store(cred);
      }
    }catch(e){}
  },[]);
  
  return {supported,authenticated,authenticate,saveCredential};
}

/* ─── ABORT CONTROLLER FETCH ─────────────────────────────────────────────── */
function useAbortableFetch() {
  const abortRef = useRef(null);
  const fetchWithAbort = useCallback(async (url, options = {}) => {
    if (abortRef.current) abortRef.current.abort();
    abortRef.current = new AbortController();
    try {
      const res = await fetch(url, { ...options, signal: abortRef.current.signal });
      return res;
    } catch(e) {
      if (e.name === "AbortError") return null;
      throw e;
    }
  }, []);
  useEffect(() => () => { if (abortRef.current) abortRef.current.abort(); }, []);
  return fetchWithAbort;
}

/* ─── IMAGE COMPRESSION ──────────────────────────────────────────────────── */
function compressImage(dataUrl, maxW = 800, maxH = 800, quality = 0.82) {
  return new Promise((resolve) => {
    const img = new Image();
    img.onload = () => {
      let { width, height } = img;
      const ratio = Math.min(maxW / width, maxH / height, 1);
      width = Math.round(width * ratio);
      height = Math.round(height * ratio);
      const canvas = document.createElement("canvas");
      canvas.width = width; canvas.height = height;
      const ctx = canvas.getContext("2d");
      ctx.drawImage(img, 0, 0, width, height);
      canvas.toBlob(blob => {
        const reader = new FileReader();
        reader.onload = e => resolve(e.target.result);
        reader.readAsDataURL(blob);
      }, "image/jpeg", quality);
    };
    img.src = dataUrl;
  });
}

/* ─── INTERSECTION OBSERVER HOOK ─────────────────────────────────────────── */
function useVisible(ref, threshold = 0.15) {
  const [visible, setVisible] = useState(false);
  useEffect(() => {
    if (!ref.current) return;
    const obs = new IntersectionObserver(
      ([entry]) => { if (entry.isIntersecting) { setVisible(true); obs.disconnect(); } },
      { threshold }
    );
    obs.observe(ref.current);
    return () => obs.disconnect();
  }, [ref, threshold]);
  return visible;
}

function useLongPress(callback, ms = 600) {
  const timerRef = useRef(null);

    fired.current = false;
    timerRef.current = setTimeout(() => {

  }, []);
  return {
    onMouseDown: start, onMouseUp: stop, onMouseLeave: stop,
    onTouchStart: start, onTouchEnd: stop, onTouchCancel: stop,
  };
}

/* ══════════════════════════════════════════════════════════════════════
   CİHAZ PARMAK İZİ SİSTEMİ
   - Tarayıcı + donanım özelliklerinden deterministik cihaz ID üretir
   - İlk girişte Firestore'a kaydedilir
   - Sonraki girişlerde karşılaştırılır — başka cihazdan giriş engellenir
   - Admin "cihaz sıfırla" ile yeni cihaza izin verebilir
══════════════════════════════════════════════════════════════════════ */

async function getDeviceFingerprint() {
  try {
    const components = [
      navigator.userAgent,
      navigator.language,
      screen.width + "x" + screen.height + "x" + screen.colorDepth,
      Intl.DateTimeFormat().resolvedOptions().timeZone,
      navigator.hardwareConcurrency || "?",
      navigator.platform || "?",
    ];

    // Canvas parmak izi
    try {
      const canvas = document.createElement("canvas");
      const ctx = canvas.getContext("2d");
      ctx.textBaseline = "top";
      ctx.font = "14px Arial";
      ctx.fillStyle = "#0C2340";
      ctx.fillRect(0, 0, 100, 30);
      ctx.fillStyle = "#F7D116";
      ctx.fillText("AAT🎓", 2, 2);
      components.push(canvas.toDataURL().slice(-40));
    } catch(_) {}

    // WebGL renderer
    try {
      const gl = document.createElement("canvas").getContext("webgl");
      if(gl) {
        const ext = gl.getExtension("WEBGL_debug_renderer_info");
        if(ext) components.push(gl.getParameter(ext.UNMASKED_RENDERER_WEBGL).slice(0,20));
      }
    } catch(_) {}

    const raw = components.join("|");
    // SHA-256 hash
    const buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(raw));
    const hex = Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,"0")).join("");
    return "DFP-" + hex.slice(0,32);
  } catch(e) {
    // Fallback: localStorage'da saklanan random ID
    try {
      let id = localStorage.getItem("aat-device-id");
      if(!id){ id = "DFP-LS-" + Math.random().toString(36).slice(2,18); localStorage.setItem("aat-device-id", id); }
      return id;
    } catch(_) { return "DFP-UNKNOWN"; }
  }
}

// Cihaz doğrulama
async function verifyDevice(userNo, currentDeviceId) {
  const fb = window.__FB;
  if(!fb || !fb.isConfigured()) return { ok: true, reason: "no_firebase" };
  try {
    const snap = await fb.getDoc(fb.doc(fb.db, "devices", userNo));
    if(!snap.exists()) {
      return { ok: true, reason: "first_login" };
    }
    const data = snap.data();
    if(data.deviceId === currentDeviceId) {
      try {
        await fb.updateDoc(fb.doc(fb.db, "devices", userNo), { lastLoginAt: fb.serverTimestamp() });
      } catch(_) {}
      return { ok: true, reason: "device_match" };
    }
    return { ok: false, reason: "device_mismatch", registeredAt: data.registeredAt };
  } catch(e) {
    return { ok: true, reason: "verify_error" };
  }
}

// Lazy image with IntersectionObserver
function LazyImg({src, alt, style, className}) {
  const ref = useRef(null);
  const [loaded, setLoaded] = useState(false);
  const visible = useVisible(ref, 0.1);
  return (
    <div ref={ref} style={{overflow:"hidden",...style}} className={className}
      aria-hidden={!src ? "true" : undefined}>
      {visible && src && (
        <img
          src={src}
          alt={alt || ""}
          loading="lazy"
          decoding="async"
          onLoad={() => setLoaded(true)}
          style={{
            width:"100%", height:"100%",
            objectFit:"cover", display:"block",
            opacity: loaded ? 1 : 0,
            transition: "opacity .3s ease"
          }}
        />
      )}
      {(!visible || !loaded) && !src && (
        <div className="shimmer" style={{width:"100%",height:"100%"}}
          aria-hidden="true"/>
      )}
    </div>
  );
}

/* ─── CSRF / NONCE ───────────────────────────────────────────────────────── */
// For a PWA without a traditional server, CSRF is mitigated by:
// 1. Same-origin policy (browser enforced)
// 2. Firebase Security Rules (server-side enforcement)
// 3. Session nonce for QR tokens (already implemented via random tokens)
function generateNonce(len = 16) {
  const arr = new Uint8Array(len);
  crypto.getRandomValues(arr);
  return Array.from(arr).map(b => b.toString(16).padStart(2,"0")).join("");
}
// Used in QR session tokens for replay-attack prevention
window._csrfNonce = generateNonce();

// Kurdî Kurmancî is LTR, but Arabic Kurmanji / Sorani is RTL
// This allows future RTL language additions
function useRTL(lang) {
  useEffect(() => {
    const rtlLangs = ["ar", "he", "fa", "ur", "ckb"]; // Central Kurdish (Sorani) is RTL
    const isRTL = rtlLangs.includes(lang);
    document.documentElement.setAttribute("dir", isRTL ? "rtl" : "ltr");
    document.documentElement.setAttribute("lang", lang === "ku" ? "ku-Latn" : lang);
  }, [lang]);
}

/* ── role=dialog wrapper — Sheet bileşeni için ── */
function AccessibleSheet({open, onClose, title, children, describedBy}) {
  const titleId = useRef("sheet-title-" + Math.random().toString(36).slice(2,6));
  const descId  = describedBy || ("sheet-desc-" + titleId.current);
  // Trap focus inside dialog when open
  const sheetRef = useRef(null);
  useEffect(() => {
    if (!open) return;
    const el = sheetRef.current;
    if (!el) return;
    const focusable = el.querySelectorAll(
      'button,input,select,textarea,[tabindex]:not([tabindex="-1"])'
    );
    if (focusable.length) focusable[0].focus();
    function trapFocus(e) {
      if (e.key !== "Tab") return;
      const first = focusable[0];
      const last  = focusable[focusable.length - 1];
      if (e.shiftKey) { if (document.activeElement === first) { e.preventDefault(); last.focus(); } }
      else            { if (document.activeElement === last)  { e.preventDefault(); first.focus(); } }
    }
    function onEsc(e) { if (e.key === "Escape") onClose && onClose(); }
    el.addEventListener("keydown", trapFocus);
    el.addEventListener("keydown", onEsc);
    return () => { el.removeEventListener("keydown", trapFocus); el.removeEventListener("keydown", onEsc); };
  }, [open, onClose]);

  return (
    <>
      {open && (
        <div
          onClick={onClose}
          style={{position:"fixed",inset:0,background:"rgba(0,0,0,.55)",zIndex:200,backdropFilter:"blur(2px)"}}
          aria-hidden="true"
        />
      )}
      <div
        ref={sheetRef}
        role="dialog"
        aria-modal="true"
        aria-labelledby={titleId.current}
        aria-describedby={descId}
        style={{
          position:"fixed",bottom:0,left:"50%",
          transform:"translateX(-50%) translateY("+(open?0:110)+"%)",
          width:"100%",
          background:"var(--bg1)",
          borderRadius:"26px 26px 0 0",
          padding:"0 16px 36px",
          zIndex:201,maxHeight:"90vh",
          display:"flex",flexDirection:"column",
          transition:"transform .32s var(--ease)",
          boxShadow:"0 -8px 40px rgba(0,0,0,.15)"
        }}
      >
        <div style={{display:"flex",justifyContent:"center",padding:"12px 0 4px"}}>
          <div style={{width:36,height:4,background:"var(--border2)",borderRadius:2}}
            aria-hidden="true"/>
        </div>
        {title && (
          <div id={titleId.current}
            style={{fontSize:17,fontWeight:700,color:"var(--text)",margin:"10px 0 18px",letterSpacing:"-0.01em"}}>
            {title}
          </div>
        )}
        <div id={descId} style={{overflowY:"auto",flex:1}}>{children}</div>
      </div>
    </>
  );
}

/* ─── SVG LOGO ──────────────────────────────────────────────────────────── */
function AcademyLogo({size=48}){
  return(
    <svg width={size} height={size} viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
      <circle cx="50" cy="50" r="50" fill="#0C2340"/>
      <circle cx="50" cy="50" r="42" fill="#0a1a30"/>
      <text x="50" y="62" textAnchor="middle" fontSize="46" fill="#F7D116">🎓</text>
      <text x="50" y="82" textAnchor="middle" fontSize="11" fill="#F7D116" fontWeight="bold" fontFamily="sans-serif">AAT</text>
    </svg>
  );
}

function KRGFlag({size=28}){
  const rays=Array.from({length:21},(_,i)=>i*360/21);
  return(
    <svg width={size} height={size*2/3} viewBox="0 0 90 60" style={{borderRadius:3,display:"block"}}>
      <rect width="90" height="20" fill="#EF2B2D"/>
      <rect y="20" width="90" height="20" fill="#FFF"/>
      <rect y="40" width="90" height="20" fill="#007A3D"/>
      <circle cx="45" cy="30" r="11" fill="#F7D116"/>
      <circle cx="45" cy="30" r="8" fill="#EF2B2D"/>
      <g fill="#F7D116" transform="translate(45,30)">
        {rays.map((r,i)=>(
          <rect key={i} x="-1" y="-19" width="2" height="6" rx="1" transform={`rotate(${r})`}/>
        ))}
      </g>
    </svg>
  );
}

function QRPattern({no, size=160}){
  const seed=no?parseInt(no.replace(/\D/g,""))||12345:12345;
  const cells=[];
  for(let i=0;i<10;i++) for(let j=0;j<10;j++){
    const v=(seed*(i*13+j*7+1))%17;
    if(v<8) cells.push([i,j]);
  }
  return(
    <svg width={size} height={size} viewBox="0 0 120 120" fill="currentColor" style={{color:"var(--text)"}}>
      <rect x="10" y="10" width="30" height="30" rx="2" fill="none" stroke="currentColor" strokeWidth="3"/>
      <rect x="15" y="15" width="20" height="20" rx="1"/>
      <rect x="80" y="10" width="30" height="30" rx="2" fill="none" stroke="currentColor" strokeWidth="3"/>
      <rect x="85" y="15" width="20" height="20" rx="1"/>
      <rect x="10" y="80" width="30" height="30" rx="2" fill="none" stroke="currentColor" strokeWidth="3"/>
      <rect x="15" y="85" width="20" height="20" rx="1"/>
      {/* Logo center */}
      <rect x="48" y="48" width="24" height="24" rx="3" fill="#0C2340"/>
      <text x="60" y="61" textAnchor="middle" fill="#F7D116" fontSize="8" fontWeight="bold" fontFamily="serif">AT</text>
      {cells.map(([r,c],k)=>(
        <rect key={k} x={50+c*7} y={50+r*7} width="6" height="6"/>
      ))}
    </svg>
  );
}

function Avatar({name,color,size=36,photo}){
  if(photo) return <img src={photo} style={{width:size,height:size,borderRadius:"50%",objectFit:"cover",flexShrink:0}} alt={name}/>;
  const ini=name?name.split(" ").map(w=>w[0]).join("").slice(0,2).toUpperCase():"??";
  return(
    <div style={{width:size,height:size,borderRadius:"50%",background:color||"#185FA5",display:"flex",alignItems:"center",justifyContent:"center",fontSize:size*0.3,fontWeight:600,color:"#fff",flexShrink:0}}>
      {ini}
    </div>
  );
}

function Badge({children,color="#185FA5",bg="#E6F1FB"}){
  return <span style={{fontSize:10,padding:"2px 8px",borderRadius:8,background:bg,color,fontWeight:500,whiteSpace:"nowrap"}}>{children}</span>;
}

function SectionHeader({children}){
  return <div className="sec-hd">{children}</div>;
}

function Card({children,style,onClick}){
  return(
    <div onClick={onClick} className={`card${onClick?" card-tap":""}`} style={{marginBottom:10,...style}}>
      {children}
    </div>
  );
}

function PrimaryBtn({children,onClick,style,icon}){
  return(
    <button onClick={onClick} className="btn-navy" style={style}>
      <span style={{display:"flex",alignItems:"center",justifyContent:"center",gap:7}}>
        {icon&&<span>{icon}</span>}{children}
      </span>
    </button>

}

function useToast(){
  const [msg,setMsg]=useState("");
  const timerRef=useRef();
  const toast=useCallback((m, duration)=>{
    setMsg(m);
    clearTimeout(timerRef.current);
    timerRef.current=setTimeout(()=>setMsg(""), duration||2800);
  },[]);
  return [msg,toast];
}

/* ─── FORGOT PASSWORD ───────────────────────────────────────────────────── */
// Güvenlik notu: Şifre sıfırlama 2 yol ile çalışır:
// 1. Kullanıcı no + admin şifresi → admin doğrulandıktan sonra yeni şifre verilir
// 2. Kullanıcı no girer → "Yöneticiye başvur" mesajı gösterilir
// Self-service şifre sıfırlama YOKTUR — güvenlik gereği admin onayı lazım.
function ForgotScreen({t, lang, onBack, onSuccess, students, teachers, onDataChange}){
  // step: "no" → "email" → "sent" | "admin" → "adminreset" → "done"
  const [step, setStep] = useState("no");
  const [noInput, setNoInput] = useState("");
  const [foundUser, setFoundUser] = useState(null);
  const [err, setErr] = useState("");
  const [loading, setLoading] = useState(false);
  const [newGenPass, setNewGenPass] = useState("");
  const [showPass, setShowPass] = useState(false);

  const L = {
    title:      {ku:"Şîfre Ji Bîr Kir",            en:"Forgot Password",           de:"Passwort vergessen"},
    noLabel:    {ku:"Jimara Xwendekar / Mamoste",   en:"Student / Teacher Number",  de:"Schüler/Lehrernummer"},
    noHint:     {ku:"Jimara xwe binivîse",           en:"Enter your number",         de:"Ihre Nummer eingeben"},
    notFound:   {ku:"⚠ Jimare nehat dîtin",          en:"⚠ Number not found",        de:"⚠ Nummer nicht gefunden"},
    next:       {ku:"Berdewam bike",                 en:"Continue",                  de:"Weiter"},
    back:       {ku:"← Vegere",                      en:"← Back",                   de:"← Zurück"},
    noEmail:    {ku:"⚠ E-posta tomarkirî nîne. Ji rêveberê re bibêje.",
                 en:"⚠ No email registered. Please contact the administrator.",
                 de:"⚠ Keine E-Mail hinterlegt. Bitte Admin kontaktieren."},
    emailSending:{ku:"E-posta tê şandin...",         en:"Sending email...",          de:"E-Mail wird gesendet..."},
    emailSent:  {ku:"✅ Girêdan hat şandin!",         en:"✅ Reset link sent!",        de:"✅ Link gesendet!"},
    emailSentSub:{ku:"Emaila xwe kontrol bike û girêdanê bitikîne da ku şîfreya nû saz bikî.",
                  en:"Check your email and click the link to set a new password.",
                  de:"Überprüfe deine E-Mail und klicke den Link, um ein neues Passwort zu setzen."},
    emailErr:   {ku:"E-posta şandin neçû. Rêveber têkilî bike.",
                 en:"Could not send email. Contact administrator.",
                 de:"E-Mail konnte nicht gesendet werden. Admin kontaktieren."},
    adminReset: {ku:"Rêveber şîfreyê sıfırla bike",  en:"Admin Password Reset",      de:"Admin setzt Passwort zurück"},
    newPassLabel:{ku:"Şîfreya Nû (Otomatîk)",        en:"New Password (Auto)",       de:"Neues Passwort (Auto)"},
    newPassHint:{ku:"Ev şîfre ji bo têketinê bide bikarhêner",
                 en:"Give this password to the user for login",
                 de:"Dieses Passwort dem Benutzer für die Anmeldung geben"},
    usePass:    {ku:"Ev şîfreyê bide bikarhêner",    en:"Use this password",         de:"Dieses Passwort verwenden"},
    doneTitle:  {ku:"✅ Şîfre hate guhertin!",        en:"✅ Password reset!",         de:"✅ Passwort zurückgesetzt!"},
    doneMsg:    {ku:"Naha dikare bi şîfreya nû têkeve.",
                 en:"The user can now sign in with the new password.",
                 de:"Der Benutzer kann sich jetzt mit dem neuen Passwort anmelden."},
  };
  const lbl = k => L[k]?.[lang] || L[k]?.en || "";

  const adminUser = (teachers||[]).find(tc => tc.isAdmin);

  function findUser(){
    const val = noInput.trim();
    if(!val){ setErr(lbl("noHint")); return; }
    const s = (students||[]).find(u => u.no === val);
    const tc = (teachers||[]).find(u => (u.no === val || u.id === val) && !u.isAdmin);
    if(s){ setFoundUser({type:"student", obj:s}); setErr(""); setStep("email"); }
    else if(tc){ setFoundUser({type:"teacher", obj:tc}); setErr(""); setStep("email"); }
    else { setErr(lbl("notFound")); }
  }

  async function sendResetEmail(){
    const realEmail = foundUser?.obj?.email?.trim();
    if(!realEmail || !realEmail.includes("@")){
      setErr(lbl("noEmail")); return;
    }
    setLoading(true); setErr("");

    // Yeni şifre üret
    const pass = genAutoPassword();
    const fb = window.__FB;
    const hashed = await hashPassword(pass);

    // 1. Firebase Auth şifresini güncelle
    if(fb && fb.isConfigured() && foundUser){
      const role = foundUser.type;
      const oldPlain = foundUser.obj._plainPass || null;
      try {
        await fb.forceResetPassword(foundUser.obj.no, role, oldPlain, pass);
      } catch(e){ console.warn("forceReset:", e); }
    }

    // 2. Firestore hash güncelle
    const updated = {...foundUser.obj, pass:hashed, passHash:hashed, _plainPass:pass};
    if(foundUser.type==="student") onDataChange("updateStudent", updated);
    else onDataChange("updateTeacher", updated);

    // 3. EmailJS ile şifreyi direkt emaile gönder
    try {
      if(!window.emailjs) throw new Error("EmailJS yüklenmedi");
      await window.emailjs.send(
        "service_g6nqjtq",
        "template_eoswbej",
        {
          to_email:   realEmail,
          to_name:    foundUser.obj.name,
          password:   pass,
          student_no: foundUser.obj.no,
        }
      );
      setStep("sent");
    } catch(e) {
      console.error("EmailJS hatası:", e);
      setErr(lbl("emailErr") + " (" + (e?.text || e?.message || "EmailJS") + ")");
    }
    setLoading(false);
  }

  async function adminResetPass(){
    setLoading(true);
    const pass = genAutoPassword();
    setNewGenPass(pass);
    const fb = window.__FB;
    const hashed = await hashPassword(pass);
    if(fb && fb.isConfigured() && foundUser){
      const role = foundUser.type;
      // _plainPass var mı? (son bilinen şifre)
      const oldPlain = foundUser.obj._plainPass || null;
      try {
        await fb.forceResetPassword(foundUser.obj.no, role, oldPlain, pass);
      } catch(e){
      }
    }
    // Firestore hash her durumda güncellenir
    const updated = {...foundUser.obj, pass:hashed, passHash:hashed, _plainPass:pass};
    if(foundUser.type==="student") onDataChange("updateStudent", updated);
    else onDataChange("updateTeacher", updated);
    setLoading(false);
    setStep("adminreset");
  }

  return(
    <div style={{height:"100%",background:"#0C2340",display:"flex",flexDirection:"column",overflow:"hidden"}}>
      <div style={{padding:"44px 24px 20px",textAlign:"center",flexShrink:0,position:"relative"}}>
        <AcademyLogo size={56}/>
        <div style={{color:"#fff",fontSize:17,fontWeight:700,marginTop:12}}>{lbl("title")}</div>
        {foundUser && step!=="no" && (
          <div style={{marginTop:8,display:"inline-flex",alignItems:"center",gap:6,background:"rgba(255,255,255,0.12)",borderRadius:20,padding:"5px 14px"}}>
            <span style={{fontSize:15}}>{foundUser.type==="student"?"🎓":"👨‍🏫"}</span>
            <span style={{color:"#F7D116",fontSize:12,fontWeight:700,fontFamily:"monospace"}}>{foundUser.obj.no}</span>
            <span style={{color:"rgba(255,255,255,0.75)",fontSize:12}}>{foundUser.obj.name}</span>
          </div>
        )}
      </div>

      <div style={{background:"var(--bg1)",borderRadius:"28px 28px 0 0",flex:1,overflow:"auto",padding:"24px 20px 48px"}}>

        {/* ADIM 1: Numara gir */}
        {step==="no" && (
          <>
            <div style={{fontSize:12,color:"var(--text2)",marginBottom:18,lineHeight:1.7,background:"var(--bg2)",padding:"12px 14px",borderRadius:12}}>
              🔢 {lbl("noHint")}
            </div>
            <FieldWrap label={lbl("noLabel")}>
              <input style={{...inputStyle,fontFamily:"monospace",fontSize:16,letterSpacing:"0.08em"}}
                value={noInput} onChange={e=>setNoInput(e.target.value)}
                placeholder={lang==="ku"?"Jimarê binivîse...":lang==="en"?"Enter number...":"Nummer eingeben..."}
                autoCapitalize="none" autoCorrect="off" inputMode="numeric"
                onKeyDown={e=>e.key==="Enter"&&findUser()}/>
            </FieldWrap>
            {err && <div style={{color:"var(--red)",fontSize:12,marginBottom:12,padding:"8px 10px",background:"var(--red-bg)",borderRadius:8}}>{err}</div>}
            <PrimaryBtn onClick={findUser} icon="🔍">{lbl("next")}</PrimaryBtn>
            <button onClick={onBack} style={{width:"100%",marginTop:10,padding:10,background:"none",border:"none",color:"var(--text2)",fontSize:13,cursor:"pointer"}}>{lbl("back")}</button>
          </>
        )}

        {/* ADIM 2: E-posta gönder veya admin seçeneği */}
        {step==="email" && foundUser && (
          <>
            {/* E-posta varsa — gönder */}
            {foundUser.obj.email ? (
              <>
                <div style={{background:"var(--bg2)",borderRadius:12,padding:"16px",marginBottom:20,textAlign:"center"}}>
                  <div style={{fontSize:28,marginBottom:8}}>✉️</div>
                  <div style={{fontSize:13,fontWeight:600,color:"var(--text)",marginBottom:4}}>
                    {lang==="ku"?"Şîfreya nû bê çêkirin û ji emailê re bê şandin":lang==="en"?"A new password will be generated and sent to the email":"Ein neues Passwort wird generiert und per E-Mail gesendet"}
                  </div>
                  <div style={{fontSize:12,color:"var(--text2)",fontFamily:"monospace",background:"var(--bg1)",padding:"8px 12px",borderRadius:8,marginTop:8}}>
                    {foundUser.obj.email.replace(/(.{2})(.*)(@.*)/, (_, a, b, c) => a + "•".repeat(Math.min(b.length,6)) + c)}
                  </div>
                </div>
                {err && <div style={{color:"var(--red)",fontSize:12,marginBottom:12,padding:"8px 10px",background:"var(--red-bg)",borderRadius:8}}>{err}</div>}
                <PrimaryBtn onClick={sendResetEmail} icon={loading?"⏳":"🔑"}>
                  {loading ? lbl("emailSending") : (lang==="ku"?"Şîfreya Nû Çêke û Bişîne":lang==="en"?"Generate & Send New Password":"Neues Passwort generieren & senden")}
                </PrimaryBtn>
              </>
            ) : (
              /* E-posta yok — sadece admin seçeneği */
              <div style={{background:"var(--gold-bg)",border:"1px solid var(--gold)",borderRadius:12,padding:"14px",marginBottom:16,fontSize:12,color:"var(--text)",lineHeight:1.8}}>
                ⚠️ {lbl("noEmail")}
              </div>
            )}

            {/* Admin ile sıfırlama her zaman mevcut */}
            <div style={{marginTop:foundUser.obj.email?16:0}}>
              <div style={{fontSize:11,color:"var(--text2)",textAlign:"center",marginBottom:10}}>
                {lang==="ku"?"an":lang==="en"?"or":"oder"}
              </div>
              <button onClick={adminResetPass} disabled={loading}
                style={{width:"100%",padding:"16px",background:"var(--bg2)",border:"1px solid var(--border2)",borderRadius:14,fontSize:13,fontWeight:600,cursor:"pointer",color:"var(--text)",display:"flex",alignItems:"center",gap:12,opacity:loading?0.7:1}}>
                <span style={{fontSize:24}}>🛡</span>
                <div style={{textAlign:"left"}}>
                  <div style={{fontWeight:700}}>{lbl("adminReset")}</div>
                  <div style={{fontSize:11,color:"var(--text2)",marginTop:2}}>
                    {lang==="ku"?"Rêveber otomatîk şîfre saz dike":lang==="en"?"Admin generates a new password":"Admin erstellt neues Passwort"}
                  </div>
                </div>
              </button>
            </div>

            <button onClick={()=>{setStep("no");setErr("");}} style={{width:"100%",marginTop:12,padding:10,background:"none",border:"none",color:"var(--text2)",fontSize:13,cursor:"pointer"}}>{lbl("back")}</button>
          </>
        )}

        {/* Email gönderildi — şifre ekranda gösterilmez */}
        {step==="sent" && foundUser && (
          <div style={{textAlign:"center",paddingTop:24}}>
            <div style={{fontSize:60,marginBottom:16}}>📬</div>
            <div style={{fontSize:16,fontWeight:700,color:"var(--text)",marginBottom:10}}>
              {lang==="ku"?"✅ Şîfre Hat Şandin!":lang==="en"?"✅ Password Sent!":"✅ Passwort gesendet!"}
            </div>
            <div style={{fontSize:13,color:"var(--text2)",lineHeight:1.8,marginBottom:24,background:"var(--bg2)",borderRadius:12,padding:"14px 16px"}}>
              {lang==="ku"
                ? <>Şîfreya nû hat şandin bo:<br/><span style={{fontFamily:"monospace",color:"var(--text)",fontWeight:700}}>{foundUser.obj.email}</span><br/><br/>Emaila xwe kontrol bike û bi şîfreya nû têkeve.</>
                : lang==="en"
                ? <>New password sent to:<br/><span style={{fontFamily:"monospace",color:"var(--text)",fontWeight:700}}>{foundUser.obj.email}</span><br/><br/>Check your email and sign in with the new password.</>
                : <>Neues Passwort gesendet an:<br/><span style={{fontFamily:"monospace",color:"var(--text)",fontWeight:700}}>{foundUser.obj.email}</span><br/><br/>E-Mail prüfen und mit neuem Passwort anmelden.</>
              }
            </div>
            <PrimaryBtn onClick={onBack} icon="→">
              {lang==="ku"?"Vegerê Têketinê":lang==="en"?"Back to Login":"Zurück zum Login"}
            </PrimaryBtn>
          </div>
        )}

        {/* Admin reset — şifre sadece adminde görünür, kullanıcıya email gitmiyor (email yoksa) */}
        {step==="adminreset" && foundUser && (
          <div style={{textAlign:"center",paddingTop:8}}>
            <div style={{fontSize:40,marginBottom:10}}>🛡</div>
            <div style={{fontSize:14,fontWeight:700,color:"var(--text)",marginBottom:6}}>
              {lang==="ku"?"✅ Şîfre Hate Sifirkirin":lang==="en"?"✅ Password Reset Done":"✅ Passwort zurückgesetzt"}
            </div>
            <div style={{fontSize:12,color:"var(--text2)",lineHeight:1.8,marginBottom:16,background:"var(--bg2)",borderRadius:12,padding:"14px 16px"}}>
              {lang==="ku"
                ? <>Şîfreya nû ya <b style={{color:"var(--text)"}}>{foundUser.obj.name}</b> hate guhertin.<br/>Şîfreya nû ji bikarhêner re bide.</>
                : lang==="en"
                ? <>Password for <b style={{color:"var(--text)"}}>{foundUser.obj.name}</b> has been reset.<br/>Hand the new password to the user directly.</>
                : <>Passwort für <b style={{color:"var(--text)"}}>{foundUser.obj.name}</b> wurde zurückgesetzt.<br/>Neues Passwort dem Benutzer persönlich mitteilen.</>
              }
            </div>
            {/* Admin için şifreyi göster (email olmayan durum) */}
            <div style={{background:"linear-gradient(135deg,#0C2340,#1a3a6a)",borderRadius:14,padding:"16px",marginBottom:14,border:"1px solid rgba(247,209,22,0.2)"}}>
              <div style={{fontSize:10,color:"rgba(247,209,22,0.6)",fontWeight:700,letterSpacing:"0.1em",textTransform:"uppercase",marginBottom:8}}>
                {lang==="ku"?"Şîfreya Nû (Tenê ji bo Admin)":lang==="en"?"New Password (Admin only)":"Neues Passwort (nur Admin)"}
              </div>
              <div style={{display:"flex",alignItems:"center",gap:8,justifyContent:"center"}}>
                <div style={{fontFamily:"monospace",fontSize:20,fontWeight:800,color:"#5DC48A",letterSpacing:"0.16em"}}>
                  {showPass ? newGenPass : "••••••••"}
                </div>
                <button onClick={()=>setShowPass(p=>!p)} style={{background:"rgba(255,255,255,0.1)",border:"none",borderRadius:6,padding:"5px 8px",fontSize:14,cursor:"pointer",color:"rgba(255,255,255,0.7)"}}>
                  {showPass?"🙈":"👁"}
                </button>
                <button onClick={async()=>{await copyToClipboard(newGenPass);hapticSuccess();}} style={{background:"rgba(93,196,138,0.2)",border:"1px solid rgba(93,196,138,0.4)",borderRadius:6,padding:"5px 10px",fontSize:13,cursor:"pointer",color:"#5DC48A",fontWeight:700}}>
                  📋
                </button>
              </div>
            </div>
            <PrimaryBtn onClick={onBack} icon="✓">
              {lang==="ku"?"Vegerê Têketinê":lang==="en"?"Back to Login":"Zurück zum Login"}
            </PrimaryBtn>
          </div>
        )}

      </div>
    </div>
  );
}


/* ─── ADD STUDENT SHEET ─────────────────────────────────────────────────── */
function AddStudentSheet({open,onClose,defaultArea,students,t,lang,toast,onSave}){
  const [name,setName]=useState("");
  const [area,setArea]=useState(defaultArea||AREAS[0]?.key||"sinema");
  const [year,setYear]=useState("2026");
  const [burs,setBurs]=useState("");
  const [phone,setPhone]=useState("");
  const [dob,setDob]=useState("");
  const [address,setAddress]=useState("");
  const [email,setEmail]=useState("");
  const [photo,setPhoto]=useState(null);
  const [showCard,setShowCard]=useState(false);
  const [docs,setDocs]=useState([]);
  const [savedCreds,setSavedCreds]=useState(null); // {no, pass} — show after registration
  const fileRef=useRef();
  const docFileRef=useRef();
  const areaLocked = !!defaultArea; // Alan kart'tan açıldıysa kilitle

  // Sheet açıldığında formu sıfırla
  useEffect(()=>{ if(open){ setSavedCreds(null); setName(""); setBurs(""); setPhone(""); setDob(""); setAddress(""); setEmail(""); setPhoto(null); setDocs([]); setShowCard(false); } },[open]);
  useEffect(()=>{if(defaultArea) setArea(defaultArea);},[defaultArea]);

  function handleDocUpload(e){
    const files=Array.from(e.target.files);
    files.forEach(file=>{
      const reader=new FileReader();
      reader.onload=ev=>setDocs(prev=>[...prev,{id:Date.now()+Math.random(),name:file.name,size:(file.size/1024).toFixed(0)+"KB",url:ev.target.result}]);
      reader.readAsDataURL(file);
    });
    e.target.value="";
  }

  function previewNo(){
    // Heman qad û sal ji bo jimareya rêzê ya herî bilind bibîne
    const existing=students.filter(s=>s.area===area&&(s.no||"").startsWith(String((AREA_MAP[area]||{code:0}).code)));
    const seqs=existing.map(s=>parseInt((s.no||'').slice(-2))||0);
    const nextSeq=(seqs.length>0?Math.max(...seqs):0)+1;
    return genStudentNo(area,year,nextSeq);
  }

  async function handleSave(){
    if(!name.trim()){toast("⚠ "+t.fullName); return;}
    const existing=students.filter(s=>s.area===area&&(s.no||"").startsWith(String((AREA_MAP[area]||{code:0}).code)));
    const seqs=existing.map(s=>parseInt((s.no||'').slice(-2))||0);
    const seq=(seqs.length>0?Math.max(...seqs):0)+1;
    const no=genStudentNo(area,year,seq);
    if(students.find(s=>s.no===no)){toast("⚠ "+t.errLogin); return;}
    const tempPass = genAutoPassword();
    // Form değerlerini async bitmeden kaybet etmemek için snapshot al
    const snapName=name, snapBurs=burs, snapPhone=phone, snapDob=dob, snapAddress=address, snapEmail=email, snapPhoto=photo, snapDocs=docs;
    // Formu hemen temizle
    setName(""); setBurs(""); setPhone(""); setDob(""); setAddress(""); setEmail(""); setPhoto(null); setDocs([]); setShowCard(false);
    // Hash hesapla
    const hashed = await hashPassword(tempPass);
    const student={
      id:Date.now(), name:sanitizeText(snapName), area, no,
      pass:hashed, passHash:hashed,
      burs:sanitizeText(snapBurs), phone:sanitizePhone(snapPhone),
      email:snapEmail.trim(),
      dob:snapDob, address:sanitizeText(snapAddress),
      photo:snapPhoto, docs:snapDocs,
      _plainPass:tempPass
    };
    onSave(student);
    setSavedCreds({no, pass:tempPass, name:snapName.trim()});
    toast("✅ "+snapName.trim()+" · "+no+" | 🔑 "+tempPass, 8000);
  }

  function handlePhoto(e){
    const f=e.target.files[0];
    if(!f) return;
    const r=new FileReader();
    r.onload=async ev=>{
      const compressed=await compressImage(ev.target.result,400,400,0.78);
      setPhoto(compressed);
    };
    r.readAsDataURL(f);
  }

  const previewStudent={name,area,no:previewNo(),burs,phone,email:"",dob,address,photo};

  // Kayıt sonrası bilgi kartı
  if(savedCreds){
    return(
      <Sheet open={open} onClose={()=>{setSavedCreds(null);onClose();}} title="✅ Xwendekar Tescîl Bû">
        <div style={{textAlign:"center",padding:"8px 0 20px"}}>
          <div style={{fontSize:48,marginBottom:8}}>🎓</div>
          <div style={{fontSize:16,fontWeight:700,color:"var(--text)",marginBottom:4}}>{savedCreds.name}</div>
          <div style={{fontSize:12,color:"var(--text2)",marginBottom:20}}>{lang==="en"?"Student registered successfully":lang==="de"?"Schüler erfolgreich registriert":"Xwendekar hate tescîlkirin"}</div>
        </div>
        {/* Login Credentials Card */}
        <div style={{background:"linear-gradient(135deg,#0C2340,#1a3a6a)",borderRadius:16,padding:"20px 18px",marginBottom:16,border:"1px solid rgba(247,209,22,0.3)"}}>
          <div style={{fontSize:10,color:"rgba(247,209,22,0.7)",fontWeight:700,letterSpacing:"0.1em",textTransform:"uppercase",marginBottom:14}}>
            🔐 {lang==="en"?"Login Credentials":lang==="de"?"Anmeldedaten":"Têketina Sîstemê"}
          </div>
          <div style={{marginBottom:12}}>
            <div style={{fontSize:10,color:"rgba(255,255,255,0.5)",marginBottom:4}}>{lang==="en"?"Username (Student No)":lang==="de"?"Benutzername":"Navê Bikarhêner (Jimara Xwendekar)"}</div>
            <div style={{display:"flex",alignItems:"center",gap:8}}>
              <div style={{flex:1,fontFamily:"monospace",fontSize:16,fontWeight:800,color:"#F7D116",letterSpacing:"0.12em"}}>{savedCreds.no}</div>
              <button onClick={async()=>{await copyToClipboard(savedCreds.no);hapticLight();}} style={{background:"rgba(247,209,22,0.15)",border:"1px solid rgba(247,209,22,0.3)",borderRadius:6,padding:"4px 8px",fontSize:11,color:"#F7D116",cursor:"pointer"}}>📋</button>
            </div>
          </div>
          <div style={{borderTop:"1px solid rgba(255,255,255,0.1)",paddingTop:12}}>
            <div style={{fontSize:10,color:"rgba(255,255,255,0.5)",marginBottom:4}}>{lang==="en"?"Password (auto-generated)":lang==="de"?"Passwort (automatisch)":"Şîfre (otomatîk)"}</div>
            <div style={{display:"flex",alignItems:"center",gap:8}}>
              <div style={{flex:1,fontFamily:"monospace",fontSize:18,fontWeight:800,color:"#5DC48A",letterSpacing:"0.15em"}}>{savedCreds.pass}</div>
              <button onClick={async()=>{await copyToClipboard(savedCreds.pass);hapticLight();}} style={{background:"rgba(93,196,138,0.15)",border:"1px solid rgba(93,196,138,0.3)",borderRadius:6,padding:"4px 8px",fontSize:11,color:"#5DC48A",cursor:"pointer"}}>📋</button>
            </div>
          </div>
        </div>
        <div style={{fontSize:11,color:"var(--text2)",background:"var(--bg2)",borderRadius:8,padding:"10px 12px",marginBottom:16,lineHeight:1.7}}>
          ⚠️ {lang==="en"?"Save this password now — it won't be shown again.":lang==="de"?"Passwort jetzt notieren — wird nicht mehr angezeigt.":"Şîfre niha tomarkirin — dîsa nayê nîşandan."}
        </div>
        <button onClick={async()=>{await copyToClipboard(savedCreds.no+" / "+savedCreds.pass);hapticSuccess();toast("✅ "+(lang==="en"?"Copied!":lang==="de"?"Kopiert!":"Kopye bû!"));}} style={{width:"100%",padding:"13px",background:"var(--navy)",color:"#fff",border:"none",borderRadius:12,fontSize:14,fontWeight:700,cursor:"pointer",marginBottom:8}}>
          📋 {lang==="en"?"Copy All":lang==="de"?"Alles kopieren":"Hemûyan Kopye Bike"}
        </button>
        <button onClick={()=>{setSavedCreds(null);onClose();}} style={{width:"100%",padding:"11px",background:"none",border:"0.5px solid var(--border2)",borderRadius:12,fontSize:13,color:"var(--text2)",cursor:"pointer"}}>
          {lang==="en"?"Close":lang==="de"?"Schließen":"Bigire"}
        </button>
      </Sheet>
    );
  }

  return(
    <Sheet open={open} onClose={onClose} title={"➕ "+t.addStudent}>
      {/* Photo */}
      <div style={{display:"flex",justifyContent:"center",marginBottom:18}}>
        <div onClick={()=>fileRef.current.click()} style={{width:80,height:80,borderRadius:"50%",background:"var(--bg2)",border:"2px dashed var(--border2)",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",overflow:"hidden",position:"relative"}}>
          {photo
            ? <img src={photo} style={{width:"100%",height:"100%",objectFit:"cover"}} alt=""/>
            : <div style={{textAlign:"center"}}><div style={{fontSize:24}}>📷</div><div style={{fontSize:9,color:"var(--text2)",marginTop:4}}>{t.photoUpload}</div></div>
          }
        </div>
        <input ref={fileRef} type="file" accept="image/*" style={{display:"none"}} onChange={handlePhoto}/>
      </div>
      <FieldWrap label={t.fullName}>
        <input style={inputStyle} value={name} onChange={e=>setName(e.target.value)} placeholder="Nav û Nasname"/>
      </FieldWrap>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
        <FieldWrap label={t.artField}>
          {areaLocked ? (
            <div style={{display:"flex",alignItems:"center",gap:8,padding:"11px 14px",background:"var(--bg2)",borderRadius:10,border:"1.5px solid var(--border2)"}}>
              <span style={{fontSize:16}}>{AREA_MAP[area]?.icon}</span>
              <span style={{flex:1,fontSize:13,fontWeight:600,color:"var(--text)"}}>{areaName(area,lang)}</span>
              <span style={{fontSize:9,color:"var(--text2)"}}>🔒</span>
            </div>
          ) : (
            <select style={selectStyle} value={area} onChange={e=>setArea(e.target.value)}>
              {AREAS.map(a=>(<option key={a.key} value={a.key}>{a.icon} {areaName(a.key,lang)}</option>))}
            </select>
          )}
        </FieldWrap>
        <FieldWrap label={t.regYear}>
          <select style={selectStyle} value={year} onChange={e=>setYear(e.target.value)}>
            {["2025","2026","2027"].map(y=>(<option key={y}>{y}</option>))}
          </select>
        </FieldWrap>
      </div>

      <FieldWrap label={t.scholarship||"Burs"}>
        <select style={selectStyle} value={burs} onChange={e=>setBurs(e.target.value)}>
          <option value="">{t.noScholarship}</option>
          <option value={t.fullScholarship}>{t.fullScholarship}</option>
          <option value={t.sch75}>{t.sch75}</option>
          <option value={t.sch50}>{t.sch50}</option>
          <option value={t.sch25}>{t.sch25}</option>
        </select>
      </FieldWrap>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
        <FieldWrap label={t.phone}>
          <input style={inputStyle} value={phone} onChange={e=>setPhone(e.target.value)} type="tel" inputMode="tel" autoComplete="tel" placeholder="05XX..." type="tel" inputMode="tel" autoComplete="tel"/>
        </FieldWrap>
        <FieldWrap label={t.dobLabel}>
          <input style={inputStyle} type="date" value={dob} onChange={e=>setDob(e.target.value)}/>
        </FieldWrap>
      </div>

      <FieldWrap label={t.addressLabel}>
        <input style={inputStyle} value={address} onChange={e=>setAddress(e.target.value)} placeholder="Navnîşan..."/>
      </FieldWrap>
      <FieldWrap label={lang==="ku"?"E-Posta":lang==="en"?"E-Mail":"E-Mail"}>
        <input style={inputStyle} value={email} onChange={e=>setEmail(e.target.value)} type="email" inputMode="email" autoComplete="email" placeholder="ornek@mail.com"/>
      </FieldWrap>

      {/* Belgeyên Serlêdanê */}
      <div style={{marginBottom:12,padding:"10px 12px",background:"var(--bg2)",borderRadius:10,border:"0.5px solid var(--border2)"}}>
        <div style={{fontSize:11,fontWeight:700,color:"var(--text2)",textTransform:"uppercase",letterSpacing:"0.07em",marginBottom:10}}>📎 {t.docTitle||"Belgeyên Serlêdanê"}</div>
        <div style={{fontSize:10,color:"var(--text2)",marginBottom:10,lineHeight:1.6}}>
          {lang==="en"?(
            <>{`• ID Copy\n• Civil / Birth Certificate\n• Residence Document\n• Photo (2 copies)`}</>
          ):lang==="de"?(
            <>{`• Personalausweiskopie\n• Personenstandszeugnis\n• Wohnsitzdokument\n• Foto (2 Stück)`}</>

            <>• Fotokopiya Nasnameyê<br/>• Belgeya Nasnameya Sivîl / Jidayikbûnê<br/>• Belgeya Rûniştinê<br/>• Wêne (2 heb)</>
          )}
        </div>
        <div onClick={()=>docFileRef.current.click()} style={{border:"1.5px dashed var(--border2)",borderRadius:8,padding:"12px",textAlign:"center",cursor:"pointer",marginBottom:8,background:"var(--bg1)"}}>
          <div style={{fontSize:20,marginBottom:4}}>📁</div>
          <div style={{fontSize:12,color:"var(--text2)"}}>{t.uploadDoc||"Belge Yükle"} (PDF, JPG, PNG)</div>
        </div>
        <input ref={docFileRef} type="file" multiple accept="image/*,.pdf" style={{display:"none"}} onChange={handleDocUpload}/>
        {docs.length>0&&(
          <div>
            {docs.map((doc,i)=>(
              <div key={doc.id} style={{display:"flex",alignItems:"center",gap:8,padding:"5px 0",borderBottom:i<docs.length-1?"0.5px solid var(--border)":"none"}}>
                <span style={{fontSize:14}}>📄</span>
                <span style={{flex:1,fontSize:11,color:"var(--text)",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{doc.name}</span>
                <span style={{fontSize:10,color:"var(--text2)"}}>{doc.size}</span>
                <button onClick={()=>setDocs(p=>p.filter(d=>d.id!==doc.id))} style={{background:"none",border:"none",color:"var(--red)",cursor:"pointer",fontSize:14,padding:"0 4px"}}>✕</button>
              </div>
            ))}
            <div style={{fontSize:10,color:"#639922",marginTop:6}}>✅ {docs.length} {lang==="en"?"document(s) uploaded":lang==="de"?"Dokument(e) hochgeladen":"belge hatine barkirin"}</div>
          </div>
        )}
      </div>

      <FieldWrap label={t.studentNoPreview}>
        <div style={{fontFamily:"monospace",fontSize:16,fontWeight:700,color:"#185FA5",padding:"10px 14px",background:"var(--bg2)",borderRadius:8,border:"0.5px solid var(--border2)",letterSpacing:"0.08em"}}>
          {previewNo()}
        </div>
      </FieldWrap>
      {/* ID Card Preview */}
      <button onClick={()=>setShowCard(p=>!p)} style={{width:"100%",padding:"10px",marginBottom:12,background:"var(--bg2)",border:"0.5px solid var(--border2)",borderRadius:8,fontSize:13,cursor:"pointer",color:"var(--text)"}}>
        🪪 {t.generateCard} {showCard?"▲":"▼"}
      </button>
      {showCard&&name&&(
        <div style={{marginBottom:14}}>
          <StudentIDCard student={previewStudent} lang={lang} t={t}/>
        </div>
      )}
      <PrimaryBtn onClick={handleSave} icon="💾">{t.saveStudent}</PrimaryBtn>
    </Sheet>
  );
}

/* ─── ADD TEACHER SHEET ─────────────────────────────────────────────────── */
function AddTeacherSheet({open,onClose,defaultArea,teachers,t,lang,toast,onSave}){
  const [name,setName]=useState("");
  const [area,setArea]=useState(defaultArea||"sinema");
  const [year,setYear]=useState("2026");
  const [phone,setPhone]=useState("");
  const [dob,setDob]=useState("");

  const [bio,setBio]=useState("");

  const areaLocked = !!defaultArea;

  useEffect(()=>{if(defaultArea) setArea(defaultArea);},[defaultArea]);

  function handlePhoto(e){
    const f=e.target.files[0];

    const r=new FileReader();
    r.onload=async ev=>{
      const compressed=await compressImage(ev.target.result,400,400,0.78);

    };
    r.readAsDataURL(f);

  function handleSave(){
    if(!name.trim()){toast("⚠ "+t.fullName); return;}
    const areaTeachers=teachers.filter(tc=>tc.area===area&&!tc.isAdmin);

      const s=parseInt((tc.no||"").slice(-2))||0;
      return s;

    const no=genTeacherNo(area,year,seq);

      onSave(tc);

          <div style={{fontSize:10,color:"rgba(247,209,22,0.7)",fontWeight:700,letterSpacing:"0.1em",textTransform:"uppercase",marginBottom:14}}>
            🔐 {lang==="en"?"Login Credentials":lang==="de"?"Anmeldedaten":"Têketina Sîstemê"}
          </div>
          <div style={{marginBottom:12}}>
            <div style={{fontSize:10,color:"rgba(255,255,255,0.5)",marginBottom:4}}>{lang==="en"?"Username (Teacher No)":lang==="de"?"Benutzername":"Navê Bikarhêner (Jimara Mamoste)"}</div>
            <div style={{display:"flex",alignItems:"center",gap:8}}>
              <div style={{flex:1,fontFamily:"monospace",fontSize:16,fontWeight:800,color:"#F7D116",letterSpacing:"0.12em"}}>{savedCreds.no}</div>
              <button onClick={async()=>{await copyToClipboard(savedCreds.no);hapticLight();}} style={{background:"rgba(247,209,22,0.15)",border:"1px solid rgba(247,209,22,0.3)",borderRadius:6,padding:"4px 8px",fontSize:11,color:"#F7D116",cursor:"pointer"}}>📋</button>
            </div>
          </div>
          <div style={{borderTop:"1px solid rgba(255,255,255,0.1)",paddingTop:12}}>
            <div style={{fontSize:10,color:"rgba(255,255,255,0.5)",marginBottom:4}}>{lang==="en"?"Password (auto-generated)":lang==="de"?"Passwort (automatisch)":"Şîfre (otomatîk)"}</div>
            <div style={{display:"flex",alignItems:"center",gap:8}}>
              <div style={{flex:1,fontFamily:"monospace",fontSize:18,fontWeight:800,color:"#5DC48A",letterSpacing:"0.15em"}}>{savedCreds.pass}</div>

/* ─── DEVICE RESET BUTTON (Admin kullanımı) ────────────────────────────── */
function DeviceResetBtn({no, lang, toast}){
  const [loading, setLoading] = useState(false);
  const [status, setStatus] = useState(null); // null | "active" | "none"

  useEffect(()=>{
    // Cihaz kayıtlı mı kontrol et
    const fb = window.__FB;
    if(!fb || !fb.isConfigured()) return;
    fb.getDoc(fb.doc(fb.db, "devices", no)).then(snap=>{
      setStatus(snap.exists() ? "active" : "none");
    }).catch(()=> setStatus("none"));
  },[no]);

  async function handleReset(){
    setLoading(true);
    const ok = await resetDeviceForUser(no);
    setLoading(false);
    if(ok){
      setStatus("none");
      toast("✅ "+(lang==="ku"?"Cîhaz sıfırlandı — nû têketin dikare bibe":lang==="en"?"Device reset — can login from new device":"Gerät zurückgesetzt"));
    } else {
      toast("⚠ "+(lang==="ku"?"Çewtiyek çêbû":lang==="en"?"An error occurred":"Ein Fehler ist aufgetreten"));
    }
  }

  if(status === null) return null;

  return(
    <div style={{marginTop:10,padding:"10px 12px",background:"var(--bg2)",borderRadius:10,border:"1px solid var(--border2)"}}>
      <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:status==="active"?8:0}}>
        <span style={{fontSize:16}}>📱</span>
        <div style={{flex:1}}>
          <div style={{fontSize:11,fontWeight:700,color:"var(--text)"}}>
            {lang==="ku"?"Cîhaza Tomar Bûyî":lang==="en"?"Registered Device":lang==="de"?"Registriertes Gerät":"Cîhaza Tomar Bûyî"}
          </div>
          <div style={{fontSize:10,color:status==="active"?"var(--green)":"var(--text2)"}}>
            {status==="active"
              ? (lang==="ku"?"✅ Cîhaz tomar e":lang==="en"?"✅ Device registered":lang==="de"?"✅ Gerät registriert":"✅ Tomar e")
              : (lang==="ku"?"— Hîn cîhaz tomar nebûye":lang==="en"?"— No device registered yet":lang==="de"?"— Noch kein Gerät":"— Hîn tomar tune")
            }
          </div>
        </div>
      </div>
      {status==="active"&&(
        <button onClick={handleReset} disabled={loading}
          style={{width:"100%",padding:"8px",background:"var(--red-bg)",border:"1px solid var(--red)",
            borderRadius:8,fontSize:12,fontWeight:700,cursor:"pointer",color:"var(--red)",
            opacity:loading?0.6:1,display:"flex",alignItems:"center",justifyContent:"center",gap:6}}>
          {loading?"⏳ ...":"🔄 "+(lang==="ku"?"Cîhazê Sıfırla":lang==="en"?"Reset Device":lang==="de"?"Gerät zurücksetzen":"Cîhazê Sıfırla")}
        </button>
      )}
    </div>
  );
}

function EditStudentSheet({student,onClose,t,lang,toast,onSave}){
  const [name,setName]=useState(student.name||"");

  const [phone,setPhone]=useState(student.phone||"");
  const [email,setEmail]=useState(student.email||"");
  const [dob,setDob]=useState(student.dob||"");
  const [address,setAddress]=useState(student.address||"");
  // Şifre: _plainPass varsa onu göster, yoksa pass (hash olabilir)
  const [pass,setPass]=useState(student._plainPass||student.pass||"1234");
  const [showPassEdit,setShowPassEdit]=useState(false);
  const [photo,setPhoto]=useState(student.photo||null);
  const photoRef=useRef();

  async function handlePhoto(e){
    const f=e.target.files[0]; if(!f) return;
    const r=new FileReader();
    r.onload=async ev=>{
      const compressed=await compressImage(ev.target.result,400,400,0.78);
      setPhoto(compressed);
    };
    r.readAsDataURL(f);
  }

  async function handleSave(){
    if(!name.trim()){toast("⚠ "+t.fullName); return;}
    // Şifre değiştiyse yeniden hash'le, değişmediyse mevcut hash koru
    let newHash = student.pass;
    let newPlain = student._plainPass;
    const currentPlain = student._plainPass || "";
    if(pass !== currentPlain && pass.length >= 4){
      newHash = await hashPassword(pass);
      newPlain = pass;
    }
    onSave({...student,name:name.trim(),area,phone,email,dob,address,pass:newHash,passHash:newHash,_plainPass:newPlain,photo});
  }

  const plainPassDisplay = student._plainPass || (student.pass && student.pass.length < 20 ? student.pass : null);

        </div>
        <input ref={photoRef} type="file" accept="image/*" style={{display:"none"}} onChange={handlePhoto}/>

          {AREAS.map(a=>(<option key={a.key} value={a.key}>{a.icon} {areaName(a.key,lang)}</option>))}

      </div>
