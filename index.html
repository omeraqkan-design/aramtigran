}

function LoginScreen({students,teachers,t,lang,setLang,onLogin,onForgot,dark,onThemeToggle}){
  const [role,setRole]=useState("student");
  const [user,setUser]=useState("");
  const [pass,setPass]=useState("");
  const [err,setErr]=useState("");

  const LANGS=[
    {key:"ku",label:"Kurdî",flag:<KRGFlag size={30}/>},
    {key:"en",label:"English",flag:<span style={{fontSize:22}}>🇬🇧</span>},
    {key:"de",label:"Deutsch",flag:<span style={{fontSize:22}}>🇩🇪</span>},
  ];

  // Credential Autofill support
  const {saveCredential}=useBiometric();
  
  async function doLogin(){
    setErr("");
    const uid=(user.trim()||"?").toLowerCase();
    if(isLockedOut(uid)){
      const mins=Math.ceil(remainingLockoutSeconds(uid)/60);
      setErr((lang==="ku"?"Hesab "+mins+" deqe kilî ye":lang==="en"?"Account locked "+mins+" min":lang==="de"?"Konto "+mins+" Min. gesperrt":"Hesab "+mins+" deqe kilî ye"));
      return;
    }

    const userInput = user.trim();
    const passInput = pass;

    let matched=null, matchedType=null;
    const fb = window.__FB;

    // ══════════════════════════════════════════════════════
    // YOL 1: Firebase Auth ile giriş (yeni oluşturulan kullanıcılar)
    // Önce öğretmen/admin dene (no@ogretmen.aat), sonra öğrenci (no@ogrenci.aat)
    // ══════════════════════════════════════════════════════
    if(fb && fb.isConfigured()){
      // Önce Firestore'dan kimin bu no olduğunu bul (rol tespiti için)
      const tcFound = teachers.find(tc => tc.no === userInput || tc.id === userInput);
      const stFound = students.find(s => s.no === userInput);

      // Hangi email suffix'ini deneyeceğimizi belirle
      const tryRoles = [];
      if(tcFound) tryRoles.push(tcFound.isAdmin ? "teacher" : "teacher");
      if(stFound) tryRoles.push("student");
      if(tryRoles.length === 0) tryRoles.push("teacher", "student"); // bilinmiyorsa ikisini de dene

      for(const tryRole of tryRoles){
        try {
          const fbCred = await fb.authSignIn(userInput, passInput, tryRole);
          if(fbCred && fbCred.user){
            // Firebase Auth başarılı — Firestore'dan kullanıcı detayını al
            if(tryRole === "student"){
              const s = students.find(s => s.no === userInput);
              if(s){ matched = s; matchedType = "student"; }
            } else {
              const tc = teachers.find(tc => tc.no === userInput || tc.id === userInput);
              if(tc){ matched = tc; matchedType = tc.isAdmin ? "admin" : "teacher"; }
            }
            break;
          }
        } catch(authErr){
          // auth/user-not-found veya auth/wrong-password — devam et
          if(authErr.code === "auth/wrong-password" || authErr.code === "auth/invalid-credential"){
            // Şifre yanlış — diğer rolü deneme, direkt hata ver
            break;
          }
          // auth/user-not-found — diğer rolü dene
        }
      }
    }

    // ══════════════════════════════════════════════════════
    // YOL 2: Firestore hash fallback (eski/demo kullanıcılar — Firebase Auth kaydı yok)
    // ══════════════════════════════════════════════════════
    if(!matched){
      const tcList = teachers.filter(tc => tc.no === userInput || tc.id === userInput);
      for(const tc of tcList){
        if(await verifyPassword(passInput, tc.pass)){
          matched = tc;
          matchedType = tc.isAdmin ? "admin" : "teacher";
          break;
        }
      }
    }
    if(!matched){
      for(const s of students.filter(s => s.no === userInput)){
        if(await verifyPassword(passInput, s.pass)){
          matched = s; matchedType = "student"; break;
        }
      }
    }


    // Firebase Auth token olmadan giriş yapıldıysa arka planda sign-in dene
    if(matched && matchedType && fb && fb.isConfigured() && !fb.auth.currentUser){
      const _role = matchedType === "student" ? "student" : "teacher";
      fb.authSignIn(matched.no, passInput, _role).catch(()=>{});
    }

    // ══════════════════════════════════════════════════════
    // Giriş sonucu + CİHAZ DOĞRULAMA
    // ══════════════════════════════════════════════════════
    if(matched && matchedType){
      // Admin cihaz kontrolünden muaf
      if(matchedType !== "admin"){
        const deviceId = await getDeviceFingerprint();
        const devCheck = await verifyDevice(matched.no, deviceId);

        if(!devCheck.ok && devCheck.reason === "device_mismatch"){
          recordFailedAttempt(uid);
          hapticError();
          setErr(
            lang==="ku" ? "🔒 Ev hesab li cîhazekî din tomar bûye. Ji rêveber re vebêje ku cîhazê sıfırla bike." :
            lang==="en" ? "🔒 This account is registered on another device. Ask admin to reset your device." :
                          "🔒 Dieses Konto ist auf einem anderen Gerät registriert. Bitte Admin um Geräte-Reset."
          );
          return;
        }

        // İlk giriş — bu cihazı kaydet
        if(devCheck.reason === "first_login"){
          await registerDevice(matched.no, matchedType, deviceId);
        }
      }

      clearAttempts(uid);
      hapticSuccess();
      window._analytics && window._analytics.login(matchedType);
      window._crashlytics && window._crashlytics.setUserId(matched.no || matched.id || "unknown");
      onLogin(matchedType, matched);
      saveCredential(userInput, passInput).catch(()=>{});
    } else {
      recordFailedAttempt(uid);
      const rem = Math.max(0, MAX_ATTEMPTS - (_loginAttempts[uid]||[]).length);
      hapticError();
      setErr(rem > 0 ? t.errLogin+" ("+rem+")" : (lang==="ku"?"Hesab kilî ye":lang==="en"?"Account locked":lang==="de"?"Konto gesperrt":"Hesab kilî ye"));
    }
  }

  return(
    <div style={{background:"var(--navy)",height:"100%",display:"flex",flexDirection:"column",overflow:"hidden"}}>
      {/* Hero */}
      <div style={{padding:"32px 24px 20px",textAlign:"center",flexShrink:0,position:"relative"}}>
        <div style={{position:"absolute",left:-40,top:-40,width:180,height:180,borderRadius:"50%",background:"rgba(255,255,255,.03)",pointerEvents:"none"}}/>
        <div style={{position:"absolute",right:-20,top:20,width:100,height:100,borderRadius:"50%",background:"rgba(247,209,22,.06)",pointerEvents:"none"}}/>
        {/* Theme toggle top right */}
        {onThemeToggle&&<div style={{position:"absolute",top:16,right:16}}><ThemeToggle dark={dark} onToggle={onThemeToggle} lang={lang}/></div>}
        <AcademyLogo size={96}/>
        <div style={{color:"rgba(255,255,255,.45)",fontSize:11,marginTop:10,letterSpacing:"0.08em",textTransform:"uppercase"}}>{t.appSub}</div>
      </div>

      {/* Forma têketinê */}
      <div style={{background:"var(--bg1)",borderRadius:"28px 28px 0 0",flex:1,overflow:"hidden",display:"flex",flexDirection:"column"}}>
        <div role="main" style={{flex:1,overflowY:"auto",padding:"22px 20px 40px"}}>

          {/* Lang picker */}
          <div style={{display:"flex",gap:6,marginBottom:22}}>
            {LANGS.map(l=>(
              <button key={l.key} onClick={()=>setLang(l.key)}
                style={{flex:1,padding:"9px 4px 8px",border:`1.5px solid ${lang===l.key?"var(--navy)":"var(--border)"}`,
                  borderRadius:12,fontSize:10.5,fontWeight:lang===l.key?700:500,
                  color:lang===l.key?"#fff":"var(--text2)",
                  background:lang===l.key?"var(--navy)":"var(--bg2)",
                  cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:4,
                  transition:"all .15s var(--ease)"}}>
                {l.flag}<span>{l.label}</span>
              </button>
            ))}
          </div>

          {/* Role selector — tenê Xwendekar + Mamoste */}
          <div style={{fontSize:11,fontWeight:700,color:"var(--text2)",textTransform:"uppercase",letterSpacing:"0.07em",marginBottom:10}}>{t.selectRole}</div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:20}}>
            {[
              {key:"student",icon:"🎓",label:t.roleStudent,sub:t.roleStudentSub},
              {key:"teacher",icon:"👨‍🏫",label:t.roleTeacher,sub:t.roleTeacherSub},
            ].map(r=>(
              <button key={r.key} onClick={()=>setRole(r.key)}
                style={{padding:"16px 10px",border:`2px solid ${role===r.key?"var(--navy)":"var(--border)"}`,
                  borderRadius:16,background:role===r.key?"var(--navy)":"var(--bg2)",
                  cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:7,
                  transition:"all .18s var(--ease)",boxShadow:role===r.key?"0 4px 16px rgba(12,35,64,.2)":"none"}}>
                <span style={{fontSize:28}}>{r.icon}</span>
                <span style={{fontSize:13,fontWeight:700,color:role===r.key?"#fff":"var(--text)"}}>{r.label}</span>
                <span style={{fontSize:10,color:role===r.key?"rgba(255,255,255,.65)":"var(--text2)"}}>{r.sub}</span>
              </button>
            ))}
          </div>

          <FieldWrap label={role==="student"?t.labelStudentNo:t.labelUsername}>
            <div style={{position:"relative"}}>
              <input className="inp" value={user} onChange={e=>setUser(e.target.value)}
                placeholder={lang==="en"?"Student / Teacher No":lang==="de"?"Schüler / Lehrer Nr.":"Jimara Xwendekar / Mamoste"}
                autoCapitalize="none" autoComplete="username" autoCorrect="off" spellCheck={false}
                inputMode="numeric"
                style={{paddingRight:40}}/>
              {user.length>0&&(
                <button onClick={()=>setUser("")} style={{position:"absolute",right:10,top:"50%",transform:"translateY(-50%)",background:"none",border:"none",color:"var(--text2)",fontSize:16,cursor:"pointer",padding:4}}>✕</button>
              )}
            </div>
          </FieldWrap>
          <FieldWrap label={t.labelPass}>
            <ShowHidePass value={pass} onChange={e=>setPass(e.target.value)} onEnter={doLogin}/>
          </FieldWrap>

          {err&&(
            <div className="fade-in" style={{background:"var(--red-bg)",border:"1px solid rgba(192,57,43,.2)",
              borderRadius:12,padding:"10px 14px",fontSize:12.5,color:"var(--red)",marginBottom:14,
              display:"flex",alignItems:"center",gap:8}}>
              ⚠️ {err}
            </div>
          )}

          <button onClick={()=>doLogin()} className="btn-navy" aria-label={t.btnLogin} style={{marginBottom:12,fontSize:15,letterSpacing:"0.02em"}}>
            {t.btnLogin}
          </button>
          <div style={{textAlign:"center",fontSize:13,color:"rgba(255,255,255,0.5)",cursor:"pointer",padding:"8px 0",fontWeight:500}} onClick={onForgot}>
            🔑 {lang==="en"?"Forgot password?":lang==="de"?"Passwort vergessen?":"Şîfre ji bîr kir?"}
          </div>
        </div>
      </div>
    </div>
  );
}

/* ─── NATIVE BARCODE DETECTION (primary) / jsQR (fallback) ─────────────── */
// hasBarcodeDetector() returns true on Chrome Android 9+, Samsung Internet
// detectBarcodeNative() uses the native GPU-accelerated scanner
// jsQR is used as a fallback for iOS/Firefox

/* ─── QR SESSION MANAGER ────────────────────────────────────────────────── */
// In-memory session store (works without localStorage)
window._aat_qr_session = null;

// ══════════════════════════════════════════════════════════════════
// QR GÜVENLİK SİSTEMİ — GPS + Dinamik Token
// 1. Dinamik token: QR her 30 saniyede otomatik yenilenir
//    → Ekran görüntüsü 30sn sonra geçersiz
// 2. GPS konum: Öğretmen konumu session'a kaydedilir
//    → Öğrenci check-in sırasında max 100m mesafe kontrolü
// 3. Token formatı: AAT-{sessionId}-{rotatingSlot}-{hmac}
// ══════════════════════════════════════════════════════════════════

const QR_ROTATE_INTERVAL = 30; // saniye — token bu sürede yenilenir
const QR_MAX_DISTANCE_M  = 100; // metre — max izin verilen mesafe

// Coğrafi mesafe hesaplama (Haversine formülü)
function haversineDistance(lat1, lon1, lat2, lon2){
  const R = 6371000; // metre
  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLon = (lon2 - lon1) * Math.PI / 180;
  const a = Math.sin(dLat/2)**2 +
    Math.cos(lat1*Math.PI/180) * Math.cos(lat2*Math.PI/180) * Math.sin(dLon/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

// GPS konum al
function getCurrentPosition(){
  return new Promise((resolve, reject)=>{
    if(!navigator.geolocation){ reject(new Error("no_gps")); return; }
    navigator.geolocation.getCurrentPosition(
      pos => resolve({lat: pos.coords.latitude, lon: pos.coords.longitude, acc: pos.coords.accuracy}),
      err => reject(err),
      {timeout:8000, maximumAge:15000, enableHighAccuracy:true}
    );
  });
}

// Rotating sub-token: 30sn'de bir değişir
function getRotatingSlot(){
  return Math.floor(Date.now() / (QR_ROTATE_INTERVAL * 1000));
}

// Token üret: sessionId + rotatingSlot + kısa hash
function generateSessionToken(lessonId, teacherId){
  const ts = Date.now();
  const rand = Math.random().toString(36).slice(2,8).toUpperCase();
  return `AAT-${teacherId}-${lessonId}-${ts}-${rand}`;
}

// Dinamik QR içeriği üret (her 30sn farklı)
function buildDynamicQRContent(sessionId){
  const slot = getRotatingSlot();
  const slotHash = (slot * 1664525 + 1013904223) >>> 0;
  const code = slotHash.toString(36).slice(0,6).toUpperCase();
  return `${sessionId}|${slot}|${code}`;
}

// Dinamik QR içeriğini doğrula (±1 slot tolerans)
function validateDynamicQRContent(content, sessionId){
  try {
    const parts = content.split("|");
    if(parts.length !== 3) return false;
    const [sid, slotStr, code] = parts;
    if(sid !== sessionId) return false;
    const slot = parseInt(slotStr);
    const currentSlot = getRotatingSlot();
    // ±1 slot tolerans (geçiş anında sorun olmasın)
    for(let s = currentSlot - 1; s <= currentSlot + 1; s++){
      const slotHash = (s * 1664525 + 1013904223) >>> 0;
      const expected = slotHash.toString(36).slice(0,6).toUpperCase();
      if(s === slot && code === expected) return true;
    }
    return false;
  } catch { return false; }
}

function openQRSession(sessionId, lessonName, teacherName, area, expiresInMs=600000, teacherLocation=null){
  const session = {
    sessionId, lessonName, teacherName, area,
    openedAt: Date.now(),
    expiresAt: Date.now() + expiresInMs,
    teacherLocation, // {lat, lon, acc} veya null
    checkins: {},
    active: true
  };
  window._aat_qr_session = session;
  return session;
}

function getActiveQRSession(){
  const s = window._aat_qr_session;
  if(!s || !s.active || Date.now() > s.expiresAt) return null;
  return s;
}

async function checkinToSession(qrContent, student, studentLocation=null){
  const s = window._aat_qr_session;
  if(!s)            return {ok:false, reason:"session_not_found"};
  if(!s.active)     return {ok:false, reason:"session_closed"};
  if(Date.now() > s.expiresAt) return {ok:false, reason:"session_expired"};

  // 1. Dinamik QR token doğrulaması
  const tokenValid = validateDynamicQRContent(qrContent, s.sessionId);
  if(!tokenValid) return {ok:false, reason:"token_mismatch"};

  // 2. Tekrar check-in engeli
  if(s.checkins[student.id]) return {ok:false, reason:"already_checked_in"};

  // 3. GPS konum kontrolü (öğretmen konumu varsa)
  if(s.teacherLocation && studentLocation){
    const dist = haversineDistance(
      s.teacherLocation.lat, s.teacherLocation.lon,
      studentLocation.lat,   studentLocation.lon
    );
    if(dist > QR_MAX_DISTANCE_M){
      return {ok:false, reason:"location_too_far", distance: Math.round(dist)};
    }
    s.checkins[student.id] = {
      name: student.name, no: student.no,
      time: new Date().toLocaleTimeString(),
      distance: Math.round(dist)
    };
  } else if(s.teacherLocation && !studentLocation){
    // GPS zorunlu — konum alınamadıysa reddet
    return {ok:false, reason:"location_required"};
  } else {
    // Öğretmen konumu yok — GPS olmadan kabul et
    s.checkins[student.id] = {name: student.name, no: student.no, time: new Date().toLocaleTimeString()};
  }

  return {ok:true, session:s};
}

function closeQRSession(){
  if(window._aat_qr_session) window._aat_qr_session.active = false;
}

function getSessionCheckins(){
  const s = window._aat_qr_session;
  return (s && s.checkins) ? s.checkins : {};
}

  const [currentQRContent, setCurrentQRContent] = useState(()=>buildDynamicQRContent(token));
  const [gpsActive, setGpsActive] = useState(false);
  const intervalRef = useRef(null);
  const rotateRef = useRef(null);

  // GPS durumu kontrol
  useEffect(()=>{
    const s = getActiveQRSession();
    setGpsActive(!!(s && s.teacherLocation));
  },[]);

  // QR içeriği üret ve render et
  function renderQR(content){
    if(!qrRef.current) return;
    qrRef.current.innerHTML = "";
    if(window.QRCode){
      qrInstance.current = new window.QRCode(qrRef.current, {
        text: content,
        width: 220,
        height: 220,
        colorDark: "#0C2340",
        colorLight: "#ffffff",

  useEffect(()=>{
    const initial = buildDynamicQRContent(token);
    setCurrentQRContent(initial);
    renderQR(initial);

    // Session geri sayımı
    intervalRef.current = setInterval(()=>{
      setSecondsLeft(p=>{
        if(p<=1){ clearInterval(intervalRef.current); onClose(); return 0; }
        return p-1;
      });
    },1000);

    // Dinamik QR rotasyonu — her 30 saniyede yenile

      clearInterval(intervalRef.current);
      clearInterval(rotateRef.current);
      clearInterval(pollRef.current);

        {/* Güvenlik durum çubuğu */}
        <div style={{display:"flex",gap:6,marginBottom:12}}>
          <div style={{flex:1,padding:"5px 8px",borderRadius:8,background:gpsActive?"rgba(93,196,138,0.15)":"rgba(224,120,120,0.15)",border:`1px solid ${gpsActive?"var(--green)":"var(--red)"}`,display:"flex",alignItems:"center",gap:5}}>

              <div style={{fontSize:8,color:"var(--text2)"}}>{gpsActive?(lang==="en"?"Active":lang==="de"?"Aktiv":"Çalak"):(lang==="en"?"Off":lang==="de"?"Aus":"Kapalı")}</div>

        <div style={{marginBottom:12}}>

/* ─── STUDENT QR SCANNER (reads teacher's QR) ───────────────────────────── */
function StudentQRScanner({student, onClose, toast, lang="ku"}){
  const videoRef  = useRef(null);
  const canvasRef = useRef(null);
  const streamRef = useRef(null);
  const rafRef    = useRef(null);
  const fileRef   = useRef(null);

  // mode: "live" = getUserMedia stream  |  "capture" = file input / photo capture
  const [mode, setMode]           = useState("live");  // try live first
  const [status, setStatus]       = useState("scanning");
  const [cameraOn, setCameraOn]   = useState(false);
  const [camError, setCamError]   = useState("");
  const [manualCode, setManualCode] = useState("");
  const [errorMsg, setErrorMsg]   = useState("");
  const [checkinTime, setCheckinTime] = useState("");
  const [lessonName, setLessonName]   = useState("");
  const [tab, setTab] = useState("camera"); // camera | manual

  /* ── labels ── */
  const L = {
    entry:     lang==="de"?"Unterrichtseingang":lang==="en"?"Class Entry":"Têketina Dersê",
    scanLabel: lang==="de"?"QR-Code des Lehrers scannen":lang==="en"?"Scan teacher's QR code":"Koda QR ya mamosteyê bixwîne",
    manualLabel:lang==="de"?"Code manuell eingeben":lang==="en"?"Enter code manually":"Koda bi destan binivîse",
    retry:     lang==="de"?"Erneut versuchen":lang==="en"?"Try again":"Dîsa biceribîne",
    shoot:     lang==="de"?"Foto aufnehmen & scannen":lang==="en"?"Take photo & scan":"Wêne bigire & bixwîne",
    starting:  lang==="de"?"Kamera wird gestartet…":lang==="en"?"Starting camera…":"Kamera tê destpêkirin…",
    submit:    lang==="de"?"Einreichen":lang==="en"?"Submit":"Bişîne",
    back:      lang==="de"?"Zurück zur Kamera":lang==="en"?"Back to camera":"Vegere kamerayê",
    ok:        lang==="de"?"OK":lang==="en"?"OK":"Baş e",
    confirmed: lang==="de"?"Eingang Bestätigt!":lang==="en"?"Entry Confirmed!":"Têketin Hate Pejirandin!",
    failed:    lang==="de"?"Eingang Fehlgeschlagen":lang==="en"?"Entry Failed":"Têketin Pêk Nehat",
    msgs:{
      ku:{session_not_found:"Civîna dersê ya çalak nehat dîtin.",session_closed:"Civîna dersê hatiye girtin.",session_expired:"Dema QR ya dersê derbas bûye.",token_mismatch:"Koda QR ya şaş an dem bûye.",already_checked_in:"Berê ketina vê dersê qeyd kir.",location_too_far:"📍 Tu ji dersê re dûr î — nêziktir bibe.",location_required:"📍 Ji bo têketinê cih lazim e — GPS-ê veke."},
      en:{session_not_found:"No active class session found.",session_closed:"Class session has been closed.",session_expired:"Class QR has expired.",token_mismatch:"Invalid or expired QR code.",already_checked_in:"You already checked into this class.",location_too_far:"📍 You are too far from class — move closer.",location_required:"📍 Location required — please enable GPS."},
      de:{session_not_found:"Keine aktive Unterrichtssitzung gefunden.",session_closed:"Unterrichtssitzung wurde geschlossen.",session_expired:"Unterrichts-QR ist abgelaufen.",token_mismatch:"Ungültiger oder abgelaufener QR-Code.",already_checked_in:"Sie haben sich bereits in dieser Klasse eingecheckt.",location_too_far:"📍 Sie sind zu weit entfernt — kommen Sie näher.",location_required:"📍 Standort erforderlich — GPS aktivieren."}
    }
  };

  /* ── mount: try live camera, fall back to capture mode ── */
  useEffect(()=>{ tryLive(); return ()=>{ stopLive(); }; },[]);

  async function tryLive(){
    setCamError(""); setCameraOn(false);
    // getUserMedia requires secure context (https or localhost)
    const secure = location.protocol==="https:" || /^(localhost|127\.0\.0\.1)$/.test(location.hostname);
    if(!secure || !navigator.mediaDevices?.getUserMedia){
      setMode("capture"); // fall back silently — no error shown
      return;
    }
    try{
      const stream = await navigator.mediaDevices.getUserMedia({
        video:{ facingMode:{ideal:"environment"}, width:{ideal:1920}, height:{ideal:1080} }
      });
      streamRef.current = stream;
      if(videoRef.current){
        videoRef.current.srcObject = stream;
        await videoRef.current.play();
        setCameraOn(true);
        scanFrame();
      }
    } catch(e){
      console.warn("getUserMedia:", e.name);
      setMode("capture"); // silently fall back
    }
  }

  function stopLive(){
    cancelAnimationFrame(rafRef.current);
    if(streamRef.current){ streamRef.current.getTracks().forEach(t=>t.stop()); streamRef.current=null; }
    setCameraOn(false);
  }

  function scanFrame(){
    const video  = videoRef.current;
    const canvas = canvasRef.current;
    if(!video||!canvas) return;
    if(video.readyState < video.HAVE_ENOUGH_DATA){ rafRef.current=requestAnimationFrame(scanFrame); return; }
    const ctx = canvas.getContext("2d");
    canvas.width=video.videoWidth; canvas.height=video.videoHeight;
    ctx.drawImage(video,0,0,canvas.width,canvas.height);
    const img = ctx.getImageData(0,0,canvas.width,canvas.height);
    if(window.jsQR){
      const code = window.jsQR(img.data,img.width,img.height,{inversionAttempts:"dontInvert"});
      if(code?.data){ stopLive(); handleToken(code.data); return; }
    }
    rafRef.current=requestAnimationFrame(scanFrame);
  }

  /* ── file/capture input handler ── */
  function onFileChange(e){
    const file = e.target.files?.[0]; if(!file) return;
    const img = new Image();
    const url = URL.createObjectURL(file);
    img.onload = ()=>{
      const canvas = canvasRef.current || document.createElement("canvas");
      canvas.width=img.width; canvas.height=img.height;
      const ctx = canvas.getContext("2d");
      ctx.drawImage(img,0,0);
      URL.revokeObjectURL(url);
      const data = ctx.getImageData(0,0,canvas.width,canvas.height);
      if(window.jsQR){
        const code = window.jsQR(data.data,data.width,data.height,{inversionAttempts:"attemptBoth"});
        if(code?.data){ handleToken(code.data); return; }
        // no QR found
        setCamError(lang==="de"?"Kein QR-Code gefunden — erneut versuchen":lang==="en"?"No QR code found — try again":"Koda QR nehat dîtin — dîsa biceribîne");
      }
    };
    img.onerror = ()=>{ URL.revokeObjectURL(url); };
    img.src = url;
    // reset input so same file can be re-selected
    e.target.value="";
  }

  /* ── token handling — Cihaz + GPS + dinamik token doğrulama ── */
  async function handleToken(qrContent){
    setStatus("loading");

    // 1. CİHAZ DOĞRULAMA — QR okutmadan önce cihaz kontrolü
    const deviceId = await getDeviceFingerprint();
    const devCheck = await verifyDevice(student.no, deviceId);
    if(!devCheck.ok && devCheck.reason === "device_mismatch"){
      setErrorMsg(
        lang==="ku" ? "🔒 Ev hesab li cîhazekî din tomar bûye. Ji rêveber re vebêje." :
        lang==="en" ? "🔒 This account is registered on another device." :
                      "🔒 Konto ist auf anderem Gerät registriert."
      );
      hapticError(); setStatus("error"); return;
    }

    // 2. GPS konum al (session GPS gerektiriyorsa)
    let studentLocation = null;
    const sess = getActiveQRSession();
    if(sess && sess.teacherLocation){
      try {
        setErrorMsg(lang==="ku"?"📍 Cih tê girtin...":lang==="en"?"📍 Getting location...":"📍 Standort wird ermittelt...");
        studentLocation = await getCurrentPosition();
      } catch(e){
        // GPS alınamazsa checkinToSession reddedecek
      }
    }
    const result = await checkinToSession(qrContent, student, studentLocation);
    if(result.ok){
      const s = getActiveQRSession();
      setLessonName(s?.lessonName||(lang==="de"?"Unterricht":lang==="en"?"Class":"Ders"));
      setCheckinTime(new Date().toLocaleTimeString());
      hapticSuccess(); setStatus("success");
    } else {
      const m = L.msgs[lang]||L.msgs.ku;
      let msg = m[result.reason]||(lang==="de"?"Fehler":lang==="en"?"Error":"Xelet");
      if(result.reason==="location_too_far" && result.distance){
        msg += ` (${result.distance}m)`;
      }
      setErrorMsg(msg);
      hapticError(); setStatus("error");
    }
  }

  /* ── manual code submit — dinamik QR ile uyumlu ── */
  function submitManual(){
    const code = manualCode.trim().toUpperCase(); if(!code) return;
    const s = getActiveQRSession();
    if(!s){
      setErrorMsg(lang==="de"?"Keine aktive Sitzung":lang==="en"?"No active session":"Rûniştina çalak tune");
      setStatus("no_session"); return;
    }
    // Tam QR içeriği veya son 6 haneli kısa kod
    const dynamicContent = buildDynamicQRContent(s.sessionId);
    if(code===dynamicContent || code===dynamicContent.slice(-6)){
      handleToken(dynamicContent);
    } else {
      setErrorMsg(lang==="de"?"Falscher Code":lang==="en"?"Wrong code — QR may have rotated, try again":"Kod xelet — QR guherîye, dîsa biceribîne");
      setStatus("error");
    }
  }

  /* ────────────────── RENDER ────────────────── */
  return(
    <div style={{position:"fixed",inset:0,background:"#000",zIndex:500,display:"flex",flexDirection:"column"}}>

      {/* ── Header ── */}
      <div style={{background:"rgba(12,35,64,0.97)",padding:"14px 16px",display:"flex",alignItems:"center",gap:12,flexShrink:0}}>
        <button onClick={()=>{stopLive();onClose();}}
          style={{background:"none",border:"none",color:"#fff",fontSize:24,cursor:"pointer",padding:0,lineHeight:1}}>←</button>
        <div style={{flex:1,color:"#fff",fontSize:15,fontWeight:700}}>📷 {L.entry}</div>
        {/* camera / manual tabs */}
        <div style={{display:"flex",gap:4,background:"rgba(255,255,255,0.1)",borderRadius:8,padding:3}}>
          {[{k:"camera",icon:"📷"},{k:"manual",icon:"⌨️"}].map(t=>(
            <button key={t.k} onClick={()=>setTab(t.k)}
              style={{padding:"5px 11px",borderRadius:6,border:"none",
                background:tab===t.k?"#F7D116":"transparent",

              {t.icon}
            </button>
          ))}
        </div>
      </div>

      {/* ── Camera tab ── */}
      {(status==="scanning"||status==="no_session")&&tab==="camera"&&(
        <>
          {/* ── LIVE mode: full-screen video ── */}
          {mode==="live"&&(
            <div style={{flex:1,position:"relative",background:"#000",overflow:"hidden"}}>
              <video ref={videoRef} playsInline muted autoPlay
                style={{position:"absolute",inset:0,width:"100%",height:"100%",objectFit:"cover"}}/>
              <canvas ref={canvasRef} style={{display:"none"}}/>

              {/* Loading spinner until stream starts */}
              {!cameraOn&&(

                  <div style={{width:48,height:48,borderRadius:"50%",border:"3px solid rgba(247,209,22,0.25)",borderTopColor:"#F7D116",animation:"spin 0.8s linear infinite"}}/>

function useOnline(){
  const [online,setOnline]=useState(typeof navigator!=="undefined"?navigator.onLine:true);
  useEffect(()=>{
    const on=()=>{setOnline(true);window.dispatchEvent(new CustomEvent("aat-online"));}
    const off=()=>{setOnline(false);window.dispatchEvent(new CustomEvent("aat-offline"));}
    window.addEventListener("online",on);
    window.addEventListener("offline",off);
    return()=>{window.removeEventListener("online",on);window.removeEventListener("offline",off);}
  },[]);
  return online;
}

function OfflineBanner({online}){
  const [visible,setVisible]=useState(false);
  const [justCame,setJustCame]=useState(false);
  const timerRef=useRef();
  useEffect(()=>{
    if(!online){setVisible(true);setJustCame(false);}
    else if(visible){
      setJustCame(true);
      clearTimeout(timerRef.current);
      timerRef.current=setTimeout(()=>{setVisible(false);setJustCame(false);},2500);

  },[online]);

  return(

/* ─── NOTIFICATION SYSTEM ────────────────────────────────────────────────── */
function useNotifications(){
  const [permission,setPermission]=useState(()=>
    typeof Notification!=="undefined"?Notification.permission:"default"
  );
  
  const requestPermission=useCallback(async()=>{
    if(typeof Notification==="undefined") return "denied";
    if(Notification.permission==="granted") return "granted";
    const result=await Notification.requestPermission();
    setPermission(result);
    return result;
  },[]);
  
  const sendLocalNotification=useCallback((title,body,options={})=>{
    if(typeof Notification==="undefined"||Notification.permission!=="granted") return;
    try{
      const n=new Notification(title,{
        body,icon:"/favicon.ico",badge:"/favicon.ico",
        tag:options.tag||"aat-notif",
        ...options
      });
      if(options.onClick) n.onclick=options.onClick;
    }catch(e){console.warn("Notification error:",e);}
  },[]);
  
  return {permission,requestPermission,sendLocalNotification};
}

      {settingRow("🔔",

        permission==="granted"

      {settingRow("📲",

        lang==="en"?"Add to home screen (offline support)":lang==="de"?"Zum Startbildschirm hinzufügen":
          lang==="ku"?lang==="en"?"Add to home screen (offline support)":lang==="de"?"Zum Startbildschirm hinzufügen":"Li ekrana serê zêde bike":lang==="en"?"Add to home screen (offline support)":"Zum Startbildschirm hinzufügen",
        <span style={{fontSize:18}}>{installing?"⏳":"➕"}</span>,

      {settingRow("⚡",

        `Service Worker: ${swStatus==="registered"

        <span style={{fontSize:11,color:swStatus==="registered"?"var(--green)":"var(--text2)",fontWeight:700}}>

        </span>,

      )}
      
      {/* Legal rows */}
      {onLegal&&settingRow("🔒",
        lang==="en"?"Privacy Policy":lang==="de"?"Datenschutzerklärung":"Siyaseta Nepenîtiyê",
        lang==="en"?"How we handle your data":lang==="de"?"Datenschutz":
          lang==="ku"?lang==="en"?"How your data is protected":lang==="de"?"Datenschutz":"Çawa daneyên we têne parastin":lang==="en"?"How your data is protected":"Datenschutz",
        <span style={{fontSize:13,color:"var(--text2)"}}>›</span>,
        ()=>onLegal("privacy")
      )}
      {onLegal&&settingRow("📋",
        lang==="en"?"Terms of Service":lang==="de"?"Nutzungsbedingungen":"Şertên Bikaranînê",
        lang==="en"?"Usage rules & conditions":lang==="de"?"Nutzungsregeln":"Bikaranîna sepetê",
        <span style={{fontSize:13,color:"var(--text2)"}}>›</span>,
        ()=>onLegal("terms")
      )}
      {onLegal&&settingRow("📝",
        lang==="en"?"Changelog":lang==="de"?"Änderungsprotokoll":"Guhertinên Nû",
        lang==="en"?"What's new in v4.0":lang==="de"?"Neuigkeiten in v4.0":"v4.0 de çi nû ye",
        <span style={{fontSize:13,color:"var(--text2)"}}>›</span>,
        ()=>onLegal("changelog")
      )}
      
      {/* Network + Battery info */}
      {(networkInfo||battery)&&(
        <div style={{marginTop:12,padding:"10px 12px",background:"var(--bg2)",borderRadius:10,
          border:"0.5px solid var(--border)",display:"flex",gap:16,justifyContent:"center",
          flexWrap:"wrap"}}>
          {networkInfo&&networkInfo.type!=="unknown"&&(
            <div style={{textAlign:"center"}}>
              <div style={{fontSize:16}}>{networkInfo.type==="4g"?"📶":networkInfo.type==="3g"?"📶":"📡"}</div>
              <div style={{fontSize:9,color:"var(--text2)",marginTop:2}}>{String(networkInfo.type).toUpperCase()}{networkInfo.downlink?" · "+networkInfo.downlink+"Mb/s":""}</div>
            </div>
          )}
          {battery&&battery.level!==null&&(
            <div style={{textAlign:"center"}}>
              <div style={{fontSize:16}}>{battery.charging?"🔌":battery.level>20?"🔋":"🪫"}</div>
              <div style={{fontSize:9,color:"var(--text2)",marginTop:2}}>{battery.level}%{battery.charging?" ⚡":""}</div>
            </div>
          )}
        </div>
      )}
      
      {/* App Info */}
      <div style={{marginTop:12,padding:"12px",background:"var(--bg2)",borderRadius:12,
        textAlign:"center",border:"0.5px solid var(--border)"}}>
        <div style={{color:"var(--text2)",fontSize:10}}>AKADEMÎYA ARAM TÎGRAN v4.0</div>
        <div style={{color:"var(--text2)",fontSize:9,marginTop:2}}>PWA · Firebase · React 18 · WCAG 2.1 · 2025</div>
      </div>
    </Sheet>
  );

// 8 karakterli güvenli otomatik şifre: 4 harf + 2 rakam + 2 sembol
// Örnek: KpJv37!@ — Firebase Auth minimum gereksinimlerini karşılar
function genAutoPassword() {
  // 8 haneli tamamen rastgele şifre: büyük/küçük harf + rakam + sembol
  const letters = "ABCDEFGHJKLMNPQRSTUVWXYZabcdefghjkmnpqrstuvwxyz";
  const digits  = "23456789";
  const symbols = "!@#$";
  const r = (s) => s[Math.floor(Math.random() * s.length)];
  const chars = [r(letters),r(letters),r(letters),r(letters),r(digits),r(digits),r(symbols),r(symbols)];
  for(let i=chars.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[chars[i],chars[j]]=[chars[j],chars[i]];}
  return chars.join("");
}


// INIT_STUDENTS ve INIT_TEACHERS'daki plain text "1234" şifreleri
// ilk yüklemede hash'lenir, böylece doğrulama tutarlı olur
async function hashInitData(list) {
  const result = [];
  for (const item of list) {
    if (item.pass && item.pass.length !== 64) {
      // 64 karakter değilse plain text — hash'le
      result.push({...item, pass: await hashPassword(item.pass)});
    } else {
      result.push(item);
    }
  }
  return result;
}

/* ─── APP ───────────────────────────────────────────────────────────────── */
function App(){
  const [lang,setLang]=useState(()=>{try{return localStorage.getItem("aat-lang")||"ku";}catch{return "ku";}});
  const [screen,setScreen]=useState("login");
  const [currentUser,setCurrentUser]=useState(null);
  const [students,setStudents]=useState(INIT_STUDENTS);
  const [teachers,setTeachers]=useState(INIT_TEACHERS);
  const [schedule,setSchedule]=useState(INIT_SCHEDULE);
  const [toastMsg,toast]=useToast();
  const t=useT(lang);
  const online=useOnline();
  const [dark,setDark]=useTheme();
  const {permission:notifPerm,requestPermission,sendLocalNotification}=useNotifications();
  const [showSettings,setShowSettings]=useState(false);

  // Demo veri şifrelerini hash'le — sadece Firebase yoksa (demo mod)
  useEffect(()=>{
    const fb = window.__FB;
    if(!fb || !fb.isConfigured()){
      hashInitData(INIT_STUDENTS).then(hashed=>setStudents(hashed));
      hashInitData(INIT_TEACHERS).then(hashed=>setTeachers(hashed));
    }
  },[]);
  
  // Persist language selection
  useEffect(()=>{try{localStorage.setItem("aat-lang",lang);}catch{}}, [lang]);
  
  // Back button (Android hardware back)
  useBackButton(screen, setScreen, setCurrentUser);
  
  // Deep link init
  useDeepLink(screen, setScreen, setCurrentUser);
  
  // Firebase offline persistence (once on mount)
  useEffect(() => { enableFirestoreOffline(); }, []);

  // ── Firebase Realtime Listeners: Firebase'den veri yükle ve dinle ──
  // Auth state değişince listener'ları başlat (giriş yapıldıktan sonra)
  useEffect(() => {
    const fb = window.__FB;
    if (!fb || !fb.isConfigured()) return; // Firebase yoksa local data kullan

    let unsubStudents = null;
    let unsubTeachers = null;
    let unsubSchedule = null;

    // Firestore listener'ları hemen başlat (auth bekleme — kurallar açık)
    unsubStudents = fb.onStudents((data) => {
      // Firebase'den veri gelince INIT demo veriyi tamamen değiştir
      if(Array.isArray(data)) setStudents(data);
    });
    unsubTeachers = fb.onTeachers((data) => {
      if(Array.isArray(data)) setTeachers(data);
    });
    unsubSchedule = fb.onSchedule((data) => {
      if(Array.isArray(data)) setSchedule(data);
    });

    // onAuthStateChanged: sadece auth durumunu izle (listener yönetimi için değil)
    const unsubAuth = fb.onAuthState((authUser) => {
      // Auth durumu değiştiğinde log — listener'ları etkilemez
      console.log("Auth state:", authUser ? authUser.email : "not signed in");
    });

    // Component unmount edildiğinde tüm listener'ları kapat
    return () => {
      unsubAuth && unsubAuth();
      if (unsubStudents) unsubStudents();
      if (unsubTeachers) unsubTeachers();
      if (unsubSchedule) unsubSchedule();
    };
  }, []); // Runs once on mount
  
  // Screen reader live region message
  const [liveMsg, setLiveMsg] = useState("");
  const announce = useCallback((msg) => {
    setLiveMsg(msg);
    setTimeout(() => setLiveMsg(""), 2000);
  }, []);
  
  const [legalModal, setLegalModal] = useState(null); // "privacy"|"terms"|"changelog"|null
  const networkInfo = useNetworkInfo();
  const battery = useBattery();
  const orientation = useOrientation();
  
  // RTL direction management (Kurdî Kurmancî = LTR; future Sorani = RTL)
  useRTL(lang || "ku");
  
  // GDPR consent state
  const [gdprAccepted, setGdprAccepted] = useState(() => {
    try { return !!localStorage.getItem("aat-gdpr-consent"); } catch { return true; }
  });
  
  // Request notification permission on first login
  const handleNotifRequest=useCallback(()=>{
    if(notifPerm==="default") requestPermission();
  },[notifPerm,requestPermission]);

  const onDataChange=useCallback(async (action,payload)=>{
    if(action==="addStudent") {
      // Optimistik güncelleme: Firebase listener gelmeden önce UI'da göster
      setStudents(p=>{
        const exists = p.some(s=>s.id===payload.id);
        return exists ? p : [...p, payload];
      });
      // Firebase'e kaydet — 3 kez dene
      let saved = false;
      for(let attempt = 1; attempt <= 3; attempt++){
        try {
          await fbSave("student", payload);
          saved = true;
          console.log("✅ Student saved to Firebase:", payload.no, "attempt:", attempt);
          break;
        } catch(e) {
          console.error("❌ Student save error attempt "+attempt+":", e.code || e.message);
          if(attempt === 3){
            toast("❌ Firebase: " + (e.code || e.message || "çewtî"), 8000);
          } else {
            await new Promise(r => setTimeout(r, 1000 * attempt));
          }
        }
      }
    }
    if(action==="addTeacher") {
      setTeachers(p=>{
        const exists = p.some(tc=>tc.id===payload.id);
        return exists ? p : [...p, payload];
      });
      for(let attempt=1;attempt<=3;attempt++){
        try {
          await fbSave("teacher", payload);
          console.log("✅ Teacher saved to Firebase:", payload.no, "attempt:", attempt);
          break;
        } catch(e) {
          console.error("❌ Teacher save error attempt "+attempt+":", e.code||e.message);
          if(attempt===3) toast("❌ Firebase: "+(e.code||e.message||"çewtî"),8000);
          else await new Promise(r=>setTimeout(r,1000*attempt));
        }
      }
    }
    if(action==="addSchedule") {
      setSchedule(p=>{
        const exists = p.some(ls=>ls.id===payload.id);
        return exists ? p : [...p, payload];
      });
      try {
        await fbSave("schedule", payload);
        console.log("✅ Schedule saved to Firebase");
      } catch(e) {
        console.error("❌ Schedule save error:", e);
        toast("❌ Firebase: " + (e.message || e.code || "çewtî"));
      }
    }
    if(action==="updateStudent") {
      setStudents(p=>p.map(s=>s.id===payload.id?payload:s));
      for(let i=1;i<=3;i++){
        try { await fbSave("student", payload); break; }
        catch(e){ if(i===3) toast("❌ Nûvekirin: "+(e.code||e.message),5000); else await new Promise(r=>setTimeout(r,800*i)); }
      }
    }
    if(action==="updateTeacher") {
      setTeachers(p=>p.map(tc=>tc.id===payload.id?payload:tc));
      for(let i=1;i<=3;i++){
        try { await fbSave("teacher", payload); break; }
        catch(e){ if(i===3) toast("❌ Nûvekirin: "+(e.code||e.message),5000); else await new Promise(r=>setTimeout(r,800*i)); }
      }
    }
    if(action==="updateSchedule") {
      setSchedule(p=>p.map(ls=>ls.id===payload.id?payload:ls));
      for(let i=1;i<=3;i++){
        try { await fbSave("schedule", payload); break; }
        catch(e){ if(i===3) toast("❌ Nûvekirin: "+(e.code||e.message),5000); else await new Promise(r=>setTimeout(r,800*i)); }
      }
    }
    if(action==="deleteSchedule") {
      const delId   = (typeof payload === "object") ? payload.id     : payload;
      const delFire = (typeof payload === "object") ? payload.fireId : null;
      setSchedule(p=>p.filter(ls=>ls.id!==delId));
      try { await fbDelete("schedule", delFire || null); } catch(e) { console.warn("Firebase delete error:", e); }
    }
    if(action==="deleteStudent") {
      setStudents(p=>p.filter(s=>s.id!==payload.id));
      try { await fbDelete("student", payload?.fireId || null); } catch(e) { console.warn("Firebase delete error:", e); }
    }
    if(action==="deleteTeacher") {
      setTeachers(p=>p.filter(tc=>tc.id!==payload.id));
      try { await fbDelete("teacher", payload?.fireId || null); } catch(e) { console.warn("Firebase delete error:", e); }
    }
  },[toast]);

  function handleLogin(type,user){
    setCurrentUser({...user,type});
    setScreen(type);
    // Welcome notification (delayed to avoid blocking UI)
    setTimeout(()=>{
      try{
        if(typeof Notification!=="undefined"&&Notification.permission==="granted"){
          sendLocalNotification(
            "Akademîya Aram Tîgran",
            (type==="student"?"Xweş hatî: ":"Mamoste: ")+user.name,
            {tag:"aat-login"}
          );
        }
      }catch(e){}
    },500);
  }

  function handleLogout(){
    // Firebase Auth'dan çıkış yap (listener'lar durur)
    const fb = window.__FB;
    if(fb && fb.isConfigured()){
      fb.authSignOut().catch(()=>{});
    }
    setScreen("login");
    setCurrentUser(null);
  }

  return(
    <div style={{maxWidth:430,margin:"0 auto",height:"100%",background:"var(--bg3)",position:"relative",display:"flex",flexDirection:"column",overflow:"hidden",borderRadius:"0"}}>
      <FirebaseBanner/>
      <OfflineBanner online={online}/>
      <PWAInstallBanner/>
      {screen==="login"&&(
        <LoginScreen students={students} teachers={teachers} t={t} lang={lang} setLang={setLang} onLogin={(type,user)=>{handleLogin(type,user);handleNotifRequest();}} onForgot={()=>setScreen("forgot")} dark={dark} onThemeToggle={()=>setDark(d=>!d)}/>
      )}
      {screen==="forgot"&&(
        <ForgotScreen t={t} lang={lang} onBack={()=>setScreen("login")} onSuccess={()=>toast("✓ "+t.forgotSuccess)} students={students} teachers={teachers} onDataChange={onDataChange}/>
      )}
      {screen==="admin"&&currentUser&&(
        <AdminPanel admin={currentUser} students={students} teachers={teachers} schedule={schedule} t={t} lang={lang} toast={toast} onLogout={handleLogout} onDataChange={onDataChange} onSettings={()=>setShowSettings(true)} dark={dark} onThemeToggle={()=>setDark(d=>!d)}/>
      )}
      {screen==="teacher"&&currentUser&&(
        <TeacherPanel teacher={currentUser} students={students} schedule={schedule} t={t} lang={lang} toast={toast} onLogout={handleLogout} onDataChange={onDataChange} onSettings={()=>setShowSettings(true)}/>
      )}
      {screen==="student"&&currentUser&&(
        <StudentPanel student={currentUser} schedule={schedule} t={t} lang={lang} toast={toast} onLogout={handleLogout} onDataChange={onDataChange} onSettings={()=>setShowSettings(true)}/>
      )}
      <Toast msg={toastMsg}/>
      <SettingsSheet open={showSettings} onClose={()=>setShowSettings(false)} dark={dark} onThemeToggle={()=>setDark(d=>!d)} lang={lang} setLang={setLang} t={t} onLegal={(type)=>{setShowSettings(false);setLegalModal(type);}} networkInfo={networkInfo} battery={battery}/>
      {!gdprAccepted && <GDPRBanner lang={lang} onAccept={()=>setGdprAccepted(true)}/>}
      <LiveRegion msg={liveMsg}/>
      {legalModal && <LegalModal type={legalModal} lang={lang} onClose={()=>setLegalModal(null)}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<ErrorBoundary><App/></ErrorBoundary>);
</script>
