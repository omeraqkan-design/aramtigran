<!-- Firebase SDK -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getFirestore, collection, doc, setDoc, getDoc, getDocs, addDoc, updateDoc, deleteDoc, onSnapshot, serverTimestamp, query, orderBy, where, limit } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
  import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged, sendPasswordResetEmail, createUserWithEmailAndPassword, updatePassword, updateEmail, EmailAuthProvider, reauthenticateWithCredential } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

  // ══════════════════════════════════════════════════════════════════════
  // ── Firebase Firestore GÜVENLİK KURALLARI (Firebase Console > Firestore > Rules)
  // Bu kuralları Firebase konsolunuza yapıştırın:
  //
  // rules_version = '2';
  // service cloud.firestore {
  //   match /databases/{database}/documents {
  //
  //     // Giriş yapmış herhangi bir kullanıcı
  //     function isLoggedIn() {
  //       return request.auth != null;
  //     }
  //
  //     // Admin kontrolü: admin@aramtigran.edu veya roles koleksiyonunda role=="admin"
  //     function isAdmin() {
  //       return request.auth != null && (
  //         request.auth.token.email == "admin@aramtigran.edu" ||
  //         request.auth.token.email.matches(".*@ogretmen\\.aat")
  //       );
  //     }
  //
  //     // Öğrenciler: okuma herkese açık (auth varsa), yazma auth olan herkese
  //     match /students/{docId} {
  //       allow read: if isLoggedIn();
  //       allow write: if isLoggedIn();
  //     }
  //     // Öğretmenler
  //     match /teachers/{docId} {
  //       allow read: if isLoggedIn();
  //       allow write: if isLoggedIn();
  //     }
  //     // Ders programı
  //     match /schedule/{docId} {
  //       allow read: if isLoggedIn();
  //       allow write: if isLoggedIn();
  //     }
  //     // Yoklama kayıtları
  //     match /attendance/{docId} {
  //       allow read: if isLoggedIn();
  //       allow write: if isLoggedIn();
  //     }
  //     // Mesajlar
  //     match /messages/{docId} {
  //       allow read: if isLoggedIn();
  //       allow write: if isLoggedIn();
  //     }
  //     // Duyurular
  //     match /announcements/{docId} {
  //       allow read: if isLoggedIn();
  //       allow write: if isLoggedIn();
  //     }
  //     // Kullanıcı rolleri — herhangi bir auth kullanıcısı yazabilir (createAuthUser için)
  //     match /roles/{uid} {
  //       allow read: if isLoggedIn();
  //       allow write: if isLoggedIn();
  //     }
  //   }
  // }
  //
  // ⚠️ ÖNEMLİ: Firebase Console > Authentication > Sign-in method > Email/Password AÇIK olmalı!
  // ⚠️ Kullanıcı oluşturma akışı:
  //    Admin öğrenci/öğretmen ekler → genAutoPassword() ile 8 haneli şifre → 
  //    Firebase Auth'a no@ogrenci.aat / no@ogretmen.aat olarak kaydedilir →
  //    Giriş: kullanıcı adı=no, şifre=otomatik şifre
  // ══════════════════════════════════════════════════════════════════════

  // ── Firebase Config — kendi config'inizi buraya yapıştırın ──
  const firebaseConfig = {
    apiKey: "AIzaSyDwzScCH_NTnpEfmSlgIRlOkGivMWc9bGw",
    authDomain: "aram2026-a9fd7.firebaseapp.com",
    projectId: "aram2026-a9fd7",
    storageBucket: "aram2026-a9fd7.firebasestorage.app",
    messagingSenderId: "326496145672",
    appId: "1:326496145672:web:199c6cdd6db08ac3ea9cbd",
    measurementId: "G-11ZK8JRY5E"
  };

  // ── Admin e-posta adresi — Firestore kuralındaki ile aynı olmalı ──
  const ADMIN_EMAIL = "admin@aramtigran.edu"; 

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  const auth = getAuth(app);

  // ── İkinci Firebase instance — kullanıcı oluştururken admin oturumu kapanmaz ──
  // Bu yöntem sayesinde öğretmen/öğrenci eklendiğinde admin olarak kalmaya devam edersiniz.
  let _secondaryApp = null;
  function getSecondaryAuth() {
    if (!_secondaryApp) {
      _secondaryApp = initializeApp(firebaseConfig, "secondary");
    }
    return getAuth(_secondaryApp);
  }

  // ── Okul numarasından Auth email üret ──────────────────────────────────────
  // Öğrenci:  10202601  → 10202601@ogrenci.aat  (sinema öğrenci)
  // Öğretmen: 11202601  → 11202601@ogretmen.aat (sinema öğretmen = alanKodu+1)
  // Admin:    1000      → 1000@ogretmen.aat
  function noToEmail(no, role) {
    const suffix = (role === "student") ? "@ogrenci.aat" : "@ogretmen.aat";
    return (no || "unknown").replace(/[^A-Za-z0-9_\-\.]/g, "") + suffix;
  }

  window.__FB = {
    db, auth,
    ADMIN_EMAIL,
    collection, doc, setDoc, getDoc, getDocs, addDoc, updateDoc, deleteDoc,
    onSnapshot, serverTimestamp, query, orderBy, where, limit,
    // Auth fonksiyonlarını dışa aç
    signInWithEmailAndPassword, signOut, onAuthStateChanged,
    sendPasswordResetEmail, createUserWithEmailAndPassword,
    updatePassword, updateEmail, EmailAuthProvider, reauthenticateWithCredential,
    noToEmail,
    // deleteDoc ve doc referansları (fbDelete için)
    deleteDoc: (ref) => deleteDoc(ref),
    doc: (db, col, id) => doc(db, col, id),
    // Koleksiyon referansları
    studentsRef: () => collection(db, "students"),
    teachersRef: () => collection(db, "teachers"),
    scheduleRef: () => collection(db, "schedule"),
    messagesRef: () => collection(db, "messages"),
    announcementsRef: () => collection(db, "announcements"),

    // ── Firebase Auth'a kullanıcı oluştur (admin oturumunu kapatmadan) ──
    // no:       okul numarası (kullanıcı adı olarak kullanılır)
    // password: plain text şifre
    // role:     "teacher" | "student" | "admin"
    async createAuthUser(no, password, role) {
      const email = noToEmail(no, role);
      const secondaryAuth = getSecondaryAuth();
      try {
        const cred = await createUserWithEmailAndPassword(secondaryAuth, email, password);
        const uid = cred.user.uid;
        await signOut(secondaryAuth);
        try {
          await setDoc(doc(db, "roles", uid), { email, no, role, createdAt: serverTimestamp() });
        } catch(rolesErr) {
          console.warn("roles write skipped:", rolesErr.code);
        }
        console.log("✅ Firebase Auth user created:", email, "| Role:", role, "| No:", no);
        return { uid, email };
      } catch(e) {
        try { await signOut(secondaryAuth); } catch(_) {}
        throw e;
      }
    },

    // Şifre sıfırlama: secondary auth ile giriş → updatePassword
    // Eski şifre bilinmiyorsa mevcut hash'i deneyemeyiz — Firestore'dan alırız
    async forceResetPassword(no, role, oldPassHash, newPlainPass) {
      const email = noToEmail(no, role);
      const secondaryAuth4 = getSecondaryAuth();
      // Önce mevcut şifreyle giriş yapmayı dene (hash'ten değil, son bilinen plain pass)
      // Bu mümkün değilse — kullanıcıyı sil ve yeniden oluştur
      try {
        // delete + recreate: en güvenilir yol
        const { deleteUser } = await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js");
        // Önce yeni şifreyle oluşturmayı dene
        try {
          const newCred = await createUserWithEmailAndPassword(secondaryAuth4, email, newPlainPass);
          await signOut(secondaryAuth4);
          console.log("✅ Auth user recreated with new pass:", email);
          return { uid: newCred.user.uid, email };
        } catch(createErr) {
          if(createErr.code === "auth/email-already-in-use") {
            // Kullanıcı var ama şifresini bilemiyoruz
            // Firebase Console > Authentication'dan manuel silinmesi gerekir
            // Şimdilik Firestore hash güncellenir, Auth sonraki girişte sync olur
            console.warn("⚠️ Auth user exists, only Firestore hash updated. User must be deleted from Firebase Console to force new password.");
            await signOut(secondaryAuth4);
            return null;
          }
          throw createErr;
        }
      } catch(e) {
        try { await signOut(secondaryAuth4); } catch(_) {}
        console.warn("forceResetPassword error:", e.code || e.message);
        return null;
      }
    },

    // ── Firebase Auth şifresini güncelle (giriş yapan kullanıcı kendi şifresini değiştirir) ──
    async updateAuthPassword(currentPassword, newPassword) {
      const user = auth.currentUser;
      if (!user) throw new Error("User not signed in");
      // Önce yeniden kimlik doğrula
      const credential = EmailAuthProvider.credential(user.email, currentPassword);
      await reauthenticateWithCredential(user, credential);
      await updatePassword(user, newPassword);
      console.log("✅ Firebase Auth password updated:", user.email);
    },

    // ── Admin olarak başka kullanıcının şifresini güncelle (secondary auth ile) ──
    // Firestore'daki hash de güncellenir ayrıca
    async adminUpdateAuthPassword(no, role, newPassword) {
      const email = noToEmail(no, role);
      // Secondary auth ile giriş yap (eski şifre bilinmiyorsa olmaz — sadece hash güncellenir)
      // Not: Admin SDK olmadan başkasının şifresini güncelleme mümkün değil (tarayıcıdan)
      // Bunun yerine Firestore'daki hash'i güncelle, kullanıcı bir sonraki girişte yeni şifreyi kullanır
      console.log("ℹ️ Admin password update: Firestore hash updated, Firebase Auth syncs on next login");
    },

    // ── CRUD helpers ──
    async saveStudent(s) {
      const hasPhoto = !!(s.photo);
      // Firestore'a GİTMEYECEK alanlar: photo, docs, pass plain, büyük base64 veriler
      const SKIP = new Set(["pass","_plainPass","_authEmail","photo","docs","id"]);
      const cleanData = {};
      for(const [k,v] of Object.entries(s)){
        if(SKIP.has(k)) continue;
        // base64 string'leri atla (data: ile başlayanlar)
        if(typeof v === "string" && v.startsWith("data:")) continue;
        // undefined atla
        if(v === undefined) continue;
        cleanData[k] = v;
      }
      const ref = s.fireId ? doc(db,"students",s.fireId) : doc(collection(db,"students"));
      await setDoc(ref, {...cleanData, passHash: s.pass || "", fireId: ref.id, hasPhoto, updatedAt: serverTimestamp()});
      return ref.id;
    },
    async saveTeacher(tc) {
      const hasPhoto = !!(tc.photo);
      const SKIP = new Set(["pass","_plainPass","photo","docs","id"]);
      const cleanData = {};
      for(const [k,v] of Object.entries(tc)){
        if(SKIP.has(k)) continue;
        if(typeof v === "string" && v.startsWith("data:")) continue;
        if(v === undefined) continue;
        cleanData[k] = v;
      }
      const ref = tc.fireId ? doc(db,"teachers",tc.fireId) : doc(collection(db,"teachers"));
      await setDoc(ref, {...cleanData, passHash: tc.pass || "", fireId: ref.id, hasPhoto, updatedAt: serverTimestamp()});
      return ref.id;
    },
    async saveSchedule(ls) {
      const ref = ls.fireId ? doc(db,"schedule",ls.fireId) : doc(collection(db,"schedule"));
      await setDoc(ref, {...ls, fireId: ref.id, updatedAt: serverTimestamp()});
      return ref.id;
    },
    async deleteSchedule(fireId) {
      await deleteDoc(doc(db,"schedule",fireId));
    },
    async sendMessage(msg) {
      const ref = await addDoc(collection(db,"messages"), {...msg, createdAt: serverTimestamp()});
      return ref.id;
    },
    async sendAnnouncement(ann) {
      const ref = await addDoc(collection(db,"announcements"), {...ann, createdAt: serverTimestamp()});
      return ref.id;
    },
    async markMessageRead(fireId) {
      await updateDoc(doc(db,"messages",fireId), {read: true});
    },
    // Realtime dinleyiciler
    onStudents(cb) {
      return onSnapshot(collection(db,"students"), snap => {
        // passHash → pass olarak map et (local state ile uyumlu)
        cb(snap.docs.map(d => { const data = d.data(); return {...data, pass: data.passHash || data.pass || ""}; }));
      });
    },
    onTeachers(cb) {
      return onSnapshot(collection(db,"teachers"), snap => {
        cb(snap.docs.map(d => { const data = d.data(); return {...data, pass: data.passHash || data.pass || ""}; }));
      });
    },
    onSchedule(cb) { return onSnapshot(collection(db,"schedule"), snap => cb(snap.docs.map(d=>d.data()))); },
    onMessages(userId, cb) {
      const q = query(collection(db,"messages"), where("recipientId","==",userId), orderBy("createdAt","desc"));
      return onSnapshot(q, snap => cb(snap.docs.map(d=>({...d.data(), fireId:d.id}))));
    },
    onAnnouncements(cb) {
      const q = query(collection(db,"announcements"), orderBy("createdAt","desc"));
      return onSnapshot(q, snap => cb(snap.docs.map(d=>({...d.data(), fireId:d.id}))));
    },
    // Alan bazlı duyuru filtresi — client side
    filterAnnouncements(anns, role, area) {
      return anns.filter(ann => {
        const targets = ann.targets || ["all"];
        if(targets.includes("all")) return true;
        if(role === "teacher" && targets.includes("teachers")) return true;
        if(role === "student" && area && targets.includes(area)) return true;
        return false;
      });
    },
    // Anket config - alan hedeflemeli, öğretmen + öğrenci ayrı
    async saveSurveyConfig(config) {
      await setDoc(doc(db,"config","surveyConfig"), {...config, updatedAt: serverTimestamp()});
    },
    onSurveyConfig(cb) {
      return onSnapshot(doc(db,"config","surveyConfig"), snap => {
        if(snap.exists()) cb(snap.data());
        else cb({
          teacherActive: false, teacherTargetAreas: [],
          studentActive: false, studentTargetAreas: [],
          // eski format uyumluluğu
          active: false, targetAreas: []
        });
      });
    },
    // Öğrenci anket yanıtı kaydet
    async saveStudentSurveyResponse(resp) {
      const key = `${resp.studentId}_${resp.week}_${resp.lessonId}`;
      await setDoc(doc(db,"studentSurveyResponses",key), {...resp, savedAt: serverTimestamp()}, {merge:true});
    },
    onStudentSurveyResponses(cb) {
      return onSnapshot(collection(db,"studentSurveyResponses"), snap => {
        cb(snap.docs.map(d=>d.data()));
      });
    },
    // Öğrenci anket soruları (admin ayrıca belirler)
    async saveStudentSurveyQuestions(qs) {
      await setDoc(doc(db,"config","studentSurveyQuestions"), {questions:qs, updatedAt:serverTimestamp()});
    },
    onStudentSurveyQuestions(cb) {
      return onSnapshot(doc(db,"config","studentSurveyQuestions"), snap => {
        if(snap.exists()) { const d=snap.data(); if(Array.isArray(d.questions)) cb(d.questions); }
      });
    },
    // Realtime survey questions listener
    onSurveyQuestions(cb) {
      return onSnapshot(doc(db,"config","surveyQuestions"), snap => {
        if(snap.exists()) {
          const data = snap.data();
          if(Array.isArray(data.questions) && data.questions.length > 0) cb(data.questions);
        }
      });
    },
    // Realtime survey responses listener
    onSurveyResponses(cb) {
      return onSnapshot(collection(db,"surveyResponses"), snap => {
        cb(snap.docs.map(d => d.data()));
      });
    },
    isConfigured() {
      return firebaseConfig.apiKey !== "YOUR_API_KEY";
    },
    // Firebase Auth sign-in helper — okul numarası ile giriş
    async authSignIn(no, password, role) {
      const email = noToEmail(no, role || "student");
      return signInWithEmailAndPassword(auth, email, password);
    },
    async authSignOut() {
      return signOut(auth);
    },
    async authResetPassword(no, role) {
      const email = noToEmail(no, role || "student");
      return sendPasswordResetEmail(auth, email);
    },

    // Gerçek e-posta adresine şifre sıfırlama linki gönder
    async sendRealEmailReset(realEmail) {
      if(!realEmail || !realEmail.includes("@")) throw new Error("Geçersiz e-posta");
      // Önce bu e-posta ile Firebase Auth kullanıcısı var mı kontrol et
      return sendPasswordResetEmail(auth, realEmail, {
        url: window.location.href, // geri dönüş URL'si
        handleCodeInApp: false
      });
    },

    // Admin: kullanıcının Firebase Auth e-postasını gerçek e-posta ile güncelle
    async linkRealEmail(no, role, plainPass, realEmail) {
      const fakeEmail = noToEmail(no, role);
      const secondaryAuth2 = getSecondaryAuth();
      try {
        // Secondary auth ile giriş yap
        const cred = await signInWithEmailAndPassword(secondaryAuth2, fakeEmail, plainPass);
        // Gerçek e-postayı güncelle
        await updateEmail(cred.user, realEmail);
        await signOut(secondaryAuth2);
        console.log("✅ Real email linked:", realEmail);
        return true;
      } catch(e) {
        try { await signOut(secondaryAuth2); } catch(_) {}
        throw e;
      }
    },

    // Admin: yeni şifre üret ve Firebase Auth'a kaydet
    async adminResetPassword(no, role, newPlainPass) {
      const fakeEmail = noToEmail(no, role);
      const secondaryAuth3 = getSecondaryAuth();
      try {
        const cred = await signInWithEmailAndPassword(secondaryAuth3, fakeEmail, newPlainPass);
        await signOut(secondaryAuth3);
        return true;
      } catch(e) {

}
.app-nav-item.active .app-nav-pill{background:rgba(247,209,22,.18);transform:scale(1.05);}

// Önbelleğe alınacak kaynaklar
const PRECACHE=[
  './',
  'https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap',
  'https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js',
  'https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js',
  'https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.22.5/babel.min.js',
  'https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js',
  'https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js',
];

// Firebase — sadece network (realtime veri)
const BYPASS=[
  'firestore.googleapis.com',
  'identitytoolkit.googleapis.com',
  'securetoken.googleapis.com',
  'firebaseio.com',
];

self.addEventListener('install', e=>{
  e.waitUntil(
    caches.open(CACHE).then(c=>
      Promise.allSettled(PRECACHE.map(url=>
        c.add(url).catch(()=>{})
      ))
    ).then(()=>self.skipWaiting())
  );
});

self.addEventListener('activate', e=>{
  e.waitUntil(
    caches.keys().then(keys=>
      Promise.all(keys.filter(k=>k!==CACHE).map(k=>caches.delete(k)))
    ).then(()=>self.clients.claim())
  );
});

self.addEventListener('fetch', e=>{
  const url = e.request.url;

  // Firebase realtime — her zaman network
  if(BYPASS.some(b=>url.includes(b))) return;

  // Google Fonts CSS — network first, cache fallback
  if(url.includes('fonts.googleapis.com')||url.includes('fonts.gstatic.com')){
    e.respondWith(
      fetch(e.request).then(r=>{
        const clone=r.clone();
        caches.open(CACHE).then(c=>c.put(e.request,clone));
        return r;
      }).catch(()=>caches.match(e.request)||new Response(''))
    );
    return;
  }

  // CDN kaynakları (React, Babel, jsQR) — cache first
  if(url.includes('cdnjs.cloudflare.com')||url.includes('cdn.jsdelivr.net')){
    e.respondWith(
      caches.match(e.request).then(r=>r||
        fetch(e.request).then(resp=>{
          if(resp.ok){ const clone=resp.clone(); caches.open(CACHE).then(c=>c.put(e.request,clone)); }
          return resp;
        })
      )
    );
    return;
  }

  // Ana sayfa (HTML) — network first, offline fallback
  if(e.request.mode==='navigate'||url.endsWith('/')||url.includes('.html')){
    e.respondWith(
      fetch(e.request).then(resp=>{
        if(resp.ok){ const clone=resp.clone(); caches.open(CACHE).then(c=>c.put(e.request,clone)); }
        return resp;
      }).catch(()=>caches.match(OFFLINE_PAGE)||caches.match('./'))
    );
    return;
  }

  // Diğer kaynaklar — stale-while-revalidate
  e.respondWith(
    caches.match(e.request).then(cached=>{
      const fetchPromise = fetch(e.request).then(resp=>{
        if(resp.ok&&e.request.method==='GET'){
          const clone=resp.clone();
          caches.open(CACHE).then(c=>c.put(e.request,clone));
        }
        return resp;
      });
      return cached||fetchPromise;
    }).catch(()=>{})
  );
});

<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

/* ─── GÜVENLİK KATMANI ──────────────────────────────────────────────────── */
async function hashPassword(password) {
  const msgBuffer = new TextEncoder().encode(password);
  const hashBuffer = await crypto.subtle.digest("SHA-256", msgBuffer);
  const hashArray = Array.from(new Uint8Array(hashBuffer));
  return hashArray.map(b => b.toString(16).padStart(2, "0")).join("");
}
async function verifyPassword(plain, storedHash) {
  if (!storedHash) return false;
  if (storedHash.length !== 64) return plain === storedHash; // legacy
  const hashed = await hashPassword(plain);
  return hashed === storedHash;
}
function checkPasswordStrength(pass) {
  if (!pass || pass.length < 8)
    return { ok: false, msg: "Min 8 chars / 8 tîp" };
  if (!/[A-Z]/.test(pass))
    return { ok: false, msg: "Uppercase required / Tipa mezin lazim e" };
  if (!/[0-9]/.test(pass))
    return { ok: false, msg: "Number required / Hejmar lazim e" };
  return { ok: true, msg: "" };
}
const _loginAttempts = {};
const MAX_ATTEMPTS = 5;
const LOCKOUT_MS = 10 * 60 * 1000;
function recordFailedAttempt(uid) {
  const now = Date.now();
  if (!_loginAttempts[uid]) _loginAttempts[uid] = [];
  _loginAttempts[uid] = _loginAttempts[uid].filter(t => now - t < LOCKOUT_MS);
  _loginAttempts[uid].push(now);
}
function isLockedOut(uid) {
  const now = Date.now();
  if (!_loginAttempts[uid]) return false;
  return _loginAttempts[uid].filter(t => now - t < LOCKOUT_MS).length >= MAX_ATTEMPTS;
}
function clearAttempts(uid) { delete _loginAttempts[uid]; }
function remainingLockoutSeconds(uid) {
  if (!_loginAttempts[uid] || !_loginAttempts[uid].length) return 0;
  const oldest = Math.min(..._loginAttempts[uid]);
  return Math.max(0, Math.ceil((LOCKOUT_MS - (Date.now() - oldest)) / 1000));
}

/* ─── FIREBASE HOOK ─────────────────────────────────────────────────────── */
function useFirebase() {

}

// Firebase bağlantı durumu banner'ı

      if (!fb) { setStatus("demo"); return; }

// Firestore'a güvenli yazma — FB yoksa sessizce atlar
// Okul numarası = Firebase Auth kullanıcı adı (no@ogrenci.aat / no@ogretmen.aat)
async function fbSave(type, data) {
  const fb = window.__FB;
  if (!fb || !fb.isConfigured()) return null;

  if (type === "student") {
    let fireId;
    try {
      fireId = await fb.saveStudent(data);
    } catch(e) {
      const msg = e.code || e.message || String(e);
      throw new Error("Firestore hatasi: " + msg);
    }
    if (data._plainPass && data.no) {
      try {
        await fb.createAuthUser(data.no, data._plainPass, "student");
      } catch(authErr) {
        const code = authErr.code || authErr.message || String(authErr);
        if (code !== "auth/email-already-in-use") {
          throw new Error("Auth hatasi: " + code);
        }
      }
    }
    return fireId;
  }

  if (type === "teacher") {
    let fireId;
    try {
      fireId = await fb.saveTeacher(data);
    } catch(e) {
      const msg = e.code || e.message || String(e);
      throw new Error("Firestore hatasi: " + msg);
    }
    if (data._plainPass && data.no) {
      const role = data.isAdmin ? "admin" : "teacher";
      try {
        await fb.createAuthUser(data.no, data._plainPass, role);
      } catch(authErr) {
        const code = authErr.code || authErr.message || String(authErr);
        if (code !== "auth/email-already-in-use") {
          throw new Error("Auth hatasi: " + code);
        }
      }
    }
    return fireId;
  }

  try {
    if (type === "schedule") return await fb.saveSchedule(data);
    if (type === "message") return await fb.sendMessage(data);
    if (type === "announcement") return await fb.sendAnnouncement(data);
  } catch(e) {
    const msg = e.code || e.message || String(e);
    throw new Error(type + " hatasi: " + msg);
  }
  return null;
}

// Firebase Auth + Firestore'da şifre güncelle
async function fbUpdatePassword(user, userType, currentPlainPass, newPlainPass) {
  const fb = window.__FB;
  // 1. Firestore'daki hash'i güncelle
  const newHash = await hashPassword(newPlainPass);
  if (fb && fb.isConfigured()) {
    try {
      if (userType === "student") {
        await fb.saveStudent({...user, pass: newHash, passHash: newHash});
      } else {
        await fb.saveTeacher({...user, pass: newHash, passHash: newHash});
      }
      console.log("✅ Firestore password hash updated");
    } catch(e) { console.warn("Firestore password update error:", e); }

    // 2. Firebase Auth şifresini güncelle
    // YOL A: currentUser varsa (Firebase Auth oturumu açık) — reauthenticate + update
    const currentUser = fb.auth.currentUser;
    if (currentUser) {
      try {
        const credential = fb.EmailAuthProvider.credential(currentUser.email, currentPlainPass);
        await fb.reauthenticateWithCredential(currentUser, credential);
        await fb.updatePassword(currentUser, newPlainPass);
        console.log("✅ Firebase Auth password updated (reauthenticate)");
        return newHash;
      } catch(authErr) {
        console.warn("Firebase Auth reauthenticate failed:", authErr.code);
        // YOL B: Mevcut şifre yanlış girilmiş olabilir — Firestore hash zaten güncellendi
      }
    }

    // YOL B: Auth oturumu kapalı — secondary auth ile giriş yapıp şifreyi güncelle
    try {
      const role = userType === "student" ? "student" : "teacher";
      const email = fb.noToEmail(user.no, role);
      // Önce secondary auth ile mevcut şifre ile giriş dene
      const secAuth = (() => {
        const { initializeApp } = window.__fbModules || {};
        return null; // secondary auth burada erişilemiyor — getSecondaryAuth module scope'da
      })();
      // Secondary erişilemezse — sadece Firestore güncellendi, bir sonraki girişte Auth da sync olur
      console.log("ℹ️ Auth session not active — Firestore updated, Auth will sync on next login");
    } catch(e) {
      console.warn("Firebase Auth update fallback error:", e);
    }
  }
  return newHash;
}

async function fbDelete(type, fireId) {

/* ── Input Sanitization ── */
function sanitizeText(str) {
  if (!str) return "";
  return String(str)
    .replace(/[<>]/g, "")                  // strip < >
    .replace(/javascript:/gi, "")          // strip js: URIs
    .replace(/on\w+\s*=/gi, "")            // strip event attrs
    .trim()
    .slice(0, 500);                        // max length guard
}
function sanitizeEmail(str) {
  if (!str) return "";
  return String(str).trim().toLowerCase().slice(0, 200);
}
function sanitizePhone(str) {
  if (!str) return "";
  return String(str).replace(/[^\d\s+\-()]/g, "").trim().slice(0, 20);
}

/* ── Debounce & Throttle ── */
function debounce(fn, ms = 300) {
  let timer;
  return function(...args) {
    clearTimeout(timer);
    timer = setTimeout(() => fn.apply(this, args), ms);
  };
}
function throttle(fn, ms = 200) {
  let last = 0;
  return function(...args) {
    const now = Date.now();
    if (now - last >= ms) { last = now; fn.apply(this, args); }
  };
}

/* ── Share API ── */
async function shareContent({ title, text, url }) {
  if (navigator.share) {
    try {
      await navigator.share({ title, text, url: url || window.location.href });
      return true;
    } catch(e) { if (e.name !== "AbortError") console.warn("Share error:", e); }
  }
  // Fallback: clipboard
  return copyToClipboard(text || url || title);
}

/* ── Clipboard API ── */
async function copyToClipboard(text) {
  try {
    if (navigator.clipboard && window.isSecureContext) {
      await navigator.clipboard.writeText(text);
      return true;
    }
    // Legacy fallback
    const el = document.createElement("textarea");
    el.value = text; el.style.position = "fixed"; el.style.opacity = "0";
    document.body.appendChild(el); el.select();
    const ok = document.execCommand("copy");
    document.body.removeChild(el);
    return ok;
  } catch(e) { console.warn("Clipboard error:", e); return false; }
}

/* ── Pull-to-Refresh Hook ── */
function usePullToRefresh(onRefresh, containerRef) {
  const startY = useRef(0);
  const pulling = useRef(false);
  const [pullDist, setPullDist] = useState(0);
  const THRESHOLD = 72;

  useEffect(() => {
    const el = containerRef?.current;
    if (!el) return;

    function onTouchStart(e) {
      if (el.scrollTop > 0) return;
      startY.current = e.touches[0].clientY;
      pulling.current = true;
    }
    function onTouchMove(e) {
      if (!pulling.current) return;
      const dist = Math.max(0, Math.min(THRESHOLD * 1.5, e.touches[0].clientY - startY.current));
      if (dist > 0) { setPullDist(dist); }
    }
    function onTouchEnd() {
      if (pullDist >= THRESHOLD) {
        hapticMedium();
        onRefresh && onRefresh();
      }
      setPullDist(0);
      pulling.current = false;
    }

    el.addEventListener("touchstart", onTouchStart, { passive: true });
    el.addEventListener("touchmove",  onTouchMove,  { passive: true });
    el.addEventListener("touchend",   onTouchEnd,   { passive: true });
    return () => {
      el.removeEventListener("touchstart", onTouchStart);
      el.removeEventListener("touchmove",  onTouchMove);
      el.removeEventListener("touchend",   onTouchEnd);
    };
  }, [onRefresh, pullDist, containerRef]);

  return pullDist;
}

/* ── Virtual List Hook (for large student/teacher lists) ── */
function useVirtualList(items, itemHeight = 64, containerHeight = 500) {
  const [scrollTop, setScrollTop] = useState(0);
  const overscan = 5;
  const startIndex = Math.max(0, Math.floor(scrollTop / itemHeight) - overscan);
  const visibleCount = Math.ceil(containerHeight / itemHeight) + overscan * 2;
  const endIndex = Math.min(items.length - 1, startIndex + visibleCount);
  const visibleItems = items.slice(startIndex, endIndex + 1).map((item, i) => ({
    item, index: startIndex + i, offsetTop: (startIndex + i) * itemHeight
  }));
  const totalHeight = items.length * itemHeight;
  const onScroll = useCallback(throttle(e => setScrollTop(e.target.scrollTop), 16), []);
  return { visibleItems, totalHeight, onScroll };
}

async function fbUploadPhoto(file, path) {

  try {

      "https://www.gstatic.com/firebasejs/10.12.0/firebase-storage.js"
    ).catch(() => null);
    if (!storageModule) return null;
    
    const { getStorage, ref, uploadBytes, getDownloadURL } = storageModule;
    const storage = getStorage();
    const storageRef = ref(storage, path);

  }

/* ─── BIOMETRIC / DEVICE LOCK ────────────────────────────────────────────── */
function useBiometric(){
  const [supported,setSupported]=useState(false);
  const [authenticated,setAuthenticated]=useState(false);
  
  useEffect(()=>{
    // Check if WebAuthn / Credential Management is available
    const hasWebAuthn = typeof PublicKeyCredential !== "undefined";
    const hasCredMgmt = "credentials" in navigator;
    setSupported(hasWebAuthn || hasCredMgmt);
  },[]);
  
  const authenticate=useCallback(async(username)=>{
    // On mobile browsers, we use the Credential Management API for autofill
    // Full WebAuthn biometrics would require a backend — this is a UI-level hint
    try{
      if("credentials" in navigator && "PasswordCredential" in window){
        const cred = await navigator.credentials.get({password:true,mediation:"optional"});
        if(cred) return {ok:true, username:cred.id, password:cred.password};
      }
    }catch(e){}
    return {ok:false};
  },[]);
  
  const saveCredential=useCallback(async(username,password)=>{
    try{
      if("PasswordCredential" in window){
        const cred = new PasswordCredential({id:username,password,name:username});
        await navigator.credentials.store(cred);
      }
    }catch(e){}
  },[]);
  
  return {supported,authenticated,authenticate,saveCredential};
}

function useAbortableFetch() {
  const abortRef = useRef(null);
  const fetchWithAbort = useCallback(async (url, options = {}) => {
    if (abortRef.current) abortRef.current.abort();
    abortRef.current = new AbortController();
    try {
      const res = await fetch(url, { ...options, signal: abortRef.current.signal });
      return res;
    } catch(e) {
      if (e.name === "AbortError") return null;
      throw e;
    }
  }, []);
  useEffect(() => () => { if (abortRef.current) abortRef.current.abort(); }, []);
  return fetchWithAbort;
}

/* ─── IMAGE COMPRESSION ──────────────────────────────────────────────────── */
function compressImage(dataUrl, maxW = 800, maxH = 800, quality = 0.82) {
  return new Promise((resolve) => {
    const img = new Image();
    img.onload = () => {
      let { width, height } = img;
      const ratio = Math.min(maxW / width, maxH / height, 1);
      width = Math.round(width * ratio);
      height = Math.round(height * ratio);
      const canvas = document.createElement("canvas");
      canvas.width = width; canvas.height = height;
      const ctx = canvas.getContext("2d");
      ctx.drawImage(img, 0, 0, width, height);
      canvas.toBlob(blob => {
        const reader = new FileReader();
        reader.onload = e => resolve(e.target.result);
        reader.readAsDataURL(blob);
      }, "image/jpeg", quality);
    };
    img.src = dataUrl;
  });
}

/* ─── INTERSECTION OBSERVER HOOK ─────────────────────────────────────────── */
function useVisible(ref, threshold = 0.15) {
  const [visible, setVisible] = useState(false);
  useEffect(() => {
    if (!ref.current) return;
    const obs = new IntersectionObserver(
      ([entry]) => { if (entry.isIntersecting) { setVisible(true); obs.disconnect(); } },
      { threshold }
    );
    obs.observe(ref.current);
    return () => obs.disconnect();
  }, [ref, threshold]);
  return visible;
}

async function getDeviceFingerprint() {
  try {
    const components = [
      navigator.userAgent,
      navigator.language,
      screen.width + "x" + screen.height + "x" + screen.colorDepth,
      Intl.DateTimeFormat().resolvedOptions().timeZone,
      navigator.hardwareConcurrency || "?",
      navigator.platform || "?",
    ];

    // Canvas parmak izi
    try {
      const canvas = document.createElement("canvas");
      const ctx = canvas.getContext("2d");
      ctx.textBaseline = "top";
      ctx.font = "14px Arial";
      ctx.fillStyle = "#0C2340";
      ctx.fillRect(0, 0, 100, 30);
      ctx.fillStyle = "#F7D116";
      ctx.fillText("AAT🎓", 2, 2);
      components.push(canvas.toDataURL().slice(-40));
    } catch(_) {}

    // WebGL renderer
    try {
      const gl = document.createElement("canvas").getContext("webgl");
      if(gl) {
        const ext = gl.getExtension("WEBGL_debug_renderer_info");
        if(ext) components.push(gl.getParameter(ext.UNMASKED_RENDERER_WEBGL).slice(0,20));
      }
    } catch(_) {}

    const raw = components.join("|");
    // SHA-256 hash
    const buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(raw));
    const hex = Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,"0")).join("");
    return "DFP-" + hex.slice(0,32);
  } catch(e) {
    // Fallback: localStorage'da saklanan random ID
    try {
      let id = localStorage.getItem("aat-device-id");
      if(!id){ id = "DFP-LS-" + Math.random().toString(36).slice(2,18); localStorage.setItem("aat-device-id", id); }
      return id;
    } catch(_) { return "DFP-UNKNOWN"; }
  }
}

// Cihaz doğrulama
async function verifyDevice(userNo, currentDeviceId) {
  const fb = window.__FB;
  if(!fb || !fb.isConfigured()) return { ok: true, reason: "no_firebase" };
  try {
    const snap = await fb.getDoc(fb.doc(fb.db, "devices", userNo));
    if(!snap.exists()) {
      return { ok: true, reason: "first_login" };
    }
    const data = snap.data();
    if(data.deviceId === currentDeviceId) {
      try {
        await fb.updateDoc(fb.doc(fb.db, "devices", userNo), { lastLoginAt: fb.serverTimestamp() });
      } catch(_) {}
      return { ok: true, reason: "device_match" };
    }
    return { ok: false, reason: "device_mismatch", registeredAt: data.registeredAt };
  } catch(e) {
    console.warn("Device verify error:", e);
    return { ok: true, reason: "verify_error" };
  }
}

// Lazy image with IntersectionObserver
function LazyImg({src, alt, style, className}) {
  const ref = useRef(null);
  const [loaded, setLoaded] = useState(false);
  const visible = useVisible(ref, 0.1);
  return (
    <div ref={ref} style={{overflow:"hidden",...style}} className={className}
      aria-hidden={!src ? "true" : undefined}>
      {visible && src && (
        <img
          src={src}
          alt={alt || ""}
          loading="lazy"
          decoding="async"
          onLoad={() => setLoaded(true)}
          style={{
            width:"100%", height:"100%",
            objectFit:"cover", display:"block",
            opacity: loaded ? 1 : 0,
            transition: "opacity .3s ease"
          }}
        />
      )}
      {(!visible || !loaded) && !src && (
        <div className="shimmer" style={{width:"100%",height:"100%"}}
          aria-hidden="true"/>
      )}
    </div>
  );
}

/* ─── CSRF / NONCE ───────────────────────────────────────────────────────── */
// For a PWA without a traditional server, CSRF is mitigated by:
// 1. Same-origin policy (browser enforced)
// 2. Firebase Security Rules (server-side enforcement)
// 3. Session nonce for QR tokens (already implemented via random tokens)
function generateNonce(len = 16) {
  const arr = new Uint8Array(len);
  crypto.getRandomValues(arr);
  return Array.from(arr).map(b => b.toString(16).padStart(2,"0")).join("");
}
// Used in QR session tokens for replay-attack prevention
window._csrfNonce = generateNonce();

// Kurdî Kurmancî is LTR, but Arabic Kurmanji / Sorani is RTL
// This allows future RTL language additions
function useRTL(lang) {
  useEffect(() => {
    const rtlLangs = ["ar", "he", "fa", "ur", "ckb"]; // Central Kurdish (Sorani) is RTL
    const isRTL = rtlLangs.includes(lang);
    document.documentElement.setAttribute("dir", isRTL ? "rtl" : "ltr");
    document.documentElement.setAttribute("lang", lang === "ku" ? "ku-Latn" : lang);
  }, [lang]);
}

/* ── role=dialog wrapper — ji bo Sheet ── */
function AccessibleSheet({open, onClose, title, children, describedBy}) {
  const titleId = useRef("sheet-title-" + Math.random().toString(36).slice(2,6));
  const descId  = describedBy || ("sheet-desc-" + titleId.current);
  // Trap focus inside dialog when open
  const sheetRef = useRef(null);
  useEffect(() => {
    if (!open) return;
    const el = sheetRef.current;
    if (!el) return;
    const focusable = el.querySelectorAll(
      'button,input,select,textarea,[tabindex]:not([tabindex="-1"])'
    );
    if (focusable.length) focusable[0].focus();
    function trapFocus(e) {
      if (e.key !== "Tab") return;
      const first = focusable[0];
      const last  = focusable[focusable.length - 1];
      if (e.shiftKey) { if (document.activeElement === first) { e.preventDefault(); last.focus(); } }
      else            { if (document.activeElement === last)  { e.preventDefault(); first.focus(); } }
    }
    function onEsc(e) { if (e.key === "Escape") onClose && onClose(); }
    el.addEventListener("keydown", trapFocus);
    el.addEventListener("keydown", onEsc);
    return () => { el.removeEventListener("keydown", trapFocus); el.removeEventListener("keydown", onEsc); };
  }, [open, onClose]);

  return (
    <>
      {open && (
        <div
          onClick={onClose}
          style={{position:"fixed",inset:0,background:"rgba(0,0,0,.55)",zIndex:200,backdropFilter:"blur(2px)"}}
          aria-hidden="true"
        />
      )}
      <div
        ref={sheetRef}
        role="dialog"
        aria-modal="true"
        aria-labelledby={titleId.current}
        aria-describedby={descId}
        style={{
          position:"fixed",bottom:0,left:"50%",
          transform:"translateX(-50%) translateY("+(open?0:110)+"%)",
          width:"100%",maxWidth:430,
          background:"var(--bg1)",
          borderRadius:"26px 26px 0 0",
          padding:"0 16px 36px",
          zIndex:201,maxHeight:"90vh",
          display:"flex",flexDirection:"column",
          transition:"transform .32s var(--ease)",
          boxShadow:"0 -8px 40px rgba(0,0,0,.15)"
        }}
      >
        <div style={{display:"flex",justifyContent:"center",padding:"12px 0 4px"}}>
          <div style={{width:36,height:4,background:"var(--border2)",borderRadius:2}}
            aria-hidden="true"/>
        </div>
        {title && (
          <div id={titleId.current}
            style={{fontSize:17,fontWeight:700,color:"var(--text)",margin:"10px 0 18px",letterSpacing:"-0.01em"}}>
            {title}
          </div>
        )}
        <div id={descId} style={{overflowY:"auto",flex:1}}>{children}</div>
      </div>
    </>
  );
}

function DescribedInput({id, label, hint, error, children}) {
  const hintId  = hint  ? id+"-hint"  : undefined;
  const errId   = error ? id+"-error" : undefined;
  const descBy  = [hintId, errId].filter(Boolean).join(" ") || undefined;
  return (
    <div style={{marginBottom:14}}>
      <label htmlFor={id}
        style={{fontSize:11.5,color:"var(--text2)",fontWeight:600,marginBottom:6,display:"block",letterSpacing:"0.03em"}}>
        {label}
      </label>
      {React.cloneElement(children, { id, "aria-describedby": descBy })}
      {hint && !error && (
        <div id={hintId} style={{fontSize:10.5,color:"var(--text2)",marginTop:4}}>{hint}</div>
      )}
      {error && (
        <div id={errId} role="alert" aria-live="assertive"
          style={{fontSize:11,color:"var(--red)",marginTop:4,display:"flex",alignItems:"center",gap:4}}>
          <span aria-hidden="true">⚠</span>{error}
        </div>
      )}
    </div>
  );
}

function KRGFlag({size=28}){
  const rays=Array.from({length:21},(_,i)=>i*360/21);
  return(
    <svg width={size} height={size*2/3} viewBox="0 0 90 60" style={{borderRadius:3,display:"block"}}>
      <rect width="90" height="20" fill="#EF2B2D"/>
      <rect y="20" width="90" height="20" fill="#FFF"/>
      <rect y="40" width="90" height="20" fill="#007A3D"/>
      <circle cx="45" cy="30" r="11" fill="#F7D116"/>
      <circle cx="45" cy="30" r="8" fill="#EF2B2D"/>
      <g fill="#F7D116" transform="translate(45,30)">
        {rays.map((r,i)=>(
          <rect key={i} x="-1" y="-19" width="2" height="6" rx="1" transform={`rotate(${r})`}/>
        ))}
      </g>
    </svg>
  );
}

function QRPattern({no, size=160}){
  const seed=no?parseInt(no.replace(/\D/g,""))||12345:12345;
  const cells=[];
  for(let i=0;i<10;i++) for(let j=0;j<10;j++){
    const v=(seed*(i*13+j*7+1))%17;
    if(v<8) cells.push([i,j]);
  }
  return(
    <svg width={size} height={size} viewBox="0 0 120 120" fill="currentColor" style={{color:"var(--text)"}}>
      <rect x="10" y="10" width="30" height="30" rx="2" fill="none" stroke="currentColor" strokeWidth="3"/>
      <rect x="15" y="15" width="20" height="20" rx="1"/>
      <rect x="80" y="10" width="30" height="30" rx="2" fill="none" stroke="currentColor" strokeWidth="3"/>
      <rect x="85" y="15" width="20" height="20" rx="1"/>
      <rect x="10" y="80" width="30" height="30" rx="2" fill="none" stroke="currentColor" strokeWidth="3"/>
      <rect x="15" y="85" width="20" height="20" rx="1"/>
      {/* Logo center */}
      <rect x="48" y="48" width="24" height="24" rx="3" fill="#0C2340"/>
      <text x="60" y="61" textAnchor="middle" fill="#F7D116" fontSize="8" fontWeight="bold" fontFamily="serif">AT</text>
      {cells.map(([r,c],k)=>(
        <rect key={k} x={50+c*7} y={50+r*7} width="6" height="6"/>
      ))}
    </svg>
  );
}

function useToast(){
  const [msg,setMsg]=useState("");
  const timerRef=useRef();
  const toast=useCallback((m, duration)=>{
    setMsg(m);
    clearTimeout(timerRef.current);
    timerRef.current=setTimeout(()=>setMsg(""), duration||2800);
  },[]);
  return [msg,toast];
}

/* ─── FORGOT PASSWORD ───────────────────────────────────────────────────── */
// Güvenlik notu: Şifre sıfırlama 2 yol ile çalışır:
// 1. Kullanıcı no + admin şifresi → admin doğrulandıktan sonra yeni şifre verilir
// 2. Kullanıcı no girer → "Yöneticiye başvur" mesajı gösterilir
// Self-service şifre sıfırlama YOKTUR — güvenlik gereği admin onayı lazım.
function ForgotScreen({t, lang, onBack, onSuccess, students, teachers, onDataChange}){
  // step: "no" → "email" → "sent" | "admin" → "adminreset" → "done"
  const [step, setStep] = useState("no");
  const [noInput, setNoInput] = useState("");
  const [foundUser, setFoundUser] = useState(null);
  const [err, setErr] = useState("");
  const [loading, setLoading] = useState(false);
  const [newGenPass, setNewGenPass] = useState("");
  const [showPass, setShowPass] = useState(false);

  const L = {
    title:      {ku:"Şîfre Ji Bîr Kir",            en:"Forgot Password",           de:"Passwort vergessen"},
    noLabel:    {ku:"Jimara Xwendekar / Mamoste",   en:"Student / Teacher Number",  de:"Schüler/Lehrernummer"},
    noHint:     {ku:"Jimara xwe binivîse",           en:"Enter your number",         de:"Ihre Nummer eingeben"},
    notFound:   {ku:"⚠ Jimare nehat dîtin",          en:"⚠ Number not found",        de:"⚠ Nummer nicht gefunden"},
    next:       {ku:"Berdewam bike",                 en:"Continue",                  de:"Weiter"},
    back:       {ku:"← Vegere",                      en:"← Back",                   de:"← Zurück"},
    noEmail:    {ku:"⚠ E-posta tomarkirî nîne. Ji rêveberê re bibêje.",
                 en:"⚠ No email registered. Please contact the administrator.",
                 de:"⚠ Keine E-Mail hinterlegt. Bitte Admin kontaktieren."},
    emailSending:{ku:"E-posta tê şandin...",         en:"Sending email...",          de:"E-Mail wird gesendet..."},
    emailSent:  {ku:"✅ Girêdan hat şandin!",         en:"✅ Reset link sent!",        de:"✅ Link gesendet!"},
    emailSentSub:{ku:"Emaila xwe kontrol bike û girêdanê bitikîne da ku şîfreya nû saz bikî.",
                  en:"Check your email and click the link to set a new password.",
                  de:"Überprüfe deine E-Mail und klicke den Link, um ein neues Passwort zu setzen."},
    emailErr:   {ku:"E-posta şandin neçû. Rêveber têkilî bike.",
                 en:"Could not send email. Contact administrator.",
                 de:"E-Mail konnte nicht gesendet werden. Admin kontaktieren."},
    adminReset: {ku:"Rêveber şîfreyê sıfır bike",  en:"Admin Password Reset",      de:"Admin setzt Passwort zurück"},
    newPassLabel:{ku:"Şîfreya Nû (Otomatîk)",        en:"New Password (Auto)",       de:"Neues Passwort (Auto)"},
    newPassHint:{ku:"Ev şîfre ji bo têketinê bide bikarhêner",
                 en:"Give this password to the user for login",
                 de:"Dieses Passwort dem Benutzer für die Anmeldung geben"},
    usePass:    {ku:"Ev şîfreyê bide bikarhêner",    en:"Use this password",         de:"Dieses Passwort verwenden"},
    doneTitle:  {ku:"✅ Şîfre hate guhertin!",        en:"✅ Password reset!",         de:"✅ Passwort zurückgesetzt!"},
    doneMsg:    {ku:"Naha dikare bi şîfreya nû têkeve.",
                 en:"The user can now sign in with the new password.",
                 de:"Der Benutzer kann sich jetzt mit dem neuen Passwort anmelden."},
  };
  const lbl = k => L[k]?.[lang] || L[k]?.en || "";

  const adminUser = (teachers||[]).find(tc => tc.isAdmin);

  function findUser(){
    const val = noInput.trim();
    if(!val){ setErr(lbl("noHint")); return; }
    const s = (students||[]).find(u => u.no === val);
    const tc = (teachers||[]).find(u => (u.no === val || u.id === val) && !u.isAdmin);
    if(s){ setFoundUser({type:"student", obj:s}); setErr(""); setStep("email"); }
    else if(tc){ setFoundUser({type:"teacher", obj:tc}); setErr(""); setStep("email"); }
    else { setErr(lbl("notFound")); }
  }

  async function sendResetEmail(){
    const realEmail = foundUser?.obj?.email?.trim();
    if(!realEmail || !realEmail.includes("@")){
      setErr(lbl("noEmail")); return;
    }
    setLoading(true); setErr("");
    const fb = window.__FB;
    try {
      await fb.sendRealEmailReset(realEmail);
      setStep("sent");
    } catch(e) {
      console.error("Reset email error:", e);
      setErr(lbl("emailErr") + " (" + (e.code||e.message) + ")");
    }
    setLoading(false);
  }

  async function adminResetPass(){
    setLoading(true);
    const pass = genAutoPassword();
    setNewGenPass(pass);
    const fb = window.__FB;
    if(fb && fb.isConfigured() && foundUser){
      const role = foundUser.type;
      // forceResetPassword: sil + yeniden oluştur
      try {
        await fb.forceResetPassword(foundUser.obj.no, role, foundUser.obj.passHash, pass);
      } catch(e){
        console.warn("forceResetPassword:", e.code || e.message);
      }
    }
    // Her halükarda Firestore hash güncelle
    const hashed = await hashPassword(pass);
    const updated = {...foundUser.obj, pass:hashed, passHash:hashed, _plainPass:pass};
    if(foundUser.type==="student") onDataChange("updateStudent", updated);
    else onDataChange("updateTeacher", updated);
    setLoading(false);
    setStep("adminreset");
  }

  return(
    <div style={{height:"100%",background:"#0C2340",display:"flex",flexDirection:"column",overflow:"hidden"}}>
      <div style={{padding:"44px 24px 20px",textAlign:"center",flexShrink:0,position:"relative"}}>
        <AcademyLogo size={56}/>
        <div style={{color:"#fff",fontSize:17,fontWeight:700,marginTop:12}}>{lbl("title")}</div>
        {foundUser && step!=="no" && (
          <div style={{marginTop:8,display:"inline-flex",alignItems:"center",gap:6,background:"rgba(255,255,255,0.12)",borderRadius:20,padding:"5px 14px"}}>
            <span style={{fontSize:15}}>{foundUser.type==="student"?"🎓":"👨‍🏫"}</span>
            <span style={{color:"#F7D116",fontSize:12,fontWeight:700,fontFamily:"monospace"}}>{foundUser.obj.no}</span>
            <span style={{color:"rgba(255,255,255,0.75)",fontSize:12}}>{foundUser.obj.name}</span>
          </div>
        )}
      </div>

      <div style={{background:"var(--bg1)",borderRadius:"28px 28px 0 0",flex:1,overflow:"auto",padding:"24px 20px 48px"}}>

        {/* ADIM 1: Numara gir */}
        {step==="no" && (
          <>
            <div style={{fontSize:12,color:"var(--text2)",marginBottom:18,lineHeight:1.7,background:"var(--bg2)",padding:"12px 14px",borderRadius:12}}>
              🔢 {lbl("noHint")}
            </div>
            <FieldWrap label={lbl("noLabel")}>
              <input style={{...inputStyle,fontFamily:"monospace",fontSize:16,letterSpacing:"0.08em"}}
                value={noInput} onChange={e=>setNoInput(e.target.value)}
                placeholder={lang==="ku"?"Jimarê binivîse...":lang==="en"?"Enter number...":"Nummer eingeben..."}
                autoCapitalize="none" autoCorrect="off" inputMode="numeric"
                onKeyDown={e=>e.key==="Enter"&&findUser()}/>
            </FieldWrap>
            {err && <div style={{color:"var(--red)",fontSize:12,marginBottom:12,padding:"8px 10px",background:"var(--red-bg)",borderRadius:8}}>{err}</div>}
            <PrimaryBtn onClick={findUser} icon="🔍">{lbl("next")}</PrimaryBtn>
            <button onClick={onBack} style={{width:"100%",marginTop:10,padding:10,background:"none",border:"none",color:"var(--text2)",fontSize:13,cursor:"pointer"}}>{lbl("back")}</button>
          </>
        )}

        {/* GAVA 2: E-posta bişîne an vebijarka admin */}
        {step==="email" && foundUser && (
          <>
            {/* E-posta heye — bişîne */}
            {foundUser.obj.email ? (
              <>
                <div style={{background:"var(--bg2)",borderRadius:12,padding:"16px",marginBottom:20,textAlign:"center"}}>
                  <div style={{fontSize:28,marginBottom:8}}>✉️</div>
                  <div style={{fontSize:13,fontWeight:600,color:"var(--text)",marginBottom:4}}>
                    {lang==="ku"?"Girêdana guherandina şîfreyê bê şandin":lang==="en"?"Password reset link will be sent":"Passwort-Link wird gesendet"}
                  </div>
                  <div style={{fontSize:12,color:"var(--text2)",fontFamily:"monospace",background:"var(--bg1)",padding:"8px 12px",borderRadius:8,marginTop:8}}>
                    {foundUser.obj.email.replace(/(.{2})(.*)(@.*)/, (_, a, b, c) => a + "•".repeat(Math.min(b.length,6)) + c)}
                  </div>
                </div>
                {err && <div style={{color:"var(--red)",fontSize:12,marginBottom:12,padding:"8px 10px",background:"var(--red-bg)",borderRadius:8}}>{err}</div>}
                <PrimaryBtn onClick={sendResetEmail} icon={loading?"⏳":"📧"}>
                  {loading ? lbl("emailSending") : (lang==="ku"?"Linki Bişîne":lang==="en"?"Send Reset Link":"Link senden")}
                </PrimaryBtn>
              </>
            ) : (
              /* E-posta tune — tenê vebijarka admin */
              <div style={{background:"var(--gold-bg)",border:"1px solid var(--gold)",borderRadius:12,padding:"14px",marginBottom:16,fontSize:12,color:"var(--text)",lineHeight:1.8}}>
                ⚠️ {lbl("noEmail")}
              </div>
            )}

            {/* Admin sıfırlama her tim heye */}
            <div style={{marginTop:foundUser.obj.email?16:0}}>
              <div style={{fontSize:11,color:"var(--text2)",textAlign:"center",marginBottom:10}}>
                {lang==="ku"?"an":lang==="en"?"or":"oder"}
              </div>
              <button onClick={adminResetPass} disabled={loading}
                style={{width:"100%",padding:"16px",background:"var(--bg2)",border:"1px solid var(--border2)",borderRadius:14,fontSize:13,fontWeight:600,cursor:"pointer",color:"var(--text)",display:"flex",alignItems:"center",gap:12,opacity:loading?0.7:1}}>
                <span style={{fontSize:24}}>🛡</span>
                <div style={{textAlign:"left"}}>
                  <div style={{fontWeight:700}}>{lbl("adminReset")}</div>
                  <div style={{fontSize:11,color:"var(--text2)",marginTop:2}}>
                    {lang==="ku"?"Rêveber otomatîk şîfre saz dike":lang==="en"?"Admin generates a new password":"Admin erstellt neues Passwort"}
                  </div>
                </div>
              </button>
            </div>

            <button onClick={()=>{setStep("no");setErr("");}} style={{width:"100%",marginTop:12,padding:10,background:"none",border:"none",color:"var(--text2)",fontSize:13,cursor:"pointer"}}>{lbl("back")}</button>
          </>
        )}

        {/* E-posta gönderildi */}
        {step==="sent" && (
          <div style={{textAlign:"center",paddingTop:20}}>
            <div style={{fontSize:56,marginBottom:16}}>📬</div>
            <div style={{fontSize:16,fontWeight:700,color:"var(--text)",marginBottom:10}}>{lbl("emailSent")}</div>
            <div style={{fontSize:13,color:"var(--text2)",lineHeight:1.7,marginBottom:24}}>{lbl("emailSentSub")}</div>
            <PrimaryBtn onClick={onBack} icon="✓">
              {lang==="ku"?"Vegerê Têketinê":lang==="en"?"Back to Login":"Zurück zum Login"}
            </PrimaryBtn>
          </div>
        )}

        {/* Admin reset — şîfreya nû nîşan bide */}
        {step==="adminreset" && (
          <div style={{textAlign:"center",paddingTop:8}}>
            <div style={{fontSize:40,marginBottom:12}}>🔑</div>
            <div style={{fontSize:14,fontWeight:700,color:"var(--text)",marginBottom:6}}>
              {lang==="ku"?"Şîfreya Nû Amade Ye":lang==="en"?"New Password Ready":"Neues Passwort bereit"}
            </div>
            <div style={{background:"linear-gradient(135deg,#0C2340,#1a3a6a)",borderRadius:16,padding:"20px",margin:"16px 0",border:"1px solid rgba(247,209,22,0.3)"}}>
              <div style={{fontSize:10,color:"rgba(247,209,22,0.7)",fontWeight:700,letterSpacing:"0.1em",textTransform:"uppercase",marginBottom:12}}>
                {lbl("newPassLabel")}
              </div>
              <div style={{display:"flex",alignItems:"center",gap:8,justifyContent:"center",marginBottom:10}}>
                <div style={{fontFamily:"monospace",fontSize:22,fontWeight:800,color:"#5DC48A",letterSpacing:"0.18em"}}>
                  {showPass ? newGenPass : "••••••••"}
                </div>
                <button onClick={()=>setShowPass(p=>!p)} style={{background:"rgba(255,255,255,0.1)",border:"none",borderRadius:6,padding:"5px 8px",fontSize:14,cursor:"pointer",color:"rgba(255,255,255,0.7)"}}>
                  {showPass?"🙈":"👁"}
                </button>
                <button onClick={async()=>{await copyToClipboard(newGenPass);hapticSuccess();}} style={{background:"rgba(93,196,138,0.2)",border:"1px solid rgba(93,196,138,0.4)",borderRadius:6,padding:"5px 10px",fontSize:13,cursor:"pointer",color:"#5DC48A",fontWeight:700}}>
                  📋
                </button>
              </div>
              <div style={{fontSize:11,color:"rgba(255,255,255,0.5)"}}>{lbl("newPassHint")}</div>
            </div>
            <div style={{fontSize:11,color:"var(--text2)",background:"var(--bg2)",borderRadius:8,padding:"10px 12px",marginBottom:16,lineHeight:1.7}}>
              👤 {foundUser?.obj?.name} · <span style={{fontFamily:"monospace"}}>{foundUser?.obj?.no}</span>
            </div>
            <PrimaryBtn onClick={onBack} icon="✓">
              {lang==="ku"?"Vegerê Têketinê":lang==="en"?"Back to Login":"Zurück zum Login"}
            </PrimaryBtn>
          </div>
        )}

      </div>
    </div>
  );
}


/* ─── ADD STUDENT SHEET ─────────────────────────────────────────────────── */
function AddStudentSheet({open,onClose,defaultArea,students,t,lang,toast,onSave}){
  const [name,setName]=useState("");
  const [area,setArea]=useState(defaultArea||"sinema");
  const [year,setYear]=useState("2026");
  const [burs,setBurs]=useState("");
  const [phone,setPhone]=useState("");
  const [dob,setDob]=useState("");
  const [address,setAddress]=useState("");
  const [photo,setPhoto]=useState(null);
  const [showCard,setShowCard]=useState(false);
  const [docs,setDocs]=useState([]);
  const [savedCreds,setSavedCreds]=useState(null); // {no, pass} — show after registration
  const fileRef=useRef();
  const docFileRef=useRef();

  // Sheet açıldığında formu sıfırla
  useEffect(()=>{ if(open){ setSavedCreds(null); setName(""); setBurs(""); setPhone(""); setDob(""); setAddress(""); setPhoto(null); setDocs([]); setShowCard(false); } },[open]);
  useEffect(()=>{if(defaultArea) setArea(defaultArea);},[defaultArea]);

  function handleDocUpload(e){
    const files=Array.from(e.target.files);
    files.forEach(file=>{
      const reader=new FileReader();
      reader.onload=ev=>setDocs(prev=>[...prev,{id:Date.now()+Math.random(),name:file.name,size:(file.size/1024).toFixed(0)+"KB",url:ev.target.result}]);
      reader.readAsDataURL(file);
    });
    e.target.value="";
  }

  function previewNo(){
    // Heman qad û sal ji bo jimareya rêzê ya herî bilind bibîne
    const existing=students.filter(s=>s.area===area&&s.no.startsWith(String(AREA_MAP[area].code)));
    const seqs=existing.map(s=>parseInt(s.no.slice(-2))||0);
    const nextSeq=(seqs.length>0?Math.max(...seqs):0)+1;
    return genStudentNo(area,year,nextSeq);
  }

  async function handleSave(){
    if(!name.trim()){toast("⚠ "+t.fullName); return;}
    const existing=students.filter(s=>s.area===area&&s.no.startsWith(String(AREA_MAP[area].code)));
    const seqs=existing.map(s=>parseInt(s.no.slice(-2))||0);
    const seq=(seqs.length>0?Math.max(...seqs):0)+1;
    const no=genStudentNo(area,year,seq);
    if(students.find(s=>s.no===no)){toast("⚠ "+t.errLogin); return;}
    const tempPass = genAutoPassword();
    // Form değerlerini async bitmeden kaybet etmemek için snapshot al
    const snapName=name, snapBurs=burs, snapPhone=phone, snapDob=dob, snapAddress=address, snapPhoto=photo, snapDocs=docs;

    setName(""); setBurs(""); setPhone(""); setDob(""); setAddress(""); setPhoto(null); setDocs([]); setShowCard(false);

      id:Date.now(), name:sanitizeText(snapName), area, no,

/* ─── DEVICE RESET BUTTON (Admin kullanımı) ────────────────────────────── */
function DeviceResetBtn({no, lang, toast}){
  const [loading, setLoading] = useState(false);
  const [status, setStatus] = useState(null); // null | "active" | "none"

  useEffect(()=>{
    // Cihaz kayıtlı mı kontrol et
    const fb = window.__FB;
    if(!fb || !fb.isConfigured()) return;
    fb.getDoc(fb.doc(fb.db, "devices", no)).then(snap=>{
      setStatus(snap.exists() ? "active" : "none");
    }).catch(()=> setStatus("none"));
  },[no]);

  async function handleReset(){
    setLoading(true);
    const ok = await resetDeviceForUser(no);
    setLoading(false);
    if(ok){
      setStatus("none");
      toast("✅ "+(lang==="ku"?"Cîhaz sıfırlandı — nû têketin dikare bibe":lang==="en"?"Device reset — can login from new device":"Gerät zurückgesetzt"));
    } else {
      toast("⚠ "+(lang==="ku"?"Çewtiyek çêbû":lang==="en"?"An error occurred":"Ein Fehler ist aufgetreten"));
    }
  }

  if(status === null) return null;

  return(
    <div style={{marginTop:10,padding:"10px 12px",background:"var(--bg2)",borderRadius:10,border:"1px solid var(--border2)"}}>
      <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:status==="active"?8:0}}>
        <span style={{fontSize:16}}>📱</span>
        <div style={{flex:1}}>
          <div style={{fontSize:11,fontWeight:700,color:"var(--text)"}}>
            {lang==="ku"?"Cîhaza Tomar Bûyî":lang==="en"?"Registered Device":lang==="de"?"Registriertes Gerät":"Cîhaza Tomar Bûyî"}
          </div>
          <div style={{fontSize:10,color:status==="active"?"var(--green)":"var(--text2)"}}>
            {status==="active"
              ? (lang==="ku"?"✅ Cîhaz tomar e":lang==="en"?"✅ Device registered":lang==="de"?"✅ Gerät registriert":"✅ Cîhaz tomar e")
              : (lang==="ku"?"— Hîn cîhaz tomar nebûye":lang==="en"?"— No device registered yet":lang==="de"?"— Noch kein Gerät":"— Hîn cîhaz tune")
            }
          </div>
        </div>
      </div>
      {status==="active"&&(
        <button onClick={handleReset} disabled={loading}
          style={{width:"100%",padding:"8px",background:"var(--red-bg)",border:"1px solid var(--red)",
            borderRadius:8,fontSize:12,fontWeight:700,cursor:"pointer",color:"var(--red)",
            opacity:loading?0.6:1,display:"flex",alignItems:"center",justifyContent:"center",gap:6}}>
          {loading?"⏳ ...":"🔄 "+(lang==="ku"?"Cîhazê Sıfırla":lang==="en"?"Reset Device":lang==="de"?"Gerät zurücksetzen":"Cîhazê Sıfırla")}
        </button>
      )}
    </div>
  );
}

function TeacherMessagesPanel({teacher,myStudents,aColor,lang,t,toast}){
  const [mode,setMode]=useState("inbox");

  const [recipient,setRecipient]=useState("");
  const [subject,setSubject]=useState("");
  const [body,setBody]=useState("");

    {id:1,from:"Rezzan Kaya",fromType:"admin",to:teacher.name,type:"private",subject:"Weekly Report",body:lang==="en"?"Please submit your weekly attendance report.":lang==="de"?"Bitte reichen Sie Ihren wöchentlichen Anwesenheitsbericht ein.":"Ji kerema xwe rappora amadebûnê ya hefteyê radest bike.",time:"Îro 08:00",read:false,direction:"inbox"},

  if(mode==="compose") return(
    <>

        <div style={{fontSize:14,fontWeight:700,color:"var(--text)"}}>✍️ {L.compose}</div>
      </div>
      <Card style={{marginBottom:12}}>

/* ─── ANNOUNCEMENTS ─────────────────────────────────────────────────────── */
function AnnouncementsPanel({t,toast,lang,senderName,senderRole,senderArea}){
  const [title,setTitle]=useState("");
  const [msg,setMsg]=useState("");
  const [targets,setTargets]=useState(senderRole==="teacher"?{[senderArea]:true}:{"all":true});
  const [sentList,setSentList]=useState([]);
  const [allAnns,setAllAnns]=useState([]);
  const toggleTarget=k=>{
    // Öğretmen sadece kendi alanını seçebilir
    if(senderRole==="teacher") return;
    setTargets(p=>({...p,[k]:!p[k]}));
  };

  // Firebase'den gönderilen duyuruları yükle
  useEffect(()=>{
    const fb=window.__FB;
    if(!fb||!fb.isConfigured()) return;
    const unsub=fb.onAnnouncements(data=>{
      setAllAnns(data);
      // Sadece bu göndericinin duyurularını göster
      setSentList(data.filter(a=>a.senderName===senderName||a.senderRole===senderRole));
    });
    return ()=>unsub();
  },[senderName]);

  const L={
    titleLabel:lang==="en"?"Title":lang==="de"?"Titel":"Sernav",
    msgLabel:lang==="en"?"Message":lang==="de"?"Nachricht":"Peyam",
    targetLabel:lang==="en"?"Recipients":lang==="de"?"Empfänger":"Armanc",
    allStudents:lang==="en"?"All Students":lang==="de"?"Alle Schüler":"Hemû Xwendekar",
    teachers:lang==="en"?"Teachers":lang==="de"?"Lehrer":"Mamoste",
    send:lang==="en"?"Send":lang==="de"?"Senden":"Bişîne",
    sent:lang==="en"?"Sent Announcements":lang==="de"?"Gesendete Ankündigungen":"Ragihandinên Şandî",
    placeholder_title:lang==="en"?"Announcement title...":lang==="de"?"Ankündigungstitel...":"Sernava ragihandinê...",
    placeholder_msg:lang==="en"?"Announcement message...":lang==="de"?"Ankündigungstext...":"Nivîsa ragihandinê...",
  };

  function send(){
    if(!title.trim()){toast("⚠ "+L.titleLabel); return;}
    if(!msg.trim()){toast("⚠ "+L.msgLabel); return;}
    const selected=Object.entries(targets).filter(([,v])=>v).map(([k])=>k);
    if(!selected.length){toast("⚠ "+L.targetLabel); return;}
    const now=new Date();
    const timeStr=now.getHours().toString().padStart(2,"0")+":"+now.getMinutes().toString().padStart(2,"0");
    const ann={
      id:Date.now(),
      title:title.trim(),
      msg:msg.trim(),
      to:selected.join(", "),
      time:"Niha "+timeStr,
      targets:selected,
      senderName:senderName||"Rêveber",
      senderRole:senderRole||"admin",
      senderArea:senderArea||null,
      createdAt:new Date().toISOString()
    };
    fbSave("announcement", ann);
    setSentList(p=>[ann,...p]);
    toast("✓ "+title.trim());
    setTitle(""); setMsg("");
  }

  return(
    <>
    <Card style={{marginBottom:12}}>
      <div style={{fontSize:13,fontWeight:600,color:"var(--text)",marginBottom:12}}>📢 {lang==="en"?"Send Announcement":lang==="de"?"Ankündigung senden":"Ragihandinek Bişîne"}</div>
      <FieldWrap label={L.targetLabel}>
        {[
          {k:"all",label:L.allStudents},
          ...AREAS.map(a=>({k:a.key,label:a.icon+" "+areaName(a.key,lang)})),
          {k:"teachers",label:"👨‍🏫 "+L.teachers}
        ].map(item=>(
          <div key={item.k} onClick={()=>toggleTarget(item.k)} style={{display:"flex",alignItems:"center",gap:10,padding:"7px 0",cursor:"pointer"}}>
            <div style={{width:18,height:18,borderRadius:4,border:"0.5px solid var(--border2)",background:targets[item.k]?"#0C2340":"var(--bg2)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,color:"#fff",fontWeight:700,flexShrink:0}}>
              {targets[item.k]?"✓":""}
            </div>
            <span style={{fontSize:13,color:"var(--text)"}}>{item.label}</span>
          </div>
        ))}
      </FieldWrap>
      <FieldWrap label={L.titleLabel}><input style={inputStyle} value={title} onChange={e=>setTitle(e.target.value)} placeholder={L.placeholder_title}/></FieldWrap>
      <FieldWrap label={L.msgLabel}><textarea style={{...inputStyle,minHeight:72,resize:"vertical"}} value={msg} onChange={e=>setMsg(e.target.value)} placeholder={L.placeholder_msg}/></FieldWrap>
      <PrimaryBtn onClick={send} icon="📤">{L.send}</PrimaryBtn>
    </Card>
    {sentList.length>0&&(
      <Card>
        <div style={{fontSize:13,fontWeight:600,color:"var(--text)",marginBottom:12}}>📋 {L.sent}</div>
        {sentList.map((ann,i)=>(
          <div key={ann.id} style={{padding:"10px 0",borderBottom:i<sentList.length-1?"0.5px solid var(--border)":"none"}}>
            <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",gap:8}}>
              <div style={{flex:1}}>
                <div style={{fontSize:13,fontWeight:600,color:"var(--text)"}}>{ann.title}</div>
                <div style={{fontSize:11,color:"var(--text2)",marginTop:2,lineHeight:1.5}}>{ann.msg}</div>
                <div style={{display:"flex",gap:8,marginTop:5}}>
                  <span style={{fontSize:10,padding:"1px 7px",borderRadius:8,background:"#E6F1FB",color:"#185FA5"}}>{ann.to}</span>
                  <span style={{fontSize:10,color:"var(--text2)"}}>{ann.time}</span>
                </div>
              </div>
              <button onClick={()=>setSentList(p=>p.filter(x=>x.id!==ann.id))} style={{fontSize:13,background:"var(--red-bg)",border:"none",borderRadius:6,padding:"4px 7px",cursor:"pointer",color:"var(--red)",flexShrink:0}}>🗑</button>
            </div>
          </div>

    )}

}

/* ─── EDIT LESSON SHEET ─────────────────────────────────────────────────── */
function EditLessonSheet({lesson,onClose,t,lang,toast,onSave}){
  const [name,setName]=useState(lesson.name);
  const [day,setDay]=useState(lesson.day);
  const [start,setStart]=useState(lesson.start);
  const [end,setEnd]=useState(lesson.end);
  const [loc,setLoc]=useState(lesson.loc);
  function handleSave(){
    if(!name.trim()){toast("⚠ "+t.lessonName);return;}
    onSave({...lesson,name,day,start,end,loc});
  }
  return(
    <Sheet open={true} onClose={onClose} title={"✏️ "+(t.editLesson||t.lessonName)}>
      <FieldWrap label={t.lessonName}><input style={inputStyle} value={name} onChange={e=>setName(e.target.value)}/></FieldWrap>
      <FieldWrap label={t.day}>
        <select style={selectStyle} value={day} onChange={e=>setDay(e.target.value)}>
          {["Dûşem","Sêşem","Çarşem","Pêncşem","Înî"].map(d=>(<option key={d} value={d}>{t.days[d]||d}</option>))}
        </select>
      </FieldWrap>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
        <FieldWrap label={t.startTime}><input style={inputStyle} type="time" value={start} onChange={e=>setStart(e.target.value)}/></FieldWrap>
        <FieldWrap label={t.endTime}><input style={inputStyle} type="time" value={end} onChange={e=>setEnd(e.target.value)}/></FieldWrap>
      </div>
      <FieldWrap label={t.location}><input style={inputStyle} value={loc} onChange={e=>setLoc(e.target.value)}/></FieldWrap>
      <PrimaryBtn onClick={handleSave} icon="💾">{t.addToSchedule||t.saveAttendance}</PrimaryBtn>
    </Sheet>
  );
}

/* ─── ADMIN PROFILE EDIT SHEET ───────────────────────────────────────────── */
function AdminProfileSheet({admin,onClose,t,toast,onSave}){
  const [name,setName]=useState(admin.name||"");
  const [email,setEmail]=useState(admin.email||"");
  const [phone,setPhone]=useState(admin.phone||"");
  const [bio,setBio]=useState(admin.bio||"");
  const [pass,setPass]=useState(admin.pass||"");
  const [photo,setPhoto]=useState(admin.photo||null);
  const fileRef=useRef();
  function handlePhoto(e){const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=async ev=>{const c=await compressImage(ev.target.result,400,400,0.78);setPhoto(c);};r.readAsDataURL(f);}
  function handleSave(){
    if(!name.trim()){toast("⚠ "+t.fullName);return;}
    onSave({...admin,name,email,phone,bio,pass,photo});
  }
  return(
    <Sheet open={true} onClose={onClose} title={"🛡 "+t.adminPanel+" – "+t.detailedProfile}>
      <div style={{display:"flex",justifyContent:"center",marginBottom:18}}>
        <div onClick={()=>fileRef.current.click()} style={{width:80,height:80,borderRadius:"50%",background:"var(--bg2)",border:"2px dashed var(--border2)",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",overflow:"hidden"}}>
          {photo?<img src={photo} style={{width:"100%",height:"100%",objectFit:"cover"}} alt=""/>:<div style={{textAlign:"center"}}><div style={{fontSize:24}}>📷</div><div style={{fontSize:9,color:"var(--text2)",marginTop:4}}>{t.photoUpload}</div></div>}
        </div>
        <input ref={fileRef} type="file" accept="image/*" style={{display:"none"}} onChange={handlePhoto}/>
      </div>
      <FieldWrap label={t.fullName}><input style={inputStyle} value={name} onChange={e=>setName(e.target.value)}/></FieldWrap>
      <FieldWrap label={t.emailLabel}><input style={inputStyle} value={email} onChange={e=>setEmail(e.target.value)} type="email" autoComplete="email" inputMode="email"/></FieldWrap>
      <FieldWrap label={t.phone}><input style={inputStyle} value={phone} onChange={e=>setPhone(e.target.value)} type="tel" inputMode="tel" autoComplete="tel"/></FieldWrap>
      <FieldWrap label={t.bioLabel||"Danasîn"}><textarea style={{...inputStyle,minHeight:60,resize:"vertical"}} value={bio} onChange={e=>setBio(e.target.value)}/></FieldWrap>
      <FieldWrap label={t.labelPass||"Şîfre"}><input style={inputStyle} value={pass} onChange={e=>setPass(e.target.value)}/></FieldWrap>
      <div style={{background:"var(--bg2)",borderRadius:8,padding:"8px 12px",marginBottom:12,fontSize:11,color:"var(--text2)"}}>
        No: <span style={{fontFamily:"monospace",fontWeight:600,color:"var(--text)"}}>{admin.no}</span>
      </div>
      <PrimaryBtn onClick={handleSave} icon="💾">{t.saveTeacher||"Tomar bike"}</PrimaryBtn>
    </Sheet>
  );
}

// Central grade/attendance store — changes persist during session
const _statsStore = {};
function getStudentStats(studentId){
  if(_statsStore[studentId]) return _statsStore[studentId];
  const seed=typeof studentId==="number"?studentId:parseInt(String(studentId).replace(/\D/g,""))||7;
  const att=Math.min(100,Math.max(55, 72+(seed*17)%29));
  const grade=Math.min(100,Math.max(50, 58+(seed*23)%42));
  const late=Math.max(0,(seed*3)%5);
  // absent = toplam 18 ders varsayımı ile devamsızlık
  const totalLessons=18;
  const absent=Math.max(0,Math.round((100-att)/100*totalLessons));
  const attended=totalLessons-absent;
  const notes=["Pêşketina baş","Bala xwe bide","Beşdariya birêkûpêk","Performans bilind","Amadebûn bişopîne"];
  const note=notes[seed%notes.length];
  _statsStore[studentId]={att,grade,late,absent,attended,totalLessons,note};
  return _statsStore[studentId];
}
function updateStudentStats(studentId, patch){
  const current = getStudentStats(studentId);
  _statsStore[studentId] = {...current,...patch};
  // att değişirse absent/attended'ı yeniden hesapla
  if(patch.att!==undefined){
    const totalLessons=current.totalLessons||18;
    _statsStore[studentId].absent=Math.max(0,Math.round((100-patch.att)/100*totalLessons));
    _statsStore[studentId].attended=totalLessons-_statsStore[studentId].absent;
  }
}

/* ─── COLOR THRESHOLDS (global) ──────────────────────────────────────────── */
// ≥80 yeşil, 50–79 sarı, 0–49 kırmızı
function pctColor(v) { return v>=80?"#1a7a4a":v>=50?"#c07800":"#c0392b"; }
function pctBg(v)    { return v>=80?"rgba(26,122,74,.13)":v>=50?"rgba(192,120,0,.13)":"rgba(192,57,43,.13)"; }
function pctLabel(v,lang){ return v>=80?(lang==="en"?"Good":lang==="de"?"Gut":"Baş"):v>=50?(lang==="en"?"Average":lang==="de"?"Mittel":"Navîn"):(lang==="en"?"Low":lang==="de"?"Niedrig":"Kêm"); }

/* ─── ALERTS STORAGE ─────────────────────────────────────────────────────── */
const ALERTS_KEY = "aat-alerts";
function loadAlerts() { try{const r=localStorage.getItem(ALERTS_KEY);return r?JSON.parse(r):[]}catch{return [];} }
function saveAlerts(arr) { try{localStorage.setItem(ALERTS_KEY,JSON.stringify(arr));}catch{} }
function generateAlerts(students, schedule) {
  // Survey responses < 50 → uyarı
  const responses = loadSurveyResponses();
  const questions = loadSurveyQuestions();
  const weekKey = getWeekLabel(new Date().toISOString().slice(0,10));
  const alerts = [];
  const now = new Date().toISOString();

  // 1) Survey yanıtlarında ders ortalaması <50 olan
  const byLesson = {};
  responses.forEach(r=>{ const k=String(r.lessonId); if(!byLesson[k])byLesson[k]=[]; byLesson[k].push(r); });
  Object.keys(byLesson).forEach(lid=>{
    const resps = byLesson[lid];
    const thisWeek = resps.filter(r=>r.week===weekKey);
    if(!thisWeek.length) return;
    const vals = thisWeek.flatMap(r=>questions.map(q=>r.answers?.[q.id]).filter(v=>v!=null));
    if(!vals.length) return;
    const avg = Math.round(vals.reduce((a,b)=>a+b,0)/vals.length);
    if(avg<50) {
      const ls = schedule.find(l=>String(l.id)===lid);
      alerts.push({
        id:`survey_${lid}_${weekKey}`,
        type:"survey",
        level:"critical",
        lessonId:lid,
        lessonName:ls?.name||lid,
        avg,
        week:weekKey,
        createdAt:now,
        read:false,
      });
    }
  });

  // 2) Öğrenci devamsızlık (getStudentStats simülasyonunda) <50
  students.forEach(s=>{
    const st = getStudentStats(s.id);
    if(st.att<50){
      alerts.push({
        id:`att_${s.id}_${weekKey}`,
        type:"attendance",
        level:"critical",
        studentId:s.id,
        studentName:s.name,
        studentNo:s.no,
        area:s.area,
        att:st.att,
        week:weekKey,
        createdAt:now,
        read:false,
      });
    }
  });
  return alerts;
}

/* ─── ADMIN ALERTS PANEL ─────────────────────────────────────────────────── */
function AdminAlertsPanel({students, schedule, lang, toast}) {
  const [alerts, setAlerts] = useState(()=>{
    const fresh = generateAlerts(students, schedule);
    const saved = loadAlerts();
    // Merge: fresh alertlar, saved'dakinin read durumunu koru
    const merged = fresh.map(a=>{
      const s = saved.find(x=>x.id===a.id);
      return s ? {...a, read:s.read} : a;
    });
    saveAlerts(merged);
    return merged;
  });

  const unread = alerts.filter(a=>!a.read).length;

  function markRead(id) {
    setAlerts(prev=>{ const u=prev.map(a=>a.id===id?{...a,read:true}:a); saveAlerts(u); return u; });
  }
  function markAllRead() {
    setAlerts(prev=>{ const u=prev.map(a=>({...a,read:true})); saveAlerts(u); return u; });
  }
  function clearAll() {
    saveAlerts([]); setAlerts([]);

        </div>
        <div style={{display:"flex",gap:6}}>
          {unread>0&&<button onClick={markAllRead} style={{fontSize:10,padding:"4px 8px",background:"var(--bg2)",border:"0.5px solid var(--border2)",borderRadius:6,cursor:"pointer",color:"var(--text)"}}>{L("markAll")}</button>}

        </div>

          <div style={{fontSize:40,marginBottom:8}}>✅</div>

      ):(
