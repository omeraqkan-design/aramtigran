                    </div>
                    <button onClick={()=>setEditingStudent(s)} style={{padding:"5px 10px",fontSize:11,background:"var(--bg2)",border:"0.5px solid var(--border2)",borderRadius:6,cursor:"pointer",color:"var(--text)",flexShrink:0}}>✏️</button>
                    <button onClick={()=>setDeleteConfirm({type:"student",item:s})} style={{padding:"5px 10px",fontSize:11,background:"var(--red-bg)",border:"0.5px solid var(--red)",borderRadius:6,cursor:"pointer",color:"var(--red)",flexShrink:0}}>🗑</button>
                  </div>
                ))
              }
            </>
          )}
          {tab==="teachers"&&(
            <>
              <PrimaryBtn onClick={()=>setShowAddTeacher(true)} style={{marginBottom:12,background:a.color}} icon="➕">{t.areaCard_teacher}</PrimaryBtn>
              {aTeachers.length===0
                ? <div style={{textAlign:"center",padding:20,color:"var(--text2)",fontSize:13}}>—</div>
                : aTeachers.map(tc=>(
                  <div key={tc.id} style={{display:"flex",alignItems:"center",gap:10,padding:"9px 0",borderBottom:"0.5px solid var(--border)"}}>
                    <Avatar name={tc.name} color={a.color} size={36} photo={tc.photo}/>
                    <div style={{flex:1}}>
                      <div style={{fontSize:13,color:"var(--text)",fontWeight:500}}>{tc.name}</div>
                      <div style={{fontSize:11,color:"var(--text2)",marginTop:1}}>{tc.no}</div>
                      {tc.email&&<div style={{fontSize:10,color:"var(--text2)"}}>{tc.email}</div>}
                      {tc.phone&&<div style={{fontSize:10,color:"var(--text2)"}}>{tc.phone}</div>}
                      {tc.bio&&<div style={{fontSize:10,color:"var(--text2)",fontStyle:"italic"}}>{tc.bio}</div>}
                    </div>
                    <button onClick={()=>setEditingTeacher(tc)} style={{padding:"5px 10px",fontSize:11,background:"var(--bg2)",border:"0.5px solid var(--border2)",borderRadius:6,cursor:"pointer",color:"var(--text)",flexShrink:0}}>✏️</button>
                    <button onClick={()=>setDeleteConfirm({type:"teacher",item:tc})} style={{padding:"5px 10px",fontSize:11,background:"var(--red-bg)",border:"0.5px solid var(--red)",borderRadius:6,cursor:"pointer",color:"var(--red)",flexShrink:0}}>🗑</button>
                  </div>
                ))
              }
            </>
          )}
          {tab==="schedule"&&(
            <>
              <PrimaryBtn onClick={()=>setShowAddLesson(true)} style={{marginBottom:12,background:a.color}} icon="➕">{t.addToSchedule}</PrimaryBtn>
              {aSchedule.length===0
                ? <div style={{textAlign:"center",padding:20,color:"var(--text2)",fontSize:13}}>—</div>
                : aSchedule.map(ls=>(
                  <div key={ls.id} style={{display:"flex",gap:10,marginBottom:8,alignItems:"center"}}>
                    <div style={{fontSize:10,color:"var(--text2)",minWidth:40,paddingTop:9}}>{ls.start}</div>
                    <div style={{flex:1,background:a.bg,borderRadius:8,padding:"9px 11px"}}>
                      <div style={{fontSize:13,fontWeight:600,color:a.text}}>{ls.name}</div>
                      <div style={{fontSize:11,color:a.color,marginTop:2}}>{ls.loc} · {ls.start}–{ls.end}</div>
                      <div style={{fontSize:10,color:a.color+"99",marginTop:1}}>{t.days[ls.day]||ls.day}</div>
                    </div>
                    <button onClick={()=>setDeleteConfirm({type:"lesson",item:ls})} style={{padding:"5px 10px",fontSize:11,background:"var(--red-bg)",border:"0.5px solid var(--red)",borderRadius:6,cursor:"pointer",color:"var(--red)",flexShrink:0}}>🗑</button>
                  </div>
                ))
              }
            </>
          )}
        </div>
      </div>
      <AddStudentSheet open={showAddStudent} onClose={()=>setShowAddStudent(false)} defaultArea={areaKey} students={students} t={t} lang={lang} toast={toast} onSave={(s)=>{onDataChange("addStudent",s);setShowAddStudent(false);}}/>
      <AddTeacherSheet open={showAddTeacher} onClose={()=>setShowAddTeacher(false)} defaultArea={areaKey} teachers={teachers} t={t} lang={lang} toast={toast} onSave={(tc)=>{onDataChange("addTeacher",tc);setShowAddTeacher(false);}}/>
      <AddLessonSheet open={showAddLesson} onClose={()=>setShowAddLesson(false)} defaultArea={areaKey} t={t} lang={lang} toast={toast} onSave={(ls)=>{onDataChange("addSchedule",ls);setShowAddLesson(false);}}/>
      {/* Student detail modal */}
      {selectedStudent&&(
        <>
          <div onClick={()=>setSelectedStudent(null)} style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.7)",zIndex:300}}/>
          <div style={{position:"fixed",bottom:0,left:0,right:0,width:"100%",background:"var(--bg1)",borderRadius:"24px 24px 0 0",zIndex:301,padding:"20px 16px 32px",maxHeight:"80vh",overflowY:"auto"}}>
            <div style={{width:36,height:3,background:"var(--border2)",borderRadius:2,margin:"0 auto 18px"}}/>
            <div style={{marginBottom:20}}><StudentIDCard student={selectedStudent} lang={lang} t={t}/></div>
            <button onClick={()=>{setEditingStudent(selectedStudent);setSelectedStudent(null);}} style={{width:"100%",padding:12,background:a.color,color:"#fff",border:"none",borderRadius:8,fontSize:14,cursor:"pointer",marginBottom:8}}>✏️ {t.edit||"Edit"}</button>
            <button onClick={()=>setSelectedStudent(null)} style={{width:"100%",padding:12,background:"var(--bg2)",border:"none",borderRadius:8,fontSize:14,cursor:"pointer",color:"var(--text)"}}>✕ {t.done}</button>
          </div>
        </>
      )}
      {/* Edit Student Modal */}
      {editingStudent&&(
        <EditStudentSheet student={editingStudent} onClose={()=>setEditingStudent(null)} t={t} lang={lang} toast={toast} onSave={(updated)=>{onDataChange("updateStudent",updated);setEditingStudent(null);toast("✓ "+updated.name);}}/>
      )}
      {/* Edit Teacher Modal */}
      {editingTeacher&&(
        <EditTeacherSheet teacher={editingTeacher} onClose={()=>setEditingTeacher(null)} t={t} lang={lang} toast={toast} onSave={(updated)=>{onDataChange("updateTeacher",updated);setEditingTeacher(null);toast("✓ "+updated.name);}}/>
      )}
      {/* Delete Confirmation Modal */}
      {deleteConfirm&&(
        <>
          <div onClick={()=>setDeleteConfirm(null)} style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.75)",zIndex:500}}/>
          <div style={{position:"fixed",bottom:0,left:0,right:0,width:"100%",background:"var(--bg1)",borderRadius:"24px 24px 0 0",zIndex:501,padding:"24px 20px 36px"}}>
            <div style={{textAlign:"center",marginBottom:20}}>
              <div style={{fontSize:40,marginBottom:12}}>🗑️</div>
              <div style={{fontSize:16,fontWeight:700,color:"var(--text)",marginBottom:8}}>{t.confirmDelete}</div>
              <div style={{fontSize:13,color:"var(--text2)",lineHeight:1.6}}>
                {deleteConfirm.item.name || deleteConfirm.item.name}
              </div>
              <div style={{fontSize:11,color:"var(--red)",marginTop:6}}>{t.confirmDeleteMsg}</div>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
              <button onClick={()=>setDeleteConfirm(null)} style={{padding:13,background:"var(--bg2)",border:"1px solid var(--border2)",borderRadius:12,fontSize:14,fontWeight:600,cursor:"pointer",color:"var(--text)"}}>
                ✕ {t.no}
              </button>
              <button onClick={()=>{
                if(deleteConfirm.type==="student"){
                  onDataChange("deleteStudent",deleteConfirm.item);
                  toast("🗑 "+deleteConfirm.item.name);
                } else if(deleteConfirm.type==="teacher"){
                  onDataChange("deleteTeacher",deleteConfirm.item);
                  toast("🗑 "+deleteConfirm.item.name);
                } else if(deleteConfirm.type==="lesson"){
                  onDataChange("deleteSchedule",deleteConfirm.item);
                  toast("🗑 "+deleteConfirm.item.name);
                }
                setDeleteConfirm(null);
              }} style={{padding:13,background:"var(--red)",border:"none",borderRadius:12,fontSize:14,fontWeight:700,cursor:"pointer",color:"#fff"}}>
                🗑 {t.yes}
              </button>
            </div>
          </div>
        </>
      )}
    </>
  );
}

/* ─── ADMIN MESSAGES PANEL ──────────────────────────────────────────────── */
function AdminMessagesPanel({students,teachers,lang,t,toast,adminName}){
  const [mode,setMode]=useState("inbox"); // inbox | compose
  const [msgType,setMsgType]=useState("private"); // private | bulk
  const [recipient,setRecipient]=useState("");
  const [recipientGroup,setRecipientGroup]=useState("allStudents");
  const [subject,setSubject]=useState("");
  const [body,setBody]=useState("");
  const [messages,setMessages]=useState([
    {id:1,from:"Sistem",fromType:"admin",to:"Dilnoza Yusupova",type:"private",subject:"Bursê Nûkirin",body:"Burseka nû ji bo te hatiye pejirandin.",time:"Îro 09:00",read:false,direction:"inbox"},
    {id:2,from:adminName||"Rêveber",fromType:"admin",to:"Hemû Xwendekar",type:"bulk",subject:"Sînav Bernamesi",body:"Ezmûnên dawiya semesterê di 5ê Hezîranê de dest pê dikin.",time:"Duh 11:30",read:true,direction:"sent"},
  ]);
  const [selectedMsg,setSelectedMsg]=useState(null);
  const [inboxFilter,setInboxFilter]=useState("all"); // all | feedback | messages

  // Firebase realtime — tüm mesajları yükle (admin için)
  useEffect(()=>{
    const fb=window.__FB;
    if(!fb||!fb.isConfigured()) return;
    let unsub=()=>{};
    try {
      unsub = fb.onAllMessages(allMsgs=>{
        // Her mesajın direction'ını belirle
        const processed = allMsgs.map(m=>{
          if(m.isStudentFeedback) return {...m, direction:"inbox"};
          if(m.senderId==="admin" || m.fromType==="admin") return {...m, direction:"sent"};
          return {...m, direction:"inbox"};
        });
        setMessages(prev=>{
          // Sadece Firebase'den gelen, local olmayanları koru
          const localOnly = prev.filter(m=>!m.fireId && m.id && typeof m.id==="number");
          // Merge: Firebase verileri önce, yerel geçici mesajlar da kalsın
          const merged = [...processed];
          localOnly.forEach(lm=>{
            if(!merged.find(fm=>fm.subject===lm.subject&&fm.time===lm.time)) merged.push(lm);
          });
          return merged;
        });
      });
    } catch(e){ /* silent */ }
    return ()=>unsub();
  },[]);

  const allPeople=[
    ...students.map(s=>({id:"s_"+s.id,label:s.name,sub:s.no,type:"student"})),
    ...teachers.filter(tc=>!tc.isAdmin).map(tc=>({id:"t_"+tc.id,label:tc.name,sub:tc.no,type:"teacher"})),
  ];
  const groupOptions=[
    {k:"allStudents",label:lang==="ku"?"Hemû Xwendekar":lang==="en"?"All Students":"Alle Schüler"},
    {k:"allTeachers",label:lang==="ku"?"Hemû Mamoste":lang==="en"?"All Teachers":"Alle Lehrkräfte"},
    {k:"all",label:lang==="ku"?"Hemû":lang==="en"?"Everyone":"Alle"},
    ...AREAS.map(a=>({k:"area_"+a.key,label:a.icon+" "+areaName(a.key,lang)})),
  ];

  const inbox=messages.filter(m=>m.direction==="inbox"||(!m.direction&&m.fromType!=="admin"&&m.senderId!=="admin"));
  const sent=messages.filter(m=>m.direction==="sent"||(m.senderId==="admin"&&m.fromType==="admin"&&!m.isStudentFeedback));
  const feedbackMsgs=inbox.filter(m=>m.isStudentFeedback);
  const regularMsgs=inbox.filter(m=>!m.isStudentFeedback);
  const displayInbox=inboxFilter==="feedback"?feedbackMsgs:inboxFilter==="messages"?regularMsgs:inbox;
  const unreadCount=inbox.filter(m=>!m.read).length;
  const [inboxTab,setInboxTab]=useState("inbox");

  async function sendMsg(){
    if(!subject.trim()||!body.trim()){toast(lang==="en"?"⚠ Title and message required":lang==="de"?"⚠ Titel und Nachricht erforderlich":"⚠ Sernav û peyam lazim e");return;}
    if(msgType==="private"&&!recipient){toast(lang==="en"?"⚠ Select recipient":lang==="de"?"⚠ Empfänger auswählen":"⚠ Wergir hilbijêre");return;}
    const toLabel=msgType==="private"
      ? allPeople.find(p=>p.id===recipient)?.label||recipient
      : groupOptions.find(g=>g.k===recipientGroup)?.label||recipientGroup;
    const now=new Date();
    const timeStr=now.getHours().toString().padStart(2,"0")+":"+now.getMinutes().toString().padStart(2,"0");
    const newMsg={
      id:Date.now(),
      from:adminName||"Rêveber",
      fromType:"admin",
      to:toLabel,
      type:msgType,
      subject:subject.trim(),
      body:body.trim(),
      time:now.toISOString().slice(0,10)+" "+timeStr,
      read:true,
      direction:"sent",
      senderId:"admin",
      // Private: recipientId = "s_ID" or "t_ID"; Bulk: recipientId = group key
      recipientId: msgType==="private" ? recipient : recipientGroup,
      recipientGroup: msgType==="bulk" ? recipientGroup : null,
      isStudentFeedback:false,
    };
    try { await fbSave("message", newMsg); } catch(e){ /* silent */ }
    setMessages(p=>[newMsg,...p]);
    toast("✓ "+(lang==="ku"?"Peyam hate şandin":lang==="en"?"Message sent":"Nachricht gesendet"));
    setSubject("");setBody("");setRecipient("");setMode("inbox");
  }

  const L={
    inbox:lang==="ku"?"Qutiya Girtî":lang==="en"?"Inbox":"Eingang",
    sent:lang==="ku"?"Şandî":lang==="en"?"Sent":"Gesendet",
    compose:lang==="ku"?"Peyamek Nû":lang==="en"?"New Message":"Neue Nachricht",
    private:lang==="ku"?"Taybet":lang==="en"?"Private":"Privat",
    bulk:lang==="ku"?"Girseyî":lang==="en"?"Bulk":"Bulk",
    recipient:lang==="ku"?"Wergir":lang==="en"?"Recipient":"Empfänger",
    group:lang==="ku"?"Koma":lang==="en"?"Group":"Gruppe",
    subject:lang==="ku"?"Sernav":lang==="en"?"Subject":"Betreff",
    message:lang==="ku"?"Peyam":lang==="en"?"Message":"Nachricht",
    send:lang==="ku"?"Bişîne":lang==="en"?"Send":"Senden",
    unread:lang==="ku"?"Nexwandî":lang==="en"?"Unread":"Ungelesen",
  };

  if(selectedMsg) return(
    <>
      <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:12}}>
        <button onClick={()=>setSelectedMsg(null)} style={{padding:"7px 14px",fontSize:12,background:"var(--bg2)",border:"0.5px solid var(--border2)",borderRadius:8,cursor:"pointer",color:"var(--text)",fontWeight:600}}>← {lang==="ku"?"Vegere":lang==="en"?"Back":"Zurück"}</button>
        <div style={{fontSize:13,fontWeight:700,color:"var(--text)",flex:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{selectedMsg.subject}</div>
        <button onClick={async()=>{
          if(!window.confirm(lang==="ku"?"Peyam were jêbirin?":lang==="en"?"Delete this message?":"Nachricht löschen?")) return;
          const fb=window.__FB;
          if(fb&&fb.isConfigured()&&selectedMsg.fireId){
            try{ await fb.deleteMessage(selectedMsg.fireId); }catch(e){ toast("❌ "+(lang==="ku"?"Jêbirin serneket":"Delete failed")); return; }
          }
          setMessages(p=>p.filter(m=>{
            const matchFire = selectedMsg.fireId && m.fireId && m.fireId===selectedMsg.fireId;
            const matchId   = selectedMsg.id   && m.id   && String(m.id)===String(selectedMsg.id);
            return !matchFire && !matchId;
          }));
          setSelectedMsg(null);
          toast(lang==="ku"?"🗑 Peyam hate jêbirin":lang==="en"?"🗑 Message deleted":"🗑 Gelöscht");
        }} style={{padding:"7px 12px",fontSize:12,background:"var(--red-bg,#fde8e8)",border:"0.5px solid #ef4444",borderRadius:8,cursor:"pointer",color:"#ef4444",fontWeight:700,flexShrink:0}}>
          🗑 {lang==="ku"?"Jêbire":lang==="en"?"Delete":"Löschen"}
        </button>
      </div>
      <Card>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:10}}>
          <div>
            <div style={{fontSize:12,fontWeight:700,color:"var(--text)"}}>{selectedMsg.direction==="inbox"?selectedMsg.from:("→ "+selectedMsg.to)}</div>
            <div style={{fontSize:10,color:"var(--text2)",marginTop:2}}>{selectedMsg.time}</div>
          </div>
          <span style={{fontSize:10,padding:"2px 8px",borderRadius:8,background:selectedMsg.type==="bulk"?"#E6F1FB":"#EAF3DE",color:selectedMsg.type==="bulk"?"#185FA5":"#1a7a4a",fontWeight:600}}>{selectedMsg.type==="bulk"?L.bulk:L.private}</span>
        </div>
        <div style={{fontSize:14,color:"var(--text)",lineHeight:1.7,padding:"10px 0",borderTop:"1px solid var(--border)"}}>{selectedMsg.body}</div>
      </Card>
    </>
  );

  if(mode==="compose") return(
    <>
      <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:12}}>
        <button onClick={()=>setMode("inbox")} style={{padding:"7px 14px",fontSize:12,background:"var(--bg2)",border:"0.5px solid var(--border2)",borderRadius:8,cursor:"pointer",color:"var(--text)",fontWeight:600}}>← {lang==="ku"?"Vegere":lang==="en"?"Back":"Zurück"}</button>
        <div style={{fontSize:14,fontWeight:700,color:"var(--text)"}}>✍️ {L.compose}</div>
      </div>
      <Card style={{marginBottom:12}}>
        <div style={{display:"flex",gap:6,marginBottom:14}}>
          {[{k:"private",icon:"👤",label:L.private},{k:"bulk",icon:"📣",label:L.bulk}].map(opt=>(
            <button key={opt.k} onClick={()=>setMsgType(opt.k)} style={{flex:1,padding:"10px 6px",border:`2px solid ${msgType===opt.k?"#0C2340":"var(--border2)"}`,borderRadius:10,background:msgType===opt.k?"#0C2340":"var(--bg2)",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:4}}>
              <span style={{fontSize:20}}>{opt.icon}</span>
              <span style={{fontSize:11,fontWeight:700,color:msgType===opt.k?"#fff":"var(--text)"}}>{opt.label}</span>
            </button>
          ))}
        </div>
        {msgType==="private"?(
          <FieldWrap label={L.recipient}>
            <select style={selectStyle} value={recipient} onChange={e=>setRecipient(e.target.value)}>
              <option value="">{lang==="ku"?"Hilbijêre...":lang==="en"?"Select...":"Select..."}</option>
              <optgroup label={lang==="ku"?"Xwendekar":lang==="en"?"Students":"Studierende"}>
                {students.map(s=><option key={"s_"+s.id} value={"s_"+s.id}>{s.name} · {s.no}</option>)}
              </optgroup>
              <optgroup label={lang==="ku"?"Mamoste":lang==="en"?"Teachers":"Lehrkräfte"}>
                {teachers.filter(tc=>!tc.isAdmin).map(tc=><option key={"t_"+tc.id} value={"t_"+tc.id}>{tc.name} · {tc.no}</option>)}
              </optgroup>
            </select>
          </FieldWrap>
        ):(
          <FieldWrap label={L.group}>
            <select style={selectStyle} value={recipientGroup} onChange={e=>setRecipientGroup(e.target.value)}>
              {groupOptions.map(g=><option key={g.k} value={g.k}>{g.label}</option>)}
            </select>
          </FieldWrap>
        )}
        <FieldWrap label={L.subject}><input style={inputStyle} value={subject} onChange={e=>setSubject(e.target.value)} placeholder="..."/></FieldWrap>
        <FieldWrap label={L.message}><textarea style={{...inputStyle,minHeight:90,resize:"vertical"}} value={body} onChange={e=>setBody(e.target.value)} placeholder="..."/></FieldWrap>
        <PrimaryBtn onClick={sendMsg} icon="📤">{L.send}</PrimaryBtn>
      </Card>
    </>
  );

  return(
    <>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
        <div style={{display:"flex",gap:6}}>
          {[{k:"inbox",label:L.inbox},{k:"sent",label:L.sent}].map(tab=>(
            <button key={tab.k} onClick={()=>setInboxTab(tab.k)} style={{padding:"7px 14px",fontSize:12,border:"none",borderRadius:8,cursor:"pointer",fontWeight:inboxTab===tab.k?700:500,background:inboxTab===tab.k?"#0C2340":"var(--bg2)",color:inboxTab===tab.k?"#fff":"var(--text)"}}>
              {tab.label}{tab.k==="inbox"&&inbox.filter(m=>!m.read).length>0&&<span style={{marginLeft:5,background:"#ef4444",color:"#fff",borderRadius:8,padding:"0 5px",fontSize:10}}>{inbox.filter(m=>!m.read).length}</span>}
            </button>
          ))}
        </div>
        <button onClick={()=>setMode("compose")} style={{padding:"8px 14px",background:"#0C2340",color:"#fff",border:"none",borderRadius:8,fontSize:12,fontWeight:700,cursor:"pointer"}}>✍️ {L.compose}</button>
      </div>
      {/* Feedback filter — shown only in inbox tab */}
      {inboxTab==="inbox"&&(
        <div style={{display:"flex",gap:6,marginBottom:10,overflowX:"auto"}}>
          {[
            {k:"all",label:lang==="ku"?"Hemû":lang==="en"?"All":"Alle",count:inbox.length},
            {k:"feedback",label:lang==="ku"?"💡 Pêşniyar/Gilî":lang==="en"?"💡 Feedback":"💡 Rückmeldung",count:feedbackMsgs.length},
            {k:"messages",label:lang==="ku"?"💬 Peyam":lang==="en"?"💬 Messages":"💬 Nachrichten",count:regularMsgs.length},
          ].map(f=>(
            <button key={f.k} onClick={()=>setInboxFilter(f.k)}
              style={{padding:"5px 10px",borderRadius:20,fontSize:10,fontWeight:inboxFilter===f.k?700:400,flexShrink:0,
                background:inboxFilter===f.k?"#0C2340":"var(--bg2)",
                color:inboxFilter===f.k?"#fff":"var(--text2)",
                border:`1px solid ${inboxFilter===f.k?"#0C2340":"var(--border)"}`,cursor:"pointer"}}>
              {f.label}{f.count>0&&<span style={{marginLeft:4,background:inboxFilter===f.k?"rgba(255,255,255,0.3)":"var(--border2)",borderRadius:8,padding:"0 4px",fontSize:9}}>{f.count}</span>}
            </button>
          ))}
        </div>
      )}
      {(inboxTab==="inbox"?displayInbox:sent).length===0?(
        <Card><div style={{textAlign:"center",padding:24,color:"var(--text2)",fontSize:13}}>
          <div style={{fontSize:36,marginBottom:8}}>💬</div>
          {lang==="ku"?"Peyam tune":lang==="en"?"No messages":"Keine Nachrichten"}
        </div></Card>
      ):(
        <Card>
          {(inboxTab==="inbox"?displayInbox:sent).map((msg,i,arr)=>(
            <div key={msg.id||msg.fireId} onClick={()=>{
              setSelectedMsg(msg);
              setMessages(p=>p.map(m=>(m.id===msg.id||m.fireId===msg.fireId)?{...m,read:true}:m));
              if(msg.fireId && !msg.read){ const fb=window.__FB; if(fb&&fb.isConfigured())fb.markRead(msg.fireId).catch(()=>{}); }
            }}
              style={{display:"flex",alignItems:"flex-start",gap:10,padding:"11px 0",borderBottom:i<arr.length-1?"0.5px solid var(--border)":"none",cursor:"pointer"}}>
              <div style={{width:36,height:36,borderRadius:"50%",
                background:msg.isStudentFeedback?(msg.type==="complaint"?"var(--red-bg)":msg.type==="question"?"#E6F1FB":"var(--green-bg)"):msg.type==="bulk"?"#E6F1FB":"#EAF3DE",
                display:"flex",alignItems:"center",justifyContent:"center",fontSize:16,flexShrink:0}}>
                {msg.isStudentFeedback?(msg.type==="complaint"?"⚠️":msg.type==="question"?"❓":"💡"):msg.type==="bulk"?"📣":"💬"}
              </div>
              <div style={{flex:1,minWidth:0}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",gap:4}}>
                  <div style={{fontSize:12,fontWeight:!msg.read&&inboxTab==="inbox"?700:500,color:"var(--text)",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>
                    {inboxTab==="inbox"?msg.from:("→ "+msg.to)}
                    {msg.isStudentFeedback&&<span style={{marginLeft:5,fontSize:9,padding:"1px 5px",borderRadius:4,background:"rgba(247,209,22,0.2)",color:"#a07800"}}>Feedback</span>}
                  </div>
                  <span style={{fontSize:9,color:"var(--text2)",flexShrink:0}}>{msg.time}</span>
                </div>
                <div style={{fontSize:12,fontWeight:!msg.read&&inboxTab==="inbox"?600:400,color:"var(--text)",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{msg.subject}</div>
                <div style={{fontSize:11,color:"var(--text2)",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{msg.body}</div>
              </div>
              {!msg.read&&inboxTab==="inbox"&&<div style={{width:8,height:8,borderRadius:"50%",background:"#0C2340",flexShrink:0,marginTop:4}}/>}
              <button onClick={async(e)=>{
                e.stopPropagation();
                if(!window.confirm(lang==="ku"?"Peyam were jêbirin?":lang==="en"?"Delete?":"Löschen?")) return;
                const fb=window.__FB;
                if(fb&&fb.isConfigured()&&msg.fireId){
                  try{ await fb.deleteMessage(msg.fireId); }catch(err){ toast("❌ "+(lang==="ku"?"Jêbirin serneket":"Delete failed")); return; }
                }
                setMessages(p=>p.filter(m=>{
                  const matchFire = msg.fireId && m.fireId && m.fireId===msg.fireId;
                  const matchId   = msg.id   && m.id   && String(m.id)===String(msg.id);
                  return !matchFire && !matchId;
                }));
                toast(lang==="ku"?"🗑 Hate jêbirin":lang==="en"?"🗑 Deleted":"🗑 Gelöscht");
              }} style={{padding:"4px 8px",fontSize:11,background:"transparent",border:"0.5px solid #ef4444",borderRadius:6,cursor:"pointer",color:"#ef4444",flexShrink:0,marginLeft:4}}>🗑</button>
            </div>
          ))}
        </Card>
      )}
    </>
  );
}
function TeacherMessagesPanel({teacher,myStudents,aColor,lang,t,toast}){
  const [mode,setMode]=useState("inbox");
  const [msgType,setMsgType]=useState("private");
  const [recipient,setRecipient]=useState("");
  const [subject,setSubject]=useState("");
  const [body,setBody]=useState("");
  const [messages,setMessages]=useState([]);
  const [selectedMsg,setSelectedMsg]=useState(null);
  const [inboxTab,setInboxTab]=useState("inbox");

  // Firebase realtime — bu öğretmene ait mesajlar
  useEffect(()=>{
    const fb=window.__FB;
    if(!fb||!fb.isConfigured()) return;
    let unsub=()=>{};
    const myId="t_"+teacher.id;
    try {
      unsub = fb.onAllMessages(allMsgs=>{
        const myMsgs = allMsgs.map(m=>{
          if((m.senderId==="admin"||m.fromType==="admin")&&m.recipientId===myId)
            return {...m, direction:"inbox"};
          if((m.senderId==="admin"||m.fromType==="admin")&&(m.recipientGroup==="allTeachers"||m.recipientGroup==="all"||m.recipientGroup==="area_"+teacher.area))
            return {...m, direction:"inbox"};
          if(String(m.senderId)===String(teacher.id)||String(m.fromId)===String(teacher.id))
            return {...m, direction:"sent"};
          return null;
        }).filter(Boolean);
        myMsgs.sort((a,b)=>(b.createdAt?.seconds||0)-(a.createdAt?.seconds||0));
        setMessages(myMsgs);
      });
    } catch(e){ /* silent */ }
    return ()=>unsub();
  },[teacher.id, teacher.area]);

  const inbox=messages.filter(m=>m.direction==="inbox");
  const sent=messages.filter(m=>m.direction==="sent");
  const unreadCount=inbox.filter(m=>!m.read).length;

  const L={
    inbox:lang==="ku"?"Qutiya Girtî":lang==="en"?"Inbox":"Eingang",
    sent:lang==="ku"?"Şandî":lang==="en"?"Sent":"Gesendet",
    compose:lang==="ku"?"Peyamek Nû":lang==="en"?"New Message":"Neue Nachricht",
    private:lang==="ku"?"Taybet":lang==="en"?"Private":"Privat",
    bulk:lang==="ku"?"Girseyî (Hemû Xwendekar)":lang==="en"?"Bulk (All Students)":"Alle Schüler",
    subject:lang==="ku"?"Sernav":lang==="en"?"Subject":"Betreff",
    message:lang==="ku"?"Peyam":lang==="en"?"Message":"Nachricht",
    send:lang==="ku"?"Bişîne":lang==="en"?"Send":"Senden",
    allStudents:lang==="ku"?"Hemû Xwendekarên Min":lang==="en"?"All My Students":"Alle meine Schüler",
    noMsgs:lang==="ku"?"Peyam tune":lang==="en"?"No messages":"Keine Nachrichten",
    back:lang==="ku"?"Vegere":lang==="en"?"Back":"Zurück",
    from:lang==="ku"?"Ji":lang==="en"?"From":"Von",
    to:lang==="ku"?"Bo":lang==="en"?"To":"An",
  };

  async function sendMsg(){
    if(!subject.trim()||!body.trim()){toast("⚠ "+L.subject+" & "+L.message);return;}
    if(msgType==="private"&&!recipient){toast(lang==="en"?"⚠ Select recipient":"⚠ Wergir hilbijêre");return;}
    const toLabel=msgType==="private"
      ? myStudents.find(s=>String(s.id)===recipient)?.name||recipient
      : L.allStudents;
    const now=new Date();
    const timeStr=now.getHours().toString().padStart(2,"0")+":"+now.getMinutes().toString().padStart(2,"0");
    const newMsg={
      id:Date.now(),
      from:teacher.name,
      fromType:"teacher",
      fromId:teacher.id,
      to:toLabel,
      type:msgType,
      subject:subject.trim(),
      body:body.trim(),
      time:now.toISOString().slice(0,10)+" "+timeStr,
      read:true,
      direction:"sent",
      senderId:String(teacher.id),
      recipientId:msgType==="private"?"s_"+recipient:null,
      recipientGroup:msgType==="bulk"?("area_"+teacher.area):null,
      area:teacher.area,
      isStudentFeedback:false,
    };
    try { await fbSave("message", newMsg); } catch(e){ /* silent */ }
    setMessages(p=>[newMsg,...p]);
    toast("✓ "+L.send+(msgType==="bulk"?" → "+myStudents.length+" "+(lang==="ku"?"xwendekar":lang==="en"?"students":"Schüler"):""));
    setSubject("");setBody("");setRecipient("");setMode("inbox");
  }

  /* ── Detay görünümü ── */
  if(selectedMsg) return(
    <div style={{paddingBottom:20}}>
      <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:14}}>
        <button onClick={()=>setSelectedMsg(null)}
          style={{padding:"8px 14px",fontSize:12,background:"var(--bg2)",border:"0.5px solid var(--border2)",borderRadius:8,cursor:"pointer",color:"var(--text)",fontWeight:600}}>
          ← {L.back}
        </button>
        <div style={{fontSize:13,fontWeight:700,color:"var(--text)",flex:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{selectedMsg.subject}</div>
      </div>
      <Card>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:12}}>
          <div>
            <div style={{fontSize:11,color:"var(--text2)"}}>{selectedMsg.direction==="inbox"?L.from:L.to}</div>
            <div style={{fontSize:13,fontWeight:700,color:"var(--text)"}}>{selectedMsg.direction==="inbox"?selectedMsg.from:selectedMsg.to}</div>
            <div style={{fontSize:10,color:"var(--text2)",marginTop:3}}>{selectedMsg.time}</div>
          </div>
          <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:4}}>
            <span style={{fontSize:10,padding:"2px 8px",borderRadius:8,
              background:selectedMsg.type==="bulk"?"#E6F1FB":"#EAF3DE",
              color:selectedMsg.type==="bulk"?"#185FA5":"#1a7a4a",fontWeight:600}}>
              {selectedMsg.type==="bulk"?L.bulk:L.private}
            </span>
            {(selectedMsg.senderId==="admin"||selectedMsg.fromType==="admin")&&
              <span style={{fontSize:10,padding:"1px 6px",borderRadius:6,background:"var(--gold-bg)",color:"var(--gold)",fontWeight:600}}>🛡 Admin</span>}
          </div>
        </div>
        <div style={{fontSize:14,color:"var(--text)",lineHeight:1.8,padding:"12px 0",borderTop:"1px solid var(--border)"}}>{selectedMsg.body}</div>
      </Card>
    </div>
  );

  /* ── Compose ── */
  if(mode==="compose") return(
    <div style={{paddingBottom:20}}>
      <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:14}}>
        <button onClick={()=>setMode("inbox")}
          style={{padding:"8px 14px",fontSize:12,background:"var(--bg2)",border:"0.5px solid var(--border2)",borderRadius:8,cursor:"pointer",color:"var(--text)",fontWeight:600}}>
          ← {L.back}
        </button>
        <div style={{fontSize:14,fontWeight:700,color:"var(--text)"}}>✍️ {L.compose}</div>
      </div>
      <Card style={{marginBottom:12}}>
        <div style={{display:"flex",gap:8,marginBottom:14}}>
          {[{k:"private",icon:"👤",label:L.private},{k:"bulk",icon:"📣",label:lang==="ku"?"Hemûyan":lang==="en"?"All":"Alle"}].map(opt=>(
            <button key={opt.k} onClick={()=>setMsgType(opt.k)}
              style={{flex:1,padding:"11px 6px",border:`2px solid ${msgType===opt.k?aColor:"var(--border2)"}`,
                borderRadius:10,background:msgType===opt.k?aColor:"var(--bg2)",cursor:"pointer",
                display:"flex",flexDirection:"column",alignItems:"center",gap:4}}>
              <span style={{fontSize:22}}>{opt.icon}</span>
              <span style={{fontSize:11,fontWeight:700,color:msgType===opt.k?"#fff":"var(--text)"}}>{opt.label}</span>
            </button>
          ))}
        </div>
        {msgType==="private"?(
          <FieldWrap label={lang==="ku"?"Xwendekar":lang==="en"?"Student":"Schüler/in"}>
            <select style={selectStyle} value={recipient} onChange={e=>setRecipient(e.target.value)}>
              <option value="">{lang==="ku"?"Hilbijêre...":lang==="en"?"Select...":"Auswählen..."}</option>
              {myStudents.map(s=><option key={s.id} value={String(s.id)}>{s.name} · {s.no}</option>)}
            </select>
          </FieldWrap>
        ):(
          <div style={{padding:"10px 12px",background:"rgba(91,170,212,0.12)",borderRadius:10,marginBottom:12,
            border:"1px solid rgba(91,170,212,0.3)",fontSize:12,color:aColor,fontWeight:600}}>
            📣 {L.allStudents} ({myStudents.length} {lang==="ku"?"xwendekar":lang==="en"?"students":"Schüler"})
          </div>
        )}
        <FieldWrap label={L.subject}>
          <input style={inputStyle} value={subject} onChange={e=>setSubject(e.target.value)} placeholder={lang==="ku"?"Sernav...":lang==="en"?"Subject...":"Betreff..."}/>
        </FieldWrap>
        <FieldWrap label={L.message}>
          <textarea style={{...inputStyle,minHeight:100,resize:"vertical"}} value={body} onChange={e=>setBody(e.target.value)} placeholder={lang==="ku"?"Peyamê binivîse...":lang==="en"?"Write your message...":"Nachricht schreiben..."}/>
        </FieldWrap>
        <PrimaryBtn onClick={sendMsg} style={{background:aColor}} icon="📤">{L.send}</PrimaryBtn>
      </Card>
    </div>
  );

  /* ── Liste ── */
  return(
    <div style={{paddingBottom:20}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
        <div style={{display:"flex",gap:6}}>
          {[{k:"inbox",label:L.inbox,cnt:unreadCount},{k:"sent",label:L.sent,cnt:0}].map(tb=>(
            <button key={tb.k} onClick={()=>setInboxTab(tb.k)}
              style={{padding:"7px 14px",fontSize:12,border:"none",borderRadius:8,cursor:"pointer",
                fontWeight:inboxTab===tb.k?700:500,
                background:inboxTab===tb.k?aColor:"var(--bg2)",
                color:inboxTab===tb.k?"#fff":"var(--text)",
                position:"relative"}}>
              {tb.label}
              {tb.cnt>0&&<span style={{marginLeft:5,background:"#ef4444",color:"#fff",borderRadius:8,padding:"0 5px",fontSize:10}}>{tb.cnt}</span>}
            </button>
          ))}
        </div>
        <button onClick={()=>setMode("compose")}
          style={{padding:"8px 14px",background:aColor,color:"#fff",border:"none",borderRadius:8,fontSize:12,fontWeight:700,cursor:"pointer"}}>
          ✍️ {L.compose}
        </button>
      </div>
      {(inboxTab==="inbox"?inbox:sent).length===0?(
        <Card>
          <div style={{textAlign:"center",padding:28,color:"var(--text2)",fontSize:13}}>
            <div style={{fontSize:36,marginBottom:8}}>💬</div>
            {L.noMsgs}
          </div>
        </Card>
      ):(
        <Card>
          {(inboxTab==="inbox"?inbox:sent).map((msg,i,arr)=>{
            const isUnread=!msg.read&&inboxTab==="inbox";
            const isAdmin=msg.senderId==="admin"||msg.fromType==="admin";
            return(
              <div key={msg.id||msg.fireId}
                onClick={()=>{
                  setSelectedMsg(msg);
                  setMessages(p=>p.map(m=>(m.id===msg.id||m.fireId===msg.fireId)?{...m,read:true}:m));
                  if(msg.fireId&&!msg.read){const fb=window.__FB;if(fb&&fb.isConfigured())fb.markRead(msg.fireId).catch(()=>{});}
                }}
                style={{display:"flex",alignItems:"flex-start",gap:10,padding:"11px 0",
                  borderBottom:i<arr.length-1?"0.5px solid var(--border)":"none",cursor:"pointer",
                  background:isUnread?"rgba(255,255,255,0.02)":"transparent"}}>
                <div style={{width:38,height:38,borderRadius:"50%",flexShrink:0,
                  background:isAdmin?"#E6F1FB":msg.type==="bulk"?"rgba(91,170,212,0.15)":"var(--green-bg)",
                  display:"flex",alignItems:"center",justifyContent:"center",fontSize:17}}>
                  {isAdmin?"🛡":msg.type==="bulk"?"📣":"💬"}
                </div>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",gap:4,marginBottom:2}}>
                    <div style={{fontSize:12,fontWeight:isUnread?700:500,color:"var(--text)",
                      overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>
                      {inboxTab==="inbox"?(msg.from||(isAdmin?"Admin":"?")):("→ "+msg.to)}
                    </div>
                    <span style={{fontSize:9,color:"var(--text2)",flexShrink:0}}>{msg.time?.slice(-5)||""}</span>
                  </div>
                  <div style={{fontSize:12,fontWeight:isUnread?600:400,color:"var(--text)",
                    overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",marginBottom:1}}>{msg.subject}</div>
                  <div style={{fontSize:11,color:"var(--text2)",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{msg.body}</div>
                </div>
                {isUnread&&<div style={{width:8,height:8,borderRadius:"50%",background:aColor,flexShrink:0,marginTop:5}}/>}
              </div>
            );
          })}
        </Card>
      )}
    </div>
  );
}


/* ─── ANNOUNCEMENTS ─────────────────────────────────────────────────────── */
function AnnouncementsPanel({t,toast,lang,senderName,senderRole,senderArea}){
  const [title,setTitle]=useState("");
  const [msg,setMsg]=useState("");
  const [targets,setTargets]=useState(senderRole==="teacher"?{[senderArea]:true}:{"all":true});
  const [sentList,setSentList]=useState([]);
  const [allAnns,setAllAnns]=useState([]);

  const toggleTarget=k=>{
    if(senderRole==="teacher") return; // öğretmen kendi alanını değiştiremez
    if(k==="all"){
      setTargets({"all":true});
    } else {
      setTargets(p=>{
        const next={...p,[k]:!p[k]};
        delete next.all;
        const anySelected=Object.values(next).some(v=>v);
        return anySelected?next:{"all":true};
      });
    }
  };

  useEffect(()=>{
    const fb=window.__FB;
    if(!fb||!fb.isConfigured()) return;
    const unsub=fb.onAnnouncements(data=>{
      setAllAnns(data);
      setSentList(data.filter(a=>a.senderName===senderName));
    });
    return ()=>unsub();
  },[senderName]);

  const L={
    titleLabel:lang==="en"?"Title":lang==="de"?"Titel":"Sernav",
    msgLabel:lang==="en"?"Message":lang==="de"?"Nachricht":"Peyam",
    targetLabel:lang==="en"?"Recipients":lang==="de"?"Empfänger":"Armanc",
    allStudents:lang==="en"?"All Students":lang==="de"?"Alle Schüler":"Hemû Xwendekar",
    teachers:lang==="en"?"Teachers":lang==="de"?"Lehrer":"Mamoste",
    send:lang==="en"?"Send":lang==="de"?"Senden":"Bişîne",
    sent:lang==="en"?"Sent Announcements":lang==="de"?"Gesendete Ankündigungen":"Ragihandinên Şandî",
    placeholder_title:lang==="en"?"Announcement title...":lang==="de"?"Ankündigungstitel...":"Sernava ragihandinê...",
    placeholder_msg:lang==="en"?"Announcement message...":lang==="de"?"Ankündigungstext...":"Nivîsa ragihandinê...",
  };

  function send(){
    if(!title.trim()){toast("⚠ "+L.titleLabel); return;}
    if(!msg.trim()){toast("⚠ "+L.msgLabel); return;}
    const selected=Object.entries(targets).filter(([,v])=>v).map(([k])=>k);
    if(!selected.length){toast("⚠ "+L.targetLabel); return;}
    const now=new Date();
    const timeStr=now.getHours().toString().padStart(2,"0")+":"+now.getMinutes().toString().padStart(2,"0");
    const ann={
      id:Date.now(),
      title:title.trim(),
      msg:msg.trim(),
      to:senderRole==="teacher"?areaName(senderArea,lang):selected.map(k=>k==="all"?L.allStudents:k==="teachers"?L.teachers:areaName(k,lang)).join(", "),
      time:timeStr,
      targets:selected,
      senderName:senderName||"Rêveber",
      senderRole:senderRole||"admin",
      senderArea:senderArea||null,
      createdAt:new Date().toISOString()
    };
    fbSave("announcement", ann);
    setSentList(p=>[ann,...p]);
    toast("✓ "+title.trim());
    setTitle(""); setMsg("");
  }

  return(
    <>
    <Card style={{marginBottom:12}}>
      <div style={{fontSize:13,fontWeight:600,color:"var(--text)",marginBottom:12}}>📢 {lang==="en"?"Send Announcement":lang==="de"?"Ankündigung senden":"Ragihandinek Bişîne"}</div>

      {/* Öğretmen: kendi alanı kilitli göster */}
      {senderRole==="teacher"?(
        <div style={{marginBottom:14}}>
          <div style={{fontSize:11,fontWeight:700,color:"var(--text2)",textTransform:"uppercase",letterSpacing:"0.07em",marginBottom:8}}>{L.targetLabel}</div>
          <div style={{display:"flex",alignItems:"center",gap:10,padding:"10px 12px",background:"var(--bg2)",borderRadius:10,border:"1.5px solid var(--border2)"}}>
            <div style={{width:18,height:18,borderRadius:4,background:"var(--navy)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,color:"#F7D116",fontWeight:700,flexShrink:0}}>✓</div>
            <span style={{fontSize:13,color:"var(--text)",fontWeight:600}}>{AREA_MAP[senderArea]?.icon} {areaName(senderArea,lang)}</span>
            <span style={{marginLeft:"auto",fontSize:10,color:"var(--text2)",padding:"2px 8px",borderRadius:6,background:"var(--bg1)"}}>🔒 {lang==="ku"?"Kilkkirî":lang==="en"?"Locked":"Gesperrt"}</span>
          </div>
        </div>
      ):(
        <FieldWrap label={L.targetLabel}>
          {[
            {k:"all",label:"🌍 "+L.allStudents},
            ...AREAS.map(a=>({k:a.key,label:a.icon+" "+areaName(a.key,lang)})),
            {k:"teachers",label:"👨‍🏫 "+L.teachers}
          ].map(item=>(
            <div key={item.k} onClick={()=>toggleTarget(item.k)} style={{display:"flex",alignItems:"center",gap:10,padding:"7px 0",cursor:"pointer"}}>
              <div style={{width:18,height:18,borderRadius:4,border:"0.5px solid var(--border2)",
                background:targets[item.k]?"var(--navy)":"var(--bg2)",
                display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,color:"#F7D116",fontWeight:700,flexShrink:0}}>
                {targets[item.k]?"✓":""}
              </div>
              <span style={{fontSize:13,color:"var(--text)"}}>{item.label}</span>
            </div>
          ))}
        </FieldWrap>
      )}

      <FieldWrap label={L.titleLabel}><input style={inputStyle} value={title} onChange={e=>setTitle(e.target.value)} placeholder={L.placeholder_title}/></FieldWrap>
      <FieldWrap label={L.msgLabel}><textarea style={{...inputStyle,minHeight:72,resize:"vertical"}} value={msg} onChange={e=>setMsg(e.target.value)} placeholder={L.placeholder_msg}/></FieldWrap>
      <PrimaryBtn onClick={send} icon="📤">{L.send}</PrimaryBtn>
    </Card>
    {sentList.length>0&&(
      <Card>
        <div style={{fontSize:13,fontWeight:600,color:"var(--text)",marginBottom:12}}>📋 {L.sent}</div>
        {sentList.map((ann,i)=>(

                <div style={{display:"flex",gap:8,marginTop:5}}>
                  <span style={{fontSize:10,padding:"1px 7px",borderRadius:8,background:"rgba(91,170,212,0.15)",color:"#185FA5"}}>{ann.to}</span>
                  <span style={{fontSize:10,color:"var(--text2)"}}>{ann.time}</span>
                </div>

                setSentList(p=>p.filter(x=>x.id!==ann.id));

              }} style={{fontSize:13,background:"var(--red-bg)",border:"none",borderRadius:6,padding:"4px 7px",cursor:"pointer",color:"var(--red)",flexShrink:0}}>🗑</button>
            </div>
          </div>
        ))}
      </Card>
    )}
    </>
  );
}

/* ─── EDIT LESSON SHEET ─────────────────────────────────────────────────── */
function EditLessonSheet({lesson,onClose,t,lang,toast,onSave}){
  const [name,setName]=useState(lesson.name);
  const [day,setDay]=useState(lesson.day);
  const [start,setStart]=useState(lesson.start);
  const [end,setEnd]=useState(lesson.end);
  const [loc,setLoc]=useState(lesson.loc);
  function handleSave(){
    if(!name.trim()){toast("⚠ "+t.lessonName);return;}
    onSave({...lesson,name,day,start,end,loc});
  }
  return(
    <Sheet open={true} onClose={onClose} title={"✏️ "+(t.editLesson||t.lessonName)}>
      <FieldWrap label={t.lessonName}><input style={inputStyle} value={name} onChange={e=>setName(e.target.value)}/></FieldWrap>
      <FieldWrap label={t.day}>
        <select style={selectStyle} value={day} onChange={e=>setDay(e.target.value)}>
          {["Dûşem","Sêşem","Çarşem","Pêncşem","Înî","Şemî","Yekşem"].map(d=>(<option key={d} value={d}>{t.days[d]||d}</option>))}
        </select>
      </FieldWrap>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
        <FieldWrap label={t.startTime}><input style={inputStyle} type="time" value={start} onChange={e=>setStart(e.target.value)}/></FieldWrap>
        <FieldWrap label={t.endTime}><input style={inputStyle} type="time" value={end} onChange={e=>setEnd(e.target.value)}/></FieldWrap>
      </div>
      <FieldWrap label={t.location}><input style={inputStyle} value={loc} onChange={e=>setLoc(e.target.value)}/></FieldWrap>
      <PrimaryBtn onClick={handleSave} icon="💾">{t.addToSchedule||t.saveAttendance}</PrimaryBtn>
    </Sheet>
  );
}

/* ─── ADMIN PROFILE EDIT SHEET ───────────────────────────────────────────── */
function AdminProfileSheet({admin,onClose,t,lang,toast,onSave}){
  const [name,setName]=useState(admin.name||"");
  const [email,setEmail]=useState(admin.email||"");
  const [phone,setPhone]=useState(admin.phone||"");
  const [bio,setBio]=useState(admin.bio||"");
  const [pass,setPass]=useState(admin.pass||"");
  const [photo,setPhoto]=useState(admin.photo||null);
  const fileRef=useRef();
  function handlePhoto(e){const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=async ev=>{const c=await compressImage(ev.target.result,400,400,0.78);setPhoto(c);};r.readAsDataURL(f);}
  function handleSave(){
    if(!name.trim()){toast("⚠ "+t.fullName);return;}
    const updated={...admin,name,email,phone,bio,pass,photo};
    // Save photo to firebase
    const fb=window.__FB;
    if(fb&&fb.isConfigured()&&photo!==admin.photo){
      try{fb.setDoc(fb.doc(fb.db,"admins",String(admin.id||"admin")),{photo,name,email,phone,bio,updatedAt:fb.serverTimestamp()},{merge:true});}catch{}
    }
    onSave(updated);
  }
  return(
    <Sheet open={true} onClose={onClose} title={"🛡 "+(lang==="ku"?"Rêveber Profîlê":lang==="en"?"Admin Profile":"Admin-Profil")}>
      <div style={{display:"flex",justifyContent:"center",marginBottom:18}}>
        <div onClick={()=>fileRef.current.click()} style={{width:80,height:80,borderRadius:"50%",background:"var(--bg2)",border:"2px dashed var(--border2)",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",overflow:"hidden"}}>
          {photo?<img src={photo} style={{width:"100%",height:"100%",objectFit:"cover"}} alt=""/>:<div style={{textAlign:"center"}}><div style={{fontSize:24}}>📷</div><div style={{fontSize:9,color:"var(--text2)",marginTop:4}}>{t.photoUpload}</div></div>}
        </div>
        <input ref={fileRef} type="file" accept="image/*" style={{display:"none"}} onChange={handlePhoto}/>
      </div>
      <FieldWrap label={t.fullName}><input style={inputStyle} value={name} onChange={e=>setName(e.target.value)}/></FieldWrap>
      <FieldWrap label={t.emailLabel}><input style={inputStyle} value={email} onChange={e=>setEmail(e.target.value)} type="email" autoComplete="email" inputMode="email"/></FieldWrap>
      <FieldWrap label={t.phone}><input style={inputStyle} value={phone} onChange={e=>setPhone(e.target.value)} type="tel" inputMode="tel" autoComplete="tel"/></FieldWrap>
      <FieldWrap label={t.bioLabel||"Danasîn"}><textarea style={{...inputStyle,minHeight:60,resize:"vertical"}} value={bio} onChange={e=>setBio(e.target.value)}/></FieldWrap>
      <FieldWrap label={t.labelPass||"Şîfre"}><input style={inputStyle} value={pass} onChange={e=>setPass(e.target.value)}/></FieldWrap>
      <div style={{background:"var(--bg2)",borderRadius:8,padding:"8px 12px",marginBottom:12,fontSize:11,color:"var(--text2)"}}>
        No: <span style={{fontFamily:"monospace",fontWeight:600,color:"var(--text)"}}>{admin.no}</span>
      </div>
      <PrimaryBtn onClick={handleSave} icon="💾">{t.saveTeacher||"Tomar bike"}</PrimaryBtn>
    </Sheet>
  );
}

          onSave={(u)=>{onDataChange("updateSchedule",u);setEditingLesson(null);toast("✓ "+u.name);}}/>
      )}
    </div>
  );

// Central grade/attendance store — changes persist during session
const _statsStore = {};
function getStudentStats(studentId){
  if(_statsStore[studentId]) return _statsStore[studentId];
  const seed=typeof studentId==="number"?studentId:parseInt(String(studentId).replace(/\D/g,""))||7;
  const att=Math.min(100,Math.max(55, 72+(seed*17)%29));
  const grade=Math.min(100,Math.max(50, 58+(seed*23)%42));
  const late=Math.max(0,(seed*3)%5);
  // absent = toplam 18 ders varsayımı ile devamsızlık
  const totalLessons=18;
  const absent=Math.max(0,Math.round((100-att)/100*totalLessons));
  const attended=totalLessons-absent;
  const notes=["Pêşketina baş","Bala xwe bide","Beşdariya birêkûpêk","Performans bilind","Amadebûn bişopîne"];
  const note=notes[seed%notes.length];
  _statsStore[studentId]={att,grade,late,absent,attended,totalLessons,note};
  return _statsStore[studentId];
}
function updateStudentStats(studentId, patch){
  const current = getStudentStats(studentId);
  _statsStore[studentId] = {...current,...patch};
  // att değişirse absent/attended'ı yeniden hesapla
  if(patch.att!==undefined){
    const totalLessons=current.totalLessons||18;
    _statsStore[studentId].absent=Math.max(0,Math.round((100-patch.att)/100*totalLessons));
    _statsStore[studentId].attended=totalLessons-_statsStore[studentId].absent;
  }
}

/* ─── COLOR THRESHOLDS (global) ──────────────────────────────────────────── */
// ≥80 yeşil, 50–79 sarı, 0–49 kırmızı
function pctColor(v) { return v>=80?"#1a7a4a":v>=50?"#c07800":"#c0392b"; }
function pctBg(v)    { return v>=80?"rgba(26,122,74,.13)":v>=50?"rgba(192,120,0,.13)":"rgba(192,57,43,.13)"; }
function pctLabel(v,lang){ return v>=80?(lang==="en"?"Good":lang==="de"?"Gut":"Baş"):v>=50?(lang==="en"?"Average":lang==="de"?"Mittel":"Navîn"):(lang==="en"?"Low":lang==="de"?"Niedrig":"Kêm"); }

/* ─── ALERTS STORAGE ─────────────────────────────────────────────────────── */
const ALERTS_KEY = "aat-alerts";
function loadAlerts() { try{const r=localStorage.getItem(ALERTS_KEY);return r?JSON.parse(r):[]}catch{return [];} }
function saveAlerts(arr) { try{localStorage.setItem(ALERTS_KEY,JSON.stringify(arr));}catch{} }
function generateAlerts(students, schedule) {
  // Survey responses < 50 → uyarı
  const responses = loadSurveyResponses();
  const questions = loadSurveyQuestions();
  const weekKey = getWeekLabel(new Date().toISOString().slice(0,10));
  const alerts = [];
  const now = new Date().toISOString();

  // 1) Survey yanıtlarında ders ortalaması <50 olan
  const byLesson = {};
  responses.forEach(r=>{ const k=String(r.lessonId); if(!byLesson[k])byLesson[k]=[]; byLesson[k].push(r); });
  Object.keys(byLesson).forEach(lid=>{
    const resps = byLesson[lid];
    const thisWeek = resps.filter(r=>r.week===weekKey);
    if(!thisWeek.length) return;
    const vals = thisWeek.flatMap(r=>questions.map(q=>r.answers?.[q.id]).filter(v=>v!=null));
    if(!vals.length) return;
    const avg = Math.round(vals.reduce((a,b)=>a+b,0)/vals.length);
    if(avg<50) {
      const ls = schedule.find(l=>String(l.id)===lid);
      alerts.push({
        id:`survey_${lid}_${weekKey}`,
        type:"survey",
        level:"critical",
        lessonId:lid,
        lessonName:ls?.name||lid,
        avg,
        week:weekKey,
        createdAt:now,
        read:false,
      });
    }
  });

  // 2) Öğrenci devamsızlık (getStudentStats simülasyonunda) <50
  students.forEach(s=>{
    const st = getStudentStats(s.id);
    if(st.att<50){
      alerts.push({
        id:`att_${s.id}_${weekKey}`,
        type:"attendance",
        level:"critical",
        studentId:s.id,
        studentName:s.name,
        studentNo:s.no,
        area:s.area,
        att:st.att,
        week:weekKey,
        createdAt:now,
        read:false,
      });
    }
  });
  return alerts;
}

/* ─── ADMIN ALERTS PANEL ─────────────────────────────────────────────────── */
function AdminAlertsPanel({students, schedule, lang, toast}) {
  const [alerts, setAlerts] = useState(()=>{
    const fresh = generateAlerts(students, schedule);
    const saved = loadAlerts();
    // Merge: fresh alertlar, saved'dakinin read durumunu koru
    const merged = fresh.map(a=>{
      const s = saved.find(x=>x.id===a.id);
      return s ? {...a, read:s.read} : a;
    });
    saveAlerts(merged);
    return merged;
  });

  const unread = alerts.filter(a=>!a.read).length;

  function markRead(id) {
    setAlerts(prev=>{ const u=prev.map(a=>a.id===id?{...a,read:true}:a); saveAlerts(u); return u; });
  }
  function markAllRead() {
    setAlerts(prev=>{ const u=prev.map(a=>({...a,read:true})); saveAlerts(u); return u; });
  }
  function clearAll() {
    saveAlerts([]); setAlerts([]);
  }

  const lbl={
    title:     {ku:"Agahdarî û Hişyarî",     en:"Alerts & Notifications",     de:"Warnungen & Benachrichtigungen"},
    noAlerts:  {ku:"Tu hişyarî tune",         en:"No alerts",                  de:"Keine Warnungen"},
    markAll:   {ku:"Hemû xwendî bimîne",      en:"Mark all as read",           de:"Alle als gelesen markieren"},
    clear:     {ku:"Hemû jê bibe",            en:"Clear all",                  de:"Alle löschen"},
    survey:    {ku:"Nirxandina kêm",          en:"Low evaluation score",       de:"Niedrige Bewertung"},
    attendance:{ku:"Amadebûna kêm",           en:"Low attendance",             de:"Niedrige Anwesenheit"},
    week:      {ku:"Hefte",                   en:"Week",                       de:"Woche"},
    avg:       {ku:"Navgîn",                  en:"Average",                    de:"Durchschnitt"},
    att:       {ku:"Amadebûn",               en:"Attendance",                  de:"Anwesenheit"},
  };
  const L = k=>lbl[k]?.[lang]||lbl[k]?.ku||k;

  return (
    <div style={{paddingBottom:20}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:14}}>
        <div style={{fontSize:15,fontWeight:700,color:"var(--text)"}}>
          🔔 {L("title")}
          {unread>0&&<span style={{marginLeft:8,background:"#ef4444",color:"#fff",fontSize:10,fontWeight:700,padding:"2px 7px",borderRadius:10}}>{unread}</span>}
        </div>
        <div style={{display:"flex",gap:6}}>
          {unread>0&&<button onClick={markAllRead} style={{fontSize:10,padding:"4px 8px",background:"var(--bg2)",border:"0.5px solid var(--border2)",borderRadius:6,cursor:"pointer",color:"var(--text)"}}>{L("markAll")}</button>}
          {alerts.length>0&&<button onClick={clearAll} style={{fontSize:10,padding:"4px 8px",background:"var(--red-bg)",border:"none",borderRadius:6,cursor:"pointer",color:"var(--red)"}}>{L("clear")}</button>}
        </div>
      </div>

      {alerts.length===0?(
        <div style={{textAlign:"center",padding:32,color:"var(--text2)"}}>
          <div style={{fontSize:40,marginBottom:8}}>✅</div>
          <div style={{fontSize:13}}>{L("noAlerts")}</div>
        </div>
      ):(
        alerts.map(a=>{
          const isSurvey=a.type==="survey";
          const val=isSurvey?a.avg:a.att;
          const c=pctColor(val); const bg=pctBg(val);
          return (
            <div key={a.id} onClick={()=>markRead(a.id)}
              style={{background:a.read?"var(--bg1)":bg,borderRadius:12,padding:"12px 14px",marginBottom:8,
                border:`1px solid ${a.read?"var(--border)":c+"55"}`,cursor:"pointer",
                opacity:a.read?0.65:1,transition:"opacity .2s"}}>
              <div style={{display:"flex",alignItems:"flex-start",gap:10}}>
                <span style={{fontSize:22,flexShrink:0}}>{isSurvey?"📋":"🎓"}</span>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:3}}>
                    <span style={{fontSize:11,fontWeight:700,color:c}}>
                      {isSurvey?L("survey"):L("attendance")}
                    </span>
                    {!a.read&&<span style={{width:6,height:6,borderRadius:"50%",background:"#ef4444",flexShrink:0,display:"inline-block"}}/>}
                  </div>
                  <div style={{fontSize:13,fontWeight:600,color:"var(--text)",marginBottom:2}}>
                    {isSurvey?a.lessonName:a.studentName}
                  </div>
                  <div style={{fontSize:10,color:"var(--text2)"}}>
                    {isSurvey?`${L("avg")}: `:`${L("att")}: `}
                    <span style={{fontWeight:700,color:c}}>{val}%</span>
                    {" · "}{L("week")}: {weekRangeLabel(a.week,lang)}
                  </div>
                </div>
                <div style={{fontFamily:"monospace",fontSize:20,fontWeight:800,color:c,flexShrink:0}}>{val}%</div>
              </div>
            </div>
          );
        })
      )}
    </div>
  );
}

/* ─── ADMIN WEEKLY REPORT PANEL ──────────────────────────────────────────── */
function AdminWeeklyReportPanel({students, teachers, schedule, lang, toast}) {
  const [weekStart, setWeekStart] = useState(()=>{
    const d=new Date(); d.setDate(d.getDate()-d.getDay()+1); return d.toISOString().slice(0,10);
  });
  const [selectedArea, setSelectedArea] = useState("all");

  const weekKey = getWeekLabel(weekStart);
  const weekLabel = weekRangeLabel(weekKey, lang);
  const responses = loadSurveyResponses();
  const questions = loadSurveyQuestions();

  const filteredStudents = selectedArea==="all" ? students : students.filter(s=>s.area===selectedArea);
  const filteredSchedule = selectedArea==="all" ? schedule : schedule.filter(l=>l.area===selectedArea);

  // Öğrenci devamsızlık istatistikleri
  const studentsWithAtt = filteredStudents.map(s=>({...s,...getStudentStats(s.id)}));
  const belowThreshold = studentsWithAtt.filter(s=>s.att<50);
  const mid = studentsWithAtt.filter(s=>s.att>=50&&s.att<80);
  const good = studentsWithAtt.filter(s=>s.att>=80);

  // Haftalık survey sonuçları
  const weekResps = responses.filter(r=>{
    if(r.week!==weekKey) return false;
    if(selectedArea==="all") return true;
    const ls=schedule.find(l=>String(l.id)===String(r.lessonId));
    return ls&&ls.area===selectedArea;
  });
  const byLesson={};
  weekResps.forEach(r=>{ const k=String(r.lessonId); if(!byLesson[k])byLesson[k]=[]; byLesson[k].push(r); });

  const lbl={
    title:      {ku:"Raporta Hefteyê",           en:"Weekly Report",                de:"Wochenbericht"},
    week:       {ku:"Hefteya",                    en:"Week of",                     de:"Woche vom"},
    area:       {ku:"Qad",                        en:"Field",                       de:"Bereich"},
    all:        {ku:"Hemû Qadan",                 en:"All Fields",                  de:"Alle Bereiche"},
    attSec:     {ku:"Rewşa Amadebûnê",            en:"Attendance Status",           de:"Anwesenheitsstatus"},
    low:        {ku:"Kêm (<50%)",                 en:"Low (<50%)",                  de:"Niedrig (<50%)"},
    mid:        {ku:"Navîn (50–79%)",             en:"Average (50–79%)",            de:"Mittel (50–79%)"},
    high:       {ku:"Baş (≥80%)",                 en:"Good (≥80%)",                 de:"Gut (≥80%)"},
    surveySec:  {ku:"Encamên Nirxandinê",         en:"Evaluation Results",          de:"Bewertungsergebnisse"},
    noResp:     {ku:"Ev hefte bersiv tune",       en:"No responses this week",      de:"Keine Antworten diese Woche"},
    download:   {ku:"PDF Dakêşe",                 en:"Download PDF",                de:"PDF herunterladen"},
    print:      {ku:"Çap bike",                   en:"Print",                       de:"Drucken"},
    students:   {ku:"Xwendekar",                  en:"Students",                    de:"Schüler"},
    avg:        {ku:"Navgîn",                     en:"Avg",                         de:"Ø"},
    alertSec:   {ku:"Hişyarî — Xwendekarên Binê %50", en:"Alerts — Students Below 50%", de:"Warnungen — Schüler unter 50%"},
    noAlert:    {ku:"Tu xwendekar binê %50 nîne", en:"No students below 50%",       de:"Keine Schüler unter 50%"},
  };
  const L = k=>lbl[k]?.[lang]||lbl[k]?.ku||k;

  function generateWeeklyPDF() {
    const aLabel = selectedArea==="all" ? L("all") : areaName(selectedArea,lang);
    const dateNow = new Date().toLocaleDateString(lang==="en"?"en-GB":lang==="de"?"de-DE":"ku",{day:"2-digit",month:"long",year:"numeric"});

    // Survey per-lesson averages
    const lessonRows = Object.keys(byLesson).map(lid=>{
      const ls = schedule.find(l=>String(l.id)===lid);
      const resps = byLesson[lid];
      const qAvgs = questions.map(q=>{
        const vals=resps.map(r=>r.answers?.[q.id]).filter(v=>v!=null);
        return vals.length?Math.round(vals.reduce((a,b)=>a+b,0)/vals.length):null;
      });
      const overall = qAvgs.filter(v=>v!=null);
      const avg = overall.length?Math.round(overall.reduce((a,b)=>a+b,0)/overall.length):null;
      return {name:ls?.name||lid, avg, qAvgs};
    });

    const html = `<!DOCTYPE html><html lang="${lang}"><head><meta charset="UTF-8"/>
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate"/>
<meta http-equiv="Pragma" content="no-cache"/>
<meta http-equiv="Expires" content="0"/>
<title>${L("title")} – ${weekLabel}</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',Arial,sans-serif;background:#f8f8f6;color:#1a1a2e;font-size:12px}
.page{max-width:800px;margin:0 auto;background:#fff;box-shadow:0 2px 20px rgba(0,0,0,.1)}
.header{background:linear-gradient(135deg,#0C2340,#1a3a6a);padding:28px 32px 24px;color:#fff}
.logo{font-size:24px;font-weight:800;color:#F7D116;letter-spacing:.05em}
.subtitle{font-size:11px;color:rgba(255,255,255,.6);margin-top:4px;text-transform:uppercase;letter-spacing:.1em}
.report-title{font-size:18px;font-weight:700;margin-top:12px}
.report-sub{font-size:11px;color:rgba(255,255,255,.65);margin-top:4px}
.meta{display:flex;gap:24px;margin-top:16px;flex-wrap:wrap}
.meta-item{font-size:10px;color:rgba(255,255,255,.55);text-transform:uppercase;letter-spacing:.06em}
.meta-val{font-size:13px;color:#fff;font-weight:600;margin-top:2px}
.section{padding:20px 32px;border-bottom:1px solid #eee}
.sec-title{font-size:14px;font-weight:700;color:#0C2340;margin-bottom:14px;display:flex;align-items:center;gap:8px}
.stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:8px}

.yellow{background:#fdf3e0;color:#c07800}
.red{background:#fdecea;color:#c0392b}
table{width:100%;border-collapse:collapse;font-size:11px}
th{background:#f0f4fb;padding:7px 10px;text-align:left;font-weight:700;color:#0C2340;border-bottom:2px solid #dde6f5}
td{padding:7px 10px;border-bottom:1px solid #f0f0f0}
tr:hover td{background:#f9fbff}
.bar-cell{width:120px}
.bar-wrap{height:7px;background:#eee;border-radius:4px;overflow:hidden}

.pct{font-weight:700;font-family:monospace}
.alert-row{background:#fdecea}
.alert-row td{color:#c0392b}
.footer{padding:16px 32px;font-size:9px;color:#aaa;display:flex;justify-content:space-between;border-top:2px solid #eee}
@media print{body{background:#fff}.page{box-shadow:none}button{display:none}.no-print{display:none}}
</style></head><body>
<div class="page">
  <div class="header">
    <div class="logo">🏛 Akademîya Aram Tîgran</div>
    <div class="subtitle">Art Academy Management System</div>
    <div class="report-title">📋 ${L("title")}</div>
    <div class="report-sub">${aLabel} · ${weekLabel}</div>
    <div class="meta">
      <div class="meta-item">${L("week")}<div class="meta-val">${weekLabel}</div></div>
      <div class="meta-item">${L("area")}<div class="meta-val">${aLabel}</div></div>
      <div class="meta-item">${lang==="en"?"Report Date":lang==="de"?"Berichtsdatum":"Roja Rapor"}<div class="meta-val">${dateNow}</div></div>
      <div class="meta-item">${L("students")}<div class="meta-val">${filteredStudents.length}</div></div>
    </div>
  </div>

  <div class="section">
    <div class="sec-title">🎓 ${L("attSec")}</div>
    <div class="stat-grid">
      <div class="stat-box red"><div class="val">${belowThreshold.length}</div><div class="lbl">${L("low")}</div></div>
      <div class="stat-box yellow"><div class="val">${mid.length}</div><div class="lbl">${L("mid")}</div></div>
      <div class="stat-box green"><div class="val">${good.length}</div><div class="lbl">${L("high")}</div></div>
    </div>
    ${belowThreshold.length>0?`
    <div class="sec-title" style="margin-top:16px;font-size:12px;">⚠️ ${L("alertSec")}</div>
    <table><thead><tr>
      <th>${lang==="en"?"Student":lang==="de"?"Schüler":"Xwendekar"}</th>
      <th>${lang==="en"?"No":lang==="de"?"Nr.":"Jm."}</th>
      <th>${lang==="en"?"Field":lang==="de"?"Bereich":"Qad"}</th>
      <th>${L("avg")} %</th>
    </tr></thead><tbody>
      ${belowThreshold.map(s=>`<tr class="alert-row"><td>${s.name}</td><td style="font-family:monospace">${s.no}</td><td>${areaName(s.area,lang)}</td><td class="pct" style="color:#c0392b">${s.att}%</td></tr>`).join("")}
    </tbody></table>
    `:"<p style='color:#aaa;font-size:11px;padding:8px 0'>"+L("noAlert")+"</p>"}
  </div>

  <div class="section">
    <div class="sec-title">📋 ${L("surveySec")}</div>
    ${lessonRows.length===0?`<p style='color:#aaa;font-size:11px'>${L("noResp")}</p>`:`
    <table><thead><tr>
      <th>${lang==="en"?"Lesson":lang==="de"?"Stunde":"Ders"}</th>
      ${questions.map((q,i)=>`<th style="max-width:80px;font-size:9px">${i+1}. ${q[lang]||q.ku}</th>`).join("")}
      <th>${L("avg")}</th>
    </tr></thead><tbody>
      ${lessonRows.map(r=>{
        const col=r.avg!=null?(r.avg>=80?"#1a7a4a":r.avg>=50?"#c07800":"#c0392b"):"#aaa";
        return `<tr>
          <td style="font-weight:600">${r.name}</td>
          ${r.qAvgs.map(v=>v!=null?`<td class="pct" style="color:${v>=80?"#1a7a4a":v>=50?"#c07800":"#c0392b"}">${v}%</td>`:"<td style='color:#ccc'>—</td>").join("")}
          <td class="pct" style="font-size:14px;font-weight:800;color:${col}">${r.avg!=null?r.avg+"%":"—"}</td>
        </tr>`;
      }).join("")}
    </tbody></table>`}
  </div>

  <div class="footer">
    <span>Akademîya Aram Tîgran · ${dateNow}</span>
    <span>${L("title")} · ${weekLabel}</span>
  </div>
</div>
</body></html>`;
    return html;
  }

  function downloadPDF() {
    const html = generateWeeklyPDF();
    const blob = new Blob([html],{type:"text/html"});
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href=url; a.download=`weekly-report-${weekKey}.html`; a.click();
    URL.revokeObjectURL(url);
    toast("✓ "+(lang==="ku"?"Rapor hat dakêşandin":lang==="en"?"Report downloaded":"Bericht heruntergeladen"));
  }

  function printReport() {
    const html = generateWeeklyPDF();
    const w = window.open("","_blank");
    if(w){w.document.write(html);w.document.close();setTimeout(()=>w.print(),500);}
    else toast("⚠ "+(lang==="ku"?"Popup hat asteng kirin":lang==="en"?"Popup blocked":"Popup blockiert"));
  }

  return (
    <div style={{paddingBottom:20}}>
      <div style={{fontSize:15,fontWeight:700,color:"var(--text)",marginBottom:14}}>📊 {L("title")}</div>

      {/* Filtreler */}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:14}}>
        <div>
          <label style={{fontSize:11,color:"var(--text2)",fontWeight:600,display:"block",marginBottom:5}}>{L("week")}</label>
          <input type="date" style={{width:"100%",padding:"10px 12px",border:"1.5px solid var(--border2)",borderRadius:10,fontSize:13,fontFamily:"inherit",color:"var(--text)",background:"var(--bg1)",outline:"none"}}
            value={weekStart} onChange={e=>setWeekStart(e.target.value)}/>
        </div>
        <div>
          <label style={{fontSize:11,color:"var(--text2)",fontWeight:600,display:"block",marginBottom:5}}>{L("area")}</label>
          <select style={{width:"100%",padding:"10px 12px",border:"1.5px solid var(--border2)",borderRadius:10,fontSize:13,fontFamily:"inherit",color:"var(--text)",background:"var(--bg1)",outline:"none"}}
            value={selectedArea} onChange={e=>setSelectedArea(e.target.value)}>
            <option value="all">{L("all")}</option>
            {AREAS.map(a=><option key={a.key} value={a.key}>{a.icon} {areaName(a.key,lang)}</option>)}
          </select>
        </div>
      </div>

      {/* Hafta etiketi */}
      <div style={{textAlign:"center",marginBottom:14,fontSize:11,color:"var(--text2)",fontWeight:600}}>
        📅 {weekLabel}
      </div>

      {/* Absence summary */}
      <Card style={{marginBottom:12}}>
        <div style={{fontSize:12,fontWeight:700,color:"var(--text)",marginBottom:12}}>🎓 {L("attSec")}</div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8,marginBottom:12}}>
          {[
            {label:L("low"), val:belowThreshold.length, c:"#c0392b", bg:"rgba(192,57,43,.12)"},
            {label:L("mid"), val:mid.length, c:"#c07800", bg:"rgba(192,120,0,.12)"},
            {label:L("high"), val:good.length, c:"#1a7a4a", bg:"rgba(26,122,74,.12)"},
          ].map((s,i)=>(
            <div key={i} style={{background:s.bg,borderRadius:8,padding:"10px 6px",textAlign:"center"}}>
              <div style={{fontSize:22,fontWeight:800,color:s.c}}>{s.val}</div>
              <div style={{fontSize:9,color:s.c,marginTop:2,fontWeight:600}}>{s.label}</div>
            </div>
          ))}
        </div>

        {/* <50% warning list */}
        {belowThreshold.length>0&&(
          <>
            <div style={{fontSize:11,fontWeight:700,color:"#c0392b",marginBottom:8}}>⚠️ {L("alertSec")}</div>
            {belowThreshold.map((s,i)=>(
              <div key={s.id} style={{display:"flex",alignItems:"center",gap:10,padding:"7px 0",
                borderBottom:i<belowThreshold.length-1?"0.5px solid var(--border)":"none"}}>
                <Avatar name={s.name} color="#c0392b" size={30} photo={s.photo}/>
                <div style={{flex:1}}>
                  <div style={{fontSize:12,fontWeight:600,color:"var(--text)"}}>{s.name}</div>
                  <div style={{fontSize:10,color:"var(--text2)",fontFamily:"monospace"}}>{s.no} · {areaName(s.area,lang)}</div>
                </div>
                <div style={{fontFamily:"monospace",fontSize:15,fontWeight:800,color:pctColor(s.att)}}>{s.att}%</div>
              </div>
            ))}
          </>
        )}
        {belowThreshold.length===0&&(
          <div style={{textAlign:"center",fontSize:11,color:"var(--green)",padding:"6px 0"}}>✅ {L("noAlert")}</div>
        )}
      </Card>

      {/* Survey results this week */}
      <Card style={{marginBottom:14}}>
        <div style={{fontSize:12,fontWeight:700,color:"var(--text)",marginBottom:12}}>📋 {L("surveySec")}</div>
        {Object.keys(byLesson).length===0?(
          <div style={{textAlign:"center",padding:16,color:"var(--text2)",fontSize:11}}>{L("noResp")}</div>
        ):(
          Object.keys(byLesson).map(lid=>{
            const ls=schedule.find(l=>String(l.id)===lid);
            const resps=byLesson[lid];
            const qAvgs=questions.map(q=>{
              const vals=resps.map(r=>r.answers?.[q.id]).filter(v=>v!=null);
              return vals.length?Math.round(vals.reduce((a,b)=>a+b,0)/vals.length):null;
            });
            const overall=qAvgs.filter(v=>v!=null);
            const avg=overall.length?Math.round(overall.reduce((a,b)=>a+b,0)/overall.length):null;
            return (
              <div key={lid} style={{marginBottom:12,paddingBottom:12,borderBottom:"0.5px solid var(--border)"}}>
                <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:8}}>
                  <div style={{fontSize:12,fontWeight:600,color:"var(--text)"}}>{ls?.name||lid}</div>
                  {avg!=null&&<div style={{fontFamily:"monospace",fontSize:16,fontWeight:800,color:pctColor(avg)}}>{avg}%</div>}
                </div>
                {questions.map((q,qi)=>{
                  const v=qAvgs[qi];
                  if(v==null) return null;
                  return (
                    <div key={q.id} style={{marginBottom:6}}>
                      <div style={{display:"flex",justifyContent:"space-between",fontSize:10,color:"var(--text2)",marginBottom:2}}>
                        <span style={{flex:1,marginRight:8,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{qi+1}. {q[lang]||q.ku}</span>
                        <span style={{fontWeight:700,color:pctColor(v),flexShrink:0}}>{v}%</span>
                      </div>
                      <div style={{height:6,background:"var(--bg2)",borderRadius:3}}>
                        <div style={{height:"100%",width:`${v}%`,background:pctColor(v),borderRadius:3}}/>
                      </div>
                    </div>
                  );
                })}
              </div>
            );
          })
        )}
      </Card>

      {/* PDF / Print buttons */}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
        <button onClick={downloadPDF}
          style={{padding:"13px",background:"#0C2340",color:"#fff",border:"none",borderRadius:12,fontSize:13,fontWeight:700,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:6}}>
          ⬇️ {L("download")}
        </button>
        <button onClick={printReport}
          style={{padding:"13px",background:"var(--bg2)",color:"var(--text)",border:"0.5px solid var(--border2)",borderRadius:12,fontSize:13,fontWeight:600,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:6}}>
          🖨️ {L("print")}
        </button>
      </div>
    </div>
  );
}

function AdminReportsPanel({students,teachers,schedule,lang,t,toast}){
  const [selectedArea,setSelectedArea]=useState("all");
  const [reportType,setReportType]=useState("attendance"); // attendance | grades | full | survey | teachers
  const [surveyTarget,setSurveyTarget]=useState("all_students"); // all_students | all_teachers | area_students | area_teachers
  const [showReport,setShowReport]=useState(false);
  const [reportTab,setReportTab]=useState("config"); // config | preview

  const filteredStudents = selectedArea==="all"
    ? students
    : students.filter(s=>s.area===selectedArea);

  const reportDate = new Date().toLocaleDateString(lang==="en"?"en-GB":lang==="de"?"de-DE":"tr-TR",{year:"numeric",month:"long",day:"numeric"});

  function generateReportHTML(){
    const areaInfo = selectedArea==="all"

/* ─── SURVEY STORAGE (localStorage fallback + Firebase) ──────────────────── */
const SURVEY_QUESTIONS_KEY = "aat-survey-questions";
const SURVEY_RESPONSES_KEY = "aat-survey-responses";

function loadSurveyQuestions() {
  try { const r = localStorage.getItem(SURVEY_QUESTIONS_KEY); return r ? JSON.parse(r) : getDefaultQuestions(); } catch { return getDefaultQuestions(); }
}
function saveSurveyQuestions(qs) {
  try { localStorage.setItem(SURVEY_QUESTIONS_KEY, JSON.stringify(qs)); } catch {}
  // Firebase
  const fb = window.__FB;
  if(fb && fb.isConfigured()) {
    try { fb.setDoc(fb.doc(fb.db,"config","surveyQuestions"),{questions:qs,updatedAt:fb.serverTimestamp()}); } catch {}
  }
}
function loadSurveyResponses() {
  try { const r = localStorage.getItem(SURVEY_RESPONSES_KEY); return r ? JSON.parse(r) : []; } catch { return []; }
}
function saveSurveyResponse(resp) {
  const all = loadSurveyResponses();
  // Aynı öğretmen + hafta + ders için güncelle
  const idx = all.findIndex(r => r.teacherId===resp.teacherId && r.week===resp.week && r.lessonId===resp.lessonId);
  if(idx>=0) all[idx]=resp; else all.push(resp);
  try { localStorage.setItem(SURVEY_RESPONSES_KEY, JSON.stringify(all)); } catch {}
  const fb = window.__FB;
  if(fb && fb.isConfigured()) {
    try { fb.setDoc(fb.doc(fb.db,"surveyResponses",`${resp.teacherId}_${resp.week}_${resp.lessonId}`),{...resp,savedAt:fb.serverTimestamp()},{merge:true}); } catch {}
  }
}
function getDefaultQuestions() {
  return [
    {id:"q1", ku:"Xwendekarên çiqasî bi çalakî beşdar bûn?", en:"How actively did students participate?", de:"Wie aktiv nahmen die Schüler teil?"},
    {id:"q2", ku:"Armancên dersê çiqasî hatin bidestxistin?", en:"How much were lesson goals achieved?", de:"Wie sehr wurden die Unterrichtsziele erreicht?"},
    {id:"q3", ku:"Asta têgihîştina xwendekaran çiqas bû?", en:"What was the student comprehension level?", de:"Wie hoch war das Verständnisniveau der Schüler?"},
    {id:"q4", ku:"Karûbarê wextê ders çiqas baş bû?", en:"How well was lesson time managed?", de:"Wie gut wurde die Unterrichtszeit gemanagt?"},
    {id:"q5", ku:"Serkeftina giştî ya dersê çiqas bû?", en:"What was the overall lesson success?", de:"Wie war der Gesamterfolg der Stunde?"},
  ];
}
function getWeekLabel(dateStr) {
  const d = dateStr ? new Date(dateStr) : new Date();
  const jan1 = new Date(d.getFullYear(),0,1);
  const week = Math.ceil(((d-jan1)/86400000+jan1.getDay()+1)/7);
  return `${d.getFullYear()}-W${String(week).padStart(2,"0")}`;
}
function weekRangeLabel(weekKey, lang) {
  try {
    const [yr, wk] = weekKey.split("-W").map(Number);
    const jan1 = new Date(yr,0,1);
    const dayOfWeek = jan1.getDay() || 7;
    const start = new Date(jan1);
    start.setDate(jan1.getDate() + (wk-1)*7 - (dayOfWeek-1));
    const end = new Date(start); end.setDate(start.getDate()+6);
    const fmt = (d) => d.toLocaleDateString(lang==="en"?"en-GB":lang==="de"?"de-DE":"ku", {day:"2-digit",month:"short"});
    return `${fmt(start)} – ${fmt(end)}`;
  } catch { return weekKey; }
}
