}

function LoginScreen({students,teachers,t,lang,setLang,onLogin,onForgot,dark,onThemeToggle}){
  const [role,setRole]=useState("student");
  const [user,setUser]=useState("");
  const [pass,setPass]=useState("");
  const [err,setErr]=useState("");

  const LANGS=[
    {key:"ku",label:"Kurdî",flag:<KRGFlag size={30}/>},
    {key:"en",label:"English",flag:<span style={{fontSize:22}}>🇬🇧</span>},
    {key:"de",label:"Deutsch",flag:<span style={{fontSize:22}}>🇩🇪</span>},
  ];

  // Credential Autofill support
  const {saveCredential}=useBiometric();
  
  async function doLogin(){
    setErr("");
    const uid=(user.trim()||"?").toLowerCase();
    if(isLockedOut(uid)){
      const mins=Math.ceil(remainingLockoutSeconds(uid)/60);
      setErr((lang==="ku"?"Hesab "+mins+" deqe kilî ye":lang==="en"?"Account locked "+mins+" min":lang==="de"?"Konto "+mins+" Min. gesperrt":"Hesab "+mins+" deqe kilî ye"));
      return;
    }

    const userInput = user.trim();
    const passInput = pass;

    let matched=null, matchedType=null;
    const fb = window.__FB;

    // ══════════════════════════════════════════════════════
    // YOL 1: Firebase Auth ile giriş (yeni oluşturulan kullanıcılar)
    // Önce öğretmen/admin dene (no@ogretmen.aat), sonra öğrenci (no@ogrenci.aat)
    // ══════════════════════════════════════════════════════
    if(fb && fb.isConfigured()){
      // Önce Firestore'dan kimin bu no olduğunu bul (rol tespiti için)
      const tcFound = teachers.find(tc => tc.no === userInput || tc.id === userInput);
      const stFound = students.find(s => s.no === userInput);

      // Hangi email suffix'ini deneyeceğimizi belirle
      const tryRoles = [];
      if(tcFound) tryRoles.push(tcFound.isAdmin ? "teacher" : "teacher");
      if(stFound) tryRoles.push("student");
      if(tryRoles.length === 0) tryRoles.push("teacher", "student"); // bilinmiyorsa ikisini de dene

      for(const tryRole of tryRoles){
        try {
          const fbCred = await fb.authSignIn(userInput, passInput, tryRole);
          if(fbCred && fbCred.user){
            // Firebase Auth başarılı — Firestore'dan kullanıcı detayını al
            if(tryRole === "student"){
              let s = students.find(s => s.no === userInput);
              if(!s){
                // Local listede yoksa Firestore'dan çek
                try {
                  const snap = await fb.getDocs(fb.collection(fb.db,"students"));
                  s = snap.docs.map(d=>({...d.data(),fireId:d.id})).find(d=>(d.no||"")===userInput);
                } catch(_){}
              }
              if(s){ matched = s; matchedType = "student"; }
            } else {
              let tc = teachers.find(tc => tc.no === userInput || tc.id === userInput);
              if(!tc){
                // Local listede yoksa Firestore'dan çek
                try {
                  const snap = await fb.getDocs(fb.collection(fb.db,"teachers"));
                  tc = snap.docs.map(d=>({...d.data(),fireId:d.id})).find(d=>(d.no||"")===userInput||(d.id||"")===userInput);
                } catch(_){}
              }
              if(tc){ matched = tc; matchedType = tc.isAdmin ? "admin" : "teacher"; }
            }
            break;
          }
        } catch(authErr){
          // auth/user-not-found veya auth/wrong-password — devam et
          if(authErr.code === "auth/wrong-password" || authErr.code === "auth/invalid-credential"){
            // Şifre yanlış — diğer rolü deneme, direkt hata ver
            break;
          }
          // auth/user-not-found — diğer rolü dene
        }
      }
    }

    // ══════════════════════════════════════════════════════
    // YOL 2: Firestore hash fallback (eski/demo kullanıcılar — Firebase Auth kaydı yok)
    // ══════════════════════════════════════════════════════
    if(!matched){
      const tcList = teachers.filter(tc => tc.no === userInput || tc.id === userInput);
      for(const tc of tcList){
        if(await verifyPassword(passInput, tc.pass)){
          matched = tc;
          matchedType = tc.isAdmin ? "admin" : "teacher";
          break;
        }
      }
    }
    if(!matched){
      for(const s of students.filter(s => s.no === userInput)){
        if(await verifyPassword(passInput, s.pass)){
          matched = s; matchedType = "student"; break;
        }
      }
    }


    // Firebase Auth token olmadan giriş yapıldıysa ÖNCE sign-in bekle, sonra devam et
    if(matched && matchedType && fb && fb.isConfigured() && !fb.auth.currentUser){
      const _role = matchedType === "student" ? "student" : "teacher";
      try {
        await fb.authSignIn(matched.no, passInput, _role);
      } catch(e) {
        if(e.code === "auth/user-not-found" || e.code === "auth/invalid-credential") {
          try {
            await fb.createAuthUser(matched.no, passInput, _role);
            await fb.authSignIn(matched.no, passInput, _role);
          } catch(e2){}
        }
      }
    }

    // ══════════════════════════════════════════════════════
    // Giriş sonucu + CİHAZ DOĞRULAMA
    // ══════════════════════════════════════════════════════
    if(matched && matchedType){
      // Admin cihaz kontrolünden muaf
      if(matchedType !== "admin"){
        const deviceId = await getDeviceFingerprint();
        const devCheck = await verifyDevice(matched.no, deviceId);

        if(!devCheck.ok && devCheck.reason === "device_mismatch"){
          recordFailedAttempt(uid);
          hapticError();
          setErr(
            lang==="ku" ? "🔒 Ev hesab li cîhazekî din tomar bûye. Ji rêveber re vebêje ku cîhazê sıfırla bike." :
            lang==="en" ? "🔒 This account is registered on another device. Ask admin to reset your device." :
                          "🔒 Dieses Konto ist auf einem anderen Gerät registriert. Bitte Admin um Geräte-Reset."
          );
          return;
        }

        // İlk giriş — bu cihazı kaydet
        if(devCheck.reason === "first_login"){
          await registerDevice(matched.no, matchedType, deviceId);
        }
      }

      clearAttempts(uid);
      hapticSuccess();
      onLogin(matchedType, matched);
      saveCredential(userInput, passInput).catch(()=>{});
    } else {
      recordFailedAttempt(uid);
      const rem = Math.max(0, MAX_ATTEMPTS - (_loginAttempts[uid]||[]).length);
      hapticError();
      setErr(rem > 0 ? t.errLogin+" ("+rem+")" : (lang==="ku"?"Hesab kilî ye":lang==="en"?"Account locked":lang==="de"?"Konto gesperrt":"Hesab kilî ye"));
    }
  }

  return(
    <div style={{background:"var(--navy)",height:"100%",display:"flex",flexDirection:"column",overflow:"hidden"}}>
      {/* Hero */}
      <div style={{padding:"32px 24px 20px",textAlign:"center",flexShrink:0,position:"relative"}}>
        <div style={{position:"absolute",left:-40,top:-40,width:180,height:180,borderRadius:"50%",background:"rgba(255,255,255,.03)",pointerEvents:"none"}}/>
        <div style={{position:"absolute",right:-20,top:20,width:100,height:100,borderRadius:"50%",background:"rgba(247,209,22,.06)",pointerEvents:"none"}}/>
        {/* Theme toggle top right */}
        {onThemeToggle&&<div style={{position:"absolute",top:16,right:16}}><ThemeToggle dark={dark} onToggle={onThemeToggle} lang={lang}/></div>}
        <AcademyLogo size={96}/>
        <div style={{color:"rgba(255,255,255,.45)",fontSize:11,marginTop:10,letterSpacing:"0.08em",textTransform:"uppercase"}}>{t.appSub}</div>
      </div>

      {/* Form panel */}
      <div style={{background:"var(--bg1)",borderRadius:"28px 28px 0 0",flex:1,overflow:"hidden",display:"flex",flexDirection:"column"}}>
        <div role="main" style={{flex:1,overflowY:"auto",padding:"22px 20px 40px"}}>

          {/* Lang picker */}
          <div style={{display:"flex",gap:6,marginBottom:22}}>
            {LANGS.map(l=>(
              <button key={l.key} onClick={()=>setLang(l.key)}
                style={{flex:1,padding:"9px 4px 8px",border:`1.5px solid ${lang===l.key?"var(--navy)":"var(--border)"}`,
                  borderRadius:12,fontSize:10.5,fontWeight:lang===l.key?700:500,
                  color:lang===l.key?"#fff":"var(--text2)",
                  background:lang===l.key?"var(--navy)":"var(--bg2)",
                  cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:4,
                  transition:"all .15s var(--ease)"}}>
                {l.flag}<span>{l.label}</span>
              </button>
            ))}
          </div>

          {/* Role selector — sadece Xwendekar + Mamoste (Admin öğretmen panelinden giriş yapar) */}
          <div style={{fontSize:11,fontWeight:700,color:"var(--text2)",textTransform:"uppercase",letterSpacing:"0.07em",marginBottom:10}}>{t.selectRole}</div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:20}}>
            {[
              {key:"student",icon:"🎓",label:t.roleStudent,sub:t.roleStudentSub},
              {key:"teacher",icon:"👨‍🏫",label:t.roleTeacher,sub:t.roleTeacherSub},
            ].map(r=>(
              <button key={r.key} onClick={()=>setRole(r.key)}
                style={{padding:"16px 10px",border:`2px solid ${role===r.key?"var(--navy)":"var(--border)"}`,
                  borderRadius:16,background:role===r.key?"var(--navy)":"var(--bg2)",
                  cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:7,
                  transition:"all .18s var(--ease)",boxShadow:role===r.key?"0 4px 16px rgba(12,35,64,.2)":"none"}}>
                <span style={{fontSize:28}}>{r.icon}</span>
                <span style={{fontSize:13,fontWeight:700,color:role===r.key?"#fff":"var(--text)"}}>{r.label}</span>
                <span style={{fontSize:10,color:role===r.key?"rgba(255,255,255,.65)":"var(--text2)"}}>{r.sub}</span>
              </button>
            ))}
          </div>

          <FieldWrap label={role==="student"?t.labelStudentNo:t.labelUsername}>
            <div style={{position:"relative"}}>
              <input className="inp" value={user} onChange={e=>setUser(e.target.value)}
                placeholder={lang==="en"?"Student / Teacher No":lang==="de"?"Schüler / Lehrer Nr.":"Jimara Xwendekar / Mamoste"}
                autoCapitalize="none" autoComplete="username" autoCorrect="off" spellCheck={false}
                inputMode="numeric"
                style={{paddingRight:40}}/>
              {user.length>0&&(
                <button onClick={()=>setUser("")} style={{position:"absolute",right:10,top:"50%",transform:"translateY(-50%)",background:"none",border:"none",color:"var(--text2)",fontSize:16,cursor:"pointer",padding:4}}>✕</button>
              )}
            </div>
          </FieldWrap>
          <FieldWrap label={t.labelPass}>
            <ShowHidePass value={pass} onChange={e=>setPass(e.target.value)} onEnter={doLogin}/>
          </FieldWrap>

          {err&&(
            <div className="fade-in" style={{background:"var(--red-bg)",border:"1px solid rgba(192,57,43,.2)",
              borderRadius:12,padding:"10px 14px",fontSize:12.5,color:"var(--red)",marginBottom:14,
              display:"flex",alignItems:"center",gap:8}}>
              ⚠️ {err}
            </div>
          )}

          <button onClick={()=>doLogin()} className="btn-navy" aria-label={t.btnLogin} style={{marginBottom:12,fontSize:15,letterSpacing:"0.02em"}}>
            {t.btnLogin}
          </button>
          <div style={{textAlign:"center",fontSize:13,color:"rgba(255,255,255,0.5)",cursor:"pointer",padding:"8px 0",fontWeight:500}} onClick={onForgot}>
            🔑 {lang==="en"?"Forgot password?":lang==="de"?"Passwort vergessen?":"Şîfre ji bîr kir?"}
          </div>
        </div>
      </div>
    </div>
  );
}

/* ─── NATIVE BARCODE DETECTION (primary) / jsQR (fallback) ─────────────── */
// hasBarcodeDetector() returns true on Chrome Android 9+, Samsung Internet
// detectBarcodeNative() uses the native GPU-accelerated scanner
// jsQR is used as a fallback for iOS/Firefox

/* ─── QR SESSION MANAGER ────────────────────────────────────────────────── */
// In-memory session store (works without localStorage)
window._aat_qr_session = null;

// ══════════════════════════════════════════════════════════════════
// QR GÜVENLİK SİSTEMİ — GPS + Dinamik Token
// 1. Dinamik token: QR her 30 saniyede otomatik yenilenir
//    → Ekran görüntüsü 30sn sonra geçersiz
// 2. GPS konum: Öğretmen konumu session'a kaydedilir
//    → Öğrenci check-in sırasında max 100m mesafe kontrolü
// 3. Token formatı: AAT-{sessionId}-{rotatingSlot}-{hmac}
// ══════════════════════════════════════════════════════════════════

const QR_ROTATE_INTERVAL = 15; // seconds — token rotates at this interval
const QR_MAX_DISTANCE_M  = 100; // metres — max allowed distance for GPS check

// Coğrafi mesafe hesaplama (Haversine formülü)
function haversineDistance(lat1, lon1, lat2, lon2){
  const R = 6371000; // metre
  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLon = (lon2 - lon1) * Math.PI / 180;
  const a = Math.sin(dLat/2)**2 +
    Math.cos(lat1*Math.PI/180) * Math.cos(lat2*Math.PI/180) * Math.sin(dLon/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

// GPS konum al
function getCurrentPosition(){
  return new Promise((resolve, reject)=>{
    if(!navigator.geolocation){ reject(new Error("no_gps")); return; }
    navigator.geolocation.getCurrentPosition(
      pos => resolve({lat: pos.coords.latitude, lon: pos.coords.longitude, acc: pos.coords.accuracy}),
      err => reject(err),
      {timeout:8000, maximumAge:15000, enableHighAccuracy:true}
    );
  });
}

// Rotating sub-token: 30sn'de bir değişir
function getRotatingSlot(){
  return Math.floor(Date.now() / (QR_ROTATE_INTERVAL * 1000));
}

// Token üret: sessionId + rotatingSlot + kısa hash
function generateSessionToken(lessonId, teacherId){
  const ts = Date.now();
  const rand = Math.random().toString(36).slice(2,8).toUpperCase();
  return `AAT-${teacherId}-${lessonId}-${ts}-${rand}`;
}

// Dinamik QR icerigi uret (her 30sn farkli)
// Guvenlik: sessionId karma ile birlestirilir — baska session'dan hesaplanamaz
function buildDynamicQRContent(sessionId){
  const slot = getRotatingSlot();
  // sessionId'nin son 8 karakterini seed'e ekle (brute-force zorlasin)
  const sidSeed = sessionId.split("").reduce((acc, c) => (acc * 31 + c.charCodeAt(0)) >>> 0, 0);
  const slotHash = ((slot * 1664525 + 1013904223) ^ sidSeed) >>> 0;
  const code = slotHash.toString(36).padStart(8,"0").slice(0,8).toUpperCase();
  return `${sessionId}|${slot}|${code}`;
}

// Dinamik QR icerigini dogrula (+-1 slot tolerans)
function validateDynamicQRContent(content, sessionId){
  try {
    const parts = content.split("|");
    if(parts.length !== 3) return false;
    const [sid, slotStr, code] = parts;
    if(sid !== sessionId) return false;
    const slot = parseInt(slotStr);
    if(isNaN(slot)) return false;
    const currentSlot = getRotatingSlot();
    // +-1 slot tolerans (gecis aninda sorun olmasin)
    const sidSeed = sessionId.split("").reduce((acc, c) => (acc * 31 + c.charCodeAt(0)) >>> 0, 0);
    for(let s = currentSlot - 1; s <= currentSlot + 1; s++){
      const slotHash = ((s * 1664525 + 1013904223) ^ sidSeed) >>> 0;
      const expected = slotHash.toString(36).padStart(8,"0").slice(0,8).toUpperCase();
      if(s === slot && code === expected) return true;
    }
    return false;
  } catch { return false; }
}

function openQRSession(sessionId, lessonName, teacherName, area, expiresInMs=600000, teacherLocation=null){
  const session = {
    sessionId, lessonName, teacherName, area,
    openedAt: Date.now(),
    expiresAt: Date.now() + expiresInMs,
    teacherLocation, // {lat, lon, acc} veya null
    checkins: {},
    active: true
  };
  window._aat_qr_session = session;
  window._aat_qr_session.checkinCount = 0; // increments on each successful checkin → triggers QR rotation
  return session;
}

function getActiveQRSession(){
  const s = window._aat_qr_session;
  if(!s || !s.active || Date.now() > s.expiresAt) return null;
  return s;
}

async function checkinToSession(qrContent, student, studentLocation=null){
  const s = window._aat_qr_session;
  if(!s)            return {ok:false, reason:"session_not_found"};
  if(!s.active)     return {ok:false, reason:"session_closed"};
  if(Date.now() > s.expiresAt) { s.active=false; return {ok:false, reason:"session_expired"}; }

  // 1. ALAN KONTROLU — ogrenci kendi alaninin dersine girebilir
  // Treat empty string as null (can come from Firebase)
  const sessionArea  = s.area      || null;
  const studentArea  = (student.area && student.area.trim()) ? student.area.trim() : null;
  if(sessionArea && studentArea && sessionArea !== studentArea){
    return {ok:false, reason:"wrong_area"};
  }

  // 2. Dinamik QR token dogrulamasi (anti-replay)
  const tokenValid = validateDynamicQRContent(qrContent, s.sessionId);
  if(!tokenValid) return {ok:false, reason:"token_mismatch"};

  // 3. Tekrar check-in engeli — sadece confirmed kayitlari kontrol et
  const existing = s.checkins[student.id];
  if(existing && existing.confirmed) return {ok:false, reason:"already_checked_in"};

  // Prevent race condition: mark as pending first
  s.checkins[student.id] = {pending:true};

  // 4. GPS konum kontrolu (ogretmen konumu varsa)
  if(s.teacherLocation && studentLocation){
    const dist = haversineDistance(
      s.teacherLocation.lat, s.teacherLocation.lon,
      studentLocation.lat,   studentLocation.lon
    );
    if(dist > QR_MAX_DISTANCE_M){
      // Pending markeri temizle — ogrenci tekrar denesin
      delete s.checkins[student.id];
      return {ok:false, reason:"location_too_far", distance: Math.round(dist)};
    }
    s.checkins[student.id] = {
      confirmed: true,
      name: student.name, no: student.no,
      time: new Date().toLocaleTimeString(),
      distance: Math.round(dist)
    };
    s.checkinCount = (s.checkinCount||0) + 1; // Signal QR rotation
  } else if(s.teacherLocation && !studentLocation){
    // GPS required — reject if location unavailable, clear pending
    delete s.checkins[student.id];
    return {ok:false, reason:"location_required"};
  } else {
    // No teacher location — accept without GPS
    s.checkins[student.id] = {
      confirmed: true,
      name: student.name, no: student.no,
      time: new Date().toLocaleTimeString()
    };
    s.checkinCount = (s.checkinCount||0) + 1; // Signal QR rotation
  }

  return {ok:true, session:s};
}

function closeQRSession(){
  if(window._aat_qr_session) window._aat_qr_session.active = false;
}

function getSessionCheckins(){
  const s = window._aat_qr_session;
  if(!s || !s.checkins) return {};
  // Return only confirmed checkins (pending = failed GPS/area check)
  const confirmed = {};
  for(const [id, v] of Object.entries(s.checkins)){
    if(v && v.confirmed) confirmed[id] = v;
  }
  return confirmed;
}

/* ─── QR CODE DISPLAY — GPS + DİNAMİK TOKEN ───────────────────────────── */
function TeacherQRDisplay({token, lessonName, teacherName, areaColor, onClose, students, myStudents, lang}){
  const qrRef = useRef(null);
  const qrInstance = useRef(null);
  const [checkins, setCheckins] = useState(()=>getSessionCheckins());
  const [secondsLeft, setSecondsLeft] = useState(600);
  const [rotateLeft, setRotateLeft] = useState(QR_ROTATE_INTERVAL);
  const [currentQRContent, setCurrentQRContent] = useState(()=>buildDynamicQRContent(token));
  const [gpsActive, setGpsActive] = useState(false);
  const intervalRef = useRef(null);
  const rotateRef = useRef(null);
  const pollRef = useRef(null);
  const lastCheckinCount = useRef(0); // Force QR rotation immediately after student checkin

  // GPS durumu kontrol
  useEffect(()=>{
    const s = getActiveQRSession();
    setGpsActive(!!(s && s.teacherLocation));
  },[]);

  // QR içeriği üret ve render et
  function renderQR(content){
    if(!qrRef.current) return;
    qrRef.current.innerHTML = "";
    if(window.QRCode){
      qrInstance.current = new window.QRCode(qrRef.current, {
        text: content,
        width: 220,
        height: 220,
        colorDark: "#0C2340",
        colorLight: "#ffffff",
        correctLevel: window.QRCode.CorrectLevel.H
      });
    }
  }

  useEffect(()=>{
    const initial = buildDynamicQRContent(token);
    setCurrentQRContent(initial);
    renderQR(initial);

    // Session geri sayımı
    intervalRef.current = setInterval(()=>{
      setSecondsLeft(p=>{
        if(p<=1){ clearInterval(intervalRef.current); onClose(); return 0; }
        return p-1;
      });
    },1000);

    // Dinamik QR rotasyonu — her 30 saniyede yenile
    rotateRef.current = setInterval(()=>{
      setRotateLeft(p=>{
        if(p<=1){
          const newContent = buildDynamicQRContent(token);
          setCurrentQRContent(newContent);
          renderQR(newContent);
          return QR_ROTATE_INTERVAL;
        }
        return p-1;
      });
    },1000);

    // Check-in listesi güncelle + yeni giriş varsa QR hemen döndür
    pollRef.current = setInterval(()=>{
      const sess = window._aat_qr_session;
      const currentCount = sess ? (sess.checkinCount||0) : 0;
      if(currentCount > lastCheckinCount.current){
        lastCheckinCount.current = currentCount;
        // Student checked in → rotate QR immediately (anti-replay)
        const newContent = buildDynamicQRContent(token);
        setCurrentQRContent(newContent);
        renderQR(newContent);
        setRotateLeft(QR_ROTATE_INTERVAL); // reset countdown
      }
      setCheckins(getSessionCheckins());
    },800);

    return ()=>{
      clearInterval(intervalRef.current);
      clearInterval(rotateRef.current);
      clearInterval(pollRef.current);
    };
  },[token]);

  const mins = Math.floor(secondsLeft/60);
  const secs = secondsLeft % 60;
  const checkinList = Object.values(checkins);
  const total = myStudents.length;
  const pct = total ? Math.round(checkinList.length/total*100) : 0;
  const rotatePct = Math.round((rotateLeft / QR_ROTATE_INTERVAL) * 100);

  return(
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.88)",zIndex:400,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:16}}>
      <div style={{background:"var(--bg1)",borderRadius:24,width:"100%",maxWidth:380,padding:"18px 16px 20px",boxShadow:"0 20px 60px rgba(0,0,0,0.5)",maxHeight:"95vh",overflowY:"auto"}}>

        {/* Header */}
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12}}>
          <div>
            <div style={{fontSize:15,fontWeight:700,color:"var(--text)"}}>📡 {lang==="en"?"Class QR":lang==="de"?"Unterrichts-QR":"Dersa QR"}</div>
            <div style={{fontSize:11,color:"var(--text2)",marginTop:1}}>{lessonName}</div>
          </div>
          <div style={{textAlign:"right"}}>
            <div style={{fontSize:20,fontWeight:700,color:secondsLeft<60?"#e07878":areaColor,fontFamily:"monospace"}}>
              {mins}:{String(secs).padStart(2,"0")}
            </div>
            <div style={{fontSize:9,color:"var(--text2)"}}>{lang==="en"?"remaining":lang==="de"?"verbleibend":"mayî"}</div>
          </div>
        </div>

        {/* Güvenlik durum çubuğu */}
        <div style={{display:"flex",gap:6,marginBottom:12}}>
          <div style={{flex:1,padding:"5px 8px",borderRadius:8,background:gpsActive?"rgba(93,196,138,0.15)":"rgba(224,120,120,0.15)",border:`1px solid ${gpsActive?"var(--green)":"var(--red)"}`,display:"flex",alignItems:"center",gap:5}}>
            <span style={{fontSize:14}}>{gpsActive?"📍":"📍"}</span>
            <div>
              <div style={{fontSize:9,fontWeight:700,color:gpsActive?"var(--green)":"var(--red)"}}>GPS</div>
              <div style={{fontSize:8,color:"var(--text2)"}}>{gpsActive?(lang==="en"?"Active":lang==="de"?"Aktiv":"Çalak"):(lang==="en"?"Off":lang==="de"?"Aus":"Girtî")}</div>
            </div>
          </div>
          <div style={{flex:1,padding:"5px 8px",borderRadius:8,background:"rgba(93,196,138,0.15)",border:"1px solid var(--green)",display:"flex",alignItems:"center",gap:5}}>
            <span style={{fontSize:14}}>⏱</span>
            <div>
              <div style={{fontSize:9,fontWeight:700,color:"var(--green)"}}>
                {lang==="en"?"Rotates in":lang==="de"?"Erneuert in":"Diguhere"} {rotateLeft}s
              </div>
              <div style={{fontSize:8,color:"var(--text2)"}}>
                {lang==="en"?"Dynamic QR":lang==="de"?"Dynamischer QR":"QR Dînamîk"}
              </div>
            </div>
            {/* Rotate progress ring */}
            <div style={{marginLeft:"auto",width:24,height:24,borderRadius:"50%",background:`conic-gradient(${areaColor} ${rotatePct}%, var(--bg2) 0%)`,display:"flex",alignItems:"center",justifyContent:"center"}}>
              <div style={{width:16,height:16,borderRadius:"50%",background:"var(--bg1)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:8,color:areaColor,fontWeight:700}}>{rotateLeft}</div>
            </div>
          </div>
        </div>

        {/* QR Code */}
        <div style={{display:"flex",justifyContent:"center",marginBottom:12}}>
          <div style={{position:"relative",background:"#fff",borderRadius:16,padding:10,boxShadow:"0 4px 20px rgba(12,35,64,0.15)",border:`3px solid ${areaColor}`}}>
            <div ref={qrRef} id="qr-teacher-canvas" style={{width:220,height:220}}/>
            {/* Rotate flash overlay */}
            {rotateLeft<=3&&(
              <div style={{position:"absolute",inset:0,borderRadius:13,background:`${areaColor}22`,display:"flex",alignItems:"center",justifyContent:"center",pointerEvents:"none"}}>
                <div style={{fontSize:28,fontWeight:900,color:areaColor,opacity:0.7}}>⟳</div>
              </div>
            )}
            {/* Scanline */}
            <div style={{position:"absolute",left:10,right:10,top:10,bottom:10,pointerEvents:"none",overflow:"hidden",borderRadius:8}}>
              <div style={{position:"absolute",left:0,right:0,height:"2px",background:`linear-gradient(90deg,transparent,${areaColor},transparent)`,animation:"scanmove 2.5s linear infinite"}}/>
            </div>
            {/* Corner marks */}
            {[{top:4,left:4},{top:4,right:4},{bottom:4,left:4},{bottom:4,right:4}].map((pos,i)=>(
              <div key={i} style={{position:"absolute",width:20,height:20,borderStyle:"solid",borderColor:areaColor,borderWidth:0,...Object.fromEntries(Object.entries(pos).map(([k,v])=>[k,v])),
                borderTopWidth:Object.keys(pos).includes("top")?3:0,
                borderLeftWidth:Object.keys(pos).includes("left")?3:0,
                borderBottomWidth:Object.keys(pos).includes("bottom")?3:0,
                borderRightWidth:Object.keys(pos).includes("right")?3:0
              }}/>
            ))}
          </div>
        </div>

        {/* Progress */}
        <div style={{marginBottom:12}}>
          <div style={{display:"flex",justifyContent:"space-between",fontSize:12,marginBottom:5}}>
            <span style={{color:"var(--text2)"}}>🎓 {lang==="en"?"Checked in":lang==="de"?"Eingetreten":"Ketine Dersê"}</span>
            <span style={{fontWeight:700,color:"var(--green)"}}>{checkinList.length} / {total}</span>
          </div>
          <div style={{height:7,background:"var(--bg2)",borderRadius:4,overflow:"hidden"}}>
            <div style={{height:"100%",width:`${pct}%`,background:"var(--green)",borderRadius:4,transition:"width 0.5s ease"}}/>
          </div>
        </div>

        {/* Check-in list */}
        {checkinList.length>0&&(
          <div style={{maxHeight:120,overflowY:"auto",marginBottom:12}}>
            {checkinList.map((c)=>(
              <div key={c.no} className="fade-in" style={{display:"flex",alignItems:"center",gap:8,padding:"4px 0",borderBottom:"0.5px solid var(--border)"}}>
                <span style={{fontSize:15}} className="check-anim">✅</span>
                <div style={{flex:1}}>
                  <div style={{fontSize:12,color:"var(--text)",fontWeight:500}}>{c.name}</div>
                  <div style={{fontSize:10,color:"var(--text2)",fontFamily:"monospace"}}>{c.no}</div>
                </div>
                <div style={{textAlign:"right"}}>
                  <div style={{fontSize:10,color:"var(--green)"}}>{c.time}</div>
                  {c.distance!=null&&<div style={{fontSize:9,color:"var(--text2)"}}>📍{c.distance}m</div>}
                </div>
              </div>
            ))}
          </div>
        )}

        {/* Buttons */}
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
          <button onClick={()=>{closeQRSession();onClose();}} style={{padding:"10px",background:"var(--red-bg)",border:"0.5px solid var(--red)",borderRadius:8,color:"var(--red)",fontSize:13,fontWeight:600,cursor:"pointer"}}>
            ✕ {lang==="en"?"Close":lang==="de"?"Schließen":"Bigire"}
          </button>
          <button onClick={()=>setCheckins(getSessionCheckins())} style={{padding:"10px",background:"var(--green-bg)",border:"0.5px solid var(--green)",borderRadius:8,color:"var(--green)",fontSize:13,fontWeight:600,cursor:"pointer"}}>
            🔄 {lang==="en"?"Refresh":lang==="de"?"Aktualisieren":"Nûve bike"}
          </button>
        </div>
      </div>
    </div>
  );
}

/* ─── STUDENT QR SCANNER (reads teacher's QR) ───────────────────────────── */
function StudentQRScanner({student, onClose, toast, lang="ku"}){
  const videoRef  = useRef(null);
  const canvasRef = useRef(null);
  const streamRef = useRef(null);
  const rafRef    = useRef(null);
  const fileRef   = useRef(null);

  // mode: "live" = getUserMedia stream  |  "capture" = file input / photo capture
  const [mode, setMode]           = useState("live");  // try live first
  const [status, setStatus]       = useState("scanning");
  const [cameraOn, setCameraOn]   = useState(false);
  const [camError, setCamError]   = useState("");
  const [manualCode, setManualCode] = useState("");
  const [errorMsg, setErrorMsg]   = useState("");
  const [checkinTime, setCheckinTime] = useState("");
  const [lessonName, setLessonName]   = useState("");
  const [tab, setTab] = useState("camera"); // camera | manual

  /* ── labels ── */
  const L = {
    entry:     lang==="de"?"Unterrichtseingang":lang==="en"?"Class Entry":"Têketina Dersê",
    scanLabel: lang==="de"?"QR-Code des Lehrers scannen":lang==="en"?"Scan teacher's QR code":"Koda QR ya mamosteyê bixwîne",
    manualLabel:lang==="de"?"Code manuell eingeben":lang==="en"?"Enter code manually":"Koda bi destan binivîse",
    retry:     lang==="de"?"Erneut versuchen":lang==="en"?"Try again":"Dîsa biceribîne",
    shoot:     lang==="de"?"Foto aufnehmen & scannen":lang==="en"?"Take photo & scan":"Wêne bigire & bixwîne",
    starting:  lang==="de"?"Kamera wird gestartet…":lang==="en"?"Starting camera…":"Kamera tê destpêkirin…",
    submit:    lang==="de"?"Einreichen":lang==="en"?"Submit":"Bişîne",
    back:      lang==="de"?"Zurück zur Kamera":lang==="en"?"Back to camera":"Vegere kamerayê",
    ok:        lang==="de"?"OK":lang==="en"?"OK":"Baş e",
    confirmed: lang==="de"?"Eingang Bestätigt!":lang==="en"?"Entry Confirmed!":"Têketin Hate Pejirandin!",
    failed:    lang==="de"?"Eingang Fehlgeschlagen":lang==="en"?"Entry Failed":"Têketin Pêk Nehat",
    msgs:{
      ku:{session_not_found:"Civîna dersê ya çalak nehat dîtin.",session_closed:"Civîna dersê hatiye girtin.",session_expired:"Dema QR ya dersê derbas bûye.",token_mismatch:"Koda QR ya şaş an dem bûye.",already_checked_in:"Berê ketina vê dersê qeyd kir.",location_too_far:"📍 Tu ji dersê re dûr î — nêziktir bibe.",location_required:"📍 Ji bo têketinê cih lazim e — GPS-ê veke.",wrong_area:"🚫 Tu ne xwendekarê vê dersê yî."},
      en:{session_not_found:"No active class session found.",session_closed:"Class session has been closed.",session_expired:"Class QR has expired.",token_mismatch:"Invalid or expired QR code.",already_checked_in:"You already checked into this class.",location_too_far:"📍 You are too far from class — move closer.",location_required:"📍 Location required — please enable GPS.",wrong_area:"🚫 You are not enrolled in this class."},
      de:{session_not_found:"Keine aktive Unterrichtssitzung gefunden.",session_closed:"Unterrichtssitzung wurde geschlossen.",session_expired:"Unterrichts-QR ist abgelaufen.",token_mismatch:"Ungültiger oder abgelaufener QR-Code.",already_checked_in:"Sie haben sich bereits in dieser Klasse eingecheckt.",location_too_far:"📍 Sie sind zu weit entfernt — kommen Sie näher.",location_required:"📍 Standort erforderlich — GPS aktivieren.",wrong_area:"🚫 Sie sind nicht in dieser Klasse eingeschrieben."}
    }
  };

  /* ── mount: try live camera, fall back to capture mode ── */
  useEffect(()=>{ tryLive(); return ()=>{ stopLive(); }; },[]);

  async function tryLive(){
    setCamError(""); setCameraOn(false);
    // getUserMedia requires secure context (https or localhost)
    const secure = location.protocol==="https:" || /^(localhost|127\.0\.0\.1)$/.test(location.hostname);
    if(!secure || !navigator.mediaDevices?.getUserMedia){
      setMode("capture"); // fall back silently — no error shown
      return;
    }
    try{
      const stream = await navigator.mediaDevices.getUserMedia({
        video:{ facingMode:{ideal:"environment"}, width:{ideal:1920}, height:{ideal:1080} }
      });
      streamRef.current = stream;
      if(videoRef.current){
        videoRef.current.srcObject = stream;
        await videoRef.current.play();
        setCameraOn(true);
        scanFrame();
      }
    } catch(e){
      setMode("capture"); // silently fall back
    }
  }

  function stopLive(){
    cancelAnimationFrame(rafRef.current);
    if(streamRef.current){ streamRef.current.getTracks().forEach(t=>t.stop()); streamRef.current=null; }
    setCameraOn(false);
  }

  function scanFrame(){
    const video  = videoRef.current;
    const canvas = canvasRef.current;
    if(!video||!canvas) return;
    if(video.readyState < video.HAVE_ENOUGH_DATA){ rafRef.current=requestAnimationFrame(scanFrame); return; }
    const ctx = canvas.getContext("2d");
    canvas.width=video.videoWidth; canvas.height=video.videoHeight;
    ctx.drawImage(video,0,0,canvas.width,canvas.height);
    const img = ctx.getImageData(0,0,canvas.width,canvas.height);
    if(window.jsQR){
      const code = window.jsQR(img.data,img.width,img.height,{inversionAttempts:"dontInvert"});
      if(code?.data){ stopLive(); handleToken(code.data); return; }
    }
    rafRef.current=requestAnimationFrame(scanFrame);
  }

  /* ── file/capture input handler ── */
  function onFileChange(e){
    const file = e.target.files?.[0]; if(!file) return;
    const img = new Image();
    const url = URL.createObjectURL(file);
    img.onload = ()=>{
      const canvas = canvasRef.current || document.createElement("canvas");
      canvas.width=img.width; canvas.height=img.height;
      const ctx = canvas.getContext("2d");
      ctx.drawImage(img,0,0);
      URL.revokeObjectURL(url);
      const data = ctx.getImageData(0,0,canvas.width,canvas.height);
      if(window.jsQR){
        const code = window.jsQR(data.data,data.width,data.height,{inversionAttempts:"attemptBoth"});
        if(code?.data){ handleToken(code.data); return; }
        // no QR found
        setCamError(lang==="de"?"Kein QR-Code gefunden — erneut versuchen":lang==="en"?"No QR code found — try again":"Koda QR nehat dîtin — dîsa biceribîne");
      }
    };
    img.onerror = ()=>{ URL.revokeObjectURL(url); };
    img.src = url;
    // reset input so same file can be re-selected
    e.target.value="";
  }

  /* ── token handling — Cihaz + GPS + dinamik token doğrulama ── */
  async function handleToken(qrContent){
    setStatus("loading");

    // 1. CİHAZ DOĞRULAMA — QR okutmadan önce cihaz kontrolü
    const deviceId = await getDeviceFingerprint();
    const devCheck = await verifyDevice(student.no, deviceId);
    if(!devCheck.ok && devCheck.reason === "device_mismatch"){
      setErrorMsg(
        lang==="ku" ? "🔒 Ev hesab li cîhazekî din tomar bûye. Ji rêveber re vebêje." :
        lang==="en" ? "🔒 This account is registered on another device." :
                      "🔒 Konto ist auf anderem Gerät registriert."
      );
      hapticError(); setStatus("error"); return;
    }

    // 2. GPS konum al (session GPS gerektiriyorsa)
    let studentLocation = null;
    const sess = getActiveQRSession();
    if(sess && sess.teacherLocation){
      try {
        setErrorMsg(lang==="ku"?"📍 Cih tê girtin...":lang==="en"?"📍 Getting location...":"📍 Standort wird ermittelt...");
        studentLocation = await getCurrentPosition();
      } catch(e){
        // GPS alınamazsa checkinToSession reddedecek
      }
    }
    const result = await checkinToSession(qrContent, student, studentLocation);
    if(result.ok){
      const s = getActiveQRSession();
      setLessonName(s?.lessonName||(lang==="de"?"Unterricht":lang==="en"?"Class":"Ders"));
      setCheckinTime(new Date().toLocaleTimeString());
      hapticSuccess(); setStatus("success");
    } else {
      const m = L.msgs[lang]||L.msgs.ku;
      let msg = m[result.reason]||(lang==="de"?"Fehler":lang==="en"?"Error":"Xelet");
      if(result.reason==="location_too_far" && result.distance){
        msg += ` (${result.distance}m)`;
      }
      setErrorMsg(msg);
      hapticError(); setStatus("error");
    }
  }

  /* ── manual code submit — tam QR icerigi zorunlu ── */
  function submitManual(){
    const code = manualCode.trim().toUpperCase(); if(!code) return;
    const s = getActiveQRSession();
    if(!s){
      setErrorMsg(lang==="de"?"Keine aktive Sitzung":lang==="en"?"No active session":"Rûniştina çalak tune");
      setStatus("no_session"); return;
    }
    // Sadece tam QR icerigi kabul edilir — kisayol yok (guvenlik)
    const dynamicContent = buildDynamicQRContent(s.sessionId);
    if(code === dynamicContent){
      handleToken(dynamicContent);
    } else {
      setErrorMsg(lang==="de"?"Falscher Code":lang==="en"?"Wrong code — QR may have rotated, try again":"Kod xelet — QR guherîye, dîsa biceribîne");
      setStatus("error");
    }
  }

  /* ────────────────── RENDER ────────────────── */
  return(
    <div style={{position:"fixed",inset:0,background:"#000",zIndex:500,display:"flex",flexDirection:"column"}}>

      {/* ── Header ── */}
      <div style={{background:"rgba(12,35,64,0.97)",padding:"14px 16px",display:"flex",alignItems:"center",gap:12,flexShrink:0}}>
        <button onClick={()=>{stopLive();onClose();}}
          style={{background:"none",border:"none",color:"#fff",fontSize:24,cursor:"pointer",padding:0,lineHeight:1}}>←</button>
        <div style={{flex:1,color:"#fff",fontSize:15,fontWeight:700}}>📷 {L.entry}</div>
        {/* camera / manual tabs */}
        <div style={{display:"flex",gap:4,background:"rgba(255,255,255,0.1)",borderRadius:8,padding:3}}>
          {[{k:"camera",icon:"📷"},{k:"manual",icon:"⌨️"}].map(t=>(
            <button key={t.k} onClick={()=>setTab(t.k)}
              style={{padding:"5px 11px",borderRadius:6,border:"none",
                background:tab===t.k?"#F7D116":"transparent",
                color:tab===t.k?"#0C2340":"#fff",fontSize:14,cursor:"pointer",fontWeight:700}}>
              {t.icon}
            </button>
          ))}
        </div>
      </div>

      {/* ── Camera tab ── */}
      {(status==="scanning"||status==="no_session")&&tab==="camera"&&(
        <>
          {/* ── LIVE mode: full-screen video ── */}
          {mode==="live"&&(
            <div style={{flex:1,position:"relative",background:"#000",overflow:"hidden"}}>
              <video ref={videoRef} playsInline muted autoPlay
                style={{position:"absolute",inset:0,width:"100%",height:"100%",objectFit:"cover"}}/>
              <canvas ref={canvasRef} style={{display:"none"}}/>

              {/* Loading spinner until stream starts */}
              {!cameraOn&&(
                <div style={{position:"absolute",inset:0,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:16,background:"#000",zIndex:10}}>
                  <div style={{width:48,height:48,borderRadius:"50%",border:"3px solid rgba(247,209,22,0.25)",borderTopColor:"#F7D116",animation:"spin 0.8s linear infinite"}}/>
                  <div style={{color:"rgba(255,255,255,0.45)",fontSize:13}}>{L.starting}</div>
                </div>
              )}

              {/* Scan-frame overlay */}
              {cameraOn&&(
                <div style={{position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"center",pointerEvents:"none"}}>
                  <div style={{position:"absolute",inset:0,background:"rgba(0,0,0,0.42)"}}/>
                  <div style={{position:"relative",width:260,height:260,zIndex:1}}>
                    <div style={{position:"absolute",inset:0,border:"1.5px solid rgba(255,255,255,0.18)",borderRadius:18}}/>
                    {[{top:0,left:0},{top:0,right:0},{bottom:0,left:0},{bottom:0,right:0}].map((p,i)=>(
                      <div key={i} style={{position:"absolute",width:32,height:32,borderStyle:"solid",borderColor:"#F7D116",borderWidth:0,
                        borderTopWidth:p.top!==undefined?3:0,borderBottomWidth:p.bottom!==undefined?3:0,
                        borderLeftWidth:p.left!==undefined?3:0,borderRightWidth:p.right!==undefined?3:0,...p,
                        borderRadius:["8px 0 0 0","0 8px 0 0","0 0 0 8px","0 0 8px 0"][i]}}/>
                    ))}
                    <div style={{position:"absolute",left:12,right:12,height:2,
                      background:"linear-gradient(90deg,transparent,#F7D116,transparent)",
                      animation:"scanmove 2s linear infinite",borderRadius:1}}/>
                  </div>
                  <div style={{position:"absolute",bottom:20,color:"rgba(255,255,255,0.7)",fontSize:12,
                    padding:"7px 18px",borderRadius:20,background:"rgba(0,0,0,0.55)",zIndex:2}}>
                    {L.scanLabel}
                  </div>
                </div>
              )}
            </div>
          )}

          {/* ── CAPTURE mode: big camera button ── */}
          {mode==="capture"&&(
            <div style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:20,padding:28,background:"#0a1628"}}>
              {/* Hidden file input – capture=environment opens back camera */}
              <input ref={fileRef} type="file" accept="image/*" capture="environment"
                style={{display:"none"}} onChange={onFileChange}/>
              <canvas ref={canvasRef} style={{display:"none"}}/>

              {/* Camera preview area */}
              <div onClick={()=>fileRef.current?.click()}
                style={{width:220,height:220,borderRadius:24,border:"2.5px dashed #F7D116",
                  display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",
                  gap:12,cursor:"pointer",background:"rgba(247,209,22,0.05)",
                  boxShadow:"0 0 40px rgba(247,209,22,0.1)"}}>
                <span style={{fontSize:64}}>📸</span>
                <div style={{color:"#F7D116",fontSize:13,fontWeight:700,textAlign:"center",lineHeight:1.5}}>
                  {L.shoot}
                </div>
              </div>

              {camError&&(
                <div style={{color:"#e07878",fontSize:12,textAlign:"center",background:"rgba(163,45,45,0.15)",
                  padding:"10px 16px",borderRadius:10,border:"1px solid rgba(163,45,45,0.3)"}}>
                  {camError}
                </div>
              )}

              <div style={{color:"rgba(255,255,255,0.3)",fontSize:11,textAlign:"center",lineHeight:1.8,maxWidth:240}}>
                {lang==="de"?"Tippen Sie auf das Kamerasymbol, um ein Foto des QR-Codes zu machen":
                 lang==="en"?"Tap the camera icon to take a photo of the QR code":
                 "Ji bo wênegirtina koda QR li ser îkona kamerayê bitikîne"}
              </div>
            </div>
          )}
        </>
      )}

      {/* ── Manual tab ── */}
      {(status==="scanning"||status==="no_session")&&tab==="manual"&&(
        <div style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:28,gap:16}}>
          <div style={{color:"rgba(255,255,255,0.6)",fontSize:13,textAlign:"center",lineHeight:1.8,maxWidth:280}}>
            {lang==="de"?"Geben Sie den Sitzungscode ein, der auf dem Bildschirm des Lehrers angezeigt wird":
             lang==="en"?"Enter the session code shown on the teacher's screen":
             "Koda rûniştinê ya li ser ekrana mamosteyê binivîse"}
          </div>
          <input value={manualCode} onChange={e=>setManualCode(e.target.value.toUpperCase())}
            onKeyDown={e=>e.key==="Enter"&&submitManual()}
            maxLength={40} autoFocus placeholder="AAT-..."
            style={{padding:"16px",fontSize:16,fontFamily:"monospace",fontWeight:700,
              letterSpacing:"0.1em",textAlign:"center",width:"100%",maxWidth:320,
              background:"rgba(255,255,255,0.08)",border:"1.5px solid rgba(255,255,255,0.25)",
              borderRadius:14,color:"#F7D116",outline:"none",WebkitAppearance:"none"}}/>
          <button onClick={submitManual}
            style={{width:"100%",maxWidth:320,padding:"14px",background:"#F7D116",color:"#0C2340",
              border:"none",borderRadius:12,fontSize:15,fontWeight:700,cursor:"pointer"}}>
            {L.submit}
          </button>
        </div>
      )}

      {/* ── QR Share Button ── */}
      {status==="scanning"&&(
        <div style={{position:"absolute",top:12,right:12,zIndex:10}}>
          {navigator.share&&(
            <button onClick={()=>shareContent({title:"Akademîya Aram Tîgran QR",text:"Ji bo tescîla dersê QR-a min / Mein QR-Code für Anwesenheit"})}
              style={{background:"rgba(255,255,255,0.15)",border:"none",borderRadius:10,
                padding:"8px 10px",fontSize:14,cursor:"pointer",color:"#fff"}}
              aria-label="Share QR">
              📤
            </button>
          )}
        </div>
      )}
      {/* ── Success ── */}
      {status==="success"&&(
        <div style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:24}}>
          <div className="check-anim" style={{width:100,height:100,borderRadius:"50%",
            background:"var(--green-bg)",display:"flex",alignItems:"center",justifyContent:"center",
            fontSize:48,marginBottom:20}}>✅</div>
          <div style={{color:"#fff",fontSize:22,fontWeight:700,marginBottom:8}}>{L.confirmed}</div>
          <div style={{color:"rgba(255,255,255,0.7)",fontSize:14,textAlign:"center",marginBottom:6}}>{lessonName}</div>
          <div style={{color:"#7DC499",fontSize:13,marginBottom:4}}>{student.name}</div>
          <div style={{color:"rgba(255,255,255,0.5)",fontSize:12,fontFamily:"monospace",marginBottom:4}}>{student.no}</div>
          <div style={{color:"rgba(255,255,255,0.35)",fontSize:11,marginBottom:36}}>{checkinTime}</div>
          <button onClick={onClose}
            style={{padding:"12px 36px",background:"#F7D116",color:"#0C2340",border:"none",
              borderRadius:12,fontSize:14,fontWeight:700,cursor:"pointer"}}>{L.ok}</button>
        </div>
      )}

      {/* ── Loading (GPS alınıyor) ── */}
      {status==="loading"&&(
        <div style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:24}}>
          <div style={{width:72,height:72,borderRadius:"50%",border:"3px solid rgba(247,209,22,0.25)",borderTopColor:"#F7D116",animation:"spin 0.8s linear infinite",marginBottom:20}}/>
          <div style={{color:"#fff",fontSize:15,fontWeight:600,marginBottom:8}}>
            {lang==="ku"?"📍 Cih tê verastkirin...": lang==="en"?"📍 Verifying location...": "📍 Standort wird überprüft..."}
          </div>
          <div style={{color:"rgba(255,255,255,0.45)",fontSize:12}}>{errorMsg}</div>
        </div>
      )}

      {/* ── Error ── */}
      {(status==="error")&&(
        <div style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:28}}>
          <div style={{fontSize:56,marginBottom:16}}>⚠️</div>
          <div style={{color:"#fff",fontSize:17,fontWeight:700,marginBottom:10}}>{L.failed}</div>
          <div style={{color:"rgba(255,255,255,0.55)",fontSize:13,textAlign:"center",marginBottom:32,lineHeight:1.7}}>{errorMsg}</div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,width:"100%",maxWidth:320}}>
            <button onClick={()=>{setErrorMsg("");setStatus("scanning");setTab("camera");if(mode==="live")tryLive();}}
              style={{padding:"13px",background:"rgba(255,255,255,0.1)",border:"1px solid rgba(255,255,255,0.2)",
                borderRadius:10,color:"#fff",fontSize:13,cursor:"pointer"}}>
              🔄 {L.retry}
            </button>
            <button onClick={onClose}
              style={{padding:"13px",background:"#F7D116",border:"none",borderRadius:10,
                color:"#0C2340",fontSize:13,fontWeight:700,cursor:"pointer"}}>← {L.back}</button>
          </div>
        </div>
      )}

    </div>
  );
}


/* ─── NETWORK STATUS ─────────────────────────────────────────────────────── */
function useOnline(){
  const [online,setOnline]=useState(typeof navigator!=="undefined"?navigator.onLine:true);
  useEffect(()=>{
    const on=()=>{setOnline(true);window.dispatchEvent(new CustomEvent("aat-online"));}
    const off=()=>{setOnline(false);window.dispatchEvent(new CustomEvent("aat-offline"));}
    window.addEventListener("online",on);
    window.addEventListener("offline",off);
    return()=>{window.removeEventListener("online",on);window.removeEventListener("offline",off);}
  },[]);
  return online;
}

function OfflineBanner({online}){
  const [visible,setVisible]=useState(false);
  const [justCame,setJustCame]=useState(false);
  const timerRef=useRef();
  useEffect(()=>{
    if(!online){setVisible(true);setJustCame(false);}
    else if(visible){
      setJustCame(true);
      clearTimeout(timerRef.current);
      timerRef.current=setTimeout(()=>{setVisible(false);setJustCame(false);},2500);
    }
    return()=>clearTimeout(timerRef.current);
  },[online]);
  if(!visible) return null;
  return(
    <div style={{
      position:"fixed",top:0,left:"50%",transform:"translateX(-50%)",
      width:"100%",zIndex:9998,
      background:justCame?"linear-gradient(90deg,#1a7a4a,#0d5c38)":"linear-gradient(90deg,#c0392b,#96281b)",
      padding:"9px 14px",display:"flex",alignItems:"center",gap:8,
      animation:"slideDown .3s ease",boxShadow:"0 4px 16px rgba(0,0,0,0.3)"
    }}>
      <span style={{fontSize:15}}>{justCame?"✅":"📡"}</span>
      <div style={{flex:1}}>
        <div style={{color:"#fff",fontSize:11,fontWeight:700}}>

/* ─── NOTIFICATION SYSTEM ────────────────────────────────────────────────── */
function useNotifications(){
  const [permission,setPermission]=useState(()=>
    typeof Notification!=="undefined"?Notification.permission:"default"
  );
  
  const requestPermission=useCallback(async()=>{
    if(typeof Notification==="undefined") return "denied";
    if(Notification.permission==="granted") return "granted";
    const result=await Notification.requestPermission();
    setPermission(result);
    return result;
  },[]);
  
  const sendLocalNotification=useCallback((title,body,options={})=>{
    if(typeof Notification==="undefined"||Notification.permission!=="granted") return;
    try{
      const n=new Notification(title,{
        body,icon:"/favicon.ico",badge:"/favicon.ico",
        tag:options.tag||"aat-notif",
        ...options
      });
      if(options.onClick) n.onclick=options.onClick;
    }catch(e){console.warn("Notification error:",e);}
  },[]);
  
  return {permission,requestPermission,sendLocalNotification};
}

// 8 karakterli güvenli otomatik şifre: 4 harf + 2 rakam + 2 sembol
// Örnek: KpJv37!@ — Firebase Auth minimum gereksinimlerini karşılar
function genAutoPassword() {
  // 8 haneli tamamen rastgele şifre: büyük/küçük harf + rakam + sembol
  const letters = "ABCDEFGHJKLMNPQRSTUVWXYZabcdefghjkmnpqrstuvwxyz";
  const digits  = "23456789";
  const symbols = "!@#$";
  const r = (s) => s[Math.floor(Math.random() * s.length)];
  const chars = [r(letters),r(letters),r(letters),r(letters),r(digits),r(digits),r(symbols),r(symbols)];
  for(let i=chars.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[chars[i],chars[j]]=[chars[j],chars[i]];}
  return chars.join("");
}


// INIT_STUDENTS ve INIT_TEACHERS'daki plain text "1234" şifreleri
// ilk yüklemede hash'lenir, böylece doğrulama tutarlı olur
async function hashInitData(list) {
  const result = [];
  for (const item of list) {
    if (item.pass && item.pass.length !== 64) {
      // 64 karakter değilse plain text — hash'le
      result.push({...item, pass: await hashPassword(item.pass)});
    } else {
      result.push(item);
    }
  }
  return result;
}

          if(tgts.includes("all")||tgts.includes("teachers")) return true;
          if(tgts.includes(currentUser.area)) return true;
          return false;
        }
        if(currentUser.type==="admin") return true;

      });
      newAnns.forEach(ann=>{

        clearTimeout(annPopupTimer.current);
        setAnnPopup({title:ann.title,msg:ann.msg,senderName:ann.senderName||"Rêveber",senderRole:ann.senderRole||"admin",icon,areaColor:areaEntry?.color||"#F7D116"});
        annPopupTimer.current = setTimeout(()=>setAnnPopup(null), 5500);
      });
    });
    return ()=>{ unsub(); clearTimeout(annPopupTimer.current); };
  },[currentUser]);

  useEffect(()=>{ if(!currentUser) seenAnnIds.current = new Set(); },[currentUser]);

  const onDataChange=useCallback(async (action,payload)=>{
    if(action==="addStudent") {
      // Optimistik güncelleme: Firebase listener gelmeden önce UI'da göster
      setStudents(p=>{
        const exists = p.some(s=>s.id===payload.id);
        return exists ? p : [...p, payload];
      });
      // Firebase'e kaydet — 3 kez dene
      let saved = false;
      for(let attempt = 1; attempt <= 3; attempt++){
        try {
          await fbSave("student", payload);
          saved = true;
          break;
        } catch(e) {
          if(attempt === 3){
            const errCode = e.message || e.code || String(e);
            toast((lang==="en"?"❌ Save failed: ":lang==="de"?"❌ Fehler: ":"❌ Xelet: ")+errCode, 6000);
          } else {
            await new Promise(r => setTimeout(r, 1000 * attempt));
          }
        }
      }
    }
    if(action==="addTeacher") {
      setTeachers(p=>{
        const exists = p.some(tc=>tc.id===payload.id);
        return exists ? p : [...p, payload];
      });
      for(let attempt=1;attempt<=3;attempt++){
        try {
          await fbSave("teacher", payload);
          break;
        } catch(e) {
          if(attempt===3) toast(lang==="en"?"❌ Save failed, check connection":lang==="de"?"❌ Speichern fehlgeschlagen":"❌ Tomarkirina serneket", 5000);
          else await new Promise(r=>setTimeout(r,1000*attempt));
        }
      }
    }
    if(action==="addSchedule") {
      setSchedule(p=>{
        const exists = p.some(ls=>ls.id===payload.id);
        return exists ? p : [...p, payload];
      });
      try {
        await fbSave("schedule", payload);
      } catch(e) {
        toast(lang==="en"?"❌ Save failed":"❌ Tomarkirina serneket");
      }
    }
    if(action==="updateStudent") {
      setStudents(p=>p.map(s=>s.fireId===payload.fireId||(s.id&&s.id===payload.id)?{...payload,fireId:payload.fireId||s.fireId}:s));
      for(let i=1;i<=3;i++){
        try { await fbSave("student", payload); break; }
        catch(e){ if(i===3) toast(lang==="en"?"❌ Update failed":"❌ Nûvekirina serneket",5000); else await new Promise(r=>setTimeout(r,800*i)); }
      }
    }
    if(action==="updateTeacher") {
      setTeachers(p=>p.map(tc=>tc.fireId===payload.fireId||(tc.id&&tc.id===payload.id)?{...payload,fireId:payload.fireId||tc.fireId}:tc));
      for(let i=1;i<=3;i++){
        try { await fbSave("teacher", payload); break; }
        catch(e){ if(i===3) toast(lang==="en"?"❌ Update failed":"❌ Nûvekirina serneket",5000); else await new Promise(r=>setTimeout(r,800*i)); }
      }
    }
    if(action==="updateSchedule") {
      setSchedule(p=>p.map(ls=>ls.id===payload.id?payload:ls));
      for(let i=1;i<=3;i++){
        try { await fbSave("schedule", payload); break; }
        catch(e){ if(i===3) toast(lang==="en"?"❌ Update failed":"❌ Nûvekirina serneket",5000); else await new Promise(r=>setTimeout(r,800*i)); }
      }
    }
    if(action==="deleteSchedule") {
      const delId   = (typeof payload === "object") ? payload.id     : payload;
      const delFire = (typeof payload === "object") ? payload.fireId : null;
      if(delId) setSchedule(p=>p.filter(ls=>String(ls.id)!==String(delId)));
      try { await fbDelete("schedule", delFire || null); } catch(e) { console.warn("Firebase delete error:", e); }
    }
    if(action==="deleteStudent") {
      setStudents(p=>p.filter(s=>{
        const matchFire = payload.fireId && s.fireId && s.fireId===payload.fireId;
        const matchId   = payload.id   && s.id   && String(s.id)===String(payload.id);
        return !matchFire && !matchId;
      }));
      const fid = payload?.fireId || String(payload?.id || "");
      if(fid) {
        try { await fbDelete("student", fid); }
        catch(e) {
          console.warn("Firebase delete error:", e);
          toast(lang==="en"?"❌ Delete failed, check connection":lang==="de"?"❌ Löschen fehlgeschlagen":"❌ Jêbirin serneket — girêdan kontrol bike", 5000);
        }
      } else {
        toast(lang==="en"?"⚠ Student deleted locally only (no Firebase ID)":lang==="de"?"⚠ Nur lokal gelöscht":"⚠ Tenê lokalî hate jêbirin — Firebase ID tune", 4000);
      }
    }
    if(action==="deleteTeacher") {
      setTeachers(p=>p.filter(tc=>{
        const matchFire = payload.fireId && tc.fireId && tc.fireId===payload.fireId;
        const matchId   = payload.id   && tc.id   && String(tc.id)===String(payload.id);
        return !matchFire && !matchId;
      }));
      const fid = payload?.fireId || String(payload?.id || "");
      if(fid) {
        try { await fbDelete("teacher", fid); }
        catch(e) {
          console.warn("Firebase delete error:", e);
          toast(lang==="en"?"❌ Delete failed, check connection":lang==="de"?"❌ Löschen fehlgeschlagen":"❌ Jêbirin serneket — girêdan kontrol bike", 5000);
        }
      } else {
        toast(lang==="en"?"⚠ Teacher deleted locally only (no Firebase ID)":lang==="de"?"⚠ Nur lokal gelöscht":"⚠ Tenê lokalî hate jêbirin — Firebase ID tune", 4000);
      }
    }
  },[toast]);

  function handleLogin(type,user){
    setCurrentUser({...user,type});
    setScreen(type);
    // Welcome notification (delayed to avoid blocking UI)
    setTimeout(()=>{
      try{
        if(typeof Notification!=="undefined"&&Notification.permission==="granted"){
          sendLocalNotification(
            "Akademîya Aram Tîgran",
            (type==="student"?"Xweş hatî: ":"Mamoste: ")+user.name,
            {tag:"aat-login"}
          );
        }
      }catch(e){}
    },500);
  }

  function handleLogout(){
    // Firebase Auth'dan çıkış yap (listener'lar durur)
    const fb = window.__FB;
    if(fb && fb.isConfigured()){
      fb.authSignOut().catch(()=>{});
    }
    setScreen("login");
    setCurrentUser(null);
  }

  return(
    <div style={{width:"100%",height:"100%",background:"var(--bg3)",position:"fixed",top:0,left:0,right:0,bottom:0,display:"flex",flexDirection:"column",overflow:"hidden"}}>
      <FirebaseBanner/>
      <OfflineBanner online={online}/>
      <PWAInstallBanner/>
      {/* Anlık duyuru banner'ı — ekranın üstünde, dismiss edilebilir */}
      {annPopup&&(
        <div className="fade-in" style={{
          position:"fixed",top:"calc(env(safe-area-inset-top,0px) + 12px)",
          left:"50%",transform:"translateX(-50%)",
          width:"calc(100% - 32px)",maxWidth:400,
          background:"linear-gradient(135deg,#0C2340ee,#1a3a6aee)",
          backdropFilter:"blur(16px)",WebkitBackdropFilter:"blur(16px)",
          borderRadius:16,
          border:"1px solid rgba(247,209,22,0.35)",
          boxShadow:"0 8px 32px rgba(0,0,0,0.5)",
          zIndex:9999,overflow:"hidden",
          cursor:"pointer"
        }} onClick={()=>{ clearTimeout(annPopupTimer.current); setAnnPopup(null); }}>
          {/* Progress bar */}
          <div style={{height:3,background:"rgba(255,255,255,0.1)",position:"relative",overflow:"hidden"}}>
            <div style={{
              position:"absolute",left:0,top:0,height:"100%",
              background:annPopup.areaColor||"#F7D116",
              animation:"annProgress 5.5s linear forwards"
            }}/>
          </div>
          <style>{`@keyframes annProgress{from{width:100%}to{width:0%}}`}</style>
          <div style={{padding:"12px 14px",display:"flex",alignItems:"flex-start",gap:10}}>
            <div style={{width:36,height:36,borderRadius:10,background:"rgba(255,255,255,0.12)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,flexShrink:0}}>
              {annPopup.icon}
            </div>
            <div style={{flex:1,minWidth:0}}>
              <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:3}}>
                <span style={{fontSize:10,color:"rgba(247,209,22,0.8)",fontWeight:700,textTransform:"uppercase",letterSpacing:"0.07em"}}>📢 Ragihandin</span>
                <span style={{fontSize:10,color:"rgba(255,255,255,0.4)",marginLeft:"auto"}}>✕</span>
              </div>
              <div style={{fontSize:13,fontWeight:700,color:"#fff",marginBottom:2,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{annPopup.title}</div>
              <div style={{fontSize:11.5,color:"rgba(255,255,255,0.75)",lineHeight:1.4,display:"-webkit-box",WebkitLineClamp:2,WebkitBoxOrient:"vertical",overflow:"hidden"}}>{annPopup.msg}</div>
              <div style={{fontSize:10,color:"rgba(255,255,255,0.4)",marginTop:4}}>{annPopup.senderName}</div>
            </div>
          </div>
        </div>
      )}
      {screen==="login"&&(
        <LoginScreen students={students} teachers={teachers} t={t} lang={lang} setLang={setLang} onLogin={(type,user)=>{handleLogin(type,user);handleNotifRequest();}} onForgot={()=>setScreen("forgot")} dark={dark} onThemeToggle={()=>setDark(d=>!d)}/>
      )}
      {screen==="forgot"&&(
        <ForgotScreen t={t} lang={lang} onBack={()=>setScreen("login")} onSuccess={()=>toast("✓ "+t.forgotSuccess)} students={students} teachers={teachers} onDataChange={onDataChange}/>
      )}
      {screen==="admin"&&currentUser&&(
        <AdminPanel admin={currentUser} students={students} teachers={teachers} schedule={schedule} t={t} lang={lang} toast={toast} onLogout={handleLogout} onDataChange={onDataChange} onSettings={()=>setShowSettings(true)} dark={dark} onThemeToggle={()=>setDark(d=>!d)}/>
      )}
      {screen==="teacher"&&currentUser&&(
        <TeacherPanel teacher={currentUser} students={students} schedule={schedule} t={t} lang={lang} toast={toast} onLogout={handleLogout} onDataChange={onDataChange} onSettings={()=>setShowSettings(true)}/>
      )}
      {screen==="student"&&currentUser&&(
        <StudentPanel student={currentUser} schedule={schedule} t={t} lang={lang} toast={toast} onLogout={handleLogout} onDataChange={onDataChange} onSettings={()=>setShowSettings(true)}/>
      )}
      <Toast msg={toastMsg}/>
      <SettingsSheet open={showSettings} onClose={()=>setShowSettings(false)} dark={dark} onThemeToggle={()=>setDark(d=>!d)} lang={lang} setLang={setLang} t={t} onLegal={(type)=>{setShowSettings(false);setLegalModal(type);}} networkInfo={networkInfo} battery={battery} toast={toast}/>
      {!gdprAccepted && <GDPRBanner lang={lang} onAccept={()=>setGdprAccepted(true)}/>}
      <LiveRegion msg={liveMsg}/>
      {legalModal && <LegalModal type={legalModal} lang={lang} onClose={()=>setLegalModal(null)}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<ErrorBoundary><App/></ErrorBoundary>);
</script>
</body>
</html>
